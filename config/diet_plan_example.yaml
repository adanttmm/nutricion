restricted_foods:
  avoid:
    - "Azúcar refinada"
    - "Harinas refinadas"
    - "Bebidas azucaradas"
    - "Frituras y ultra-procesados"
    - "Aceites vegetales refinados"
  limit_weekly:
    - "Alcohol: máximo 1-2 copas de vino tinto"
    - "Quesos maduros: máximo 2-3 veces"
    - "Carne roja: máximo 2 veces"

cheat_meal:
  per_week: 1
  preferred_day: "sábado"
  preferred_time: "cena"
  notes: "Sin restricciones. Disfrutar plenamente. Puede ser restaurante."

context:
  extra_person_days: "martes, miércoles y viernes"
  meal_prep_day: "domingo"
  gym_calorie_bonus: 150
  salsa_calorie_bonus: 100
