  proteins:
    - "Pollo sin piel"
    - "Salmón"
    - "Atún en agua"
    - "Pavo"
    - "Huevos"
    - "Yogurt griego natural"
    - "Queso cottage"
    - "Camarones"
    - "Queso ricotta"
    - "Robalo / tilapia"
