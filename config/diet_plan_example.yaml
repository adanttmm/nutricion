# ============================================================
# PLAN NUTRICIONAL
# Reemplaza con el plan real de tu nutriólogo.
# Puedes tener múltiples archivos: diet_plan_fase1.yaml, etc.
# ============================================================
plan_name: "Plan de Composición Corporal - Fase 1"
nutritionist: "Dr./Lic. [Nombre del Nutriólogo]"
created_date: "2026-06-01"
goal: "Pérdida de grasa corporal manteniendo masa muscular"

daily_targets:
  calories: 2200
  protein_g: 165     # ~30 % de las calorías (×4 kcal/g)
  carbs_g: 220       # ~40 % de las calorías (×4 kcal/g)
  fat_g: 73          # ~30 % de las calorías (×9 kcal/g)
  fiber_g: 35
  water_liters: 3.0
  sodium_mg: 2300

meal_structure:
  desayuno:
    time: "07:00"
    calories: 450
    protein_g: 35
    carbs_g: 45
    fat_g: 15
    notes: "Alta proteína. Carbohidratos complejos para energía matutina."

  colacion_am:
    time: "10:30"
    calories: 200
    protein_g: 15
    carbs_g: 20
    fat_g: 6
    notes: "Colación ligera. Fruta + proteína o lácteo."

  comida:
    time: "14:00"
    calories: 650
    protein_g: 50
    carbs_g: 65
    fat_g: 20
    notes: "Comida principal. Balance completo. L/M/V hay un tercer comensal."

  colacion_pm:
    time: "17:30"
    calories: 200
    protein_g: 20
    carbs_g: 15
    fat_g: 6
    notes: "Pre-entrenamiento cuando aplique. Carbohidratos + proteína."

  cena:
    time: "20:30"
    calories: 500
    protein_g: 40
    carbs_g: 40
    fat_g: 16
    notes: "Cena moderada. Énfasis en verduras y proteína magra."

  # ~200 kcal de flexibilidad diaria

gym_nutrition:
  pre_workout:
    timing: "45-60 min antes"
    focus: "Carbohidratos de rápida absorción + proteína moderada"
    examples:
      - "Plátano + yogurt griego"
      - "Pan integral + mantequilla de almendra"
      - "Avena + frutos rojos"
  post_workout:
    timing: "30 min después"
    focus: "Proteína de alta calidad + carbohidratos"
    examples:
      - "Pollo + arroz integral"
      - "Huevos + camote"
      - "Batido de proteína + fruta"

