const TRACKING = {"weekly": [], "weight_history": [], "today": {"date": "2026-06-05", "meals": [], "totals": {"calories": 0, "protein_g": 0, "carbs_g": 0, "fat_g": 0}, "goals": null}};
const DAYS     = [{"key": "lunes", "short": "Lun", "name": "# 🟦 LUNES", "menu": "# 🟦 LUNES 08 DE JUNIO — Gym ATM (+150 kcal)\n*Gastronomía: Japonesa / Mediterránea*\n\n---\n\n### 🌅 Desayuno 🏪 🇯🇵\n**Overnight Oats Matcha-Proteico: Avena Fría con Polvo de Proteína de Vainilla, Leche de Avena, Pasta de Matcha, Fresas Maceradas y Nueces Tostadas**\n*Avena hidratada toda la noche con matcha ceremonial, proteína batida y fresas maceradas en miel de agave; acabado con nueces caramelizadas en seco.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **612 · 61g · 55g · 20g** | **198 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g (2 porciones) | 30 g (1 porción) |\n| Avena cruda | 50 g | — |\n| Plátano entero | — | 120 g (1 pieza) |\n| Fresas frescas | 150 g | — |\n| Nueces | 20 g | — |\n| Leche de avena / agua | 200 ml leche avena | agua |\n| Matcha ceremonial | 2 g | — |\n| Miel de agave | 5 g | — |\n\n> 🏪 Prep: ATM mezcla avena + proteína + leche de avena + matcha en frasco hermético; refrigerar. IOB: proteína en polvo + plátano licuados en agua al momento (30 seg).\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Sándwich Estilo Club en Chapata Integral: Pavo Confitado, Espinaca Baby, Jitomate Heritage y Germen de Alfalfa con Aguacate**\n*Chapata integral tostada en seco el domingo, pavo cocido laminado fino, capas vegetales frescas y aguacate al momento.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **781 · 73g · 86g · 17g** | **315 · 29g · 28g · 9g** |\n| Chapata integral | 80 g (1 pieza) | — |\n| Pan integral (rebanada) | — | 30 g (1 rebanada) |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g (3 claras) |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Germen de alfalfa | 10 g | — |\n| Aguacate fresco | 45 g (¼ pieza) | — |\n| Papaya fresca | — | 140 g (1 taza) |\n| Miel de agave | — | 7 g (1 cdita) |\n\n> 🏪 Prep: pavo cocido al vacío / hervido y laminado; claras IOB cocidas duras. Chapata tostada al momento (1 min tostador).\n\n---\n\n### 🍽️ Comida 🏪 🇲🇹\n**Pollo Chermoula Dorado: Pechuga Confitada en Salsa Verde Marroquí con Arroz Jazmín al Azafrán, Zanahorias Glaseadas y Ensalada Crispy**\n*Pechuga confitada en aceite de oliva con cilantro, comino y ajo; servida sobre arroz jazmín perfumado con azafrán y zanahorias glaseadas en miel-limón.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **604 · 63g · 47g · 17g** | **407 · 28g · 18g · 17g** |\n| Pechuga de pollo cocida 🏪 | 200 g | 120 g |\n| Arroz jazmín cocido 🏪 | 200 g (1 taza) | — |\n| Tortilla de harina integral | — | 30 g (1 pieza) |\n| Aguacate fresco | — | 45 g |\n| Chermoula verde 🏪 | 30 g | 30 g |\n| Zanahoria glaseada 🏪 | 80 g | al gusto |\n| Lechuga + jitomate | 90 g | 90 g |\n| Espinaca cruda | 30 g | 30 g |\n| Aceite oliva (en chermoula) | 8 g | 8 g |\n| Gelatina light | — | 240 ml |\n\n> *(Lunes: 2 comensales)*\n> 🏪 Prep: pollo confitado en aceite con chermoula; arroz jazmín con infusión azafrán; zanahorias glaseadas en miel-limón-romero.\n\n---\n\n### 🌿 Colación PM *(pre-entreno gym — +150 kcal ATM)*\n**Power Shake de Proteína con Tostada Integral, Mantequilla de Cacahuate y Jícama Crujiente**\n*Shake denso de proteína con miel de agave; acompañado de tostada integral con mantequilla de cacahuate natural y bastones de jícama.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **637 · 57g · 55g · 19g** | **266 · 27g · 39g · 1g** |\n| Proteína en polvo | 60 g (2 porciones) | 30 g (1 porción) |\n| Pan integral | 30 g (1 rebanada) | — |\n| Mantequilla de cacahuate | 16 g (1 cda) | — |\n| Miel de agave | 14 g (2 cditas) *(+gym)* | — |\n| Jícama fresca | 130 g (1 taza) | 130 g (1 taza) |\n| Manzana verde | — | 180 g (1 pieza) |\n\n> ATM: +150 kcal gym = miel de agave doble (14 g vs 7 g base) + 5 g nueces extra.\n\n---\n\n### 🌙 Cena 🏪 🇮🇹\n**Salmón en Crosta di Erbe con Pasta Integral al Limón, Espárragos Salteados y Reducción de Alcaparras**\n*Salmón cocido en costra de hierbas (eneldo, perejil, cebolla morada); pasta integral al dente con emulsión de limón, alcaparras y espárragos blanqueados.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 64g · 53g · 34g** | **357 · 28g · 56g · 8g** |\n| Salmón cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g (1 taza) | 75 g (½ taza) |\n| Espárragos blanqueados 🏪 | 134 g (1 taza) | 134 g (1 taza) |\n| Cebolla morada | 30 g | — |\n| Aceite oliva + limón | 10 g | 5 g |\n| Alcaparras (reducción) | 15 g | — |\n| Gelatina light | 480 ml | 480 ml |\n\n> 🏪 Prep: salmón horneado en costra de hierbas; pasta integral cocida al dente; espárragos blanqueados 2 min + choque frío.\n\n---\n\n## 📊 Resumen Lunes\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 434** | **1 343** |\n| **Proteína** | **318g** | **137g** |\n| **Carbs** | **296g** | **172g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 427 (gym)* | *1 374* |\n\n---\n---", "recipes": "# 🗓️ LUNES 08 DE JUNIO\n\n---\n\n## 🌅 Desayuno — Overnight Oats Matcha-Proteico\n\n### Overnight Oats Matcha-Proteico con Fresas Maceradas y Nueces Caramelizadas en Seco\n**Tiempo:** prep 8 min · reposo 8 h (noche) | **Porciones:** 1 ATM (ajustar para IOB)\n**Macros por porción ATM:** 612 kcal · P 61g · C 55g · G 20g\n**Macros por porción IOB:** 198 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Proteína en polvo vainilla | 60 g (2 scoops) | 30 g (1 scoop) |\n| Avena cruda (rolled oats) | 50 g | — |\n| Plátano | — | 120 g (1 pieza) |\n| Fresas frescas | 150 g | — |\n| Nueces de castilla | 20 g | — |\n| Leche de avena / agua | 200 ml leche avena | agua c/s |\n| Matcha ceremonial | 2 g | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(domingo)*\n- Batir proteína en polvo con leche de avena hasta disolver grumos; incorporar matcha tamizado y avena cruda en frasco hermético de 500 ml; refrigerar mínimo 8 h\n- Macerar fresas laminadas con miel de agave + ralladura de limón en recipiente aparte; refrigerar\n- Tostar nueces en sartén seca a fuego medio-alto 3–4 min hasta fragancia de avellana; enfriar en papel absorbente; guardar en bolsa hermética a temperatura ambiente\n\n**Elaboración**\n1. **ATM — mañana:** Rescatar frasco del refrigerador; revolver la mezcla con espátula para homogeneizar la proteína que pudo sedimentar. Textura objetivo: pudding denso, cuchareable\n2. Montar fresas maceradas encima sin mezclar — preservar los líquidos del macerado como salsa natural\n3. Finalizar con nueces tostadas al momento del servicio (mantienen crujiente)\n4. **IOB — al momento:** Licuar proteína en polvo + plátano + agua fría 30 seg a velocidad alta; servir de inmediato\n\n**Emplatado**\nFrasco mason jar abierto con capas visibles: base cremosa de avena, fresas maceradas al centro y nueces sobre la cresta. Para IOB, vaso alto con plátano laminado al borde si se sirve en casa.\n\n**Conservación**\nBase de avena (sin fresas ni nueces) hasta 3 días en refrigeración. Fresas maceradas máximo 24 h — se ablandan.\n\n**Tip del chef**\nTamizar el matcha directamente sobre el líquido frío antes de incorporar la proteína evita grumos verdes. Si el matcha se añade junto con el polvo de proteína, se aglomera por la caseína. Temperatura del líquido: máximo 40 °C — el calor degrada los catequinos del matcha ceremonial.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=overnight+oats+matcha+proteico+receta) · [English version](https://www.youtube.com/results?search_query=matcha+protein+overnight+oats+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+overnight+oats+matcha+proteico)\n\n---\n\n## 🍎 Colación AM — Sándwich Club en Chapata Integral\n\n### Sándwich Estilo Club: Pavo Confitado, Espinaca Baby, Jitomate Heritage y Germen con Aguacate\n**Tiempo:** prep 5 min · ensamble 3 min | **Porciones:** 1 ATM / 1 IOB\n**Macros por porción ATM:** 781 kcal · P 73g · C 86g · G 17g\n**Macros por porción IOB:** 315 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Chapata integral | 80 g (1 pieza) | — |\n| Pan integral (rebanada) | — | 30 g (1 rebanada) |\n| Pechuga de pavo cocida | 200 g | 50 g |\n| Claras de huevo cocidas | — | 90 g (3 claras) |\n| Espinaca baby | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Germen de alfalfa | 10 g | — |\n| Aguacate fresco | 45 g (¼ pieza) | — |\n| Papaya fresca | — | 140 g (1 taza) |\n| Miel de agave | — | 7 g (1 cdita) |\n\n**Mise en place** *(domingo)*\n- **Pavo:** Confitar pechuga entera en aceite de oliva a 72 °C durante 45 min; enfriar en el mismo aceite, refrigerar. Al momento: laminar en diagonal a 3 mm — el confitado da cohesión para rebanado limpio sin desgarrar la fibra\n- **Claras IOB:** Cocer huevos enteros 12 min desde agua fría hirviendo; choque en agua-hielo 5 min; pelar y separar claras; refrigerar en agua fría\n- **Chapata:** Tostar en seco en plancha o tostador a potencia alta 1 min — objetivo corteza crujiente, miga tibia\n\n**Elaboración**\n1. Tostar chapata al momento; nunca de mise en place — la humedad del relleno la ablanda en 20 min\n2. Untar aguacate directamente sobre la miga caliente (el calor suaviza y permite esparcir sin romper el pan); sazonar con flor de sal y limón\n3. Construir en capas por barrera de humedad: espinaca seca → pavo laminado → jitomate (sin semillas, escurrido) → germen de alfalfa\n4. **IOB:** Pan integral tostado, claras laminadas, espinaca, jitomate; papaya con miel de agave por separado\n\n**Emplatado**\nCortar en diagonal con cuchillo de sierra; presentar los dos triángulos ligeramente abiertos mostrando las capas. Germen de alfalfa sobre la cresta visible.\n\n**Conservación**\nPavo confitado hasta 5 días en refrigeración sumergido en su aceite. No ensamblar el sándwich con anticipación — máximo 30 min antes de consumir.\n\n**Tip del chef**\nAl confitar el pavo, añadir 3 dientes de ajo aplastados y 2 ramas de tomillo al aceite. La temperatura objetivo es 72 °C sostenida — usar termómetro de sonda. Por encima de 80 °C la pechuga pierde jugosidad irreversiblemente.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=sandwich+club+pavo+chapata+integral+gourmet) · [English version](https://www.youtube.com/results?search_query=gourmet+turkey+club+sandwich+whole+grain)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+sandwich+club+pavo+confitado+chapata)\n\n---\n\n## 🍽️ Comida — Pollo Chermoula Dorado\n\n### Pollo Chermoula Dorado con Arroz Jazmín al Azafrán, Zanahorias Glaseadas y Ensalada Crispy\n**Tiempo:** prep 15 min · cocción 35 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción ATM:** 604 kcal · P 63g · C 47g · G 17g\n**Macros por porción IOB:** 407 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Pechuga de pollo cocida | 200 g | 120 g |\n| Arroz jazmín cocido | 200 g (1 taza) | — |\n| Tortilla harina integral | — | 30 g (1 pieza) |\n| Aguacate fresco | — | 45 g |\n| Chermoula verde | 30 g | 30 g |\n| Zanahoria glaseada | 80 g | al gusto |\n| Lechuga + jitomate | 90 g | 90 g |\n| Espinaca cruda | 30 g | 30 g |\n| Aceite de oliva (en chermoula) | 8 g | 8 g |\n| Gelatina light | — | 240 ml |\n\n**Mise en place** *(domingo)*\n- **Chermoula verde:** Procesar cilantro (40 g), perejil (20 g), ajo (3 dientes), comino molido (4 g), páprika (3 g), jugo de limón (30 ml), aceite de oliva (30 ml), sal. Textura: pasta húmeda granular — no emulsionar completamente. Refrigerar hasta 5 días\n- **Pollo confitado en chermoula:** Marinar pechugas 12 h en chermoula; confitar en aceite de oliva a 70–72 °C por 40 min; enfriar; laminar o desmechar. Refrigerar en chermoula\n- **Arroz jazmín al azafrán:** Infusionar 0.2 g azafrán en 30 ml agua caliente 10 min; incorporar al agua de cocción del arroz (ratio 1:1.5); cocinar a fuego mínimo tapado 15 min; reposar 5 min. Refrigerar\n- **Zanahorias glaseadas:** Reducir miel de agave (15 g) + jugo de limón (20 ml) + romero (1 rama) en sartén; incorporar zanahorias en bastones blanqueados 3 min; glasear a fuego medio hasta lacado brillante. Refrigerar\n\n**Elaboración**\n1. Regenerar pollo: en sartén antiadherente a fuego alto con aceite mínimo, dorar 2 min por lado para recuperar corteza — temperatura interna 70 °C\n2. Regenerar arroz en sartén con 15 ml agua tapado, fuego bajo 3 min; separar granos con tenedor\n3. Glasear zanahorias regeneradas 1 min en el mismo líquido original reducido\n4. Ensalada: mezclar lechuga troceada + espinaca + jitomate sin semillas; aliñar con aceite de oliva + limón + flor de sal solo al momento del servicio\n5. **IOB:** Tortilla calentada en comal seco 30 seg; montar pollo + chermoula + aguacate; ensalada por separado\n\n**Emplatado**\nATM: base de arroz al centro del plato hondo; pollo laminado inclinado sobre el arroz; zanahorias a un costado; ensalada en bowl separado para preservar crujiente. Hilo de chermoula sobre el pollo.\n\n**Conservación**\nPollo + chermoula: 4 días refrigerado. Arroz: 3 días. Zanahorias glaseadas: 3 días. Ensalada: armar siempre al momento.\n\n**Tip del chef**\nLa chermoula pierde intensidad aromática con el calor — reservar 10 g de la preparación en frío para añadir sobre el plato terminado. La diferencia entre chermoula cocinada (fondo) y cruda (acabado) da complejidad aromática en tres tiempos.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=pollo+chermoula+arroz+azafran+receta) · [English version](https://www.youtube.com/results?search_query=chermoula+chicken+saffron+rice+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+pollo+chermoula+arroz+jazmin+azafran)\n\n---\n\n## 🌿 Colación PM — Power Shake Pre-Entreno\n\n### Power Shake Proteico con Tostada Integral, Mantequilla de Cacahuate y Jícama Crujiente\n**Tiempo:** prep 5 min | **Porciones:** 1 ATM / 1 IOB\n**Macros por porción ATM (+gym):** 637 kcal · P 57g · C 55g · G 19g\n**Macros por porción IOB:** 266 kcal · P 27g · C 39g · G 1g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Proteína en polvo | 60 g (2 scoops) | 30 g (1 scoop) |\n| Pan integral | 30 g (1 rebanada) | — |\n| Mantequilla de cacahuate natural | 16 g (1 cda) | — |\n| Miel de agave | 14 g (2 cditas) *+gym* | — |\n| Jícama fresca en bastones | 130 g | 130 g |\n| Manzana verde | — | 180 g (1 pieza) |\n\n**Mise en place** *(domingo)*\n- Jícama pelada y cortada en bastones de 8 × 1 cm; conservar en agua fría con jugo de limón para evitar oxidación y mantener turgencia\n\n**Elaboración**\n1. **ATM:** Batir proteína con 300 ml agua fría en shaker 20 seg; en días de gym añadir miel de agave directamente al shaker — se integra mejor con el líquido que untada aparte\n2. Tostar pan integral; untar mantequilla de cacahuate cuando está caliente — la temperatura abre los poros y la mantequilla penetra en lugar de quedar superficial\n3. Jícama escurrida y seca para máximo crujiente\n4. **IOB:** Shake básico + jícama + manzana verde en gajos\n\n**Emplatado**\nConsumo funcional pre-entreno: shake en vaso alto, tostada + bastones de jícama en recipiente de transporte.\n\n**Tip del chef**\nConsumir máximo 45 min antes del entreno. La miel de agave (fructosa + glucosa de absorción escalonada) da energía sostenida vs. glucosa simple que pica y baja. Para ATM en días sin gym: reducir miel a 7 g y omitir los 5 g de nueces extra.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteico+pre+entreno+meal+prep) · [English version](https://www.youtube.com/results?search_query=pre+workout+protein+shake+peanut+butter+meal+prep)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteico+pre+entreno+mantequilla+cacahuate)\n\n---\n\n## 🌙 Cena — Salmón en Crosta di Erbe\n\n### Salmón en Crosta di Erbe con Pasta Integral al Limón, Espárragos Salteados y Reducción de Alcaparras\n**Tiempo:** prep 15 min · cocción 25 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción ATM:** 800 kcal · P 64g · C 53g · G 34g\n**Macros por porción IOB:** 357 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Salmón (filete con piel) | 250 g | 120 g |\n| Pasta integral cocida | 150 g | 75 g |\n| Espárragos | 134 g (1 taza) | 134 g (1 taza) |\n| Cebolla morada | 30 g | — |\n| Aceite oliva + limón | 10 g aceite + 20 ml limón | 5 g aceite + 10 ml limón |\n| Alcaparras | 15 g | — |\n| Gelatina light | 480 ml | 480 ml |\n\n**Para la crosta di erbe:**\n- Eneldo fresco 10 g · Perejil plano 10 g · Ralladura de limón 1 pieza · Ajo en polvo 2 g · Panko integral 20 g · Aceite de oliva 8 g · Flor de sal\n\n**Mise en place** *(domingo)*\n- **Crosta:** Procesar hierbas + panko + ralladura + aceite hasta arena húmeda verde; refrigerar en bolsa plana — la grasa del aceite mantiene cohesión\n- **Salmón:** Secar filetes con papel absorbente; portar temperatura (sacar 20 min antes de cocinar) — crítico para cocción pareja\n- **Pasta integral:** Cocer al dente (2 min menos que el tiempo del paquete); enfriar en agua fría; emulsionar con aceite de oliva para evitar pegado; refrigerar\n- **Espárragos:** Blanquear 2 min en agua hirviendo salada + 30 seg choque en agua-hielo; refrigerar secos\n- **Reducción de alcaparras:** Reducir alcaparras + jugo de limón (30 ml) + aceite de oliva (10 ml) + cebolla morada brunoise a fuego medio 8 min; enfriar\n\n**Elaboración**\n1. **Salmón:** Sellar lado piel en sartén de hierro a fuego alto con aceite mínimo 3 min — piel crujiente y grasa subcutánea rendida; voltear, apagar fuego\n2. Cubrir lado carne con crosta presionando ligeramente; gratinar en horno a 220 °C posición grill 3–4 min hasta costra dorada. Temperatura interna objetivo: 52–54 °C (medio) — jugoso con textura sedosa\n3. Regenerar pasta en sartén con 20 ml agua + aceite de oliva + ralladura de limón; movimiento constante para emulsionar. Ajustar sal\n4. Saltear espárragos regenerados en el fondo de la misma sartén del salmón — aprovechar la grasa residual del sello; 2 min fuego alto\n5. Calentar reducción de alcaparras a fuego mínimo; no hervir para preservar acidez brillante\n\n**Emplatado**\nPasta enroscada con pinzas formando nido al centro; salmón apoyado en ángulo sobre la pasta con crosta visible al frente; espárragos cruzados; reducción de alcaparras en hilo sobre el salmón y plato. Ralladura de limón fresca al terminar.\n\n**Conservación**\nSalmón horneado: consumir el mismo día — la crosta absorbe humedad en refrigeración. Pasta emulsionada: 2 días. Reducción de alcaparras: 4 días refrigerada en frasco.\n\n**Tip del chef**\nEl error más común es sobrecocinar el salmón esperando que pierda el tono translúcido completamente. A 52 °C el centro aún luce ligeramente oscuro — es el punto donde la proteína coaguló sin expulsar agua. Usar termómetro de sonda, no tiempo, como indicador de punto.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+costra+hierbas+pasta+integral+limon+receta) · [English version](https://www.youtube.com/results?search_query=herb+crusted+salmon+whole+wheat+pasta+lemon+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+crosta+erbe+pasta+integral+limon+alcaparras)\n\n---"}, {"key": "martes", "short": "Mar", "name": "# 🟩 MARTES", "menu": "# 🟩 MARTES 09 DE JUNIO — Salsa ambos (+100 kcal) · 3er comensal comida\n*Gastronomía: Francesa / Mexicana contemporánea*\n\n---\n\n### 🌅 Desayuno 🏪 🇫🇷\n**Crêpe Proteica à la Française: Proteína de Vainilla con Plátano Flambé, Canela y Miel de Agave**\n*Base de proteína en polvo batida con huevo y avena fina formando crêpe; rellena de plátano caramelizado en canela y  Vegetales libres (rábano, cilantro) | al gusto | al gusto |\n| Gelatina light | — | 240 ml |\n\n> *(3 porciones ATM × proteína + arroz; IOB su porción habitual)*\n> 🏪 Prep: res confitada en adobo 4 h; arroz rojo; cebolla encurtida en jugo de habanero + vinagre.\n\n---\n\n### 🌿 Colación PM *(+100 kcal salsa — ambos)*\n**Shake Proteico con Tostada Integral, Mantequilla de Cacahuate, Manzana Verde y Jícama**\n*Shake cremoso con miel de agave extra; bastones de jícama y manzana como acompañamiento refrescante post-ensayo.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **587 · 57g · 52g · 19g** | **366 · 27g · 49g · 1g** |\n| Proteína en polvo | 60 g (2 porciones) | 30 g (1 porción) |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 14 g (+salsa boost) | 7 g |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | 90 g (½) *(+salsa)* | 180 g (1 pieza) |\n\n> Ambos +100 kcal salsa: ATM añade manzana media extra; IOB duplica miel de agave.\n\n---\n\n### 🌙 Cena 🏪 🇯🇵\n**Teriyaki de Salmón Glaseado: Filete Lacado con Salsa Teriyaki Casera, Pasta Integral Soba-Style, Espárragos Sésamo y Ensalada de Cebolla Morada**\n*Salmón lacado en glaseado teriyaki de mirin-soya reducida; pasta integral como base; espárragos finalizados con sésamo tostado.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 63g · 53g · 34g** | **356 · 28g · 56g · 8g** |\n| Salmón cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos blanqueados 🏪 | 134 g | 134 g |\n| Salsa teriyaki casera 🏪 | 25 ml | 15 ml |\n| Cebolla morada | 30 g | — |\n| Sésamo tostado | 5 g | 3 g |\n| Aceite sésamo | 5 g | 3 g |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Martes\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 383** | **1 639** |\n| **Proteína** | **316g** | **137g** |\n| **Carbs** | **290g** | **182g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 377 (salsa)* | *1 474 (salsa)* |\n\n---\n---", "recipes": "# 🗓️ MARTES 09 DE JUNIO\n\n---\n\n## 🌅 Desayuno — Crêpe Proteica à la Française\n\n### Crêpe Proteica à la Française con Plátano Flambé, Canela y Miel de Agave\n**Tiempo:** prep 10 min · cocción 8 min | **Porciones:** 1 ATM / 1 IOB\n**Macros por porción ATM:** 613 kcal · P 60g · C 54g · G 20g\n**Macros por porción IOB:** 197 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Proteína en polvo vainilla | 60 g (2 scoops) | 30 g (1 scoop) |\n| Avena cruda (molida fina) | 50 g | — |\n| Plátano | 120 g (en crêpe) | 120 g (licuado) |\n| Fresas frescas | 150 g | — |\n| Nueces de castilla | 20 g | — |\n| Miel de agave | 5 g | — |\n| Canela molida | c/s | c/s |\n\n**Mise en place** *(domingo)*\n- **Base de crêpe ATM:** Moler avena cruda hasta harina fina en procesador; mezclar con proteína en polvo (40 g — reservar 20 g para relleno), 1 huevo entero, 150 ml leche de avena, pizca de vainilla; reposar 30 min en refrigeración — el reposo hidrata la avena y da textura sedosa, no granulosa\n- **Congelar crêpes crudas** en papel parafinado o cocinar y refrigerar apiladas con papel entre capas\n- **Nueces:** Tostar en seco; enfriar; guardar hermético\n\n**Elaboración**\n1. **ATM — crêpe:** Sartén antiadherente de 20 cm a fuego medio con film de aceite de coco; verter 60 ml de masa; inclinar rápidamente en círculo para capa delgada uniforme — 90 seg lado 1, 30 seg lado 2. Textura: bordes que se despegan solos, superficie mate\n2. **Relleno — plátano flambé:** En la misma sartén caliente, saltear rodajas de plátano 1 min; añadir canela + miel de agave; desglasar con 10 ml de ron oscuro si se tiene — flamear o evaporar 30 seg. Resultado: plátano lacado, caramelizado en los bordes\n3. Enrollar crêpe sobre el relleno; cubrir con fresas maceradas + nueces tostadas; los 20 g de proteína reservados pueden disolverse en 50 ml leche de avena caliente como salsa tipo crema inglesa proteica para acabar el plato\n4. **IOB:** Licuar proteína + plátano + agua + canela 30 seg; servir con fresas si las hay disponibles\n\n**Emplatado**\nCrêpe enrollada o doblada en triángulo; fresas laminadas en abanico lateral; nueces sobre la cresta; hilo de miel de agave en espiral. Canela en polvo tamizada desde altura.\n\n**Conservación**\nCrêpes cocidas apiladas con papel: 3 días refrigeradas, 1 mes congeladas. Regenerar 30 seg en sartén seca a fuego bajo — no microondas, pierden textura.\n\n**Tip del chef**\nLa proteína en polvo de caseína funciona mejor que la de suero para crêpes — coagula más lento y da elasticidad. Si solo se tiene suero (whey), reducir la cantidad a 40 g total y compensar con 10 g adicionales de avena molida para evitar que la crêpe se rompa al doblar.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=crepe+proteica+platano+caramelizado+receta) · [English version](https://www.youtube.com/results?search_query=protein+crepe+caramelized+banana+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+crepe+proteica+platano+flambe+canela)\n\n---\n\n## 🍎 Colación AM — Torta Gourmet de Pavo\n\n### Torta Gourmet de Pavo con Chapata Integral, Aguacate, Jitomate Asado y Germen\n**Tiempo:** prep 5 min · ensamble 3 min | **Porciones:** 1 ATM / 1 IOB\n**Macros por porción ATM:** 780 kcal · P 73g · C 85g · G 17g\n**Macros por porción IOB:** 314 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Chapata integral | 80 g (1 pieza) | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida | 200 g | 50 g |\n| Claras de huevo cocidas | — | 90 g (3 claras) |\n| Espinaca baby | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Germen de alfalfa | 10 g | — |\n| Aguacate fresco | 45 g (¼ pieza) | — |\n| Papaya fresca | — | 140 g (1 taza) |\n| Miel de agave | — | 7 g (1 cdita) |\n\n**Mise en place** *(domingo — misma base que lunes)*\n- Pavo confitado del domingo laminado fino; refrigerado en aceite de confitado\n- Jitomate asado al rescoldo: colocar jitomates enteros directamente en hornilla de gas a fuego directo, rotar con pinzas hasta que la piel se ennegrece en manchas y la pulpa cede al tacto — 6–8 min; pelar, desechar piel carbonizada, escurrir jugo excedente; refrigerar\n- Claras IOB en agua fría, refrigeradas\n\n**Elaboración**\n1. Tostar chapata en plancha de hierro a fuego alto 1.5 min por lado — presionar ligeramente con espátula para marcas de plancha y costra uniforme\n2. La textura del jitomate asado es completamente diferente al crudo: pulpa ahumada, concentrada, sin la acidez brillante — colocar sin escurrir excesivamente para que impregne la miga\n3. Construir de adentro hacia afuera: aguacate aplastado grueso en la miga inferior → espinaca → pavo laminado en abanico → jitomate asado → germen como capa final de textura\n4. Sazonar con flor de sal + unas gotas de limón sobre el aguacate; no usar mayonesa ni salsas adicionales — el aceite del confitado en el pavo aporta grasa suficiente\n5. **IOB:** Pan integral tostado, claras laminadas, espinaca, jitomate fresco (no asado); papaya con miel por separado\n\n**Emplatado**\nPresentar abierto tipo open sandwich si es en casa; cerrado y envuelto en papel kraft si es para llevar. Germen desbordando visiblemente.\n\n**Conservación**\nJitomates asados: 4 días refrigerados en recipiente con su jugo. No ensamblar el sándwich con anticipación.\n\n**Tip del chef**\nEl jitomate asado directamente en la llama (método árabe/mexicano) desarrolla compuestos de Maillard en la piel que la piel cruda nunca alcanza. Si no hay hornilla de gas, usar el grill del horno a máxima temperatura con jitomates cortados a la mitad cara abajo — 12 min a 250 °C.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=torta+gourmet+pavo+aguacate+jitomate+asado) · [English version](https://www.youtube.com/results?search_query=gourmet+turkey+sandwich+roasted+tomato+avocado)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+torta+pavo+confitado+jitomate+asado+aguacate)\n\n---\n\n## 🍽️ Comida — Birria de Res Contemporánea\n\n### Birria de Res Contemporánea: Filete Confitado en Chile Guajillo-Ancho, Consomé Reducido y Cebolla Encurtida en Habanero\n**Tiempo:** prep 20 min · cocción 4 h (mise en place) · regeneración 15 min | **Porciones:** 3 ATM + 1 IOB\n**Macros por porción ATM:** 603 kcal · P 63g · C 46g · G 17g\n**Macros por porción IOB:** 406 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n| Ingrediente | ATM (×3) | IOB |\n|---|---|---|\n| Filete de res magro cocido | 600 g (200 g × 3) | 120 g |\n| Arroz rojo cocido | 600 g (200 g × 3) | — |\n| Tortilla harina integral | — | 30 g (1 pieza) |\n| Aguacate fresco | — | 45 g |\n| Cebolla encurtida | 90 g (30 g × 3) | 30 g |\n| Consomé de birria | 450 ml (150 ml × 3) | 150 ml |\n| Rábano, cilantro | al gusto | al gusto |\n| Gelatina light | — | 240 ml |\n\n**Para el adobo de birria:**\n- Chile guajillo seco 40 g · Chile ancho 20 g · Ajo 6 dientes · Cebolla blanca 100 g · Jitomate 200 g · Canela en raja 1 pieza · Clavo entero 3 piezas · Comino 3 g · Orégano seco 4 g · Vinagre blanco 30 ml · Sal\n\n**Mise en place** *(domingo — requiere más tiempo)*\n- **Adobo:** Tostar chiles secos en comal seco 20 seg por lado (hasta que aromatizan sin humear); rehidratar en agua caliente 20 min; licuar con jitomates asados, ajo, cebolla, especias y vinagre hasta pasta homogénea; colar por malla fina\n- **Confitar la res:** Marinar filete en adobo 12 h; confitar sumergido en adobo + caldo de res a 85 °C durante 3.5–4 h hasta que cede a la presión del dedo sin desmoronarse — la carne debe desmechar en tiras limpias, no en polvo. Separar caldo (consomé) y desgrasarlo parcialmente. Refrigerar carne y consomé por separado\n- **Arroz rojo:** Sofreír arroz crudo seco a fuego medio hasta color arena dorado (tostado seco); incorporar adobo base (50 g) + caldo de pollo; cocinar cubierto a fuego mínimo 18 min; reposar 5 min. Refrigerar\n- **Cebolla encurtida en habanero:** Cebolla morada en juliana fina, escaldar 30 seg en agua hirviendo + choque frío (elimina picor sin quitar color); marinar en jugo de limón (60 ml) + vinagre de manzana (30 ml) + sal + 1 habanero sin semillas en tiras finas; mínimo 2 h, mejor 24 h. Refrigerar hasta 2 semanas\n\n**Elaboración**\n1. Regenerar consomé a fuego medio; desgrasar superficie con cuchara si es necesario; rectificar sal; debe quedar limpio y brillante\n2. Regenerar carne de birria en sartén con 30 ml de consomé — fuego medio-alto, movimiento constante para que el adobo glace la carne sin secarla. 4–5 min\n3. Regenerar arroz rojo en sartén con 20 ml agua, tapado, fuego bajo 3 min; granos separados\n4. Para servir: carne sobre arroz; consomé en bowl separado con las guarniciones (rábano laminado, cilantro, cebolla encurtida escurrida)\n5. **IOB:** Tortilla calentada en comal seco; tacos con carne + cebolla encurtida; consomé en vaso; aguacate al lado\n\n**Emplatado**\nPlato hondo: arroz como base; carne de birria sobre el arroz; cebolla encurtida rosa sobre la carne; consomé servido en jarrita o taza de barro al lado para verter al gusto. Cilantro fresco y rábano laminado como guarnición de color.\n\n**Conservación**\nBirria (carne + consomé): 5 días refrigerada, 3 meses congelada. Cebolla encurtida: 2 semanas refrigerada — mejora con el tiempo.\n\n**Tip del chef**\nLa clave de un consomé de birria limpio está en no hervir nunca a burbuja grande durante el confitado — el hervor violento emulsiona la grasa con el caldo y lo opaca. Temperatura constante a 85 °C (apenas tiembla la superficie). Si el consomé queda turbio, clarificar con claras de huevo batidas en frío.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=birria+de+res+contemporanea+receta+gourmet) · [English version](https://www.youtube.com/results?search_query=mexican+birria+beef+contemporary+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+birria+res+chile+guajillo+ancho+consome)\n\n---\n\n## 🌿 Colación PM — Shake Proteico Post-Ensayo\n\n### Shake Proteico con Tostada Integral, Mantequilla de Cacahuate, Manzana Verde y Jícama\n**Tiempo:** prep 5 min | **Porciones:** 1 ATM / 1 IOB\n**Macros por porción ATM (+salsa):** 587 kcal · P 57g · C 52g · G 19g\n**Macros por porción IOB (+salsa):** 366 kcal · P 27g · C 49g · G 1g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Proteína en polvo | 60 g (2 scoops) | 30 g (1 scoop) |\n| Pan integral | 30 g (1 rebanada) | — |\n| Mantequilla de cacahuate natural | 16 g (1 cda) | — |\n| Miel de agave | 14 g (2 cditas) *+salsa* | 7 g (1 cdita) |\n| Jícama fresca en bastones | 130 g | 130 g |\n| Manzana verde | 90 g (½) *+salsa* | 180 g (1 pieza) |\n\n**Mise en place** *(domingo)*\n- Jícama en bastones conservada en agua-limón; manzana verde cortada al momento para evitar oxidación (o con jugo de limón si se corta antes)\n\n**Elaboración**\n1. **ATM:** Shake en shaker con agua fría + miel de agave integrada; tostar pan y untar mantequilla de cacahuate caliente; manzana en gajos con limón; jícama escurrida\n2. La manzana verde (ácido málico) después de actividad física ayuda a recuperación muscular por su efecto en el ciclo de Krebs — no es decorativa\n3. **IOB:** Shake básico + jícama + manzana completa; duplicar miel de agave vs. días base para reponer glucógeno post-salsa\n\n**Emplatado**\nConsumo funcional: shake en vaso de 500 ml; tostada + bastones en recipiente portable.\n\n**Conservación**\nPreparar shake al momento — la proteína de suero se degrada en textura pasados 30 min.\n\n**Tip del chef**\nPara mantequilla de cacahuate natural sin azúcar añadida: verificar que el único ingrediente sea cacahuate (y sal opcional). Las versiones comerciales \"light\" tienen maltodextrina que eleva los carbos sin aportar grasas buenas. La separación del aceite natural en el frasco es señal de calidad — revolver antes de usar.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteico+mantequilla+cacahuate+jicama+colacion) · [English version](https://www.youtube.com/results?search_query=protein+shake+peanut+butter+jicama+snack+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+colacion+shake+proteico+mantequilla+cacahuate+manzana+jicama)\n\n---\n\n## 🌙 Cena — Teriyaki de Salmón Glaseado\n\n### Teriyaki de Salmón Glaseado con Pasta Integral Soba-Style, Espárragos Sésamo y Cebolla Morada\n**Tiempo:** prep 10 min · cocción 20 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción ATM:** 800 kcal · P 63g · C 53g · G 34g\n**Macros por porción IOB:** 356 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n| Ingrediente | ATM | IOB |\n|---|---|---|\n| Salmón (filete con piel) | 250 g | 120 g |\n| Pasta integral cocida | 150 g | 75 g |\n| Espárragos blanqueados | 134 g | 134 g |\n| Salsa teriyaki casera | 25 ml | 15 ml |\n| Cebolla morada | 30 g | — |\n| Sésamo tostado | 5 g | 3 g |\n| Aceite de sésamo | 5 g | 3 g |\n| Gelatina light | 480 ml | 480 ml |\n\n**Para la salsa teriyaki casera:**\n- Soya baja en sodio 60 ml · Mirin 40 ml · Sake 30 ml (o vino blanco seco) · Miel de agave 15 g · Jengibre fresco rallado 5 g · Ajo 1 diente rallado\n\n**Mise en place** *(domingo)*\n- **Salsa teriyaki:** Reducir todos los ingredientes en sartén a fuego medio hasta que napa la cuchara y cae en hilo — aprox. 8–10 min. Enfriar; refrigerar hasta 2 semanas. La reducción concentra el umami y carameliza los azúcares del mirin para el glaseado\n- **Salmón:** Secar filetes; marinar en 30 ml de salsa teriyaki 2 h máximo — más tiempo y la sal de la soya desnaturaliza la proteína superficial endureciendo la textura\n- **Pasta integral:** Cocer al dente; enjuagar con agua fría; emulsionar con aceite de sésamo (5 g) para evitar pegado; refrigerar\n- **Espárragos:** Blanquear 2 min + choque frío; refrigerar secos\n\n**Elaboración**\n1. **Salmón teriyaki:** Retirar del marinado y secar ligeramente — el exceso de humedad impide el glaseado. Sartén de hierro o antiadherente grueso a fuego medio-alto; colocar lado piel 3 min sin mover (piel crujiente y autoliberante); voltear 2 min; pincelar con salsa teriyaki concentrada y repetir 2 veces más con 1 min entre capas. Temperatura interna: 52–54 °C. El glaseado debe verse lacado, brillante, con ligero caramelizado en los bordes\n2. **Pasta soba-style:** En sartén con aceite de sésamo a fuego medio, saltear cebolla morada en juliana fina 2 min; incorporar pasta fría; añadir 20 ml de salsa teriyaki diluida con 20 ml de agua; saltear 2 min. Textura: pasta suelta, ligeramente glaseada\n3. **Espárragos:** Saltear en el fondo de la sartén del salmón 2 min fuego alto; terminar con sésamo tostado añadido fuera del fuego para no quemar\n\n**Emplatado**\nPasta girada con pinzas en base del plato; espárragos cruzados sobre la pasta; salmón recostado con piel hacia arriba para mostrar la costra lacada; hilo de salsa teriyaki sobre el salmón; sésamo en lluvia fina; microgreens o cebollín en diagonal si se tiene.\n\n**Conservación**\nSalmón glaseado: consumir el mismo día — el glaseado se cristaliza en refrigeración y la textura cambia. Pasta y espárragos: 2 días. Salsa teriyaki: 2 semanas refrigerada.\n\n**Tip del chef**\nEl secreto del glaseado teriyaki en capas está en aplicar la salsa cuando la sartén está fuera del fuego directo momentáneamente — si la salsa toca la superficie a fuego máximo, el azúcar del mirin se quema (amargo) antes de caramelizar (dulce-umami). Tres capas de pincelado con 60 seg de reposo entre cada una construyen profundidad de sabor imposible de lograr con una sola aplicación abundante.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+teriyaki+glaseado+pasta+integral+receta) · [English version](https://www.youtube.com/results?search_query=glazed+teriyaki+salmon+whole+wheat+pasta+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+teriyaki+glaseado+pasta+integral+esparragos+sesamo)\n\n---"}, {"key": "miercoles", "short": "Mié", "name": "# 🟨 MIÉRCOLES", "menu": "# 🟨 MIÉRCOLES 10 DE JUNIO — Gym ATM (+150 kcal) · 3er comensal comida\n*Gastronomía: Peruana / Nórdica*\n\n---\n\n### 🌅 Desayuno 🏪 🇵🇪\n**Quinoa Bowl Andino: Proteína de Vainilla, Quinoa Cocida, Mango Congelado, Fresas y Semillas de Chía**\n*Quinoa blanca cocida al vapor como base; batido proteico de vainilla a modo de leche; mango congelado y fresas frescas; chía hidratada toda la noche.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **609 · 60g · 56g · 20g** | **197 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g | 30 g (en agua) |\n| Quinoa cocida 🏪 | 100 g | — |\n| Plátano | — | 120 g |\n| Mango congelado | 80 g | — |\n| Fresas | 100 g | — |\n| Nueces | 20 g | — |\n| Chía | 10 g | — |\n| Miel de agave | 5 g | — |\n\n> 🏪 Prep: quinoa cocida en lote; fresas frescas cortar al momento.\n\n---\n\n### 🍎 Colación AM 🏪 🇳🇴\n**Smørrebrød Nórdico de Pavo: Pan Integral con Crema de Rábano, Pavo Laminado, Pepino Encurtido y Eneldo Fresco**\n*Reinterpretación del clásico danés: pan integral denso con untado de rábano, pavo confitado laminado, pepino en escabeche ligero y eneldo.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **781 · 73g · 85g · 17g** | **315 · 29g · 28g · 9g** |\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Pepino encurtido 🏪 | 40 g | 40 g |\n| Rábano | 20 g | 20 g |\n| Espinaca cruda | 30 g | 30 g |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n---\n\n### 🍽️ Comida *(3er comensal — misma porción que ATM)* 🏪 🇵🇪\n**Lomo Saltado Contemporáneo: Filete de Res en Salsa de Soya-Ostión, Arroz Blanco Perfumado, Pimientos Tricolor y Papas Confitadas**\n*Clásico peruano reinterpretado: res marinada en soya-Worcestershire; pimientos y cebolla morada confitados; arroz al vapor; papa amarilla confitada.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **604 · 63g · 47g · 17g** | **406 · 28g · 18g · 17g** |\n| Filete de res magro cocido 🏪 | 200 g | 120 g |\n| Arroz blanco cocido 🏪 | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Pimiento tricolor confitado 🏪 | 80 g | 80 g |\n| Papa amarilla confitada 🏪 | 50 g | — |\n| Salsa lomo saltado 🏪 | 30 ml | 20 ml |\n| Cebolla morada 🏪 | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Gelatina light | — | 240 ml |\n\n> 🏪 Prep: res sous vide + sellado rápido; salsa de soya-ostión reducida; pimientos confitados; papa amarilla confitada.\n\n---\n\n### 🌿 Colación PM *(pre-entreno gym — +150 kcal ATM)*\n**Shake de Proteína Doble con Tostada, Mantequilla de Cacahuate, Miel y Jícama**\n*Shake potente pre-entreno con carbohidratos de rápida absorción y mantequilla de cacahuate para energía sostenida.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **637 · 57g · 56g · 19g** | **266 · 27g · 39g · 1g** |\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 14 g (+gym) | — |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | — | 180 g |\n\n---\n\n### 🌙 Cena 🏪 🇳🇴\n**Salmón Nórdico Confitado: Filete en Aceite de Eneldo con Pasta Integral, Espárragos con Limón Nórdico y Cebolla Morada Caramelizada**\n*Salmón confitado suavemente en aceite de oliva + eneldo; pasta integral con mantequilla de limón micro-emulsionada; espárragos al vapor.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **799 · 63g · 53g · 34g** | **356 · 28g · 56g · 8g** |\n| Salmón confitado 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Cebolla morada caramelizada 🏪 | 30 g | — |\n| Aceite oliva + eneldo | 10 g | 5 g |\n| Limón (jugo) | ½ pieza | ½ pieza |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Miércoles\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 430** | **1 340** |\n| **Proteína** | **316g** | **137g** |\n| **Carbs** | **297g** | **172g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 427 (gym)* | *1 374* |\n\n---\n---", "recipes": "# 🗓️ MIÉRCOLES 10 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Quinoa Bowl Andino: Proteína de Vainilla, Quinoa Cocida, Mango Congelado, Fresas y Semillas de Chía\n\n**Tiempo:** prep 5 min · cocción 0 min (todo pre-hecho) | **Porciones:** ATM + IOB\n**Macros ATM:** 609 kcal · P 60g · C 56g · G 20g\n**Macros IOB:** 197 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Quinoa blanca cocida | 100 g | — |\n| Plátano maduro | — | 120 g |\n| Mango congelado | 80 g | — |\n| Fresas frescas | 100 g | — |\n| Nueces | 20 g | — |\n| Chía hidratada (desde noche anterior) | 10 g | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(domingo)*\n- Quinoa cocida al vapor en lote, conservar en contenedor hermético\n- Chía hidratada en proporción 1:8 con agua o leche vegetal, mínimo 8 h en refrigeración\n- Fresas limpias enteras en contenedor; cortar al momento de servir\n\n**Elaboración**\n1. **Base proteica:** Disolver proteína en 150–180 ml de agua fría batiendo vigorosamente; debe quedar cremosa, sin grumos. Para ATM, mezclar directamente con la quinoa cocida a temperatura ambiente — la quinoa actuará como \"grano de desayuno\" absorbiendo el líquido.\n2. **Fruta ATM:** Descongelar el mango 5 min a temperatura ambiente para textura semi-fría; cortar fresas en cuartos al momento.\n3. **Ensamble ATM:** Quinoa + mezcla proteica como base; acomodar mango y fresas en secciones; añadir chía hidratada, nueces enteras y hilo de agave.\n4. **Bowl IOB:** Proteína en agua fría sobre plátano en rodajas. Sin capas elaboradas — directo y limpio.\n\n**Emplatado**\nBowl profundo con quinoa como base compacta; fruta acomodada en tercios para contraste de color; nueces y chía como topping central. Miel en hilo fino al final.\n\n**Conservación**\nQuinoa cocida: 5 días en refrigeración. Chía hidratada: 4 días. Fresas cortadas: consumir el mismo día.\n\n**Tip del chef**\nLa quinoa cocida fría tiene índice glucémico significativamente menor que caliente — ventaja para control de glucosa matutino. Si la mezcla proteica queda muy espesa, afinar con 20–30 ml de agua adicional antes de incorporar al bowl.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=quinoa+bowl+proteico+desayuno+andino) · [English version](https://www.youtube.com/results?search_query=protein+quinoa+breakfast+bowl)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+quinoa+bowl+andino+proteico)\n\n---\n\n## 🍎 Colación AM\n\n### Smørrebrød Nórdico de Pavo: Pan Integral con Crema de Rábano, Pavo Laminado, Pepino Encurtido y Eneldo Fresco\n\n**Tiempo:** prep 8 min · cocción 0 min (todo pre-hecho) | **Porciones:** ATM + IOB\n**Macros ATM:** 781 kcal · P 73g · C 85g · G 17g\n**Macros IOB:** 315 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida, laminada | 200 g | 50 g |\n| Claras de huevo cocidas | — | 90 g |\n| Pepino encurtido | 40 g | 40 g |\n| Rábano fresco | 20 g | 20 g |\n| Espinaca cruda | 30 g | 30 g |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n**Mise en place** *(domingo)*\n- Pechuga de pavo cocida en lote (sous vide 65°C/2 h o confitada); laminada en frío a 3 mm — la carne fría se lamina limpiamente\n- Pepino encurtido en escabeche ligero: vinagre blanco + agua (1:1), sal, azúcar mínima, eneldo seco, 24 h mínimo\n- Claras cocidas duras; refrigerar peladas en contenedor con agua fría\n\n**Elaboración**\n1. **Crema de rábano (ATM):** Rallar rábanos finamente; mezclar con aguacate machacado 45 g, sal de mar y unas gotas de limón hasta obtener pasta untable con textura — no homogénea, se busca rusticidad.\n2. **Pan:** Chapata integral a temperatura ambiente o tostada 90 seg en plancha seca a fuego medio-alto para crosta ligera sin resecarse.\n3. **Ensamble ATM:** Untar crema de rábano-aguacate generosamente; cama de espinacas crudas; pavo laminado en capas ligeramente superpuestas; pepino encurtido escurrido; rábano en láminas finas con mandolina.\n4. **Ensamble IOB:** Pan tostado, espinaca, pavo laminado, pepino encurtido, claras en cuartos. Papaya aparte con hilo de miel.\n\n**Emplatado**\nSmørrebrød abierto sobre tabla de madera o plato plano; corte diagonal que exponga las capas. Rábano en láminas translúcidas como elemento decorativo final.\n\n**Conservación**\nPavo laminado: 4 días en refrigeración bien sellado. Pepino encurtido: 2 semanas. Ensamblar siempre al momento para evitar pan empapado.\n\n**Tip del chef**\nEl escabeche del pepino debe estar frío y bien escurrido al momento de ensamblar — el exceso de líquido arruina la textura del pan en minutos. Si usas eneldo fresco (no seco), agrégalo solo al momento de servir; el calor y la humedad lo ennegrecen rápidamente.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=smorrebrod+nordico+pan+integral+pavo) · [English version](https://www.youtube.com/results?search_query=smorrebrod+open+sandwich+turkey+nordic)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+smorrebrod+nordico+pavo+pepino+encurtido)\n\n---\n\n## 🍽️ Comida *(3er comensal — misma porción que ATM)*\n\n### Lomo Saltado Contemporáneo: Filete de Res en Salsa de Soya-Ostión, Arroz Blanco Perfumado, Pimientos Tricolor y Papas Confitadas\n\n**Tiempo:** prep 10 min · cocción 8 min (saltado) | **Porciones:** 3 × ATM + 1 × IOB\n**Macros ATM/3er comensal:** 604 kcal · P 63g · C 47g · G 17g\n**Macros IOB:** 406 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes** *(por porción ATM; ×3 para los tres comensales)*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Filete de res magro cocido | 200 g | 120 g |\n| Arroz blanco cocido | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Pimiento tricolor confitado | 80 g | 80 g |\n| Papa amarilla confitada | 50 g | — |\n| Salsa lomo saltado | 30 ml | 20 ml |\n| Cebolla morada | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n\n**Mise en place** *(domingo)*\n- **Res:** Sous vide 55°C/1.5 h para término medio-rojo; enfriar en baño de hielo, laminar en tiras de 1.5 cm × 5 cm. Sellar en wok a fuego máximo al momento (30 seg por lado — solo colorear, ya está cocida)\n- **Salsa lomo saltado:** Reducir soya baja en sodio + salsa de ostión + Worcestershire + ajo + toque de vinagre de arroz. Ratio: 3:1:1. Reducir 30% hasta napar cuchara\n- **Pimientos tricolor:** Confitar en aceite de oliva a 130°C/25 min con ajo y tomillo; reservar en su aceite\n- **Papa amarilla:** Confitar en aceite a 140°C/20 min desde frío hasta que un palillo entre sin resistencia; escurrir y secar\n- **Cebolla morada:** Cortar en pluma gruesa; reservar cruda para saltar al momento\n\n**Elaboración**\n1. **Wok a temperatura máxima** — debe humear antes de agregar cualquier ingrediente. El lomo saltado auténtico requiere \"wok hei\" (sabor a quemado-ahumado del fuego vivo).\n2. Agregar aceite de maíz o canola (no oliva — punto de humo insuficiente); sellar tiras de res 30–45 seg sin mover. Retirar y reservar.\n3. En el mismo wok: cebolla morada en pluma, saltear 60 seg a fuego máximo hasta que los bordes carbonizan ligeramente — esto es intencional y característico del plato.\n4. Agregar pimientos confitados (ya cocidos, solo calentar), jitomate en gajos; 30 seg.\n5. Regresar res; añadir salsa pre-elaborada; mezclar en movimiento constante 45 seg. La salsa debe glasear la carne, no encharcarse.\n6. Papa confitada: calentar aparte en sartén con aceite mínimo para crujiente exterior; incorporar al plato al emplatado, no al wok (pierden textura).\n7. **IOB:** Calentar porciones en sartén; servir sobre tortilla integral con aguacate en láminas.\n\n**Emplatado**\nArroz moldeado en timbal lateral; lomo saltado al centro con salsa brillante; papa confitada apoyada verticalmente. Cebolla de color morada-dorada como guarnición visible. Unas gotas de aceite del confitado de pimientos para brillo.\n\n**Conservación**\nRes sous vide sin sellar: 4 días. Salsa reducida: 1 semana. Pimientos confitados en aceite: 2 semanas en refrigeración. Papa confitada: 3 días (recalentar en sartén, nunca microondas).\n\n**Tip del chef**\nEl error más común del lomo saltado en casa es sobrecargar el wok — con ingredientes para 3 personas, dividir en dos tandas. La temperatura cae drásticamente con exceso de masa y el resultado es estofado, no saltado. Temperatura mínima del wok: 280°C antes de cada tanda.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=lomo+saltado+peruano+contemporaneo+wok) · [English version](https://www.youtube.com/results?search_query=lomo+saltado+peruvian+stir+fry+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+lomo+saltado+contemporaneo+peruano)\n\n---\n\n## 🌿 Colación PM *(pre-entreno gym — +150 kcal ATM)*\n\n### Shake de Proteína Doble con Tostada, Mantequilla de Cacahuate, Miel y Jícama\n\n**Tiempo:** prep 5 min · cocción 0 min | **Porciones:** ATM + IOB\n**Macros ATM:** 637 kcal · P 57g · C 56g · G 19g\n**Macros IOB:** 266 kcal · P 27g · C 39g · G 1g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate natural | 16 g | — |\n| Miel de agave | 14 g (+gym) | — |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | — | 180 g |\n\n**Mise en place**\n- Jícama pelada y en bastones gruesos desde el domingo; conservar en agua fría con limón para evitar oxidación\n- Mantequilla de cacahuate natural (sin azúcares añadidos) a temperatura ambiente para untabilidad óptima\n\n**Elaboración**\n1. **Shake ATM:** Proteína en 250 ml de agua fría; batir 30 seg en coctelera o licuadora. Objetivo: completamente liso, temperatura <10°C — el frío mejora percepción de sabor en proteínas de vainilla.\n2. **Tostada:** Pan integral en tostador al nivel máximo para crosta firme que soporte el untado sin romperse. Untar mantequilla de cacahuate inmediatamente sobre pan caliente para que se funda ligeramente en la superficie. Hilo de agave encima.\n3. **Jícama ATM/IOB:** Servir en bastones como elemento crocante lateral — función táctil y digestiva (fibra prebiótica).\n4. **IOB:** Shake simple en agua; manzana verde en gajos con piel.\n\n**Emplatado**\nShake en vaso alto con hielo; tostada al lado. Bastones de jícama en vasito vertical o en abanico sobre el plato. Consumir dentro de 20–30 min pre-entreno para absorción óptima de carbohidratos.\n\n**Tip del chef**\nLa miel de agave en esta colación no es opcional para el día de gym — el fructo-oligosacárido del agave tiene absorción más lenta que glucosa pura, ideal para esfuerzo de 60–90 min. No sustituir con miel de abeja (glucosa directa, pico más pronunciado).\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteico+pre+entreno+mantequilla+cacahuate) · [English version](https://www.youtube.com/results?search_query=pre+workout+protein+shake+peanut+butter+toast)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=colacion+pre+entreno+proteina+mantequilla+cacahuate+jicama)\n\n---\n\n## 🌙 Cena\n\n### Salmón Nórdico Confitado: Filete en Aceite de Eneldo con Pasta Integral, Espárragos con Limón Nórdico y Cebolla Morada Caramelizada\n\n**Tiempo:** prep 15 min · cocción 25 min (confit) + 10 min ensamble | **Porciones:** ATM + IOB\n**Macros ATM:** 799 kcal · P 63g · C 53g · G 34g\n**Macros IOB:** 356 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón confitado | 250 g | 120 g |\n| Pasta integral cocida | 150 g | 75 g |\n| Espárragos | 134 g | 134 g |\n| Cebolla morada caramelizada | 30 g | — |\n| Aceite de oliva + eneldo | 10 g | 5 g |\n| Jugo de limón | ½ pieza | ½ pieza |\n| Gelatina light | 480 ml | 480 ml |\n\n**Mise en place** *(domingo)*\n- **Salmón confitado:** Sumergir filetes en aceite de oliva con eneldo fresco, piel de limón y sal de mar. Temperatura de confit: 52–55°C en horno o baño de agua controlado, 20–25 min. El salmón estará opaco pero translúcido en el centro — esto es correcto. Enfriar en su aceite; refrigerar\n- **Pasta integral:** Cocer al dente (-1 min del tiempo indicado), enfriar en agua helada, mezclar con 5 ml de aceite del confit para evitar adherencia\n- **Espárragos:** Blanquear 90 seg en agua hirviendo con sal; baño de hielo inmediato para fijar color verde brillante. Refrigerar\n- **Cebolla caramelizada:** Cebolla morada en pluma fina, caramelizar a fuego bajo con aceite de oliva mínimo 30 min hasta color ámbar profundo y textura melosa\n\n**Elaboración**\n1. **Regeneración del salmón:** El confit pre-hecho se regenera en su propio aceite a 50°C en sartén antiadherente, 3–4 min por lado tapado. No superar 58°C interno — la proteína se contrae y pierde textura sedosa que es la razón de existir del confit.\n2. **Mantequilla de limón micro-emulsionada (ATM):** En sartén caliente, desglasear con jugo de limón; fuera del fuego, montar con 8 g del aceite de confit aromatizado (ya tiene eneldo incorporado) en movimiento circular rápido. Textura: salsa nacarada que envuelve la pasta sin encharcarse.\n3. **Pasta:** Calentar en la misma sartén del desglose de limón; incorporar salsa emulsionada; 60 seg a fuego medio. Debe brillar y cubrir cada espiral.\n4. **Espárragos:** Calentar en sartén seca a fuego alto 60 seg; terminar con gotas de limón y sal. No sobrecocinar — deben tener resistencia al morder.\n5. **Cebolla caramelizada:** Calentar a temperatura ambiente o tibio; no recalentar agresivamente.\n\n**Emplatado**\nTwirl de pasta al centro con pinzas formando nido compacto; salmón apoyado en ángulo sobre la pasta, piel hacia arriba si quedó crocante; espárragos en paralelo al costado; cebolla caramelizada sobre el salmón como corona. Unas gotas del aceite de confit alrededor del plato para brillo y aroma.\n\n**Conservación**\nSalmón confitado en su aceite: 3 días en refrigeración (el aceite actúa como barrera). Pasta cocida: 3 días. Espárragos blanqueados: 3 días. Cebolla caramelizada: 1 semana.\n\n**Tip del chef**\nGuardar el aceite del confit de salmón — es un condimento de alta concentración de omega-3 y sabor. Usarlo para saltear verduras, emulsionar salsas o aderezar ensaladas durante la semana. No se desperdicia.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+confitado+nordico+aceite+eneldo+pasta+integral) · [English version](https://www.youtube.com/results?search_query=nordic+confit+salmon+dill+oil+pasta)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+nordico+confitado+eneldo+pasta+integral)\n\n---\n---"}, {"key": "jueves", "short": "Jue", "name": "# 🟧 JUEVES", "menu": "# 🟧 JUEVES 11 DE JUNIO — Salsa ambos (+100 kcal)\n*Gastronomía: Árabe / Mediterránea*\n\n---\n\n### 🌅 Desayuno 🏪 🇱🇧\n**Ful Medames Proteico: Proteína de Vainilla con Frijol Negro Especiado, Avena Árabe, Fresas y Nueces al Za'atar**\n*Inspirado en el desayuno árabe: avena cocida con especias cálidas (comino, canela), proteína batida y fresas; nueces tostadas con toque de za'atar.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **612 · 61g · 55g · 20g** | **198 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda | 50 g | — |\n| Plátano | — | 120 g |\n| Fresas | 150 g | — |\n| Nueces | 20 g | — |\n| Comino + canela | c/s | — |\n| Miel de agave | 5 g | — |\n\n---\n\n### 🍎 Colación AM 🏪 🇱🇧\n**Flatbread Árabe de Pavo con Labneh Ligero, Za'atar, Jitomate Confitado y Pepino Fresco**\n*Chapata integral como base de flatbread; labneh de yogurt 0% con za'atar casero; pavo confitado; jitomate confitado en aceite; pepino fresco.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **779 · 73g · 85g · 17g** | **314 · 29g · 28g · 9g** |\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Labneh 0% | 30 g | — |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Za'atar | 3 g | — |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n---\n\n### 🍽️ Comida 🏪 🇲🇽\n**Pollo en Salsa de Chile Pasilla con Arroz Integral, Ejotes Salteados y Ensalada de Nopales Asados**\n*Pechuga confitada en salsa oscura de pasilla-ajo; arroz integral perfumado con hoja de laurel; nopales asados marinados en vinagre y orégano.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **603 · 63g · 46g · 17g** | **405 · 28g · 18g · 17g** |\n| Pechuga de pollo cocida 🏪 | 200 g | 120 g |\n| Arroz integral cocido 🏪 | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Salsa pasilla 🏪 | 40 ml | 30 ml |\n| Ejotes blanqueados 🏪 | 80 g | 80 g |\n| Nopales asados 🏪 | 80 g | 80 g |\n| Jitomate + lechuga | 90 g | 90 g |\n| Gelatina light | — | 240 ml |\n\n> *(Jueves: 2 comensales)*\n> 🏪 Prep: pollo confitado; salsa pasilla reducida; ejotes blanqueados; nopales asados marinados.\n\n---\n\n### 🌿 Colación PM *(+100 kcal salsa — ambos)*\n**Shake Proteico con Tostada de Mantequilla de Cacahuate, Miel Extra y Bastones de Jícama**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **587 · 57g · 52g · 19g** | **366 · 27g · 49g · 1g** |\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 14 g (+salsa) | 7 g |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | 90 g (½) | 180 g |\n\n---\n\n### 🌙 Cena 🏪 🇸🇦\n**Salmón Harissa: Filete Marinado en Pasta Harissa Casera, Pasta Integral con Chermoula Blanca, Espárragos Asados y Cebolla Morada en Escabeche de Sumac**\n*Salmón marinado en harissa de chile de árbol-pimiento asado-comino; pasta integral con salsa blanca ligera de yogurt-limón-eneldo; espárragos asados.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 63g · 53g · 34g** | **357 · 28g · 56g · 8g** |\n| Salmón marinado-cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Harissa casera 🏪 | 20 g | 10 g |\n| Cebolla morada en sumac 🏪 | 30 g | — |\n| Aceite oliva | 10 g | 5 g |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Jueves\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 381** | **1 640** |\n| **Proteína** | **317g** | **137g** |\n| **Carbs** | **291g** | **182g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 377 (salsa)* | *1 474 (salsa)* |\n\n---\n---", "recipes": "# 🗓️ JUEVES 11 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Ful Medames Proteico: Proteína de Vainilla con Frijol Negro Especiado, Avena Árabe, Fresas y Nueces al Za'atar\n\n**Tiempo:** prep 5 min · cocción 5 min (avena) | **Porciones:** ATM + IOB\n**Macros ATM:** 612 kcal · P 61g · C 55g · G 20g\n**Macros IOB:** 198 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda (old-fashioned) | 50 g | — |\n| Plátano maduro | — | 120 g |\n| Fresas frescas | 150 g | — |\n| Nueces | 20 g | — |\n| Comino molido + canela | c/s | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(domingo)*\n- Fresas limpias enteras en contenedor hermético; cortar al momento\n- Nueces tostadas en seco a 160°C/8 min; enfriar completamente antes de guardar — el tostado activa aceites y potencia sabor\n\n**Elaboración**\n1. **Avena árabe:** Cocer avena en agua (no leche) con pizca de comino molido y canela — ratio 1:2, fuego medio, 4–5 min hasta absorción total. La avena debe quedar cremosa pero con textura, no papilla. Retirar del fuego 30 seg antes de punto final — el reposo termina la cocción.\n2. **Proteína como \"leche árabe\":** Disolver proteína de vainilla en 120 ml de agua fría; agregar sobre la avena caliente fuera del fuego. El calor residual integra la proteína sin desnaturalizarla agresivamente — textura cremosa sin grumos.\n3. **Especiado:** El comino y canela en la avena es la referencia al ful medames (desayuno árabe de habas especiadas) — no sobrepasar ¼ cdita de cada uno; aromáticos, no dominantes.\n4. **Topping ATM:** Fresas en cuartos, nueces tostadas, hilo de agave. El za'atar de la inspiración conceptual se traduce aquí en el comino — si se tiene za'atar real, una pizca sobre las nueces eleva el plato.\n5. **IOB:** Proteína en agua fría + plátano en rodajas.\n\n**Emplatado**\nBowl amplio; avena como base ligeramente volcánica al centro; fresas en abanico a un lado; nueces agrupadas al otro. Canela en polvo espolvoreada desde altura para patrón natural.\n\n**Conservación**\nAvena cocida: 3 días en refrigeración (regenerar con splash de agua en microondas 60 seg). Nueces tostadas: 2 semanas en frasco hermético a temperatura ambiente.\n\n**Tip del chef**\nLa avena old-fashioned (hojuelas enteras) tiene índice glucémico 15–20 puntos menor que la avena instantánea. Para el contexto de día de salsa (actividad vespertina), esta carga glucémica moderada en ayuno es óptima. Nunca usar avena instantánea en preparaciones gourmet — la textura es irreversiblemente inferior.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=ful+medames+avena+arabe+proteico+desayuno) · [English version](https://www.youtube.com/results?search_query=arabic+inspired+protein+oatmeal+bowl+spiced)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+ful+medames+proteico+avena+arabe)\n\n---\n\n## 🍎 Colación AM\n\n### Flatbread Árabe de Pavo con Labneh Ligero, Za'atar, Jitomate Confitado y Pepino Fresco\n\n**Tiempo:** prep 8 min · cocción 0 min (todo pre-hecho) | **Porciones:** ATM + IOB\n**Macros ATM:** 779 kcal · P 73g · C 85g · G 17g\n**Macros IOB:** 314 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida, laminada | 200 g | 50 g |\n| Claras de huevo cocidas | — | 90 g |\n| Labneh 0% (yogurt colado) | 30 g | — |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate fresco o confitado | 60 g | al gusto |\n| Za'atar | 3 g | — |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n**Mise en place** *(domingo)*\n- **Labneh casero:** Yogurt griego 0% en manta de cielo, 12–24 h en refrigeración; resultado: queso fresco cremoso de alta proteína. Si comprar labneh comercial, verificar que sea 0% grasa\n- **Jitomate confitado:** Jitomates cherry o saladet en mitades, aceite de oliva, ajo, tomillo, 120°C/45–60 min hasta concentración y ligera caramelización de bordes; conservar en su aceite\n- Pavo laminado desde lote del domingo (misma prep que miércoles)\n- Claras cocidas duras en agua fría\n\n**Elaboración**\n1. **Za'atar casero funcional:** Mezclar za'atar comercial (mezcla de tomillo seco, zumaque, ajonjolí tostado) con pizca de sal. Si no hay za'atar, sustituir con: tomillo seco + ajonjolí tostado + pizca de zumaque en polvo (o limón deshidratado).\n2. **Labneh especiado:** Mezclar labneh con 2 g de za'atar, ralladura de limón, sal. Textura: untable firme, no líquida — si quedó muy espeso del colado, afinar con 5 ml de agua.\n3. **Pan:** Chapata integral en plancha 90 seg por lado a fuego medio-alto — buscar marcas de parrilla y crosta exterior manteniendo interior suave. No tostar completamente; el flatbread árabe tiene contraste crujiente-esponjoso.\n4. **Ensamble ATM:** Labneh al za'atar como base generosa; espinaca cruda; pavo en láminas sobrepuestas; jitomate confitado bien escurrido; aguacate en láminas; acabar con pizca adicional de za'atar y hilo del aceite del confitado.\n5. **IOB:** Pan tostado simple, espinaca, pavo, claras en cuartos, jitomate fresco. Papaya con miel aparte.\n\n**Emplatado**\nChapata en corte diagonal o rectangular servida abierta sobre tabla de madera; capas visibles desde el lateral. Hilo del aceite de jitomate confitado como elemento brillante final.\n\n**Conservación**\nLabneh colado: 5 días bien tapado. Jitomate confitado en aceite: 2 semanas. Ensamblar al momento de consumir.\n\n**Tip del chef**\nEl labneh colado casero tiene hasta 3× más proteína que el yogurt de origen por concentración. Para la colación AM de alto requerimiento proteico (73g ATM), este untado aporta proteína de caseína de digestión lenta — complementa la leucina de la pechuga de pavo perfectamente. Colar mínimo 18 h para textura óptima.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=flatbread+arabe+labneh+zaatar+pavo+confitado) · [English version](https://www.youtube.com/results?search_query=arabic+flatbread+labneh+zaatar+turkey+open+sandwich)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+flatbread+arabe+labneh+zaatar+pavo)\n\n---\n\n## 🍽️ Comida\n\n### Pollo en Salsa de Chile Pasilla con Arroz Integral, Ejotes Salteados y Ensalada de Nopales Asados\n\n**Tiempo:** prep 10 min · cocción 12 min (ensamble y calentado) | **Porciones:** ATM + IOB *(2 comensales)*\n**Macros ATM:** 603 kcal · P 63g · C 46g · G 17g\n**Macros IOB:** 405 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pollo confitada, laminada | 200 g | 120 g |\n| Arroz integral cocido | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Salsa pasilla | 40 ml | 30 ml |\n| Ejotes blanqueados | 80 g | 80 g |\n| Nopales asados marinados | 80 g | 80 g |\n| Jitomate + lechuga | 90 g | 90 g |\n\n**Mise en place** *(domingo)*\n- **Pollo confitado:** Pechuga en aceite de oliva + ajo + laurel a 68°C/90 min. Enfriar en su aceite; laminar en frío en piezas de 2 cm. Textura: jugosa, nada fibrosa\n- **Salsa pasilla:** Tostar chiles pasilla en comal seco hasta fragante (no quemado — amarga); rehidratar en agua caliente 15 min. Licuar con ajo asado, cebolla asada, caldo de pollo, comino, sal. Colar y reducir en sartén con aceite mínimo hasta napar cuchara. La salsa debe ser oscura, profunda, con acidez equilibrada\n- **Ejotes:** Blanquear 3 min en agua salada hirviendo; baño de hielo; escurrir y secar. Saltear al momento con ajo y aceite mínimo\n- **Nopales asados:** Nopales en plancha o comal a fuego alto sin aceite hasta que pierden baba y obtienen marcas de carbón en bordes; marinar en vinagre de manzana + orégano seco + sal + pizca de chile de árbol 30 min mínimo\n\n**Elaboración**\n1. **Arroz integral:** Regenerar en sartén con 15 ml de agua, tapado, fuego bajo 3 min. El vapor regenera sin resecar. Nunca microondas directo sin humedad — resultado harinoso.\n2. **Pollo en salsa:** Calentar salsa pasilla en sartén a fuego medio; incorporar pollo laminado; cubrir 2 min. El pollo ya está cocido — solo se trata de calentar y glasear con la salsa. No sobrecocinar.\n3. **Ejotes:** Sartén muy caliente, aceite mínimo, 60–90 seg. Solo calentar y dar color; mantener crujiente.\n4. **Nopales:** Servir fríos o temperatura ambiente directamente del marinado — la acidez contrasta perfectamente con la salsa oscura del pollo.\n5. **IOB:** Pollo y salsa sobre tortilla integral calentada en comal; aguacate en láminas, jitomate y lechuga. Nopales como guarnición lateral.\n\n**Emplatado**\nArroz en timbal compacto; pollo laminado en abanico sobre la salsa espejada en la base del plato; ejotes en paralelo al costado; nopales en ensalada ligera al frente. La salsa oscura como fondo dramático del plato.\n\n**Conservación**\nPollo confitado: 4 días. Salsa pasilla: 1 semana en refrigeración (congela perfectamente hasta 3 meses). Nopales marinados: 5 días. Ejotes blanqueados: 3 días.\n\n**Tip del chef**\nEl secreto de la salsa pasilla sin amargor es el tostado controlado: el chile debe estar fragante y ligeramente inflado, nunca con partes negras. El amargor del chile tostado en exceso es irreversible — ninguna cantidad de sal o azúcar lo corrige. Temperatura de comal: media. Tiempo: 20–30 seg por lado máximo.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=pollo+salsa+chile+pasilla+arroz+integral+nopales) · [English version](https://www.youtube.com/results?search_query=chicken+pasilla+chile+sauce+mexican+rice+nopales)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+pollo+salsa+chile+pasilla+nopales+asados)\n\n---\n\n## 🌿 Colación PM *(+100 kcal salsa — ambos)*\n\n### Shake Proteico con Tostada de Mantequilla de Cacahuate, Miel Extra y Bastones de Jícama\n\n**Tiempo:** prep 5 min · cocción 0 min | **Porciones:** ATM + IOB\n**Macros ATM:** 587 kcal · P 57g · C 52g · G 19g\n**Macros IOB:** 366 kcal · P 27g · C 49g · G 1g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate natural | 16 g | — |\n| Miel de agave | 14 g (+salsa) | 7 g |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | 90 g (½) | 180 g |\n\n**Mise en place**\n- Jícama en bastones desde el domingo, conservada en agua fría con limón\n- La miel de agave extra (vs. días sin actividad) carga carbohidratos para la actividad de salsa de 2–3 h\n\n**Elaboración**\n1. **Shake:** Proteína en 250 ml agua fría, batir 20–30 seg. Para IOB: misma preparación en escala.\n2. **Tostada ATM:** Pan al tostador nivel alto; mantequilla de cacahuate inmediatamente sobre pan caliente; miel de agave en hilo generoso sobre la mantequilla. La miel debe mezclarse levemente con la mantequilla caliente — no revolver completamente, buscar contraste de sabor en cada mordida.\n3. **Jícama:** Bastones fríos directos — su temperatura y crujiente contrastan con la tostada caliente.\n4. **Manzana IOB:** En gajos con piel; la pectina de la manzana verde es fibra soluble que modera absorción de azúcares — relevante para IOB.\n\n**Emplatado**\nFuncional. Shake en vaso con hielo; tostada en plato pequeño; jícama en vasito o al costado. Consumir 45–60 min antes de la clase de salsa.\n\n**Tip del chef**\nPara el día de salsa (cardio moderado-intenso de 60–90 min), la combinación miel de agave + mantequilla de cacahuate ofrece dos velocidades de energía: fructosa del agave (absorción media, 45–90 min) + grasas del cacahuate (energía sostenida 2–3 h). Es una colación pre-actividad bien calibrada, no improvisada.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=colacion+pre+entreno+shake+proteico+tostada+cacahuate) · [English version](https://www.youtube.com/results?search_query=pre+workout+snack+protein+shake+peanut+butter+toast)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=colacion+pre+actividad+shake+proteico+mantequilla+cacahuate+jicama)\n\n---\n\n## 🌙 Cena\n\n### Salmón Harissa: Filete Marinado en Pasta Harissa Casera, Pasta Integral con Chermoula Blanca, Espárragos Asados y Cebolla Morada en Escabeche de Sumac\n\n**Tiempo:** prep 15 min (+ 2 h marinado mínimo) · cocción 15 min | **Porciones:** ATM + IOB\n**Macros ATM:** 800 kcal · P 63g · C 53g · G 34g\n**Macros IOB:** 357 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón marinado en harissa | 250 g | 120 g |\n| Pasta integral cocida | 150 g | 75 g |\n| Espárragos | 134 g | 134 g |\n| Harissa casera | 20 g | 10 g |\n| Cebolla morada en escabeche de sumac | 30 g | — |\n| Aceite de oliva | 10 g | 5 g |\n| Jugo de limón | ½ pieza | ½ pieza |\n| Gelatina light | 480 ml | 480 ml |\n\n**Mise en place** *(domingo o jueves AM)*\n- **Harissa casera:** Asar chiles de árbol (3) + pimiento rojo (1 pieza) directamente en llama hasta piel ennegrecida; pelar, retirar semillas. Licuar con ajo (2 dientes), comino tostado, cilantro molido, aceite de oliva (15 g), sal y gotas de limón. Debe quedar pasta densa, color rojo-naranja intenso, aromática y con calor moderado\n- **Marinado salmón:** Cubrir filetes con 15–20 g de harissa por pieza; refrigerar mínimo 2 h, máximo 12 h. La pasta forma corteza natural al cocinar\n- **Cebolla en escabeche de sumac:** Cebolla morada en pluma fina + sumac en polvo (2 g) + vinagre de manzana + pizca de sal + azúcar mínima. 30 min mínimo — el sumac tiñe la cebolla de color magenta intenso y aporta acidez afrutada única\n- **Pasta integral y espárragos:** Misma prep que miércoles (blanqueados en baño de hielo)\n\n**Elaboración**\n1. **Salmón:** Sartén antiadherente o de hierro a fuego medio-alto con 5 ml aceite. Colocar salmón marinado con la harissa hacia abajo primero — crea costra caramelizada-especiada de 2–3 min. Voltear; temperatura interna objetivo: 52–54°C (jugoso) o 58°C (completamente cocido según preferencia). La harissa forma una corteza ligeramente crujiente y ahumada.\n2. **Chermoula blanca (salsa pasta):** Yogurt griego 0% (30 g) + aceite de oliva + jugo de limón + eneldo o perejil picado fino + ajo rallado + sal. Emulsionar en frío con batidor. Textura: salsa ligera cremosa. Mezclar con pasta tibia fuera del fuego — el calor la corta si es directo.\n3. **Pasta:** Regenerar al vapor o con splash de agua en sartén; fuera del fuego incorporar chermoula blanca; mezclar hasta cubrir uniformemente.\n4. **Espárragos:** Asar en sartén seca a fuego alto 2 min con gotas de aceite, voltear una vez; terminar con sal y limón. Deben tener marcas de carbón en puntas.\n5. **Cebolla en sumac:** Escurrir ligeramente; servir fría directamente — el contraste de temperatura con el salmón caliente es intencional.\n\n**Emplatado**\nPasta en base del plato en movimiento circular; salmón encima en diagonal mostrando la costra harissa hacia arriba; espárragos cruzando el plato en ángulo; cebolla en sumac de color magenta como acento cromático sobre el salmón. Hilo de aceite de oliva y pizca de sumac en polvo alrededor del plato para acabado profesional.\n\n**Conservación**\nSalmón marinado sin cocinar: 24 h máximo en refrigeración. Cocido: consumir el mismo día (la harissa oxida y modifica sabor). Harissa casera: 2 semanas en refrigeración cubierta con aceite. Cebolla en sumac: 1 semana.\n\n**Tip del chef**\nEl sumac es el ingrediente que más transforma este plato — su acidez es completamente diferente al limón (más afrutada, menos agresiva, con notas tánicas). Si no se consigue en tienda de especias árabes o gourmet, sustituir con zeste de limón deshidratado + pizca de cremor tártaro, pero la sustitución es inferior. Vale la pena buscar sumac real para este plato.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+harissa+casera+pasta+integral+chermoula) · [English version](https://www.youtube.com/results?search_query=harissa+salmon+fillet+sumac+onion+whole+wheat+pasta)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+harissa+casera+pasta+integral+sumac)\n\n---"}, {"key": "viernes", "short": "Vie", "name": "# 🟥 VIERNES", "menu": "# 🟥 VIERNES 12 DE JUNIO — Gym ATM (+150 kcal) · 3er comensal comida\n*Gastronomía: Mediterránea
