ado, corte en diagonal respecto a la fibra, sin presionar.\n2. **Pasta:** Saltear en sartén con 8ml AOVE + ralladura de limón + pimienta blanca recién molida. Incorporar 2–3 cdas de crema de rábano-eneldo a la pasta caliente fuera del fuego — el calor residual integra la salsa sin que el yogur se corte (no superar 75°C o el yogur separa el suero).\n3. **Espárragos:** Escurrir de la vinagreta, secar ligeramente. Plancha caliente 1.5 min para marcar sin recocinar — el encurtido ya los ablandó parcialmente.\n4. **Pepino:** Servir directamente de la vinagreta, escurrido. Temperatura fría — contraste con la pasta caliente es intencional.\n5. **Cebolla morada ATM:** Directamente del encurtido rápido, bien escurrida.\n6. **Emplatado final:** Pasta + crema al centro, gravlax en láminas en abanico sobre la pasta, espárragos cruzados, pepino en lateral, cebolla morada en cairn pequeño. Eneldo fresco en el acabado. Crema de rábano-eneldo en puntos periféricos con cuchara pequeña.\n\n**Emplatado**\nPlato amplio blanco o gris. Pasta en base, gravlax en láminas como pétalos sobre la pasta, espárragos en X en diagonal, pepino apilado en láminas translúcidas, puntos de crema de rábano perimetrales. La remolacha del curado da un borde violáceo natural a las láminas de salmón — presentación dramática sin intervención adicional. Gelatina light en copa aparte.\n\n**Conservación**\nGravlax curado sin rebanar: 5 días refrigerado bien envuelto. Rebanado: consumir en 24h (la superficie expuesta se oxida). Crema de rábano-eneldo: 4 días. Pepino en vinagreta: 4 días — se vuelve más ácido con el tiempo.\n\n**Tip del chef**\nEl rábano picante fresco (horseradish) pierde su potencia pungente rápidamente al rallarlo — el isotiocianato que genera el calor y el picor se volatiliza en minutos en contacto con el aire. Rallar siempre con microplane justo antes de incorporar a la crema, y añadir el jugo de limón inmediatamente después — el ácido estabiliza el compuesto picante y preserva el punch nórdico característico. El frasco preparado (en vinagre) es sustituto funcional pero a 40% de la intensidad del fresco.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=gravlax+nordico+salmon+curado+remolacha+eneldo) · [English version](https://www.youtube.com/results?search_query=nordic-gravlax+cured-salmon+beet+dill+horseradish)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+gravlax+nordico+salmon+curado+remolacha+eneldo+rabano+picante)\n\n---"}, {"key": "viernes", "short": "Vie", "name": "# VIERNES", "menu": "# VIERNES 12 DE JUNIO 🏋️ (+150 kcal ATM → colación PM sube)\n*(Comida: 3 comensales)*\n\n---\n\n### 🌅 Desayuno 🏪 🇧🇷\n**Açaí Protein Bowl: Base de Açaí Congelado, Proteína de Chocolate, Avena, Fresas, Granola Casera y Coco**\n*Bowl brasileño denso y energético con base morada de açaí, capa de proteína de cacao, granola horneada y frutas rojas vibrantes*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **560 · 38g · 63g · 17g** | **340 · 27g · 37g · 10g** |\n| Proteína en polvo (chocolate) | 60g (2 scoops) | 30g (1 scoop) |\n| Açaí congelado | 100g | — |\n| Avena cruda 🏪 | 50g | — |\n| Fresas | 100g | — |\n| Plátano | — | 120g |\n| Nueces / granola ligera | 30g nueces | — |\n| Coco tostado | 15g | — |\n\n---\n\n### 🍎 Colación AM 🏪 🇮🇹\n**Bruschetta Proteica: Chapata Integral con Pavo al Pesto Ligero, Jitomate Confitado, Rúcula y Parmesano Rallado**\n*Pan artesanal tostado con capa de pesto de albahaca light, pavo delicado, jitomates caramelizados y hoja de rúcula peppery*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **280 · 19g · 32g · 9g** | **170 · 14g · 19g · 5g** |\n| Pechuga de pavo cocida 🏪 | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Pesto light 🏪 | 20g | — |\n| Jitomate confitado 🏪 | 50g | 50g |\n| Rúcula | 30g | 30g |\n| Claras cocidas 🏪 | — | 90g |\n| Papaya | — | 150g |\n\n---\n\n### 🍽️ Comida 🏪 🇲🇽 *(3er comensal — misma porción que ATM)*\n**Tinga de Res Contemporánea: Filete Deshebrado en Chipotle-Jitomate Asado, Arroz Integral con Epazote, Nopales a la Parrilla y Guacamole Clásico**\n*Versión premium de la tinga nacional: res de res confitada en salsa ahumada de chipotle, arroz verde y guarnición de cactus asado*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **840 · 58g · 95g · 26g** | **510 · 41g · 56g · 14g** |\n| Filete de res deshebrado 🏪 | 200g | 120g |\n| Arroz integral cocido 🏪 | 200g | — |\n| Tortilla integral 🏪 | — | 30g |\n| Salsa chipotle-jitomate 🏪 | 80g | 60g |\n| Aguacate fresco | 30g | 45g |\n| Nopales asados 🏪 | 100g | 100g |\n| Gelatina light | — | 240g |\n\n---\n\n### 🌿 Colación PM 🏋️ *(gym ATM +150 kcal)*\n\n**Shake Proteico Reforzado con Mantequilla de Cacahuate, Pan Integral y Jícama**\n*Colación de recuperación muscular con triple proteína, carbohidratos complejos y grasas saludables*\n\n| | 🧔 ATM (+150 gym) | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **430 · 35g · 52g · 13g** | **170 · 14g · 19g · 5g** |\n| Proteína en polvo | 90g (3 scoops) | 30g (1 scoop) |\n| Pan integral | 45g | — |\n| Mantequilla de cacahuate | 24g | — |\n| Miel de agave | 10g | — |\n| Jícama bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n---\n\n### 🌙 Cena 🏪 🇨🇳\n**Salmón Szechuan: Filete Glaseado en Salsa de Frijol Negro Fermentado, Pasta Integral Wok-Style con Bok Choy, Espárragos Salteados y Aceite de Chile Tostado**\n*Perfil de sabor chino contemporáneo: salmón lacado con fermentado de frijol negro, pasta al wok con vegetales crujientes y aceite de chile ahumado*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **700 · 48g · 79g · 21g** | **425 · 34g · 47g · 12g** |\n| Salmón confitado 🏪 | 250g | 120g |\n| Pasta integral cocida 🏪 | 150g | 75g |\n| Salsa frijol negro 🏪 | 50g | 35g |\n| Espárragos 🏪 | 134g | 134g |\n| Bok choy blanqueado 🏪 | 100g | 100g |\n| Aceite chile tostado | 5ml | 3ml |\n| Gelatina light | 480ml | 480ml |\n\n**🧔 ATM TOTAL VIERNES: 2,810 kcal · 198g P · 321g C · 86g G** ✅\n**👤 IOB TOTAL VIERNES: 1,615 kcal · 130g P · 178g C · 46g G** ✅\n\n---", "recipes": "# 🗓️ VIERNES 12 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Açaí Protein Bowl\n**Tiempo:** prep 10 min · sin cocción | **Porciones:** ATM / IOB (ver tabla)\n**Macros — ATM:** 560 kcal · P 38g · C 63g · G 17g | **IOB:** 340 kcal · P 27g · C 37g · G 10g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (chocolate) | 60g (2 scoops) | 30g (1 scoop) |\n| Açaí congelado (pulpa sin azúcar) | 100g | — |\n| Avena cruda laminada | 50g | — |\n| Fresas | 100g | — |\n| Plátano maduro | — | 120g |\n| Nueces troceadas / granola ligera | 30g nueces | — |\n| Coco tostado en hojuelas | 15g | — |\n\n**Mise en place** *(domingo)*\n- Tostar coco en sartén seca a fuego medio hasta dorado homogéneo; reservar hermético\n- Preparar granola si es casera (ver Tip)\n- Porcionar açaí en bolsa individual y mantener en congelador\n\n**Elaboración**\n1. **Base açaí (ATM):** Procesar el bloque de açaí congelado con mínimo líquido (15–20ml de agua fría o leche vegetal) hasta obtener una pasta densa, tipo sorbete espeso. La textura debe mantenerse; si fluye, está demasiado líquida — volver al congelador 5 min.\n2. **Capa proteica:** Disolver la proteína de chocolate en 80–100ml de agua muy fría batiendo con tenedor hasta sin grumos. Verter sobre la base con cuchara para crear capa visible, no mezclar.\n3. **Cobertura IOB:** Rebanar plátano en monedas de 5mm en diagonal; disponer en abanico.\n4. **Montaje:** Sobre la base, colocar avena cruda en un sector, fresas enteras o partidas a la mitad en otro, nueces troceadas en el tercero. Finalizar con coco tostado distribuido uniformemente.\n5. **Temperatura crítica:** Servir inmediatamente; a los 8–10 min la base pierde estructura.\n\n**Emplatado**\nBowl amplio de cerámica oscura para contrastar el morado del açaí. Seccionar los toppings en tercios bien definidos — no mezclar — para presentación de café de especialidad.\n\n**Conservación**\nBase açaí: no conservar una vez procesada. Toppings secos (coco, granola): hermético hasta 2 semanas.\n\n**Tip del chef**\nPara granola casera express: avena + nueces troceadas + 5g aceite de coco + 8g miel, hornear a 170°C 15 min moviendo a la mitad. El secreto de la textura en bloque está en no mover durante los últimos 5 min de horneado y dejar enfriar sin tocar.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+acai+protein+bowl) · [English version](https://www.youtube.com/results?search_query=how+to+make+acai+protein+bowl)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+acai+protein+bowl)\n\n---\n\n## 🍎 Colación AM\n\n### Bruschetta Proteica con Pavo al Pesto, Jitomate Confitado, Rúcula y Parmesano\n**Tiempo:** prep 8 min · cocción 4 min | **Porciones:** ATM / IOB\n**Macros — ATM:** 280 kcal · P 19g · C 32g · G 9g | **IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pavo cocida | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Pesto ligero | 20g | — |\n| Jitomate confitado | 50g | 50g |\n| Rúcula baby | 30g | 30g |\n| Claras cocidas | — | 90g |\n| Papaya | — | 150g |\n\n**Mise en place** *(domingo)*\n- **Jitomate confitado:** Jitomates cherry partidos a la mitad, cara arriba en charola, con aceite de oliva, ajo laminado, tomillo y sal de mar. Horno a 130°C por 90 min hasta arrugados y concentrados. Conservar en aceite hasta 10 días en refrigeración.\n- **Pavo cocido:** Pechuga pochada en caldo con laurel y pimienta entera a 75°C interno; rebanar en frío para corte limpio.\n- **Claras cocidas (IOB):** Hervir, pelar, reservar en agua fría.\n\n**Elaboración**\n1. **Tostado del pan:** Chapata o pan integral en grill o comal a fuego alto — presionar ligeramente para marcas uniformes. Objetivo: costra crujiente exterior, centro con algo de suavidad. 2 min por lado máximo.\n2. **Base:** Frotar cara interior con diente de ajo crudo una sola pasada; esto perfuma sin dominar. Aplicar pesto en capa delgada uniforme (ATM).\n3. **Montaje en capas:** Pavo en láminas superpuestas → jitomate confitado escurrido (sin el aceite excesivo para no remojar el pan) → rúcula sin aliñar.\n4. **IOB:** Montar jitomate + rúcula sobre pan integral tostado; claras rebanadas al lado. Papaya en cuñas como acompañante fresco.\n5. Servir en los siguientes 3 min antes de que la humedad del jitomate migre al pan.\n\n**Emplatado**\nBruschetta diagonal sobre tabla de madera o pizarra. Rúcula sobresaliendo levemente del borde — efecto \"desbordado\" que da altura y movimiento.\n\n**Conservación**\nMontar al momento. Componentes por separado en refrigeración hasta 4 días.\n\n**Tip del chef**\nEl jitomate confitado a baja temperatura (130°C vs. 200°C) concentra azúcares sin caramelizar en exceso — el resultado es umami frutal, no amargo. El aceite de conserva se convierte en condimento: úsalo para aderezar ensaladas.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+bruschetta+proteica+pavo+pesto) · [English version](https://www.youtube.com/results?search_query=how+to+make+turkey+pesto+bruschetta)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+bruschetta+pavo+pesto+jitomate+confitado)\n\n---\n\n## 🍽️ Comida *(3 comensales — 3er comensal = porción ATM)*\n\n### Tinga de Res Contemporánea con Arroz Integral al Epazote, Nopales a la Parrilla y Guacamole Clásico\n**Tiempo:** prep 20 min · cocción 35 min (con carne pre-deshebrada) | **Porciones:** 3×ATM + 1×IOB\n**Macros — ATM:** 840 kcal · P 58g · C 95g · G 26g | **IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n**Ingredientes**\n\n| | 🧔 ATM (×3) | 👤 IOB |\n|---|---|---|\n| Filete de res deshebrado | 200g c/u → 600g | 120g |\n| Arroz integral cocido | 200g c/u → 600g | — |\n| Tortilla integral | — | 30g |\n| Salsa chipotle-jitomate | 80g c/u → 240g | 60g |\n| Aguacate fresco | 30g c/u → 90g | 45g |\n| Nopales asados | 100g c/u → 300g | 100g |\n| Gelatina light | — | 240g |\n\n**Mise en place** *(domingo)*\n- **Res deshebrada:** Confitar filete o chambarete a 80°C en caldo de res con cebolla, ajo y hierbas por 2.5–3h. Deshebrando en caliente con dos tenedores siguiendo la fibra muscular. Porcionar y refrigerar en su propio caldo para que no se reseque.\n- **Salsa chipotle-jitomate:** Asar jitomates guaje y cebolla en comal hasta manchas negras. Licuar con chipotles en adobo (ajustar picor), ajo asado, orégano y sal. Freír la salsa en aceite caliente hasta que oscurezca y fragüe — textura debe cubrir cuchara. Refrigerar hasta 6 días.\n- **Arroz integral:** Cocinar con caldo de pollo, epazote fresco y ajo; refrigerar.\n- **Nopales:** Desinflamar con sal, enjuagar, secar perfectamente antes de la parrilla.\n\n**Elaboración**\n1. **Tinga:** Calentar sartén/cazuela de hierro a fuego medio-alto. Incorporar salsa chipotle-jitomate y dejar que empiece a caramelizar en los bordes (1–2 min). Agregar res deshebrada, integrar y reducir a fuego medio hasta que la salsa abraza la carne sin caldear — textura húmeda pero no soposa. Sazonar y ajustar acidez con gotas de jugo de limón.\n2. **Arroz:** Rehidratar el arroz cocido en sartén con unas gotas de agua y caldo; remover con tenedor para separar granos. Nunca en microondas directo sin vapor — reseca y apelmaza.\n3. **Nopales a la parrilla:** Parrilla o comal a temperatura máxima. Nopales limpios y secos untados con aceite en spray. Asar 3–4 min por lado sin mover — deben soltar su baba, evaporarla y obtener marcas de parrilla definidas. El punto correcto: color verde brillante con manchas oscuras, textura al dente sin ser babosos.\n4. **Guacamole:** Aguacate maduro aplastado con tenedor (no licuadora — textura rústica). Sal, limón, cilantro y chile serrano finísimo. Montar al último momento para evitar oxidación; si se anticipa, cubrir con film directo sobre la superficie.\n\n**Emplatado**\nPlato hondo o barro negro. Tinga en montículo central, arroz en quenelle lateral, nopal recostado sobre el arroz, guacamole en quenelle pequeño sobre la tinga. Hilo de salsa chipotle extra alrededor.\n\n**Conservación**\nTinga: hasta 5 días refrigerada en contenedor hermético, mejora de sabor al día siguiente. Nopales: asar al momento para textura óptima.\n\n**Tip del chef**\nEl secreto de la tinga con profundidad: freír la salsa licuada en aceite bien caliente hasta que cambie de color rojo brillante a rojo oscuro-casi negro en los bordes de la cazuela. Ese proceso de \"fritura de salsa\" desarrolla compuestos de Maillard que no se obtienen simplemente hirviendo — es la diferencia entre una salsa plana y una con cuerpo ahumado real.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+tinga+de+res+contemporanea+gourmet) · [English version](https://www.youtube.com/results?search_query=how+to+make+beef+tinga-mexican)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+tinga+de+res+chipotle+nopales+parrilla)\n\n---\n\n## 🌿 Colación PM 🏋️ *(gym ATM +150 kcal)*\n\n### Shake Proteico Reforzado con Mantequilla de Cacahuate, Pan Integral y Jícama\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** ATM / IOB\n**Macros — ATM (+150 gym):** 430 kcal · P 35g · C 52g · G 13g | **IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| | 🧔 ATM (+150 gym) | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 90g (3 scoops) | 30g (1 scoop) |\n| Pan integral | 45g | — |\n| Mantequilla de cacahuate natural | 24g | — |\n| Miel de agave | 10g | — |\n| Jícama en bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n**Mise en place** *(domingo)*\n- Jícama cortada en bastones de 8×1cm, conservar en agua fría con limón para evitar oxidación y mantener crujiente.\n- Pan integral en porciones pre-pesadas en bolsa hermética.\n\n**Elaboración**\n1. **Shake ATM:** Batir 3 scoops de proteína en 250–300ml de agua muy fría o leche descremada con batidor de mano o shaker hasta emulsión homogénea sin grumos. Para textura más densa, usar 200ml líquido.\n2. **Tostada de cacahuate:** Tostar rebanada de pan integral. Aplicar mantequilla de cacahuate en capa uniforme mientras el pan está caliente para que penetre ligeramente. Hilo fino de miel de agave en zigzag — no cubrir toda la superficie para mantener el contraste de sabor.\n3. **IOB:** Shake simple + manzana verde en gajos con piel para aprovechar la fibra de la cáscara.\n4. **Timing post-entreno ATM:** Consumir dentro de los 30–45 min post-entrenamiento para ventana anabólica óptima.\n\n**Emplatado**\nJícama en bastones verticales en vaso pequeño. Shake en botella o vaso alto. Pan en plato pequeño. Presentación funcional y rápida — es colación de recuperación.\n\n**Tip del chef**\nUsar mantequilla de cacahuate natural (solo cacahuate + sal, sin aceites hidrogenados ni azúcar añadida). Si está separada, mezclar el aceite de vuelta antes de porcionar — nunca desechar ese aceite: es donde están los ácidos grasos insaturados más valiosos.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteico+post+entreno+mantequilla+cacahuate) · [English version](https://www.youtube.com/results?search_query=how+to+make+post+workout+protein+shake+peanut+butter)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+colacion+proteica+post+entreno+mantequilla+cacahuate)\n\n---\n\n## 🌙 Cena\n\n### Salmón Szechuan Glaseado en Frijol Negro Fermentado con Pasta Integral Wok-Style, Bok Choy y Aceite de Chile Tostado\n**Tiempo:** prep 15 min · cocción 20 min | **Porciones:** ATM / IOB\n**Macros — ATM:** 700 kcal · P 48g · C 79g · G 21g | **IOB:** 425 kcal · P 34g · C 47g · G 12g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón (filete, piel intacta) | 250g | 120g |\n| Pasta integral cocida | 150g | 75g |\n| Salsa de frijol negro fermentado | 50g | 35g |\n| Espárragos | 134g | 134g |\n| Bok choy blanqueado | 100g | 100g |\n| Aceite de chile tostado | 5ml | 3ml |\n| Gelatina light | 480ml | 480ml |\n\n**Mise en place** *(domingo)*\n- **Salmón confitado base:** Filete en aceite de oliva aromatizado (ajo, jengibre, piel de limón) a 55°C por 25–30 min. Textura: desmenuzable con presión mínima, color rosado uniforme sin zonas grises. Refrigerar en su aceite; rehidratar con glaseado al momento.\n- **Pasta integral:** Cocer al dente, enfriar en agua helada, aceitar ligeramente para evitar pegado. Refrigerar.\n- **Aceite de chile tostado casero:** Calentar aceite neutro a 180°C, verter sobre mezcla de chile guajillo + chile de árbol molidos + ajo + jengibre rallado + sal. El chisporroteo activa los aromas — cuidar salpicaduras. Reposar 24h para profundidad de sabor.\n- **Bok choy:** Blanquear 90 segundos en agua con sal, shock térmico en agua con hielo, escurrir y refrigerar.\n\n**Elaboración**\n1. **Glaseado Szechuan:** En sartén pequeña, calentar salsa de frijol negro fermentado con 30ml de agua, 5ml de salsa de soya baja en sodio, 5ml de mirin y ½ cdita de azúcar mascabado. Reducir a fuego medio hasta que nape la cuchara y tenga brillo lacado.\n2. **Salmón:** Sacar del refrigerador 15 min antes. En sartén antiadherente o de acero a fuego medio-alto con mínimo aceite, colocar piel hacia abajo — presionar suavemente los primeros 30 segundos para evitar que se curve. Sellar 3–4 min hasta que la piel esté crocante y el calor haya subido ¾ del filete (zona translúcida en el centro visible desde el lado). Voltear, apagar fuego y dejar reposar 1 min. Glasear con brocha en la última fase.\n3. **Wok pasta:** Wok o sartén grande a fuego máximo hasta humear. Aceite neutro en hilo, espárragos en trozos de 4cm salteados 2 min con movimiento constante. Incorporar pasta, 2 cucharadas de glaseado, bok choy. Saltear 90 segundos máximo — el objetivo es calentar y ahumar, no cocer más.\n4. **Temperatura interna salmón:** 52°C para medium (rosado translúcido al centro) — el punto profesional para salmón de calidad. 60°C si se prefiere bien cocido, pero pierde jugosidad.\n\n**Emplatado**\nPasta en twirl central con pinzas. Salmón glaseado recostado sobre la pasta — nunca encima centrado, sino en ángulo para mostrar la piel dorada. Espárragos y bok choy flanqueando. 3–4 gotas de aceite de chile en el plato, no sobre el salmón, para que cada bocado lo tome al gusto.\n\n**Conservación**\nSalmón confitado sin glasear: 2 días en refrigeración en su aceite. Pasta: 3 días. Aceite de chile: temperatura ambiente hasta 3 semanas.\n\n**Tip del chef**\nLa clave del wok-style sin wok profesional es trabajar en tandas pequeñas y con el utensilio al máximo de temperatura posible. Si se superpobla la sartén, la temperatura cae, los ingredientes se cuecen al vapor en lugar de ahumarse y se pierde el *wok hei* — ese sabor ligeramente ahumado y chamuscado que define la cocina china de alta temperatura.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+salmon+szechuan+frijol+negro+fermentado) · [English version](https://www.youtube.com/results?search_query=how+to+make+szechuan+glazed-salmon+black-bean)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+szechuan+frijol+negro+fermentado+pasta+wok)\n\n---\n\n> **🧔 ATM TOTAL VIERNES: 2,810 kcal · 198g P · 321g C · 86g G** ✅\n> **👤 IOB TOTAL VIERNES: 1,615 kcal · 130g P · 178g C · 46g G** ✅\n\n---\n---"}, {"key": "sabado", "short": "Sáb", "name": "# SÁBADO", "menu": "# SÁBADO 13 DE JUNIO 😴 (día normal)\n\n---\n\n### 🌅 Desayuno 🏪 🇰🇷\n**Juk Proteico: Congee Coreano de Arroz Integral con Proteína de Vainilla, Jengibre Fresco, Huevo Poché y Sésamo Negro**\n*Porridge caldoso de arroz suave con infusión de jengibre, proteína integrada en el caldo, huevo spesa.\n2. **Integración proteica:** Retirar del fuego. Dejar bajar a ~70°C (ya no humea agresivamente). Disolver proteína de vainilla en 50ml de agua fría e incorporar al congee removiendo enérgicamente — añadir en caliente directo desnaturaliza la proteína y genera grumos.\n3. **Avena (ATM):** Incorporar avena cruda al congee caliente fuera del fuego; el calor residual la suaviza en 3–4 min sin sobrecocción — textura al dente.\n4. **Jengibre:** Rallar fresco con microplane directamente sobre el bowl al servir — el calor activa los gingeroles de inmediato.\n5. **IOB versión porridge:** Porridge de avena + plátano en rodajas + proteína integrada fuera del fuego. Misma técnica de temperatura.\n\n**Emplatado**\nBowl hondo de cerámica gruesa (retiene calor). Congee como base, fresas enteras o partidas en cuartos en sector, nueces tostadas en otro. Sésamo negro espolvoreado al último (textura + visual). Hilo de miel o sirope de maple opcional si los macros lo permiten.\n\n**Conservación**\nBase congee sin proteína: 4 días refrigerada. Con proteína integrada: consumir inmediatamente.\n\n**Tip del chef**\nPara lograr la textura sedosa característica del juk coreano, agregar 1 cdita de aceite de sésamo tostado al final de la cocción de la base — crea una microemulsión que da brillo y cuerpo sin sumar carbohidratos significativos. Omitir si los macros son ajustados.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+juk+congee+coreano+proteico) · [English version](https://www.youtube.com/results?search_query=how+to+make+korean+juk+congee+protein)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+juk+congee+coreano+arroz+integral+proteina)\n\n---\n\n## 🍎 Colación AM\n\n### Msemen de Pavo al Ras el Hanout con Zanahoria Rallada, Harissa Suave y Menta\n**Tiempo:** prep 10 min · cocción 4 min | **Porciones:** ATM / IOB\n**Macros — ATM:** 280 kcal · P 19g · C 32g · G 9g | **IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pavo cocida | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Espinaca baby | 30g | 30g |\n| Jitomate | 50g | 50g |\n| Claras cocidas | — | 90g |\n| Papaya | — | 150g |\n\n*Condimentos sugeridos para perfil Msemen:* ras el hanout (½ cdita), harissa en pasta (5g), menta fresca, zanahoria rallada finamente, aceite de oliva extra virgen en hilo\n\n**Mise en place** *(domingo)*\n- Pavo cocido: igual que receta anterior (poché a 75°C, rebanar en frío).\n- **Marinada rápida pavo (ATM):** Mezclar pavo rebanado con ras el hanout, aceite de oliva, sal y pimienta. Reposar mínimo 1h en refrigeración — los aceites esenciales del blend de especias se activan con el calor del aceite.\n- Zanahoria rallada en juliana fina con microplane; mezclar con limón, comino y sal. Refrigerar.\n\n**Elaboración**\n1. **Pan:** Tostar chapata o pan integral en grill/comal a temperatura alta para obtener costra. El msemen original es un pan hojaldrado marroquí — la chapata tostada replica su textura exterior crujiente con interior esponjoso.\n2. **Montaje ATM:** Untada de harissa en capa muy delgada sobre pan caliente (la capsaicina se potencia con el calor). Capa de espinaca baby → pavo marinado en especias → zanahoria rallada condimentada → hojas de menta fresca arrancadas a mano (nunca cortadas con cuchillo — oxidan).\n3. **Jitomate:** Rebanar y sazonar con sal de mar en escamas y pimienta justo al servir — si se sazona antes, el osmosis extrae líquido y encharca el pan.\n4. **IOB:** Pan tostado + espinaca + jitomate + claras rebanadas + harissa en cantidad mínima. Papaya al lado como fruta acompañante.\n\n**Emplatado**\nBocadillo abierto o cerrado. Si abierto: presentar en tabla con zanahoria marinada en pequeño montículo lateral y hojas de menta como garnish. Perfil cromático: naranja (zanahoria) + verde (espinaca/menta) + rojo (jitomate/harissa) sobre pan oscuro.\n\n**Conservación**\nPavo marinado: 3 días. Zanahoria marinada: 5 días — mejora con el tiempo. Montar al momento.\n\n**Tip del chef**\nEl ras el hanout de calidad incluye pétalos de rosa seca — si tu mezcla no los tiene, es una versión simplificada. Para profundidad extra, tostar el blend en sartén seca 30 segundos antes de usarlo: los terpenos y fenoles se vuelven más solubles en aceite y la marinada penetra mejor en la proteína.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+msemen+bocadillo+pavo+ras+el+hanout) · [English version](https://www.youtube.com/results?search_query=how+to+make+moroccan+msemen+turkey+ras+el+hanout)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+msemen+pavo+ras+el+hanout+harissa)\n\n---\n\n## 🍽️ Comida\n\n### Tikka Masala de Pollo Ligero con Arroz Basmati Integral y Raita de Pepino\n**Tiempo:** prep 15 min · cocción 30 min (con pollo y arroz pre-cocidos) | **Porciones:** ATM / IOB\n**Macros — ATM:** 840 kcal · P 58g · C 95g · G 26g | **IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pollo (sous vide) | 200g | 120g |\n| Arroz basmati integral cocido | 200g | — |\n| Tortilla integral | — | 30g |\n| Salsa tikka masala | 100g | 70g |\n| Aguacate fresco | — | 45g |\n| Raita de pepino | 80g | 60g |\n| Gelatina light | — | 240g |\n\n**Mise en place** *(domingo)*\n- **Pollo sous vide:** Bolsa al vacío con pechuga, sal, cúrcuma, comino, coriandro, ajo y jengibre en pasta (marinada seca húmeda). Cocinar a 65°C por 90 min. Resultado: textura uniforme y suculenta imposible de lograr en sartén. Refrigerar en bolsa sellada.\n- **Salsa tikka masala:** Sofreír cebolla hasta dorado profundo (20 min a fuego medio — no hay atajo aquí). Agregar pasta de ajo-jengibre, especias (garam masala, cúrcuma, paprika ahumada, comino), cocinar 2 min. Incorporar jitomate triturado, reducir 15 min. Finalizar con yogur griego bajo en grasa fuera del fuego para evitar corte. Licuar parcialmente para textura semi-cremosa. Refrigerar hasta 6 días.\n- **Raita:** Pepino rallado, escurrido con sal (desamargar y eliminar exceso de agua), yogur griego, menta, comino tostado molido, sal. Refrigerar.\n- **Arroz basmati integral:** Cocinar con cardamomo, clavo y hoja de laurel. Refrigerar.\n\n**Elaboración**\n1. **Rehidratación pollo sous vide:** Sacar de bolsa, conservar los jugos. Rebanar o trozar el pollo. En sartén caliente con toque de aceite, sellar rápidamente por todos lados 1 min total — solo para textura exterior, el centro ya está en punto perfecto.\n2. **Salsa tikka:** Calentar en sartén profunda, incorporar jugos del sous vide, ajustar densidad con caldo si espesó mucho. Incorporar pollo sellado, cocinar a fuego bajo 3–4 min para que impregne sin sobrecocinar.\n3. **Arroz:** Rehidratar con vapor (sartén tapada con chorrito de agua a fuego bajo 3 min). Granos sueltos, perfumados.\n4. **IOB:** Tortilla integral calentada en comal seco. Pollo en tikka masala sobre tortilla, aguacate en rebanadas, raita al lado.\n\n**Emplatado**\nBowl o plato hondo. Arroz moldeado con aro o taza (lado izquierdo). Tikka masala vertida sobre el pollo (lado derecho con el caldo bien glossy). Raita en cucharada al centro como separador visual. Polvo de coriandro fresco o cilantro finísimo espolvoreado. Hoja de menta opcional para nota visual fresca.\n\n**Conservación**\nSalsa tikka: 6 días refrigerada, congela perfectamente hasta 3 meses. Pollo sous vide sin abrir: 4 días. Raita: 2 días máximo.\n\n**Tip del chef**\nEl yogur en la salsa tikka nunca debe añadirse en ebullición — corta y genera una textura granulosa. La temperatura correcta para integrarlo es alrededor de 70°C, fuera del fuego, en movimiento constante. Si necesitas más cuerpo sin grasa, usar yogur griego 0% que tiene mayor concentración de caseína — estabiliza mejor que el yogur regular.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=receta+tikka+masala+pollo+ligero+arroz+basmati) · [English version](https://www.youtube.com/results?search_query=how+to+make+chicken+tikka+masala+light+basmati)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+tikka+masala+pollo+sous+vide+arroz+basmati+integral)\n\n---\n\n## 🌿 Colación PM\n\n### Shake Proteico Estándar con Pan Integral, Mantequilla de Cacahuate y Jícama\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** ATM / IOB\n**Macros — ATM:** 280 kcal · P 19g · C 32g · G 9g | **IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 60g (2 scoops) | 30g (1 scoop) |\n| Pan integral | 30g | — |\n| Mantequilla de cacahuate natural | 16g | — |\n| Miel de agave | 7g | — |\n| Jícama en bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n**Mise en place** *(domingo)*\n- Jícama en bastones conservada en agua fría con limón (ver Viernes PM).\n- Pan pre-pesado en porciones individuales.\n\n**Elaboración**\n1. **Shake:** 2 scoops en 200–250ml agua fría o leche descremada. Agitar en shaker 20 segundos o mezclar con batidor hasta emulsión sin grumos. Para textura más gruesa: reducir líquido a 150ml.\n2. **Tostada:** Pan integral tostado. Mantequilla de cacahuate aplicada en capa uniforme. Hilo de agave en espiral — la miel de agave tiene índice glucémico más bajo que la de abeja para liberación energética más sostenida.\n3. **IOB:** Shake simple en agua fría + jícama y manzana en gajos. Mantener la manzana con piel para fibra soluble (pectina).\n\n**Emplatado**\nColación funcional — presentar en contenedor de vidrio o bowl pequeño. Jícama en bastones verticales como crudités para hacer la colación más satisfactoria visualmente y táctilmente.\n\n**Tip del chef**\nLa diferencia entre mantequilla de cacahuate natural vs. comercial no es solo nutricional: la natural tiene punto de fusión más bajo y se extiende mejor sobre pan caliente creando una capa uniforme. Almacenar boca abajo en refrigeración previene que el aceite se separe en exceso.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteico+colacion+pan+integral+mantequilla+cacahuate) · [English version](https://www.youtube.com/results?search_query=how+to+make+protein+shake+peanut+butter+snack)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+colacion+proteica+pan+integral+mantequilla+cacahuate+jicama)\n\n---\n\n> **🧔 ATM TOTAL SÁBADO (sin cena trampa): 1,960 kcal + cena libre** ✅\n> **👤 IOB TOTAL SÁBADO (sin cena trampa): 1,190 kcal + cena libre** ✅\n\n---"}, {"key": "domingo", "short": "Dom", "name": "# DOMINGO", "menu": "# DOMINGO 14 DE JUNIO 🧑‍🍳 (día normal + DÍA DE MEAL PREP)\n\n---\n\n### 🌅 Desayuno 🏪 🇮🇹\n**Shakshuka Proteica all'Italiana: Huevos Escalfados en Salsa de Jitomate-Nduja Ligera, Avena Savory con Parmesano, Espinacas y Proteína en Polvo**\n*Brunch de inspiración mediterránea: huevos en salsa roja especiada italiana, avena salada con parmesano y proteína de alta absorción integrada*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **560 · 38g · 63g · 17g** | **340 · 27g · 37g · 10g** |\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Huevos enteros frescos | 2 piezas (100g) | 1 pieza (50g) |\n| Avena cruda | 30g | — |\n| Plátano | — | 120g |\n| Salsa jitomate | 100g | — |\n| Espinacas | 50g | — |\n| Nueces | 25g | — |\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Molletes de Pavo: Bolillo Integral con Frijol Negro Refritos, Pavo Deshebrado, Jitomate, Queso Panela y Pico de Gallo**\n*Versión premium del mollete mexicano: base de frijol cremoso, pavo especiado, queso fresco fundido y salsa fresca de jitomate-cilantro*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **280 · 19g · 32g · 9g** | **170 · 14g · 19g · 5g** |\n| Pechuga de pavo 🏪 | 200g | 50g |\n| Chapata/bo  | Para quién |\n|---|---|---|\n| Pechuga de pollo sous vide (65°C/2h) | ~1.2kg | Ambos (lun, mar, sáb, dom + 3er comensal mar, mié, vie) |\n| Filete de res marinado y sellado | ~800g | Ambos (mar, mié, vie + 3er comensal vie) |\n| Pechuga de pavo cocida y laminada | ~900g | ATM (200g/día x5) + IOB (50g/día x5) |\n| Salmón confitado en aceite-eneldo | ~1.1kg | Ambos (lun, mié, jue, vie, dom) |\n| Claras de huevo cocidas | ~450g | IOB (90g/día x5) |\n\n### 🌾 Granos (preparar el domingo)\n| Preparación | Cantidad total |\n|---|---|\n| Arroz integral (varios estilos) | ~1.5kg cocido |\n| Pasta integral (al dente) | ~1.2kg cocida |\n| Tortillas de harina integral horneadas | 10 piezas |\n| Avena remojada porciones ATM | 7 contenedores individuales |\n\n### 🥣 Salsas y bases (preparar el domingo)\n| Salsa | Uso |\n|---|---|\n| Dashi-ponzu | Lunes cena |\n| Mole negro ligero | Martes cena |\n| Aderezo ponzu | Miércoles comida |\n| Salsa ají amarillo | Martes comida |\n| Salsa larb tailandesa | Jueves comida |\n| Crema rábano-eneldo nórdica | Jueves cena |\n| Salsa plaki griega (jitomate-aceitunas) | Miércoles cena |\n| Salsa frijol negro fermentado | Viernes cena |\n| Salsa chipotle-jitomate | Viernes comida |\n| Tikka masala + raita | Sábado comida |\n| Velouté champiñones-estragón | Domingo comida |\n| Salsa alcaparras-mostaza nórdica | Domingo cena |\n| Pesto light | Viernes colación AM |\n| Hummus ligero | Jueves colación AM |\n\n---\n\n> 💡 **Nota operativa:** Entre semana el único paso activo es calentar proteínas y salsas 3-4 min en microondas o baño maría, agregar pasta/arroz frío del refri y ensamblar con elementos frescos (aguacate, hierbas, pepino). Tiempo activo de cocina entre semana: **máximo 8 minutos por comida.**", "recipes": "# 🗓️ DOMINGO 14 DE JUNIO\n\n---\n\n## 🌅 Desayuno — Shakshuka Proteica all'Italiana\n\n### Shakshuka Proteica all'Italiana: Huevos Escalfados en Salsa de Jitomate-Nduja con Avena Savory de Parmesano\n\n**Tiempo:** prep 10 min · cocción 18 min | **Porciones:** 2 (ATM + IOB, cantidades diferenciadas)\n**Macros por porción — ATM:** 560 kcal · P 38g · C 63g · G 17g\n**Macros por porción — IOB:** 340 kcal · P 27g · C 37g · G 10g\n\n---\n\n**Ingredientes**\n\n*Salsa base shakshuka (compartida, proporcionar)*\n- 100g salsa de jitomate (ATM) / sin salsa (IOB usa plátano como carbohidrato)\n- 50g espinacas baby (ATM)\n- ¼ cebolla morada, brunoise fina\n- 1 diente de ajo, microplane\n- ½ cdta pimentón ahumado\n- ¼ cdta comino\n- Pizca de hojuelas de chile seco (sustituye nduja si no hay)\n- 1 cda aceite de oliva\n\n*Proteína*\n- 2 huevos enteros (100g) — ATM\n- 1 huevo entero (50g) — IOB\n\n*Avena savory — solo ATM*\n- 30g avena gruesa (old fashioned)\n- 15g parmesano reggiano, rallado fino\n- 60g proteína en polvo vainilla (disuelta aparte)\n- 25g nueces, trozadas gruesas tostadas\n\n*IOB — base alternativa*\n- 120g plátano maduro\n- 30g proteína en polvo vainilla (en licuado o mezclada con yogurt si prefiere)\n\n---\n\n**Mise en place** *(adelantar el domingo — esta misma mañana o el sábado)*\n- Tostar nueces en sartén seco 3 min; reservar\n- Rallar parmesano y tener proteína pesada por separado\n- La salsa base se puede hacer en 8 min el mismo día; no requiere prep previo por su frescura\n\n---\n\n**Elaboración**\n\n1. **Salsa shakshuka:** Sartén de acero o hierro fundido a fuego medio-alto. Aceite de oliva, sofrito de cebolla hasta translúcida (~3 min). Añadir ajo rallado, pimentón y comino; tostar aromáticos 45 segundos hasta fragantes. Incorporar salsa de jitomate; reducir a fuego medio hasta que pierda acidez cruda (~5 min). Ajustar sal.\n\n2. **Espinacas (ATM):** Añadir espinacas directamente a la salsa; marchitar 1 min. La salsa debe tener consistencia de ragù espeso, no aguada — si hay exceso de líquido, subir fuego 1 min.\n\n3. **Escalfado de huevos en salsa:** Con cuchara, formar cavidades en la salsa. Romper huevos directamente en las cavidades. Tapar con tapa de cristal; cocinar a fuego bajo-medio. Punto exacto: clara completamente cuajada, yema mobile (3–4 min). Para IOB (1 huevo), reducir tiempo 30 seg. Retirar del fuego inmediatamente.\n\n4. **Avena savory (ATM, paralelo):** En sartén pequeña o cacerola, calentar 80ml agua o leche vegetal; añadir avena, cocinar 4 min revolviendo. Retirar del fuego, incorporar parmesano fuera del calor para evitar grumosidad. La proteína en polvo se disuelve primero en 2 cdas de agua fría y se incorpora al final mezclando rápido — temperatura de la avena no debe superar 60°C para no desnaturalizar estructura proteica innecesariamente. Coronar con nueces tostadas.\n\n5. **IOB — plátano:** Servir entero o en rodajas; la proteína en polvo se integra en licuado o consume por separado según preferencia.\n\n---\n\n**Emplatado**\nServir la shakshuka directamente en la sartén de hierro para ATM con la avena en tazón paralelo. Para IOB, huevo en cazuela individual de barro. Terminar ambos con hojuelas de chile y hilo de aceite de oliva crudo.\n\n---\n\n**Conservación**\nLa salsa shakshuka base (sin huevos) conserva 4 días en refrigeración — ideal para tener lista desde el sábado. Los huevos siempre frescos al momento.\n\n---\n\n**Tip del chef**\nLa proteína en polvo en avena caliente tiende a formar grumos elásticos si se añade directamente. Disolverla primero en agua fría (slurry) e incorporarla fuera del fuego con movimiento envolvente da textura homogénea sin afectar el sabor.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shakshuka+proteica+avena+salada+parmesano) · [English version](https://www.youtube.com/results?search_query=savory+oats+parmesan+shakshuka+eggs+high+protein)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+shakshuka+proteica+avena+salada+parmesano)\n\n---\n\n---\n\n## 🍎 Colación AM — Molletes de Pavo\n\n### Molletes de Pavo con Frijol Negro Refritos, Pavo Deshebrado, Queso Panela y Pico de Gallo\n\n**Tiempo:** prep 8 min · cocción 10 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción — ATM:** 280 kcal · P 19g · C 32g · G 9g\n**Macros por porción — IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n---\n\n**Ingredientes**\n\n*Base ATM*\n- 80g chapata o bolillo integral, partido longitudinal\n- 200g pechuga de pavo cocida y deshebrada (🏪 meal prep)\n- 60g frijol negro refrito (🏪 meal prep)\n- Queso panela al gusto, rebanado 4mm\n- 50g jitomate saladet + cebolla morada, pico de gallo fresco\n\n*Base IOB*\n- 30g pan integral (1 rebanada)\n- 50g pechuga de pavo deshebrada (🏪 meal prep)\n- 30g frijol negro refrito (🏪 meal prep)\n- 90g claras cocidas (🏪 meal prep), laminadas o en cubos\n- 50g jitomate + cebolla, pico de gallo\n- 150g papaya en cubos (servir al lado)\n\n*Pico de gallo base (compartido)*\n- 50g jitomate bola, concassé sin semillas\n- ¼ cebolla blanca, brunoise\n- Chile serrano al gusto, picado fino\n- Cilantro, chiffonade\n- Jugo de limón, sal\n\n---\n\n**Mise en place** *(adelantar el domingo)*\n- Frijoles negros refritos: preparar batch completo semanal (ver Preparaciones Base)\n- Pavo deshebrado: cocinar y deshebrear batch completo (ver Preparaciones Base)\n- Pico de gallo: hacer al momento para máxima frescura — tarda 3 min\n\n---\n\n**Elaboración**\n\n1. **Refritos express:** Si los frijoles vienen del refri, calentar en sartén antiadherente con ½ cda aceite, aplastar con machacador hasta pasta rústica semi-homogénea. Ajustar consistencia con 1–2 cdas del propio líquido de cocción conservado. Punto: extendibles pero no líquidos.\n\n2. **Pavo:** Calentar deshebrado en microondas 90 seg con 1 cda de caldo o agua tapado, o saltearlo 2 min en sartén seco para dar bordes crujientes. Sazonar con sal ahumada y pimienta negra.\n\n3. **Ensamble:** Extender frijoles sobre pan/chapata abierta en capa generosa. Distribuir pavo. Colocar rebanadas de panela (ATM). Para IOB, añadir claras cocidas laminadas encima del pavo.\n\n4. **Gratinado:** Horno a 220°C función grill, 3–4 min hasta que panela funda con bordes dorados y pan crujiente por debajo. Vigilar — el pan integral se quema rápido en grill.\n\n5. **Terminar:** Pico de gallo fresco encima al sacar del horno, nunca antes (el calor lo cuece y pierde textura).\n\n---\n\n**Emplatado**\nMolletes en tabla de madera o plato plano. Pico de gallo en montículo central. Para IOB, papaya en cubos en tazón pequeño al lado con squeeze de limón.\n\n---\n\n**Conservación**\nPavo y frijoles por separado en refri hasta 5 días. El pan nunca se guarda ya ensamblado — siempre armar al momento.\n\n---\n\n**Tip del chef**\nPara frijoles refritos con mayor profundidad de sabor sin grasa extra: añadir una hoja de epazote seca al calentar y una pizca de cumin tostado en seco previamente. El epazote seco da el perfil de \"frijoles de olla\" sin necesitar manteca.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=molletes+pavo+frijol+negro+gourmet+mexicano) · [English version](https://www.youtube.com/results?search_query=mexican+molletes+turkey+black+beans+gourmet)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+molletes+pavo+frijol+negro+panela)\n\n---\n\n---\n\n## 🍽️ Comida — Blanquette de Pollo\n\n### Blanquette de Pollo: Suprema en Velouté Ligera de Champiñones y Estragón, Arroz Integral Pilaf y Zanahorias Glacé\n\n**Tiempo:** prep 15 min · cocción 35 min (o ensamble 8 min si todo es meal prep) | **Porciones:** 2 (ATM + IOB)\n**Macros por porción — ATM:** 840 kcal · P 58g · C 95g · G 26g\n**Macros por porción — IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n---\n\n**Ingredientes**\n\n*Pollo*\n- 200g suprema de pechuga, porcionada en medallones 3cm (ATM) — 🏪 meal prep\n- 120g pechuga cocida, laminada o en cubos (IOB) — 🏪 meal prep\n\n*Velouté ligera de champiñones (🏪 meal prep — batch completo)*\n- 250g champiñones cremini o blancos, laminados\n- 300ml fondo de pollo sin grasa, reducido\n- 1 cda fécula de maíz disuelta en frío (liaison ligera, no roux)\n- 1 cda crema ácida baja grasa o yogurt griego (incorporar fuera del fuego)\n- Estragón fresco o seco, 1 cdta\n- Perejil liso, sal, pimienta blanca\n\n*Arroz integral pilaf (🏪 meal prep)*\n- 200g arroz integral cocido (ATM)\n- Pizca de caldo concentrado, perejil\n\n*IOB alternativa de carbohidrato*\n- 30g tortilla integral, calentada\n- 45g aguacate fresco en abanico\n\n*Zanahorias glacé*\n- 100g zanahoria baby o torneada (ambos) — 🏪 meal prep\n- ½ cdta mantequilla\n- ½ cdta miel de abeja\n- Sal\n\n*IOB adicional*\n- 240g gelatina light (postre al final)\n\n---\n\n**Mise en place** *(adelantar el domingo — esta misma preparación es el meal prep)*\n- Velouté: hacer batch completo hoy (ver Preparaciones Base)\n- Arroz integral pilaf: hacer batch completo hoy\n- Zanahorias cocidas al vapor o blanqueadas: batch semanal\n- Pollo sous vide o pochado: batch semanal\n\n---\n\n**Elaboración**\n\n**Versión meal prep completo (día de prep):**\n\n1. **Velouté de champiñones:** Saltear champiñones en sartén caliente en seco primero hasta que suelten toda el agua y doren — este paso es crítico para sabor, no omitir. Añadir ½ cda mantequilla al final del dorado. Incorporar fondo de pollo caliente, reducir 5 min. Espesar con fécula disuelta en frío, incorporar en hilo revolviendo. Fuera del fuego, añadir yogurt griego y estragón. Nunca hervir después del yogurt — se corta.\n\n2. **Pollo — técnica blanquette:** Si se hace desde crudo: pochar supremas en fondo aromatizado con bouquet garni a 80°C (nunca hervir — blanquette es cocción gentil). Temperatura interna objetivo: 72°C. Reservar en su propio líquido de cocción.\n\n3. **Zanahorias glacé:** En sartén pequeña, zanahoria blanqueada con mantequilla, miel y 3 cdas de agua; reducir hasta glaseado brillante. El agua debe evaporarse completamente al final — zanahoria debe brillar con cobertura laqueada.\n\n4. **Arroz pilaf:** Si es desde crudo: tostar arroz seco en sartén con ½ cda aceite hasta notas a nuez. Cocinar con fondo de pollo 1:2, tapa sellada, fuego mínimo 35 min. Reposar 10 min sin abrir.\n\n**Versión entre semana (ensamble 8 min):**\nCalentar velouté a fuego bajo revolviendo; añadir pollo ya cocido y calentar dentro de la salsa 3 min — nunca en microondas o la textura de la salsa se rompe. Arroz en microondas con gota de agua, tapado, 2 min. Glasear zanahoria 2 min con mantequilla y miel en sartén.\n\n---\n\n**Emplatado**\nPlato hondo tipo coupe. Cama de arroz pilaf desmenuzado con tenedor para airearlo. Medallones de pollo en abanico. Velouté vertida en nappé generoso. Zanahorias glacé al costado. Estragón fresco y perejil para terminar. Para IOB: tortilla integral caliente a un lado, aguacate en abanico sobre el pollo.\n\n---\n\n**Conservación**\nVelouté en refri hasta 4 días — al recalentar, siempre a fuego bajo con agitación constante; añadir 1–2 cdas de fondo si espesó demasiado. El pollo pochado en su caldo, hasta 5 días.\n\n---\n\n**Tip del chef**\nEl secreto de la blanquette ligera sin crema pesada es la double liaison: fécula para estructura + yogurt griego frío fuera del fuego para cremosidad y acidez. La proporción correcta es 8g fécula por 300ml fondo para una velouté que nape la cuchara sin ser pesada.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=blanquette+pollo+veloute+champinones+receta+francesa) · [English version](https://www.youtube.com/results?search_query=chicken+blanquette+mushroom+veloute+light+french+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+blanquette+pollo+veloute+champinones+estragon)\n\n---\n\n---\n\n## 🌿 Colación PM — Shake Estándar con Pan Integral y Jícama\n\n### Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Bastones de Jícama\n\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** 2 (ATM + IOB)\n**Macros por porción — ATM:** 280 kcal · P 19g · C 32g · G 9g\n**Macros por porción — IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n---\n\n**Ingredientes**\n\n*ATM*\n- 60g (2 scoops) proteína en polvo vainilla\n- 30g pan integral, tostado\n- 16g mantequilla de cacahuate natural (sin azúcar añadida)\n- 7g miel de agave\n- 130g jícama en bastones, con limón y chile piquín\n\n*IOB*\n- 30g (1 scoop) proteína en polvo vainilla\n- 130g jícama en bastones\n- 180g manzana verde, en gajos\n\n---\n\n**Mise en place**\n- Jícama pelada y en bastones desde el día anterior — conserva en agua fría con limón hasta 3 días sin oxidarse\n- Proteína pesada en contenedor individual listo\n\n---\n\n**Elaboración**\n\n1. **Shake:** Disolver proteína en 250–300ml de agua fría o leche vegetal en shaker o licuadora. Para textura más cremosa sin calorías extra: añadir 3–4 cubos de hielo y licuar 20 segundos. La vainilla combina bien con notas de cacahuate — si se desea, añadir la mantequilla de cacahuate directamente al licuado (ATM).\n\n2. **Pan tostado (ATM):** Tostar pan integral en tostador o sartén seco a fuego alto. Untado con mantequilla de cacahuate al sacar; hilo de agave encima. El calor del pan derrite ligeramente la mantequilla — aplicar inmediatamente.\n\n3. **Jícama (ambos):** Bastones con squeeze de limón y chile piquín al gusto. Temperatura ideal: fría del refri — el contraste frío/crujiente complementa el shake.\n\n4. **IOB:** Manzana verde en gajos con limón para evitar oxidación. Shake solo con agua.\n\n---\n\n**Emplatado**\nShake en vaso alto con hielo. Pan en tabla pequeña. Jícama y manzana en tazón con hielo seco decorativo si se quiere presentación de nivel.\n\n---\n\n**Tip del chef**\nLa mantequilla de cacahuate natural tiende a separarse en aceite y sólidos. Guardarla invertida en el refri mantiene la homogeneidad sin necesidad de revolver cada vez.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteina+vainilla+colacion+fit+mexicano) · [English version](https://www.youtube.com/results?search_query=protein+shake+peanut+butter+high+protein+snack)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=colacion+proteica+shake+mantequilla+cacahuate+jicama)\n\n---\n\n---\n\n## 🌙 Cena — Salmón Gravlax Nórdico\n\n### Salmón Gravlax Nórdico: Filete Curado Vodka-Remolacha-Eneldo, Pasta Integral con Salsa de Alcaparras-Mostaza y Espárragos Blanqueados\n\n**Tiempo:** curado 24–48h (prep sábado) · ensamble 15 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción — ATM:** 700 kcal · P 48g · C 79g · G 21g\n**Macros por porción — IOB:** 425 kcal · P 34g · C 47g · G 12g\n\n---\n\n**Ingredientes**\n\n*Gravlax — curado 24–48h (iniciar sábado)*\n- 250g filete de salmón piel con piel, sin espinas (ATM) — 🏪\n- 120g filete de salmón (IOB) — 🏪\n- Mezcla de curado (por cada 100g de salmón): 15g sal kosher + 10g azúcar + 30g remolacha rallada + 20ml vodka + 10g eneldo fresco picado\n- Ralladura de limón amarillo, pimienta negra molida gruesa\n\n*Pasta*\n- 150g pasta integral cocida al dente (ATM) — 🏪 meal prep\n- 75g pasta integral cocida (IOB) — 🏪 meal prep\n\n*Salsa alcaparras-mostaza (🏪 meal prep)*\n- 30g mostaza de Dijon\n- 15g mostaza dulce nórdica (o mezcla Dijon + 5g miel)\n- 20g alcaparras en salmuera, picadas gruesas\n- 1 cda aceite de oliva\n- 1 cda eneldo fresco\n- Jugo de limón, pimienta blanca\n\n*Espárragos*\n- 134g espárragos medianos (ambos) — 🏪 meal prep blanqueados\n- Sal, aceite de oliva, ralladura de limón\n\n*ATM adicional*\n- 30g cebolla morada encurtida (🏪 prep del domingo)\n\n*IOB adicional*\n- 480ml gelatina light (postre)\n\n---\n\n**Mise en place** *(iniciar el sábado para servir el domingo por la noche)*\n- **Gravlax:** Hacer la mezcla de curado el sábado AM. Cubrir salmón completamente, envolver en plástico apretado, poner peso encima (plato + lata), refrigerar 24–36h mínimo. El curado de remolacha da color fucsia espectacular en el exterior.\n- Salsa alcaparras-mostaza: mezcla fría, no requiere cocción — hacer hoy domingo\n- Espárragos: blanquear hoy, conservar en hielo\n- Cebolla morada encurtida: limón + sal + vinagre blanco, 30 min mínimo\n\n---\n\n**Elaboración**\n\n1. **Finalizar gravlax:** Retirar salmón del curado; enjuagar brevemente bajo agua fría para quitar exceso de sal y remolacha. Secar con papel absorbente. La superficie debe tener color rojizo-fucsia intenso del betabel. Laminar en diagonal muy fino (2–3mm) con cuchillo flexible, jalando hacia el cuerpo, paralelo a la piel. Temperatura ideal de servicio: 8–10°C, no temperatura ambiente ni caliente — el gravlax es un curado, no se cocina.\n\n2. **Pasta al momento:** Pasta del meal prep en sartén con ½ cda aceite de oliva y 2 cdas del agua de cocción reservada; calentar 2 min a fuego medio revolviendo. Añadir ¾ de la salsa mostaza-alcaparras directamente sobre la pasta caliente; emulsionar rápido. La salsa no se cocina — el calor residual de la pasta es suficiente para activar aromas.\n\n3. **Espárragos:** De meal prep ya blanqueados (80°C, 90 seg, shock en hielo). Saltear 1 min en sartén muy caliente con aceite de oliva para dar color. Terminar con ralladura de limón y sal en escamas.\n\n4. **Salsa alcaparras-mostaza (restante ¼):** Reservar para nappé encima del gravlax al emplatar.\n\n---\n\n**Emplatado**\nPasta en el centro del plato formando nido con tenaza. Láminas de gravlax sobrepuestas en abanico encima de la pasta (el calor de la pasta templa ligeramente el salmón — temperatura perfecta). Espárragos cruzados en diagonal. Hilo de salsa mostaza encima del salmón. Cebolla encurtida (ATM) y eneldo fresco para terminar. Gelatina light para IOB en copa al lado.\n\n---\n\n**Conservación**\nGravlax curado sin laminar conserva hasta 5 días en refri bien envuelto. Una vez laminado, consumir en 24h. La salsa mostaza-alcaparras conserva 1 semana en refri.\n\n---\n\n**Tip del chef**\nEl vodka en el gravlax no es solo aromático — el alcohol penetra la membrana celular del pescado acelerando la deshidratación parcial del curado y ### TURNO 1 — 09:00 — Arrancar lo de mayor tiempo

**► QUEMADOR 1 — Olla a presión/cazuela pesada: Frijoles negros (60 min)**
- Escurrir frijoles remojados. Cubrir con agua fresca 3:1. Añadir: 1/2 cebolla, 2 dientes ajo, 1 hoja laurel, epazote fresco.
- A presión: 25–30 min desde que sube la válvula. En cazuela convencional: 60–70 min a fuego medio tapado.
- **Cantidad objetivo:** 200g secos → ~480g cocidos. Reservar caldo de frijol.

**► QUEMADOR 2 — Olla mediana: Caldo dashi base (40 min)**
- 1.5L agua fría + 30g kombu (alga) → llevar lentamente a 60°C (20 min, sin hervir) → retirar kombu → subir a 80°C → añadir 25g katsuobushi (hojuelas de bonito) → apagar → infusionar 10 min → colar.
- Resultado: ~1.2L dashi limpio. Dividir: **600ml para ponzu** (añadir 80ml ponzu/soja, 40ml mirin, 30ml yuzu o limón), **600ml reserva**.

**► HORNO a 165°C — Charola 1: Jitomates confitados (90 min)**
- 300g jitomate cherry partido a la mitad + 200g jitomate saladet en cuartos.
- Charola con papel encerado. Bañar con 30ml aceite oliva, sal, pimienta, 4 dientes ajo enteros, tomillo fresco, azúcar glass ligero.
- Hornear 90 min a 165°C hasta que estén arrugados, caramelizados y concentrados.

**► PARALELO (mientras todo lo anterior avanza): Sous vide setup**
- Llenar olla grande con agua, colocar termómetro de inmersión o sous vide circulator. Objetivo: **65°C estable**.
- Porcionar pechugas de pollo: pesar y etiquetar — ver cantidades en bloque siguiente.

|---|---|---|---|---|

- Bolsas sous vide: empacar en grupos por tamaño de porción. Sazonar cada bolsa con sal, pimienta blanca, aceite oliva, ajo en polvo, tomillo.

  return `<div class="w-full bg-${col}-100 rounded-full h-1.5 mb-2.5"><div class="bg-${col}-400 h-1.5 rounded-full" style="width:${pct}%"></div></div>`;
}

// ── Rating system ─────────────────────────────────────────────────────────────
let ratings = JSON.parse(localStorage.getItem(RATING_KEY) || '{}');

function rkey(title) {
  return title.toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function saveRatings() {
  localStorage.setItem(RATING_KEY, JSON.stringify(ratings));
  renderFavoritos();
}

function addRatingWidgets() {
  const dayShort = DAYS[curDay]?.short || '';
  document.getElementById('recipes-day').querySelectorAll('h3').forEach(h3 => {
    if (h3.nextElementSibling?.classList.contains('recipe-rating')) return;
    const title = h3.textContent.trim();
    const key   = rkey(title);
    const r     = ratings[key] || { stars: 0, tag: '', title, day: dayShort };

    const w = document.createElement('div');
    w.className = 'recipe-rating not-prose flex items-center flex-wrap gap-2 my-2 px-3 py-2 bg-gray-50 rounded-lg';
    w.dataset.recipe = key;

    // Stars
    const sd = document.createElement('div');
    sd.className = 'flex gap-0.5 items-center';
    for (let s = 1; s <= 5; s++) {
      const sb = document.createElement('span');
      sb.className = 'star-btn' + (s <= r.stars ? ' lit' : '');
      sb.textContent = '★';
      sb.onclick = () => {
        const ns = ratings[key]?.stars === s ? 0 : s;
        ratings[key] = { ...(ratings[key] || {}), stars: ns, title, day: dayShort };
        saveRatings();
        w.querySelectorAll('.star-btn').forEach((b, j) => b.classList.toggle('lit', j < ns));
      };
      sd.appendChild(sb);
    }
    w.appendChild(sd);

    // Tag buttons
    [['favorito','❤️ fav','active-fav'],['repetir','🔄 repetir','active-rep'],['no','🚫 no','active-no']].forEach(([t, l, ac]) => {
      const tb = document.createElement('button');
      tb.className = 'tag-btn' + (r.tag === t ? ' ' + ac : '');
      tb.dataset.tag = t;
      tb.textContent = l;
      tb.onclick = () => {
        const cur = ratings[key]?.tag;
        ratings[key] = { ...(ratings[key] || {}), tag: cur === t ? '' : t, title, day: dayShort };
        saveRatings();
        const newTag = ratings[key].tag;
        w.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.remove('active-fav','active-rep','active-no');
          if (b.dataset.tag === newTag) {
            if (newTag === 'favorito') b.classList.add('active-fav');
            else if (newTag === 'repetir') b.classList.add('active-rep');
            else if (newTag === 'no') b.classList.add('active-no');
          }
        });
      };
      w.appendChild(tb);
    });

    h3.after(w);
  });
}

// ── Favoritos section ─────────────────────────────────────────────────────────
function renderFavoritos() {
  const favs = Object.values(ratings).filter(r => r.tag === 'favorito' || r.tag === 'repetir' || r.stars >= 4);
  const sec  = document.getElementById('fav-section');
  const list = document.getElementById('fav-list');
  if (!favs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = favs.map(r => {
    const tagEl = r.tag === 'favorito' ? '<span class="text-xs bg-red-50 text-red-400 border border-red-100 px-2 py-0.5 rounded-full">❤️ fav</span>'
                : r.tag === 'repetir'  ? '<span class="text-xs bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 rounded-full">🔄 repetir</span>'
                : '';
    const starsEl = r.stars > 0 ? `<span class="text-yellow-400 text-sm tracking-tighter">${'★'.repeat(r.stars)}</span>` : '';
    return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        ${tagEl}
        <span class="text-sm text-gray-700 truncate">${r.title}</span>
        ${r.day ? `<span class="text-xs text-gray-400 shrink-0">${r.day}</span>` : ''}
      </div>
      ${starsEl}
    </div>`;
  }).join('');
}

renderFavoritos();

// ── Shopping ──────────────────────────────────────────────────────────────────
let checks  = JSON.parse(localStorage.getItem(SHOP_KEY) || '{}');
let curShop = 'costco';
let shopRendered = false;

function shop(which) {
  curShop = which;
  const on  = 'px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white';
  const off = 'px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600';
  document.getElementById('btn-costco').className = which === 'costco' ? on : off;
  document.getElementById('btn-city').className   = which === 'city'   ? on : off;
  const el = document.getElementById('shop-content');
  el.innerHTML = marked.parse(C[which] || '_Sin contenido_');
  let tot = 0, chk = 0;
  el.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    const k = which + '_' + i;
    cb.checked = !!checks[k];
    if (cb.checked) chk++;
    tot++;
    cb.addEventListener('change', () => {
      checks[k] = cb.checked;
      localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
      setProgress(which);
    });
  });
  setProgress(which, tot, chk);
}

function setProgress(which, tot, chk) {
  if (tot === undefined) {
    const boxes = document.getElementById('shop-content').querySelectorAll('input[type=checkbox]');
    tot = boxes.length; chk = 0;
    boxes.forEach((cb, i) => { if (checks[which + '_' + i]) chk++; });
  }
  const p = document.getElementById('check-prog');
  p.textContent = tot ? `${chk} / ${tot} ítems` : '';
  p.className = chk === tot && tot > 0 ? 'text-xs text-green-600 font-medium' : 'text-xs text-gray-400 font-medium';
}

function clearChecks() {
  Object.keys(checks).filter(k => k.startsWith(curShop + '_')).forEach(k => delete checks[k]);
  localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
  shop(curShop);
}
