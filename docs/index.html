## 🗓️ SÁBADO 07 DE JUNIO — Tarde (30–45 min)

**Objetivo:** Todo lo que necesita 24h+ de anticipación.

### 📌 Marinados y Encurtidos (hacerlos en este orden)

**[15:00] Cebolla morada encurtida en hibisco**
- 2 cebollas moradas grandes → cortar en juliana fina con mandolina (2mm)
- Brine: 200ml vinagre de arroz + 100ml agua + 15g sal + 10g azúcar + 2 flores de hibisco secas → calentar hasta disolver sal/azúcar, NO hervir
- Verter caliente sobre la cebolla en frasco de vidrio de 500ml
- Tapar y dejar enfriar 30 min a temperatura ambiente → refrigerar
- ✅ Lista en 2h, óptima a las 24h

**[15:05] Pepino marinado**
- 2 pepinos medianos → cortar en rodajas diagonales de 3mm
- Mezcla: 150ml vinagre de arroz + 10ml salsa de soya + 5ml aceite de sésamo + 5g azúcar + 5g sal + 1 cucharadita semillas de sésamo tostado
- Mezclar pepino con sal y dejar sudar 10 min → exprimir suavemente → sumergir en mezcla de vinagre
- Frasco hermético 400ml → refrigerar
- ✅ Listo en 4h, óptimo a las 24h

**[15:10] Marinado de filete de res para sous vide**
- 1,900g filete de res (todos los cortes de la semana) → porcionar en medallones de 150–200g según uso ATM/IOB
- Salpimentar generosamente con sal de mar gruesa y pimienta negra recién molida
- Embolsar en bolsas zip o al vacío: separar bolsas por día/persona (ver Tabla de Contenedores)
- Añadir a cada bolsa: 2 dientes ajo aplastado, 1 ramita tomillo, 5ml aceite de oliva
- Refrigerar inmediatamente
- ✅ El marinado seco en frío durante 12–24h mejora la corteza al dorar post sous vide

**[15:20] Overnight oats ATM (para lunes)**
- Frasco ATM-OAT-LUN: 50g avena + 150ml leche de avena + 60g proteína vainilla + 4g matcha ceremonial
- Batir bien con tenedor hasta sin grumos de proteína → tapar → refrigerar
- ✅ Listo para lunes AM

**[15:25] Remojo lentejas negras**
- 120g lentejas negras secas → enjuagar → cubrir con agua fría abundante en bowl con tapa → refrigerar
- ✅ Se drenan y cocinan el domingo

**[15:30] Remojo farro perlado**
- 200g farro perlado seco → enjuagar → cubrir con agua fría → refrigerar
- ✅ El remojo reduce el tiempo de cocción de 40 min a 20–25 min

**[15:35] Preparar miso glaze para overnight oats**
- 5g miso blanco + 8ml miel de agave + 3ml agua caliente → emulsionar en bowl pequeño hasta consistencia de jarabe → frasco de 30ml → refrigerar
- ✅ Dura 7 días

## 🗓️ DOMINGO 07 DE JUNIO — Sesión Principal

**Duración objetivo: 4.5–5 horas**
**Recomendación:** Empezar a las 09:00, terminar a las 14:00–14:30

### Pre-sesión: Mise en Place General (15 min antes de arrancar)

Antes de encender cualquier quemador u horno:

1. Sacar filete de res del refrigerador → atemperar a temperatura ambiente (mínimo 30 min antes del sous vide)
2. Drenar y enjuagar lentejas negras del remojo
3. Drenar y enjuagar farro perlado del remojo
4. Poner a calentar el water bath del sous vide (o olla grande con termómetro) a **57°C** — este proceso tarda 20–30 min
5. Organizar todos los contenedores etiquetados vacíos sobre la barra
6. Imprimir o tener visible la lista de contenedores

---

### TURNO 1 — 09:00 · Arrancar Todo lo de Largo Tiempo

> **Objetivo:** Encender horno, arrancar sous vide, poner caldos y fermentados. Estos no requieren atención constante.

**[09:00] HORNO → 200°C convección**

**[09:02] Camotes al horno**
- 6–7 camotes medianos (aprox. 1.5kg total) → lavar, secar, pinchar 8 veces con tenedor cada uno
- Colocar directamente sobre la rejilla del horno (sin charola, para piel crujiente) con papel aluminio en el fondo del horno para goteos
- Hornear **55–65 minutos** hasta que inserten un palillo sin resistencia y la piel esté arrugada
- NO sacar aún — estarán listos al final del Turno 2

**[09:05] Betabel al horno**
- 3–4 betabeles medianos → lavar, no pelar, envolver individualmente en papel aluminio con 3ml aceite de oliva y pizca de sal
- Colocar en charola en la rejilla inferior del horno
- Hornear **60–75 minutos** a 200°C hasta que un palillo entre sin resistencia

**[09:07] QUEMADOR 1 → Water bath sous vide**
- Olla de 8L llena a 2/3 con agua → mantener a **57°C exactos** con termómetro digital (o usar circulador si se tiene)
- Sumergir todas las bolsas de filete de res marinadas → asegurar que estén completamente sumergidas con un peso (plato pequeño)
- Tiempo de sous vide: **mínimo 90 minutos, máximo 3 horas** — a 57°C no hay sobrecocción en ese rango
- ⚠️ Verificar temperatura cada 20 min y ajustar quemador

**[09:10] QUEMADOR 2 → Caldo Dashi**
- Olla mediana 3L: 1.2L agua fría + 30g kombu en trozo → llevar a **60°C** a fuego bajo-medio (NO hervir el kombu)
- Mantener a 60°C por **30 minutos** → retirar kombu
- Subir a fuego medio hasta casi hervir (90°C) → apagar → añadir 20g katsuobushi (bonito) → infusionar **5 minutos** sin hervir
- Colar con malla fina → reservar en olla pequeña
- Total tiempo: ~40 min → listo a las 09:50

**[09:10 PARALELO] QUEMADOR 3 → Salsa verde tomatillo**
- 600g tomatillos sin cáscara + 2 chiles serranos + 4 dientes ajo + 1/2 cebolla blanca → asar en comal o sartén de hierro a fuego alto
- Voltear cuando estén negros en partes (5–7 min por lado) → los tomatillos deben reventar
- Licuar con 1 manojo cilantro, sal, 100ml agua → velocidad alta 30 seg
- Probar sal → reservar en contenedor
- Total: ~20 min → listo a las 09:30

**[09:12 PARALELO] QUEMADOR 4 → Lentejas negras**
- Olla mediana: lentejas drenadas + agua fría al doble de volumen + 1 hoja laurel + 1/2 cebolla + 3 dientes ajo + 5g sal
- Hervir, reducir a fuego bajo → cocinar **25–30 minutos** hasta tiernas pero enteras
- Drenar, retirar laurel y cebolla → reservar
- Total: ~35 min → listas a las 09:45

---

**[09:30] REVISIÓN RÁPIDA:**
- ✅ Salsa verde lista → enfriar, contenedor, refrigerador
- ✅ Dashi: verificar temperatura (debería estar en fase kombu)
- ✅ Sous vide: verificar temperatura
- ✅ Camotes y betabel: en horno, no tocar

**[09:35] Arroz jazmín — primera tanda (QUEMADOR 3 libre)**
- 320g arroz jazmín → enjuagar 3 veces hasta agua clara → drenar
- Olla de 2L: arroz + 500ml agua + 2 hojas kaffir lime + 1 trozo jengibre fresco (3cm) + 5g sal
- Hervir → reducir al mínimo → tapar hermético → **18 minutos sin abrir**
- Apagar → reposar tapado **10 minutos**
- Retirar kaffir y jengibre → esponjar con tenedor → enfriar extendido en charola
- Total: ~30 min → listo a las 10:05

**[09:40] Farro perlado (QUEMADOR 4 libre)**
- Farro drenado del remojo → olla mediana con 600ml agua + 5g sal + 5ml aceite de oliva
- Hervir → reducir a fuego medio-bajo → **20–25 minutos** hasta al dente (debe tener ligero bite)
- Drenar → extender en charola para enfriar
- Total: ~30 min → listo a las 10:10

### TURNO 2 — 10:00 · Proteínas Principales

> **Objetivo:** Confitar pollo y pavo (el mayor volumen), limpiar y porcionar salmón.

**[10:00] HORNO: Verificar camotes y betabel**
- Pinchar con palillo → si sale limpio y sin resistencia, retirar betabel (puede estar listo)
- Camotes: posiblemente necesiten 10–15 min más

**[10:00] QUEMADOR 1 → Sous vide: verificar temperatura**
- Debe seguir a 57°C → ajustar si necesario
- Los filetes llevan 50 min → necesitan 40 min más mínimo

**[10:05] HORNO: Incorporar charola de confitado**
- Reducir temperatura del horno a **130°C** (después de sacar o desplazar los camotes si ya están)
- **Cacerola/roaster grande para pollo confitado:**
  - 1,930g pechuga de pollo (ATM + IOB + 3er semana completa) → cubrir completamente con aceite de oliva (aprox. 400–500ml — se recupera después)
  - Añadir: 8 dientes ajo aplastado, 6 ramitas tomillo fresco, 2 ramitas romero, 1 cucharadita pimienta negra entera, 2 hojas laurel, ralladura de 1 limón, 15g sal fina
  - El aceite debe cubrir el pollo completamente — si no alcanza, completar con aceite de girasol
  - Cubrir herméticamente con tapa o papel aluminio doble
  - Hornear a **130°C por 90 minutos** → temperatura interna objetivo: **68–70°C**

- **Cacerola mediana para pavo confitado:**
  - 1,500g pechuga de pavo → mismo proceso: cubrir con aceite, ajo, tomillo, sal
  - Cubrir herméticamente
  - Hornear a **130°C por 75–80 minutos** → temperatura interna: **68°C**

> ⚠️ NOTA: Si el horno no tiene capacidad para ambas cacerolas simultáneamente, el pavo entra primero (75 min) y el pollo después, o usar la rejilla superior/inferior con cacerolas de perfil bajo.

**[10:10] QUEMADOR 2 → Frijoles negros (Quemador 4 liberado)**
- 200g frijoles negros secos previamente remojados (si no, usar enlatados y omitir este paso) → cocinar en olla con agua + ajo + laurel + sal **35–45 min**
- Si son enlatados: drenar, enjuagar, calentar con ajo y laurel 10 min → reservar

> Si se usan enlatados (recomendado para ahorrar tiempo): 2 latas de 400g → proceder directamente en el Turno 3

**[10:15] PARALELO: Preparar salmón para las diferentes cenas**

División estratégica del salmón (1,710g total):
- **Lunes y Miércoles** (cocinar hoy): ATM 250g+250g=500g / IOB 120g+120g=240g → **740g al vapor hoy**
- **Jueves y Viernes** (cocinar miércoles noche): marinar crudo y refrigerar → **ATM 250g+250g=500g / IOB 120g+120g=240g → 740g → marinar en bolsa, refrigerar hasta miércoles**
- **Domingo** (cocinar hoy, es el mismo día): ATM 150g / IOB 80g → **230g al vapor hoy**

**Porcionado y marinado del salmón:**
1. Porcionar los 1,710g en los grupos anteriores
2. **740g para Jue/Vie:** colocar en bolsa zip con 20ml limón, 5ml aceite de oliva, eneldo, pizca sal → refrigerar (se cocinarán el miércoles en la noche en 8 min)
3. **970g para hoy (Lun + Mié + Dom):** preparar para vapor

**[10:25] QUEMADOR 3 → Vaporera para salmón**
- Vaporera de 2 niveles: llenar base con 500ml agua + 1 limón partido + 1 tallo lemongrass aplastado
- Nivel 1 (porciones más gruesas — Lun ATM 250g): sazonar con sal, pimienta, rodajas de limón encima
- Nivel 2 (porciones más delgadas — Lun IOB 120g, Dom ATM 150g, Dom IOB 80g): misma sazón

- Temperatura interna objetivo: **52°C** (rosado en el centro, confitado suave)
- Retirar → enfriar en plato limpio → refrigerar sin apilar

**[10:35] Salmón primera tanda lista → enfriar**
**[10:40] Segunda tanda de salmón (Mié) → vaporera 8 min**

- ✅ Pavo en horno (lleva 35 min, necesita 40 más)
- ✅ Sous vide: llevan 95 min → ya están listos técnicamente, pueden seguir hasta las 12:00

### TURNO 3 — 11:00 · Salsas, Verduras y Componentes Finales

function mbar(v, max, col) {
  const pct = Math.min(100, Math.round(v / max * 100));
  return `<div class="w-full bg-${col}-100 rounded-full h-1.5 mb-2.5"><div class="bg-${col}-400 h-1.5 rounded-full" style="width:${pct}%"></div></div>`;
}

// ── Rating system ─────────────────────────────────────────────────────────────
let ratings = JSON.parse(localStorage.getItem(RATING_KEY) || '{}');

function rkey(title) {
  return title.toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function saveRatings() {
  localStorage.setItem(RATING_KEY, JSON.stringify(ratings));
  renderFavoritos();
}

function addRatingWidgets() {
  const dayShort = DAYS[curDay]?.short || '';
  document.getElementById('recipes-day').querySelectorAll('h3').forEach(h3 => {
    if (h3.nextElementSibling?.classList.contains('recipe-rating')) return;
    const title = h3.textContent.trim();
    const key   = rkey(title);
    const r     = ratings[key] || { stars: 0, tag: '', title, day: dayShort };

    const w = document.createElement('div');
    w.className = 'recipe-rating not-prose flex items-center flex-wrap gap-2 my-2 px-3 py-2 bg-gray-50 rounded-lg';
    w.dataset.recipe = key;

    // Stars
    const sd = document.createElement('div');
    sd.className = 'flex gap-0.5 items-center';
    for (let s = 1; s <= 5; s++) {
      const sb = document.createElement('span');
      sb.className = 'star-btn' + (s <= r.stars ? ' lit' : '');
      sb.textContent = '★';
      sb.onclick = () => {
        const ns = ratings[key]?.stars === s ? 0 : s;
        ratings[key] = { ...(ratings[key] || {}), stars: ns, title, day: dayShort };
        saveRatings();
        w.querySelectorAll('.star-btn').forEach((b, j) => b.classList.toggle('lit', j < ns));
      };
      sd.appendChild(sb);
    }
    w.appendChild(sd);

    // Tag buttons
    [['favorito','❤️ fav','active-fav'],['repetir','🔄 repetir','active-rep'],['no','🚫 no','active-no']].forEach(([t, l, ac]) => {
      const tb = document.createElement('button');
      tb.className = 'tag-btn' + (r.tag === t ? ' ' + ac : '');
      tb.dataset.tag = t;
      tb.textContent = l;
      tb.onclick = () => {
        const cur = ratings[key]?.tag;
        ratings[key] = { ...(ratings[key] || {}), tag: cur === t ? '' : t, title, day: dayShort };
        saveRatings();
        const newTag = ratings[key].tag;
        w.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.remove('active-fav','active-rep','active-no');
          if (b.dataset.tag === newTag) {
            if (newTag === 'favorito') b.classList.add('active-fav');
            else if (newTag === 'repetir') b.classList.add('active-rep');
            else if (newTag === 'no') b.classList.add('active-no');
          }
        });
      };
      w.appendChild(tb);
    });

    h3.after(w);
  });
}

// ── Favoritos section ─────────────────────────────────────────────────────────
function renderFavoritos() {
  const favs = Object.values(ratings).filter(r => r.tag === 'favorito' || r.tag === 'repetir' || r.stars >= 4);
  const sec  = document.getElementById('fav-section');
  const list = document.getElementById('fav-list');
  if (!favs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = favs.map(r => {
    const tagEl = r.tag === 'favorito' ? '<span class="text-xs bg-red-50 text-red-400 border border-red-100 px-2 py-0.5 rounded-full">❤️ fav</span>'
                : r.tag === 'repetir'  ? '<span class="text-xs bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 rounded-full">🔄 repetir</span>'
                : '';
    const starsEl = r.stars > 0 ? `<span class="text-yellow-400 text-sm tracking-tighter">${'★'.repeat(r.stars)}</span>` : '';
    return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        ${tagEl}
        <span class="text-sm text-gray-700 truncate">${r.title}</span>
        ${r.day ? `<span class="text-xs text-gray-400 shrink-0">${r.day}</span>` : ''}
      </div>
      ${starsEl}
    </div>`;
  }).join('');
}

renderFavoritos();

// ── Shopping ──────────────────────────────────────────────────────────────────
let checks  = JSON.parse(localStorage.getItem(SHOP_KEY) || '{}');
let curShop = 'costco';

function shop(which) {
  curShop = which;
  const on  = 'px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white';
  const off = 'px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600';
  document.getElementById('btn-costco').className = which === 'costco' ? on : off;
  document.getElementById('btn-city').className   = which === 'city'   ? on : off;
  const el = document.getElementById('shop-content');
  el.innerHTML = marked.parse(C[which] || '_Sin contenido_');
  let tot = 0, chk = 0;
  el.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    const k = which + '_' + i;
    cb.checked = !!checks[k];
    if (cb.checked) chk++;
    tot++;
    cb.addEventListener('change', () => {
      checks[k] = cb.checked;
      localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
      setProgress(which);
    });
  });
  setProgress(which, tot, chk);
}

function setProgress(which, tot, chk) {
  if (tot === undefined) {
    const boxes = document.getElementById('shop-content').querySelectorAll('input[type=checkbox]');
    tot = boxes.length; chk = 0;
    boxes.forEach((cb, i) => { if (checks[which + '_' + i]) chk++; });
  }
  const p = document.getElementById('check-prog');
  p.textContent = tot ? `${chk} / ${tot} ítems` : '';
  p.className = chk === tot && tot > 0 ? 'text-xs text-green-600 font-medium' : 'text-xs text-gray-400 font-medium';
}

function clearChecks() {
  Object.keys(checks).filter(k => k.startsWith(curShop + '_')).forEach(k => delete checks[k]);
  localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
  shop(curShop);
}
