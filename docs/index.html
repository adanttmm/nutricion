## SÁBADO 7 DE JUNIO — Por la tarde (45–60 min)

> Todo lo que necesita 24h+ para funcionar correctamente

### 🥩 Marinados (hacer en el orden indicado)

**1. Pollo sous vide coreano (para lunes comida)**
- Pesar **600g de pechuga de pollo** (300g ATM + 200g IOB + 100g extra para caldo tlalpeño jueves)
- Mezclar marinada: 40g gochujang · 20ml salsa de soya baja sodio · 15ml aceite de sésamo · 10g miel · 3 dientes de ajo rallado · 10g jengibre rallado · 5g azúcar morena
- Bolsa al vacío o bolsa zip con toda la mezcla; masajear, sellar, refrigerar

**2. Camarones al ajillo (para viernes comida — cocinar CRUDO el domingo)**
- Pelar y desvenar **600g de camarón mediano** (200g ATM + 120g IOB + 200g 3er comensal + 80g extra)
- Marinada: 6 dientes de ajo laminado · 30ml aceite de oliva · ralladura de 1 limón · 5g chile de árbol seco · sal · pimienta
- Bolsa hermética, refrigerar. **Nota:** estos NO se cocinan el domingo — la cocción de 4 min ocurre el viernes al calentar.

**3. Salmón para confitar (jueves cena + lunes cena)**
- Porcionar **800g de filete de salmón** sin piel: 4 porciones de 200g
  - Lunes cena: ATM 250g + IOB 120g = **370g** (congelar en crudo marinado)
  - Jueves cena: ATM 250g + IOB 120g = **370g** (confitar el domingo)
- Marinada común: 60ml aceite de oliva · ralladura + jugo de 1 limón · 3 ramas de tomillo · 2 dientes de ajo aplastados · sal kosher
- Separar en dos bolsas; la porción del lunes al **congelador** hoy mismo; la porción del jueves al **refrigerador**

**4. Remojo de leguminosas**
- **Garbanzos secos 300g** → enjuagar y cubrir con agua fría 3× el volumen, refrigerar (para caldo tlalpeño jueves + shakshuka domingo)
- **Frijoles negros secos 150g** → remojar igual (para torta martes + tlayuda domingo)

**5. Bacalao desalado (para miércoles cena)**
- Si usas bacalao salado: poner **500g** en tazón con agua fría, cambiar el agua cada 8h (sábado tarde + noche + domingo mañana)
- Si usas bacalao fresco: omitir este paso

**6. Huevos marinados en tamari (para lunes cena)**
- Hervir **8 huevos** exactamente 7 minutos desde agua hirviendo; enfriar en baño de hielo 5 min; pelar
- Marinada: 120ml tamari · 60ml mirin · 60ml agua · 1 cdita de azúcar
- Calentar la marinada a fuego medio hasta disolver el azúcar; enfriar completamente antes de agregar los huevos
- Sumergir los huevos en frasco hermético, refrigerar mínimo 8h (idealmente 24h)

## DOMINGO 8 DE JUNIO — Sesión Principal de Meal Prep

**Duración objetivo: 4.5–5 horas**
**Cronograma sugerido: 9:00am – 2:00pm**

---

### TURNO 1 — 9:00am | Arrancar todo lo de largo tiempo

**→ HORNO a 180°C (precalentar)**

| Quemador / Equipo | Tarea |
|---|---|
| **Olla grande (10L)** | Garbanzos + frijoles: escurrir remojo, poner a cocer por separado |
| **Olla mediana** | Caldo base para doenjang jjigae (viernes cena) |
| **Horno** | Pimientos rojos para asar (sábado desayuno + salsa vizcaína) |
| **Sous vide / Olla baja** | Llenar con agua, subir a 65°C |

**DETALLE POR ESTACIÓN:**

**🫕 Olla 1 — Garbanzos** (quemador 1)
- Escurrir garbanzos, cubrir con agua limpia fría, añadir 1 hoja de laurel y ½ cebolla
- Llevar a hervor, reducir a fuego medio-bajo
- **Tiempo estimado:** 60–75 min hasta que estén tiernos pero enteros
- No salar hasta los últimos 10 min

**🫕 Olla 2 — Frijoles negros** (quemador 2)
- Igual que garbanzos; añadir epazote si tienes
- **Tiempo estimado:** 60–70 min
- Reservar el caldo de cocción (sirve para el refrito)

**🌡️ Sous vide** (quemador 3 o circulador eléctrico)
- Agua a 65°C
- Introducir la bolsa del pollo coreano marinado desde ayer
- **Tiempo:** 1h 30min a exactamente 65°C

**🔥 Horno — Pimientos rojos**
- Colocar 4 pimientos rojos enteros + 2 tomates enteros en charola con papel encerado
- 180°C por 35–40 min hasta que la piel ampolla y se carbonice ligeramente
- Sacar, cubrir con papel film 15 min para que suden → pelar fácil

**⏱️ MIENTRAS TODO ESTO ARRANCA (9:00–9:30am):**
- Cocer los **8 huevos duros** para la semana: 8 min desde agua hirviendo, agua fría, pelar, refrigerar en recipiente con tapa
- Poner a hervir **1.5L de agua** para blanquear verduras después
- Sacar el salmón del refrigerador (el de jueves) para atemperar 20 min antes de confitar

---

### TURNO 2 — 9:30am | Proteínas principales (batch completo)

> El sous vide del pollo coreano sigue corriendo. Garbanzos y frijoles siguen.

**HORNO: bajar a 60°C cuando terminen los pimientos (≈9:40am) → entrar el salmón**

**🐟 Salmón confitado — HORNO 60°C** (solo para jueves; el de lunes va congelado crudo)
- Sacar el salmón (370g: ATM 250g + IOB 120g) de su marinada
- Porcionar en fuente de vidrio o cerámica; cubrir completamente con el aceite de oliva de la marinada + añadir más hasta sumergir
- Introducir al horno a **60°C por 25–30 min**
- El salmón estará listo cuando cambia de translúcido a opaco rosado pero aún se desmorona suave al tacto
- Sacar, enfriar a temperatura ambiente 20 min, refrigerar en su aceite

**🍗 Pollo para tikka masala (martes cena) + caldo tlalpeño (jueves) + teriyaki (domingo) + doenjang (viernes)**

*Esta es la proteína que más trabaja la semana — batch grande*

Necesitas en total:
- Martes cena: ATM 250g + IOB 120g cocido = **~500g crudo**
- Jueves comida (deshebrado): ATM 200g + IOB 120g cocido = **~400g crudo**
- Viernes cena (en sopa): ATM 100g + IOB 50g = **~200g crudo**
- Domingo comida (teriyaki): ATM 200g + IOB 120g = **~400g crudo**
- **Total crudo necesario: ≈1,500g de pechuga**

**División técnica:**
1. **Tikka masala + tlalpeño + doenjang** → hervir/pochear en caldo aromático:
   - Olla con 2L agua · ½ cebolla · 2 dientes ajo · sal · pimienta negra en grano · 1 zanahoria
   - Llevar a 85°C (no a hervor pleno — técnica de pochado)
   - Introducir **1,100g de pechuga** (para martes, jueves y viernes)
   - Cocer 20–22 min a 85°C hasta temperatura interna 74°C
   - Reservar el caldo (base del caldo tlalpeño y del doenjang jjigae)
   - Enfriar y desmenuzar/rebanar según uso (ver Turno 4)

2. **Teriyaki (domingo)** → saltear al final en sartén con salsa (Turno 3)

**🥩 Res molida para tacos (martes comida)**
- Quemador libre: sartén de hierro a fuego alto
- Dorar **600g de res molida 93%** (ATM 200g × 2 porciones martes + ATM 200g + IOB 120g = total: ATM necesita 200g, IOB 120g, 3er comensal 200g = **520g mínimo, hacer 600g**)
- Dorar sin mover 3 min, romper, salpimentar
- Añadir: 1 cdita comino tostado · ½ cdita chile guajillo en polvo · ½ cdita achiote · ½ cdita ajo en polvo · ½ cdita orégano
- Mezclar 2 min; escurrir grasa sobre colador; probar y ajustar sal
- Enfriar completamente antes de refrigerar

**🥩 Res para kabsa (sábado comida)**
- Mismo sartén de hierro: sellar **440g de filete de res magro** (ATM 200g + IOB 120g = 320g mínimo; hacer 440g)
- Sellar a fuego muy alto: 3 min/lado para sellar; no debe cocer completamente
- Transferir a olla pequeña; añadir: ½ cdita canela · ¼ cdita clavo molido · ¼ cdita cardamomo · ½ cdita pimienta negra · ½ cdita comino (mezcla baharat) · 200ml caldo de res o agua
- Cocinar tapado a fuego bajo 25–30 min hasta tierno; el jugo reducirá en salsa daqqus (ver Turno 3)

**🐟 Atún sellado (miércoles comida)**
- Sartén de hierro muy caliente a fuego máximo
- Secar perfectamente el atún con papel (ATM 200g + IOB 120g + 3er comensal 200g = **520g de atún**, idealmente en 2–3 bloques)
- Cubrir los bloques con sésamo negro presionando
- Sellar **exactamente 30 segundos por lado** (incluye los 4 lados)
- El interior debe quedar completamente crudo — rosado oscuro brillante
- Enfriar sobre rejilla; NO sobre papel que crea vapor y continúa la cocción
- Refrigerar descubierto 15 min, luego envolver en film apretado

> ⚠️ **NOTA CRÍTICA:** El atún sellado pierde calidad después de 2 días. Cocinar el domingo, consumir el miércoles = día 3. Aceptable. Si prefieres máxima calidad, puedes sellar el martes por la noche (2 min de trabajo activo).

**🦐 Camarones** — NO cocinar hoy. Ya están marinados en crudo desde ayer. Dejar en refrigerador hasta el viernes.

### TURNO 3 — 11:00am | Granos, salsas, verduras y preparaciones de apoyo

> El salmón ya salió del horno. El sous vide del pollo termina ≈10:30am (sacarlo, enfriar, no abrir la bolsa hasta que baje a temperatura ambiente). Los garbanzos y frijoles deberían estar listos o casi.

**ORGANIZACIÓN DE ESTE BLOQUE: 4 estaciones simultáneas**

---

**ESTACIÓN A — Horno a 200°C | Hornear tandas**

**Tanda 1 — Entrar al horno:**
- **Camote / papa amarilla** para la causa del viernes: 300g papa amarilla + camotes opcionales, en charola a 200°C por 35–40 min hasta suaves al pinchar
- **Jitomates cherry confitados** (sábado colación AM): 160g jitomate cherry + 20ml AOVE + tomillo + sal; charola pequeña a 160°C (bajar temperatura) 45 min → sacar cuando estén arrugados y concentrados

**Tanda 2** (cuando salen los anteriores, ≈11:40am):
- **Nopales asados**: limpiar y cortar en tiras 240g (80g ATM dom + 80g IOB dom + extra para desayunos); asar a 200°C 20 min con sal y aceite mínimo

---

**ESTACIÓN B — Quemadores | Granos (todos de una vez)**

*Usar todas las ollas disponibles en paralelo:*

| Olla | Grano | Agua | Tiempo | Total a cocer |
|---|---|---|---|---|
| **Olla A** | Arroz jazmín | 1:1.5 agua | 18 min | 600g crudo → ~1,200g cocido |
| **Olla B** | Arroz basmati | 1:1.5 agua | 15 min con 3 vainas cardamomo | 400g crudo → ~800g cocido |
| **Olla C** | Arroz integral | 1:2 agua | 40 min | 400g crudo → ~800g cocido |
| **Olla D** | Quinoa tricolor | 1:1.75 caldo verduras | 15 min | 300g crudo → ~600g cocido |
| **Olla E (pequeña)** | Farro perlado | 1:3 agua con laurel | 25 min | 200g crudo → ~450g cocido |

> 💡 Estrategia: Arrancar arroz integral primero (40 min), luego el resto. Jazmín y basmati en los últimos 20 min.

**Pasta integral:** cocer **400g** al dente en agua con sal abundante (10L agua, 10g sal por litro); escurrir al 80% cocción, pasar por agua fría, mezclar con 15ml AOVE para que no pegue. Porcionar.

**Noodles de arroz (lunes cena):** hidratar **225g** en agua caliente 8 min, escurrir, mezclar con gotitas de aceite de sésamo.

---

**ESTACIÓN C — Licuadora / Procesador | Salsas (todas de una vez)**

Hacer en este orden (de más delicada a más robusta para no limpiar entre cada una):

**1. Glaseado miso-jengibre** (miércoles comida) — sin cocción
- Mezclar: 40g miso blanco · 20ml mirin · 15ml salsa de soya baja sodio · 10g jengibre rallado · 5g azúcar · 15ml agua caliente para soltar
- Batir con tenedor hasta homogéneo. Frasco pequeño.

**2. Salsa gochujang-miel** (lunes comida) — sin cocción
- 40g gochujang · 20ml vinagre de arroz · 15g miel · 10ml aceite de sésamo · 5g ajo rallado · 5g jengibre rallado · 20ml agua
- Batir hasta integrado. Frasco pequeño.

**3. Chermoula** (viernes comida) — sin cocción
- Procesar: 1 manojo cilantro · 1 manojo perejil · 4 dientes ajo · 1 cdita comino tostado · 1 cdita pimentón · ½ cdita cúrcuma · jugo de 1 limón · 80ml AOVE · sal
- Procesar hasta pasta gruesa. No licuar fino — textura rústica.

**4. Salsa verde de tomatillo** (martes comida + domingo colación AM)
- Asar 400g tomatillo + 2 chiles serranos + ½ cebolla en comal seco hasta carbonizar
- Licuar con 1 diente ajo · sal · cilantro al gusto
- Hervir la salsa 5 min en olla pequeña; enfriar

**5. Tzatziki** (jueves cena) — sin cocción
- Rallar ½ pepino, exprimir exceso de agua con paño
- Mezclar: 200g yogurt griego · pepino rallado · 1 diente ajo rallado · 10ml AOVE · hojas de menta picada · sal · pimienta
- Refrigerar inmediatamente

**6. Salsa vizcaína** (miércoles cena) — cocción corta
- Usar los pimientos asados y pelados del Turno 1
- Sofreír ½ cebolla + 3 dientes ajo en AOVE; añadir 400g jitomate san marzano machacado + pimientos en tiras + 1 cdita pimentón ahumado + 20g aceitunas kalamata picadas
- Cocinar 20 min a fuego medio; salpimentar; enfriar

**7. Salsa tikka masala** (martes cena)
- En la misma olla donde estaba la vizcaína (o una nueva): sofreír ½ cebolla + 4 dientes ajo + 20g jengibre en AOVE
- Añadir: 1 cdita garam masala · 1 cdita cúrcuma · 1 cdita comino · ½ cdita coriandro
- Tostar especias 1 min; añadir 400g jitomate triturado + 150g yogurt griego batido (añadir fuera del fuego para evitar corte) + 100ml agua
- Cocinar 15 min; licuar parcialmente (textura semidensa); regresar al fuego 5 min; enfriar

**8. Salsa daqqus** (sábado comida)
- Con los jugos de la cocción de la res + 200g jitomate bola asado + 1 chile de árbol + sal + comino
- Licuar todo junto; colar si se desea más fina; reducir 5 min

**9. Salsa teriyaki** (domingo comida)
- 60ml tamari · 40ml mirin · 20ml sake (o vino blanco) · 10g azúcar · 5g jengibre rallado
- Reducir en sartén pequeña 8 min hasta que nape la cuchara; reservar

**10. Salsa vierge** (jueves cena) — sin cocción
- 150g jitomate bola en brunoise · 20 hojas albahaca en chiffonade · 15g alcaparras · 60ml AOVE · jugo de ½ limón · sal · pimienta
- Mezclar en frío. No cocinar.

---

**ESTACIÓN D — Quemador libre | Verduras y guarniciones**

**Blanquear en el mismo agua (de menor a mayor tiempo):**
1. **Edamame pelado** 240g → 3 min agua hirviendo, agua fría
2. **Ejotes** 120g → 4 min agua hirviendo, agua fría
3. **Bok choy** 200g → 2 min agua hirviendo, agua fría
4. **Espárragos** 600g (para toda la semana: lunes cena 214g + martes cena 234g + miércoles cena 234g + jueves cena 234g + viernes cena 214g) → 3 min agua hirviendo, agua fría; cortar puntas

**Saltear en sartén antiadherente:**
- **Espinacas** 360g con ajo laminado y aceite de oliva → 2 min hasta marchitar; escurrir bien
- **Champiñones shiitake** 160g con soya y gotitas de sésamo → 4 min a fuego alto
- **Zanahoria juliana/bastones** para bibimbap (lunes): 120g + gotitas aceite sésamo + sal · 2 min en sartén
- **Poro caramelizado** (jueves): 2 poros limpios en rodajas → sartén a fuego bajo con 10ml AOVE + sal + 5g azúcar → 20–25 min removiendo hasta dorado

**Encurtidos rápidos:**
- **Cebolla morada**: 200g en juliana fina · cubrir con 100ml vinagre de manzana + 100ml agua + 10g sal + 10g azúcar + 5g orégano · dejar reposar 30 min mínimo; refrigerar
- **Daikon encurtido** (para miércoles): 100g daikon en juliana + 50ml vinagre de arroz + 5g azúcar + 5g sal · mismo procedimiento
- **Pepino marinado** (para jueves smørrebrød): 80g pepino en láminas + 40ml vinagre blanco + 5g sal + 3g eneldo seco

**Gelatina light:**
- Preparar 6 moldes de 480ml (lunes, martes, miércoles, jueves, viernes, sábado — cada uno ATM + IOB)
- Usar sabores distintos o neutro con fruta natural; seguir instrucciones del paquete
- Refrigerar mínimo 3h antes del primer uso (lunes cena)

---

**ESTACIÓN E — Preparaciones finales puntuales**

**Pechuga de pavo para toda la semana:**
- El pavo recorre toda la semana en colaciones AM: lunes, martes, miércoles, jueves, viernes, sábado, domingo
- ATM: 200g × 7 días = **1,400g de pechuga de pavo**
- IOB: 50–55g ×` };
const SHOP_KEY   = 'ns_20260605';

// ── Tabs ──────────────────────────────────────────────────────────────────────
function tab(name, btn) {

// ── Person cards ──────────────────────────────────────────────────────────────
function mbar(v, max, col) {
  const pct = Math.min(100, Math.round(v / max * 100));
  return `<div class="w-full bg-${col}-100 rounded-full h-1.5 mb-2.5"><div class="bg-${col}-400 h-1.5 rounded-full" style="width:${pct}%"></div></div>`;
}

  document.getElementById('person-cards').innerHTML += `
  <div class="bg-white rounded-xl shadow-sm p-5">
    <div class="flex items-center justify-between mb-4">

// ── Rating system ─────────────────────────────────────────────────────────────
let ratings = JSON.parse(localStorage.getItem(RATING_KEY) || '{}');

function rkey(title) {
  return title.toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function saveRatings() {
  localStorage.setItem(RATING_KEY, JSON.stringify(ratings));
  renderFavoritos();
}

function addRatingWidgets() {
  const dayShort = DAYS[curDay]?.short || '';
  document.getElementById('recipes-day').querySelectorAll('h3').forEach(h3 => {
    if (h3.nextElementSibling?.classList.contains('recipe-rating')) return;
    const title = h3.textContent.trim();
    const key   = rkey(title);
    const r     = ratings[key] || { stars: 0, tag: '', title, day: dayShort };

    const w = document.createElement('div');
    w.className = 'recipe-rating not-prose flex items-center flex-wrap gap-2 my-2 px-3 py-2 bg-gray-50 rounded-lg';
    w.dataset.recipe = key;

    // Stars
    const sd = document.createElement('div');
    sd.className = 'flex gap-0.5 items-center';
    for (let s = 1; s <= 5; s++) {
      const sb = document.createElement('span');
      sb.className = 'star-btn' + (s <= r.stars ? ' lit' : '');
      sb.textContent = '★';
      sb.onclick = () => {
        const ns = ratings[key]?.stars === s ? 0 : s;
        ratings[key] = { ...(ratings[key] || {}), stars: ns, title, day: dayShort };
        saveRatings();
        w.querySelectorAll('.star-btn').forEach((b, j) => b.classList.toggle('lit', j < ns));
      };
      sd.appendChild(sb);
    }
    w.appendChild(sd);

    // Tag buttons
    [['favorito','❤️ fav','active-fav'],['repetir','🔄 repetir','active-rep'],['no','🚫 no','active-no']].forEach(([t, l, ac]) => {
      const tb = document.createElement('button');
      tb.className = 'tag-btn' + (r.tag === t ? ' ' + ac : '');
      tb.dataset.tag = t;
      tb.textContent = l;
      tb.onclick = () => {
        const cur = ratings[key]?.tag;
        ratings[key] = { ...(ratings[key] || {}), tag: cur === t ? '' : t, title, day: dayShort };
        saveRatings();
        const newTag = ratings[key].tag;
        w.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.remove('active-fav','active-rep','active-no');
          if (b.dataset.tag === newTag) {
            if (newTag === 'favorito') b.classList.add('active-fav');
            else if (newTag === 'repetir') b.classList.add('active-rep');
            else if (newTag === 'no') b.classList.add('active-no');
          }
        });
      };
      w.appendChild(tb);
    });

    h3.after(w);
  });
}

// ── Favoritos section ─────────────────────────────────────────────────────────
function renderFavoritos() {
  const favs = Object.values(ratings).filter(r => r.tag === 'favorito' || r.tag === 'repetir' || r.stars >= 4);
  const sec  = document.getElementById('fav-section');
  const list = document.getElementById('fav-list');
  if (!favs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = favs.map(r => {
    const tagEl = r.tag === 'favorito' ? '<span class="text-xs bg-red-50 text-red-400 border border-red-100 px-2 py-0.5 rounded-full">❤️ fav</span>'
                : r.tag === 'repetir'  ? '<span class="text-xs bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 rounded-full">🔄 repetir</span>'
                : '';
    const starsEl = r.stars > 0 ? `<span class="text-yellow-400 text-sm tracking-tighter">${'★'.repeat(r.stars)}</span>` : '';
    return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        ${tagEl}
        <span class="text-sm text-gray-700 truncate">${r.title}</span>
        ${r.day ? `<span class="text-xs text-gray-400 shrink-0">${r.day}</span>` : ''}
      </div>
      ${starsEl}
    </div>`;
  }).join('');
}

renderFavoritos();

// ── Shopping ──────────────────────────────────────────────────────────────────
let checks  = JSON.parse(localStorage.getItem(SHOP_KEY) || '{}');
let curShop = 'costco';

function shop(which) {
  curShop = which;
  const on  = 'px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white';
  const off = 'px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600';
  document.getElementById('btn-costco').className = which === 'costco' ? on : off;
  document.getElementById('btn-city').className   = which === 'city'   ? on : off;
  const el = document.getElementById('shop-content');
  el.innerHTML = marked.parse(C[which] || '_Sin contenido_');
  let tot = 0, chk = 0;
  el.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    const k = which + '_' + i;
    cb.checked = !!checks[k];
    if (cb.checked) chk++;
    tot++;
    cb.addEventListener('change', () => {
      checks[k] = cb.checked;
      localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
      setProgress(which);
    });
  });
  setProgress(which, tot, chk);
}

function setProgress(which, tot, chk) {
  if (tot === undefined) {
    const boxes = document.getElementById('shop-content').querySelectorAll('input[type=checkbox]');
    tot = boxes.length; chk = 0;
    boxes.forEach((cb, i) => { if (checks[which + '_' + i]) chk++; });
  }
  const p = document.getElementById('check-prog');
  p.textContent = tot ? `${chk} / ${tot} ítems` : '';
  p.className = chk === tot && tot > 0 ? 'text-xs text-green-600 font-medium' : 'text-xs text-gray-400 font-medium';
}

function clearChecks() {
  Object.keys(checks).filter(k => k.startsWith(curShop + '_')).forEach(k => delete checks[k]);
  localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
  shop(curShop);
}

shop('costco');
