# 🗓️ VIERNES 12 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Bircher Muesli Helénico: Avena Hidratada en Kéfir, Proteína de Limón, Fresas, Granada y Pistaches Tostados\n\n**Tiempo:** prep 5 min · reposo 8 h (overnight) | **Porciones:** 2 (ATM + IOB — versiones distintas)\n**Macros ATM:** 611 kcal · P 61g · C 54g · G 20g\n**Macros IOB:** 197 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda (old-fashioned) | 50 g | — |\n| Plátano maduro | — | 120 g |\n| Fresas frescas | 120 g | — |\n| Kéfir bajo en grasa | 60 ml | — |\n| Pistaches sin sal | 15 g | — |\n| Nueces de Castilla | 10 g | — |\n| Arils de granada | 30 g | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(adelantar noche del jueves / domingo si se prepara batch)*\n- ATM: mezclar avena + kéfir + proteína en polvo con 80 ml de agua fría en frasco hermético; refrigerar overnight mínimo 6 h — la proteína hidrata la avena y elimina la textura harinosa\n- IOB: proteína + agua fría en shaker hermético; preparar al momento o refrigerar sin plátano\n- Pistaches: tostar en sartén seco 2-3 min a fuego medio hasta que suelten aroma; enfriar y almacenar en recipiente cerrado\n\n**Elaboración**\n\n1. **ATM — Al servir:** sacar el frasco del refrigerador; la avena debe estar completamente hidratada y con textura densa tipo pudín. Si quedó demasiado espesa, aflojar con 20-30 ml de agua o kéfir adicional.\n2. Incorporar raspadura fina de ½ limón amarillo directamente sobre la avena — no antes del reposo para evitar que amargue.\n3. Coronar con fresas en cuartos, arils de granada y pistaches tostados troceados groseramente. Finalizar con hilo de agave.\n4. **IOB:** licuar proteína con agua fría hasta integrar completamente. Servir con plátano en rodajas al lado o incorporado.\n\n**Emplatado**\nATM en frasco de vidrio tipo mason jar — estratificar visible: avena al fondo, fruta al centro, pistaches y granada encima para contraste de texturas. IOB en vaso alto con plátano en diagonal.\n\n**Conservación**\nLa avena hidratada con kéfir y proteína se conserva hasta 48 h en refrigeración sin fruta ni pistaches. Agregar toppings siempre al momento de servir para mantener el crunch.\n\n**Tip del chef**\nIncorporar la proteína en polvo *antes* del reposo overnight —no al día siguiente— permite que las proteínas actúen como coloide espesante junto al almidón de la avena, logrando una textura untuosa sin grumos. Si la mezcla queda líquida al día siguiente, la proporción kéfir/proteína está desequilibrada: reducir kéfir 20 ml la próxima vez.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=bircher+muesli+kefir+proteina+receta) · [English version](https://www.youtube.com/results?search_query=bircher+muesli+protein+kefir+overnight-oats)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+bircher+muesli+kefir+proteina+granada+pistache)\n\n---\n\n## 🍎 Colación AM\n\n### Pita Griega con Pavo Souvlaki, Tzatziki Ligero, Jitomate Cherry y Espinaca Baby\n\n**Tiempo:** prep 10 min · cocción 0 min (proteína pre-cocida) | **Porciones:** 2 (ATM + IOB)\n**Macros ATM:** 780 kcal · P 73g · C 85g · G 17g\n**Macros IOB:** 315 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Tzatziki ligero 🏪 | 30 g | — |\n| Espinaca baby cruda | 30 g | 30 g |\n| Jitomate bola o cherry | 60 g | al gusto |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n**Mise en place** *(adelantar domingo)*\n- **Pechuga de pavo souvlaki:** marinar pechuga entera con orégano seco, ralladura de limón, ajo confitado machacado, pimienta negra y una pizca de comino; cocinar al horno 180 °C o en sartén de hierro hasta 72 °C interno; rebanar fino o desmechar; refrigerar en su jugo\n- **Tzatziki ligero:** yogurt griego 0% + pepino rallado bien escurrido (exprimir en manta de cielo) + ajo microplane + menta fresca + jugo de limón + sal; refrigerar en hermético hasta 5 días\n- **Claras cocidas IOB:** hervir o cocer en molde; refrigerar en agua fría\n\n**Elaboración**\n\n1. Tostar la chapata en sartén seco o salamandra hasta que la corteza esté crujiente y el interior caliente — 2-3 min por lado a fuego medio-alto. Para IOB, tostar la rebanada de pan integral.\n2. **ATM:** abrir chapata; extender tzatziki en ambas caras interiores (actúa como barrera de humedad y no empapa el pan). Montar espinaca baby como base, pavo en láminas ligeramente superpuestas, jitomate en rodajas y aguacate en láminas finas.\n3. **IOB:** untar pan con aguacate machacado sazonado, montar claras en rodajas, jitomate y espinaca. Servir papaya al lado con miel de agave.\n4. Servir inmediatamente — el tzatziki sobre pan caliente pierde textura en 10 min.\n\n**Emplatado**\nChapata abierta estilo tartine en tabla de madera; tzatziki visible en los bordes; jitomate cherry partido en mitades colocados de forma irregular; finishing de orégano seco y hilo fino de AOVE.\n\n**Conservación**\nEl armado completo no se conserva. Proteína y tzatziki por separado hasta 4 días. Armar al momento de consumir.\n\n**Tip del chef**\nEl error más común del tzatziki es no escurrir suficientemente el pepino — debe quedar casi seco antes de mezclar. Rallarlo grueso, salar ligeramente 10 min y exprimir en manta de cielo elimina >60% del agua libre, evitando que el yogurt se aguade y garantizando una salsa densa y adherente.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=pita+griega+pavo+souvlaki+tzatziki+receta) · [English version](https://www.youtube.com/results?search_query=greek+pita+turkey+souvlaki+tzatziki+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+pita+griega+souvlaki+pavo+tzatziki+ligero)\n\n---\n\n## 🍽️ Comida *(3er comensal — misma porción que ATM)*\n\n### Bulgogi de Res Coreano: Filete Marinado en Soya-Pera-Sésamo, Arroz Integral con Sésamo, Kimchi Ligero y Ensalada de Pepino Gochujang\n\n**Tiempo:** prep 15 min · marinado 12-24 h · cocción 8 min | **Porciones:** 3 (ATM × 2 + IOB)\n**Macros ATM/comensal 3:** 603 kcal · P 63g · C 46g · G 17g\n**Macros IOB:** 406 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (×2 + comensal) | 👤 IOB |\n|---|---|---|\n| Filete de res magro cocido 🏪 | 200 g por persona | 120 g |\n| Arroz integral cocido 🏪 | 200 g por persona | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Marinada bulgogi 🏪 | 25 ml por persona | 15 ml |\n| Kimchi ligero 🏪 | 40 g | 40 g |\n| Pepino en gochujang 🏪 | 60 g | 60 g |\n| Espinaca cruda | 30 g | 30 g |\n| Gelatina light | — | 240 ml |\n\n**Mise en place** *(adelantar domingo — batch para 3 porciones ATM + 1 IOB)*\n\n- **Marinada bulgogi:** licuar ½ pera asiática pelada (o manzana fuji) + 60 ml salsa de soya baja en sodio + 30 ml mirin + 4 dientes ajo + 15 g jengibre fresco + 10 ml aceite de sésamo + 15 g azúcar morena + pimienta negra. La enzima bromelina/proteasa de la pera rompe fibras musculares — no marinar más de 24 h o la textura se vuelve pastosa.\n- **Res:** cortar filete en láminas de 2-3 mm contra la fibra (semi-congelar 20 min facilita el corte); marinar en la preparación anterior en bolsa de vacío o hermético; refrigerar. Para meal prep cocinar el domingo en batch: sartén de hierro o parrilla a fuego muy alto, capa delgada, 90 seg por lado — caramelización intensa por Maillard + azúcar de la marinada.\n- **Arroz integral:** cocinar con ratio 1:2.2, agregar sal y unas gotas de vinagre de arroz; al terminar mezclar con sésamo negro tostado y unas gotas de aceite de sésamo; guardar en hermético.\n- **Pepino gochujang:** pepino persa en rodajas finas + 10 g gochujang + 15 ml vinagre de arroz + 5 g azúcar + 5 ml aceite de sésamo + semillas de sésamo; marinar mínimo 1 h, hasta 3 días.\n- **Kimchi ligero:** usar kimchi comercial bajo en sodio o preparar versión rápida sin fermentación larga.\n\n**Elaboración**\n\n1. **Regeneración del bulgogi:** calentar sartén de hierro a máxima temperatura; agregar res marinada en capa única sin mover los primeros 60 seg para lograr caramelización de la marinada — el azúcar lacado debe crear una costra oscura sin quemarse.\n2. Terminar con 15 ml de marinada fresca reducida sobre la carne fuera del fuego — esto glasea y añade brillo.\n3. Calentar arroz en sartén con unas gotas de agua tapado; finalizar con sésamo negro y aceite de sésamo en frío.\n4. **IOB:** calentar tortilla, montar con res bulgogi (porción IOB), aguacate en láminas, pepino gochujang y espinaca.\n5. Servir kimchi a temperatura ambiente — nunca calentarlo, destruye los probióticos y cambia el sabor.\n\n**Emplatado**\nBowl amplio: arroz como base, bulgogi encima con jugo de cocción, kimchi en esquina, pepino gochujang al lado opuesto, espinaca fresca en centro. Finalizar con sésamo blanco y negro y corte fino de cebolla de cambray. Para IOB: tortilla en papel encerado doblada al centro, ingredientes visibles.\n\n**Conservación**\nRes bulgogi cocida: 4 días refrigerada sin mezclar con arroz. Arroz integral: 5 días. Pepino gochujang: 3 días (mejora con tiempo). Kimchi: indefinido refrigerado — se va acidificando progresivamente.\n\n**Tip del chef**\nLa pera asiática en la marinada no es opcional ni decorativa — sus proteasas naturales (actinidina) fragmentan las proteínas miofibrilares del músculo en 12-24 h, logrando una terneza que no se consigue con golpe de calor. Si usas cortes de segunda, extiende el marinado a 18 h. Con cortes premium tipo ribeye delgado, 6 h son suficientes.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=bulgogi+coreano+receta+autentica+res) · [English version](https://www.youtube.com/results?search_query=authentic-korean-bulgogi-beef-recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+bulgogi+res+coreano+marinada+pera+soya+sesamo)\n\n---\n\n## 🌿 Colación PM *(pre-entreno gym — +150 kcal ATM)*\n\n### Shake de Proteína con Tostada, Mantequilla de Cacahuate, Miel Extra y Jícama\n\n**Tiempo:** prep 5 min | **Porciones:** 2 (ATM + IOB)\n**Macros ATM:** 637 kcal · P 57g · C 56g · G 19g\n**Macros IOB:** 266 kcal · P 27g · C 39g · G 1g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate natural | 16 g | — |\n| Miel de agave | 14 g (+gym) | — |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | — | 180 g |\n\n**Elaboración**\n\n1. Licuar proteína con 300-350 ml de agua fría o hielos hasta textura homogénea. No usar leche en esta colación — objetivo es digestión rápida pre-entreno.\n2. **ATM:** tostar pan integral; extender mantequilla de cacahuate natural (sin azúcares añadidos) y finalizar con hilo de agave. La combinación proteína rápida (suero) + carbohidrato de índice medio (pan integral) + grasa (cacahuate) da energía sostenida para los primeros 45 min de entreno.\n3. Jícama en bastones para ATM e IOB — refrigerada para mayor crujencia. Manzana verde en gajos para IOB.\n4. Consumir 30-45 min antes del entreno.\n\n**Emplatado**\nFuncional: shake en shaker o vaso alto, tostada en papel kraft, jícama en bolsa hermética para transportar al gym.\n\n**Tip del chef**\nLa miel de agave en esta colación tiene función glucogénica específica — su índice glucémico moderado (aprox. 19) eleva glucemia de forma gradual sin pico insulínico brusco, manteniendo disponibilidad de glucosa durante el calentamiento y los primeros sets. No sustituir por miel de abeja (IG ~58) si el objetivo es energía sostenida.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteina+pre+entreno+receta+gym) · [English version](https://www.youtube.com/results?search_query=pre-workout-protein-shake-peanut-butter-recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=colacion+pre+entreno+proteina+mantequilla+cacahuate+miel+agave)\n\n---\n\n## 🌙 Cena\n\n### Salmón Miso-Glazed: Filete Lacado en Miso Blanco, Mirin y Jengibre con Pasta Integral Sesame-Shoyu, Espárragos al Vapor y Wakame\n\n**Tiempo:** prep 10 min · marinado 12 h · cocción 18 min | **Porciones:** 2 (ATM + IOB)\n**Macros ATM:** 800 kcal · P 64g · C 53g · G 34g\n**Macros IOB:** 356 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón miso-glaze 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Miso blanco (en salsa) | 15 g | 8 g |\n| Salsa shoyu-sésamo 🏪 | 20 ml | 10 ml |\n| Wakame rehidratada | 10 g | 10 g |\n| Cebolla morada | 30 g | — |\n| Aceite de sésamo | 5 g | 3 g |\n| Gelatina light | 480 ml | 480 ml |\n\n**Mise en place** *(adelantar noche del jueves)*\n\n- **Glaze miso:** mezclar miso blanco shiro + mirin + sake seco (o vinagre de arroz) en ratio 2:1:1; agregar jengibre microplane y una pizca de azúcar morena; calentar suavemente hasta disolver — no hervir para no destruir enzimas. Pincelar salmón por ambos lados; marinar en hermético 12 h mínimo (hasta 24 h máximo — el miso comienza a \"cocinar\" el exterior por osmosis).\n- **Salsa shoyu-sésamo:** reducir 50 ml shoyu + 20 ml mirin + 5 ml aceite de sésamo + 5 g jengibre en brunoise fino a fuego bajo hasta consistencia nappante ligera. Enfriar y refrigerar.\n- **Espárragos:** limpiar tallos, blanquear 90 seg en agua hirviendo con sal, cortar en agua con hielo — conservar el verde intenso. Refrigerar.\n- **Wakame:** rehidratar en agua fría 5-10 min; escurrir y sazonar con unas gotas de shoyu y sésamo; refrigerar.\n- **Pasta integral:** cocinar al dente (un punto antes del dente indicado); enfriar, mezclar con un hilo de aceite de sésamo para evitar que se pegue; refrigerar.\n\n**Elaboración**\n\n1. **Salmón:** precalentar horno en modo broil/salamandra a 220 °C o usar sartén de hierro con tapa. Secar el exceso de miso con papel absorbente — la capa excesiva se quema antes de que el centro alcance temperatura. La capa fina crea el glaze caramelizado característico.\n2. **Método sartén:** aceite de sésamo en sartén de hierro frío, colocar salmón con piel hacia arriba, encender a fuego medio-alto. Cuando los bordes del filete cambien de translúcido a opaco hasta ⅓ de la altura (~3 min), voltear. Tapar y reducir a fuego medio 3-4 min. Target: 52-54 °C interno para término medio; 58-60 °C para bien cocido.\n3. **Método broil:** colocar sobre rejilla a 15 cm del calor, 6-8 min sin voltear — el glaze burbujea, carameliza y forma costra oscura en puntos. Vigilar constantemente.\n4. Regenerar pasta en sartén con 30 ml de agua caliente; agregar salsa shoyu-sésamo y mantener en movimiento 2 min hasta que la salsa nappea los fideos.\n5. Regenerar espárragos en sartén seco o vapor 60 seg — solo calentar, no recocinar.\n6. Wakame: servir a temperatura ambiente directamente del refrigerador.\n\n**Emplatado**\nPlato hondo amplio o bowl: pasta integral al centro en giro, filete de salmón apoyado en ángulo con la piel visible y el glaze brillante hacia arriba, espárragos cruzados, wakame en lado opuesto, cebolla morada en juliana fina encima del salmón. Finalizar con hilo de aceite de sésamo y semillas de sésamo negro. El contraste cromático verde-salmón-negro-blanco es el objetivo visual.\n\n**Conservación**\nSalmón miso se conserva marinado (crudo) 24 h máximo. Cocido: 48 h — recalentar suavemente en sartén tapado con 15 ml agua para evitar que se reseque. Pasta con salsa: 3 días. Espárragos blanqueados: 3 días.\n\n**Tip del chef**\nEl miso blanco (shiro) tiene mayor contenido de azúcares fermentados que el rojo (aka) — esto lo hace ideal para glazes porque carameliza a temperaturas más bajas (150-160 °C) sin requerir calor extremo. Si usas miso rojo, el glaze quedará más amargo y requerirá mayor proporción de mirin para equilibrar. Nunca uses miso de calidad inferior — es el ingrediente protagonista y su complejidad umami define todo el perfil del platillo.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+miso+glaze+receta+japonesa) · [English version](https://www.youtube.com/results?search_query=miso-glazed-salmon-recipe-japanese)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+miso+blanco+glaze+pasta+integral+sesamo)\n\n---\n\n---"}, {"key": "sabado", "short": "Sáb", "name": "# 🟪 SÁBADO", "menu": "# 🟪 SÁBADO 13 DE JUNIO — Día normal · 🎉 Cena trampa\n*Gastronomía: Mexicana contemporánea / —*\n\n---\n\n### 🌅 Desayuno 🏪 🇲🇽\n**Chilaquiles Verdes Proteicos: Tortilla Horneada Crujiente, Salsa Verde de Tomatillo, Pechuga Deshebrada, Queso Panela y Aguacate Cremoso**\n*Tortillas de maíz horneadas tipo chip; salsa verde de tomatillo-chile serrano confitada; pechuga deshebrada; queso panela; aguacate fresco al momento.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **612 · 61g · 54g · 20g** | **198 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda | 50 g | — |\n| Plátano | — | 120 g |\n| Fresas | 150 g | — |\n| Nueces | 20 g | — |\n| Miel de agave | 5 g | — |\n\n> *Nota: Los chilaquiles son una inspiración para el sabor del día; el desayuno sigue la estructura del plan (shake+avena ATM / shake+plátano IOB) para cumplir macros. Los chilaquiles se sirven en la comida del domingo.*\n> 🏪 Prep: avena en frascos; proteína en shakers.\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Torta de Pavo con Chile Pasilla: Chapata Integral, Pavo Deshebrado en Pasilla Suave, Lechuga Orejona y Aguacate**\n*Chapata crujiente con pavo . Disfrutar plenamente. Retomar el plan el domingo.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **— · — · — · —** | **— · — · — · —** |\n\n---\n\n## 📊 Resumen Sábado *(sin cena trampa)*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal (sin trampa)** | **2 482** | **1 184** |\n| **Proteína** | **253g** | **109g** |\n| **Carbs** | **226g** | **116g** |\n| **Grasa** | **66g** | **29g** |\n| *Nota* | *Cena trampa libre* | *Cena trampa libre* |\n\n---\n---", "recipes": "# 🗓️ SÁBADO 13 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Shake Proteico Base con Avena Overnight y Fresas *(estructura chilaquiles — macros del plan)*\n\n**Tiempo:** prep 5 min · reposo 8 h (overnight) | **Porciones:** 2 (ATM + IOB)\n**Macros ATM:** 612 kcal · P 61g · C 54g · G 20g\n**Macros IOB:** 198 kcal · P 25g · C 31g · G 2g\n\n> *Los chilaquiles verdes proteicos son la inspiración culinaria del día; el desayuno mantiene la estructura del plan para cumplir macros. Los chilaquiles verdes completos se sirven el domingo en comida. Este desayuno es idéntico en estructura al del viernes con ligeras variaciones en toppings.*\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda (old-fashioned) | 50 g | — |\n| Plátano maduro | — | 120 g |\n| Fresas frescas | 150 g | — |\n| Nueces de Castilla | 20 g | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(adelantar noche del viernes)*\n- ATM: proteína + avena + 100 ml agua fría en frasco hermético; agitar vigoroso para disolver la proteína antes de que la avena absorba el líquido — evita grumos secos al fondo\n- IOB: proteína en shaker; plátano aparte\n\n**Elaboración**\n\n1. **ATM:** sacar frasco del refrigerador; verificar consistencia — debe ser densa pero cuchareable. Ajustar con 20 ml agua fría si está demasiado compacta.\n2. Incorporar raspadura de limón amarillo o naranja al momento — aroma cítrico sin acidificar la avena durante el reposo.\n3. Coronar con fresas en láminas finas (más superficie aromática que en cuartos), nueces troceadas a mano para textura irregular y hilo de agave.\n4. **IOB:** licuar proteína + 250 ml agua fría; servir con plátano en rodajas al lado.\n\n**Emplatado**\nMason jar con tapa para transportar si aplica. Fresas en láminas superpuestas sobre la superficie de la avena crean un efecto visual tipo \"tarta\" — nueces en centro como punto focal.\n\n**Conservación**\nAvena preparada (sin fruta ni nueces) hasta 48 h refrigerada. Fresas cortadas máximo 24 h en hermético con unas gotas de limón para evitar oxidación.\n\n**Tip del chef**\nAumentar nueces a 20 g (vs. 10 g del viernes) incrementa el aporte de ácidos grasos omega-3 de cadena corta (ALA) — el sábado sin gym es el momento ideal para priorizar grasas de calidad sobre carbohidratos de energía rápida. La textura también mejora: las nueces hidratadas parcialmente por contacto con la avena adquieren una suavidad que contrasta con el centro crujiente.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=overnight+oats+proteina+fresas+receta) · [English version](https://www.youtube.com/results?search_query=protein-overnight-oats-strawberry-walnuts-recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+avena+overnight+proteina+fresas+nueces+miel+agave)\n\n---\n\n## 🍎 Colación AM\n\n### Torta de Pavo con Chile Pasilla: Chapata Integral, Pavo Deshebrado en Pasilla Suave, Lechuga Orejona y Aguacate\n\n**Tiempo:** prep 8 min · cocción 0 min (proteína pre-cocida) | **Porciones:** 2 (ATM + IOB)\n**Macros ATM:** 780 kcal · P 73g · C 85g · G 17g\n**Macros IOB:** 314 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Salsa pasilla suave 🏪 | 20 g | — |\n| Espinaca baby cruda | 30 g | 30 g |\n| Jitomate bola o cherry | 60 g | al gusto |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n**Mise en place** *(adelantar domingo)*\n\n- **Pavo deshebrado en pasilla:** desvenar y tostar chiles pasilla secos en comal seco 20-30 seg por lado hasta que inflen ligeramente y suelten aroma — no quemar o amargará. Remojar en agua caliente 15 min. Licuar con ajo, cebolla asada, pimienta negra y el agua de remojo; colar. Sofreír la salsa en sartén con una pizca de aceite hasta que oscurezca y pierda el sabor a crudo (~5 min). Incorporar pavo deshebrado (de la pechuga souvlaki o batch aparte); ajustar sal. La salsa debe napar el pavo sin quedar caldosa.\n- **Claras cocidas IOB:** de batch semanal en refrigeración\n- **Aguacate:** preparar al momento para evitar oxidación\n\n**Elaboración**\n\n1. Tostar chapata en sartén de hierro a fuego alto — objetivo: corteza crujiente con interior caliente. Para pan integral IOB, tostadora o sartén seco.\n2. **ATM:** extender una capa delgada de salsa pasilla en la cara inferior de la chapata (actúa como impermeabilizante). Montar espinaca baby, pavo en salsa pasilla caliente, jitomate en rodajas y aguacate en láminas finas con escamas de sal de mar encima.\n3. **IOB:** aguacate machacado como base del pan, claras en rodajas, espinaca y jitomate. Papaya al lado con agave.\n4. La salsa pasilla debe estar caliente al ensamblar — el contraste temperatura caliente/aguacate frío/pan crujiente define la experiencia.\n\n**Emplatado**\nTorta abierta (open-face) sobre tabla de madera para mostrar capas. Terminar con tiritas de chile pasilla rehidratado encima del pavo como elemento visual y guiño al chile protagónico.\n\n**Conservación**\nPavo en salsa pasilla: 4 días refrigerado en hermético — mejora de sabor con el tiempo. Salsa pasilla sola: 1 semana o congelar hasta 3 meses. Armar torta siempre al momento.\n\n**Tip del chef**\nEl tostado del chile pasilla en comal seco es la diferencia entre una salsa con profundidad terrosa-frutal y una salsa plana. La temperatura exacta importa: debes escuchar un ligero crujido y ver micro-burbujas en la piel sin que el chile humee — 20-30 seg a fuego medio es el rango. El chile pasilla debe conservar su color negro-verdoso; si se vuelve café opaco, se quemó y la salsa amargará.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=torta+pavo+chile+pasilla+receta+mexicana) · [English version](https://www.youtube.com/results?search_query=mexican-turkey-sandwich-pasilla-chile-recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+torta+pavo+deshebrado+chile+pasilla+aguacate+mexicana)\n\n---\n\n## 🍽️ Comida\n\n### Tostadas de Atún Mediterráneo: Atún en Agua Escurrido con Pico de Gallo, Aguacate, Nopales Asados y Tortilla Horneada Crujiente\n\n**Tiempo:** prep 15 min · cocción 12 min | **Porciones:** 2 (ATM + IOB — sábado 2 comensales)\n**Macros ATM:** 603 kcal · P 63g · C 46g · G 17g\n**Macros IOB:** 406 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Atún en agua 🏪 | 200 g (escurrido) | 120 g |\n| Tortilla de maíz horneada 🏪 | 2 piezas (60 g) | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | 45 g | 45 g |\n| Pico de gallo fresco 🏪 | 80 g | 60 g |\n| Nopales asados 🏪 | 80 g | 80 g |\n| Espinaca baby cruda | 30 g | 30 g |\n| Gelatina light | — | 240 ml |\n\n**Mise en place** *(adelantar domingo — conserva bien)*\n\n- **Tortillas tipo tostada horneadas:** precalentar horno a 190 °C; colocar tortillas de maíz directamente en rejilla (sin aceite); hornear 8-10 min volteando a la mitad hasta que estén completamente crujientes y con bordes ligeramente dorados. Enfriar sobre rejilla — el vapor al enfriar en superficie plana las ablanda. Guardar en bolsa de papel o recipiente abierto (nunca hermético — el vapor las suaviza).\n- **Pico de gallo base:** jitomate roma en concassé fino (sin semillas ni agua), cebolla blanca en brunoise, chile serrano en brunoise fino, cilantro cortado al momento, sal y jugo de limón al gusto. No preparar con más de 4 h de anticipación — el jitomate suelta agua y pierde textura. Si se prepara el domingo, guardar sin sal ni limón y sazonar al momento.\n- **Nopales asados:** nopales limpios en tiras o enteros en comal o sartén de hierro sin aceite a fuego alto hasta que estén tiernos y con marcas de carbón en ambas caras (~4 min por lado); dejar enfriar, cortar en tiras y marinar con limón, sal, orégano seco y cilantro. Refrigerar.\n- **Atún:** escurrir completamente (prensa con tapa de lata sobre escurridor); mezclar con pico de gallo al momento de servir para evitar que el jitomate ablande el atún.\n\n**Elaboración**\n\n1. Si las tostadas están del día anterior, re-crujir en horno a 180 °C 3 min sobre rejilla — recuperan textura perfectamente.\n2. Preparar aguacate: en bowl, machacar ligeramente con tenedor, sazonar con limón, sal y una pizca de chile en polvo — textura semi-rústica, no guacamole liso.\n3. Mezclar atún escurrido + pico de gallo fresco + unas gotas de limón + sal al gusto. La mezcla debe estar húmeda pero no caldosa — si el pico de gallo soltó mucho líquido, escurrir también.\n4. **Armado:** espinaca baby como primera capa (protege la tostada de la humedad del aguacate), aguacate en capa uniforme, mezcla de atún y pico de gallo, nopales asados encima.\n5. **IOB:** tortilla de harina integral caliente; aguacate como base, atún + pico de gallo, nopales, espinaca.\n6. Servir inmediatamente — la tostada pierde crunch en 4-5 min con relleno húmedo.\n\n**Emplatado**\n2-3 tostadas superpuestas en diagonal sobre plato plano. Nopales en tiras cruzadas sobre el atún como elemento visual elevado. Terminar con gotas de salsa valentina o Tapatio, rodajas de rábano y ramitas de cilantro. El verde de los nopales y espinaca contra el rojo del pico de gallo sobre tostada dorada es la paleta correcta.\n\n**Conservación**\nTostadas horneadas (sin relleno): 3-4 días en recipiente abierto a temperatura ambiente. Pico de gallo: 24 h máximo sazonado. Nopales asados marinados: 4 días refrigerados. Atún escurrido: usar el mismo día. Armar siempre al momento.\n\n**Tip del chef**\nEl error que convierte una tostada en un desastre es no crear una barrera impermeable entre el pan y el relleno húmedo. La espinaca baby actúa como esa barrera: sus hojas crean una capa física que retrasa la transferencia de humedad del aguacate y el atún a la tostada. Técnicamente funciona igual que la lechuga en una hamburguesa clásica — grasa no penetra la hoja, y la hoja no penetra el pan. Tienes ~5 min adicionales de crunch vs. untado directo de aguacate.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=tostadas+atun+aguacate+nopal+receta+mexicana) · [English version](https://www.youtube.com/results?search_query=mexican-tuna-tostadas-avocado-nopal-recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+tostadas+atun+pico+de+gallo+aguacate+nopales+asados)\n\n---\n\n## 🌿 Colación PM *(día normal)*\n\n### Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Jícama\n\n**Tiempo:** prep 5 min | **Porciones:** 2 (ATM + IOB)\n**Macros ATM:** 487 kcal · P 56g · C 41g · G 12g\n**Macros IOB:** 266 kcal · P 27g · C 39g · G 1g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate natural | 16 g | — |\n| Miel de agave | 7 g | — |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | — | 180 g |\n\n**Elaboración**\n\n1. Licuar proteína con 300 ml agua fría y 3-4 hielos hasta textura homogénea y espumosa. Para textura más densa, reducir agua a 240 ml.\n2. Tostar pan integral; extender mantequilla de cacahuate natural (verificar que el único ingrediente sea cacahuate — sin aceites hidrogenados ni azúcar añadida); terminar con hilo de agave. A diferencia de la colación pre-gym del viernes, la miel es 7 g (no 14 g) — día de reposo no requiere el mismo impulso glucogénico.\n3. Jícama en bastones gruesos para máxima crujencia y saciedad mecánica. Manzana verde en gajos con cáscara para IOB.\n\n**Emplatado**\nFuncional de sábado: shake en vaso, tostada en plato pequeño, jícama en bowl con chile tajín y limón al gusto — no cuenta macros relevantes pero eleva significativamente la experiencia sensorial.\n\n**Tip del chef**\nEn días sin entreno, la mantequilla de cacahuate cumple una función diferente a la del pan: retarda el vaciamiento gástrico por su contenido lipídico, prolongando la saciedad 90-120 min adicionales vs. una colación solo de proteína + carb. Esto hace que la espera hasta la cena (trampa) sea más manejable sin generar un déficit que lleve a sobrecompensación en la cena libre.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteina+mantequilla+cacahuate+colacion+fit) · [English version](https://www.youtube.com/results?search_query=protein-shake-peanut-butter-toast-healthy-snack)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=colacion+proteina+pan+integral+mantequilla+cacahuate+jicama+macros)\n\n---\n\n## 🌙 Cena\n\n### 🎉 Cena Libre — Sin Tarjeta de Receta\n\n> Sin conteo calórico. Sin estructura. Retomar el plan completo el domingo desde el desayuno.\n\n---\n\n---"}, {"key": "domingo", "short": "Dom", "name": "# ⬛ DOMINGO", "menu": "# ⬛ DOMINGO 14 DE JUNIO — Día normal + 🏪 MEGA MEAL PREP\n*Gastronomía: Italiana / Mexicana*\n\n---\n\n### 🌅 Desayuno 🇮🇹\n**Frittata Proteica alla Romana: Huevos con Proteína en Polvo, Espinacas Wilted, Jitomate Cherry, Parmesano y Avena Tostada al Lado**\n*Frittata al horno con huevos enteros + claras + proteína; espinacas salteadas; jitomate cherry; acabado de parmesano; acompañada de avena integral tostada.*\n n| Parmesano light | 15 g | 8 g |\n| Vino blanco (reducido) | 30 ml | — |\n| Rúcula fresca | 20 g | 20 g |\n| Aceite oliva | 8 g | 5 g |\n| Gelatina light | — | 240 ml |\n\n> *(Domingo: 2 comensales; se cocina activamente)*\n\n---\n\n### 🌿 Colación PM *(día normal)*\n**Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Jícama**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **487 · 56g · 41g · 12g** | **266 · 27g · 39g · 1g** |\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 7 g | — |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | — | 180 g |\n\n---\n\n### 🌙 Cena 🏪 🇮🇹\n**Salmón al Cartoccio con Limón Siciliano: Paquete de Pergamino con Salmón, Alcaparras, Aceitunas, Pasta Integral al Pomodoro Ligero y Espárragos con Parmesano**\n*Salmón cocido en papillote con limón, alcaparras y aceitunas; pasta integral con passata de tomate ligera; espárragos con parmesano rallado.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 63g · 53g · 34g** | **356 · 28g · 56g · 8g** |\n| Salmón al cartoccio 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Salsa pomodoro ligera 🏪 | 60 ml | 40 ml |\n| Alcaparras | 15 g | 8 g |\n| Aceitunas verdes | 10 g | — |\n| Cebolla morada | 30 g | — |\n| Aceite oliva | 10 g | 5 g |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Domingo\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 283** | **1 340** |\n| **Proteína** | **316g** | **109g** |\n| **Carbs** | **281g** | **132g** |\n| **Grasa** | **100g** | **37g** |\n| *Meta* | *3 277* | *1 374* |\n\n---\n\n---\n\n# 🗓️ GUÍA COMPLETA DE MEAL PREP DOMINICAL\n\n## 🏪 Lista maestra — Todo lo que se cocina el domingo 14 de junio\n\n### PROTEÍNAS (para toda la semana)\n| Proteína | Cantidad total | Técnica | Distribución |\n|---|---|---|---|\n| **Pechuga de pollo** | ~1 200 g crudo | Confitar en aceite de oliva + hierbas a 80°C / 1.5 h | Lun comida, Jue comida |\n| **Filete de res** | ~1 200 g crudo | Sous vide 54°C / 2 h + sellado en sartén | Mar comida, Mié comida, Vie comida |\n| **Salmón** | ~1 850 g crudo | Porciones individuales: hornear 180°C / 12-15 min | Todas las cenas |\n| **Pechuga de pavo** | ~750 g crudo | Hervir en caldo aromático + laminar | Todas las colaciones AM (ATM) |\n| **Claras de huevo** | 18 claras (~540 g) | Cocer duras, pelar y refrigerar en agua | Todas las colaciones AM (IOB) |\n| **Atún en agua** | 400 g (Costco lata/bolsa) | Escurrir + mezclar con pico de gallo base | Sáb comida |\n\n### GRANOS Y CARBOHIDRATOS\n| Grano | Cantidad total cocida | Técnica |\n|---|---|---|\n| **Arroz jazmín** | 800 g cocido | Hervir con azafrán; dividir en 4 porciones ATM (200g c/u) |\n| **Arroz integral** | 400 g cocido | Hervir con sésamo negro; 2 porciones ATM |\n| **Pasta integral** | 900 g cocida | Al dente; porcionar 150g ATM / 75g IOB; dividir en 7 bolsas |\n| **Quinoa** | 200 g cocida | Vapor; para desayuno Mié ATM |\n| **Tortillas maíz horneadas** | 6 piezas | 180°C / 8 min hasta crujiente |\n\n### SALSAS Y CONDIMENTOS\n| Salsa | Cantidad | Uso |\n|---|---|---|\n| **Chermoula verde** | 200 ml | Lun comida |\n| **Salsa teriyaki casera** | 200 ml | Mar cena |\n| **Salsa birria adobo** | 400 ml | Mar comida |\n| **Salsa lomo saltado** | 300 ml | Mié comida |\n| **Salsa pasilla** | 350 ml | Jue comida + Sáb colAM |\n| **Harissa casera** | 150 g | Jue cena |\n| **Salsa bulgogi** | 200 ml | Vie comida |\n| **Salsa shoyu-sésamo** | 150 ml | Vie cena |\n| **Tzatziki ligero** | 100 g | Vie colAM |\n| **Salsa pomodoro** | 300 ml | Dom cena |\n| **Pico de gallo base** | 300 g | Sáb comida |\n\n### VEGETALES PREPARADOS\n| Vegetal | Técnica | Uso |\n|---|---|---|\n| **Espárragos blanqueados** | 2 min agua + choque frío | Todas las cenas |\n| **Zanahorias glaseadas** | Glasear en miel-limón-mantequilla | Lun comida |\n| **Pimientos tricolor confitados** | 180°C / 25 min en aceite | Mié comida |\n| **Papa amarilla confitada** | Confitar en aceite 130°C / 30 min | Mié comida |\n| **Nopales asados** | Asador / comal seco + marinar | Jue comida + Sáb comida |\n| **Ejotes blanqueados** | 3 min agua salada + choque frío | Jue comida |\n| **Cebolla encurtida en habanero** | Vinagre-naranja agria-habanero / 24 h | Mar comida |\n| **Cebolla morada en sumac** | Vinagre-sumac / 2 h mínimo | Jue cena |\n| **Pepino encurtido** | Vinagre de arroz + eneldo / 2 h | Mié colAM |\n| **Pepino en gochujang** | Gochujang-vinagre-sésamo / 2 h | Vie comida |\n| **Kimchi ligero** | Mezcla col-gochujang-jengibre (ready-made Costco OK) | Vie comida |\n\n---\n\n# 📊 TABLA RESUMEN SEMANAL\n\n## 🧔 ATM — Totales diarios\n\n| Día | kcal | Proteína | Carbs | Grasa | Meta kcal |\n|---|---|---|---|---|---|\n| Lun 08 (gym) | 3 434 | 318g | 296g | 107g | 3 427 |\n| Mar 09 (salsa) | 3 383 | 316g | 290g | 107g | 3 377 |\n| Mié 10 (gym) | 3 430 | 316g | 297g | 107g | 3 427 |\n| Jue 11 (salsa) | 3 381 | 317g | 291g | 107g | 3 377 |\n| Vie 12 (gym) | 3 431 | 318g | 294g | 107g | 3 427 |\n| Sáb 13 | 2 482* | 253g | 226g | 66g | 3 277 |\n| Dom 14 | 3 283", "recipes": "# 🗓️ DOMINGO 14 DE JUNIO\n\n---\n\n## 🌅 Desayuno — Frittata Proteica alla Romana\n\n### Frittata Proteica alla Romana\n**Tiempo:** prep 10 min · cocción 18 min | **Porciones:** 2 (ATM + IOB, proporciones distintas)\n**Macros por porción:** ATM 611 kcal · P 61g · C 54g · G 20g | IOB 197 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n*ATM:*\n- Proteína en polvo (sabor neutro o vainilla) — 60 g\n- Huevo entero — 1 pza (50 g)\n- Espinaca cocida — 30 g\n- Jitomate cherry — 60 g\n- Avena integral cruda — 50 g\n- Fresas frescas — 150 g\n- Nueces — 15 g\n- Miel de agave — 5 g\n- Parmesano rallado — al gusto para acabado\n- Aceite en spray / 3 g aceite de oliva\n\n*IOB:*\n- Proteína en polvo — 30 g\n- Espinaca cocida — 30 g\n- Jitomate cherry — al gusto\n- Plátano — 120 g\n\n**Mise en place**\n- Espinacas previamente salteadas en seco y escurridas\n- Jitomates cherry cortados a la mitad, marcados en comal seco hasta que suelten jugo\n- Avena tostada en sartén seca a fuego medio hasta color ámbar (reservar en tarro)\n- Proteína tamizada con 30 ml agua fría para evitar grumos antes de incorporar al huevo\n\n**Elaboración**\n1. Precalentar horno a 190°C con ventilador. Sartén de hierro o antiadherente apta para horno (18 cm ATM / 14 cm IOB), filmada con spray.\n2. **ATM:** Batir huevo entero + 60 g proteína en polvo + 30 ml agua hasta homogéneo. Incorporar espinaca escurrida y cherry marcado.\n3. **IOB:** Batir 30 g proteína + 2 claras (si se tiene a mano) + espinaca + cherry. Consistencia más ligera.\n4. Verter mezcla en sartén caliente a fuego medio-alto. En cuanto los bordes coagulen (≈90 seg), transferir al horno.\n5. Hornear 10–12 min hasta que el centro esté firme al tacto y la superficie ligeramente dorada. Parmesano rallado fino en los últimos 2 min para gratinar.\n6. **Avena tostada (ATM):** Mezclar con fresas laminadas, nueces troceadas y hilo de agave. Servir al lado como acompañamiento frío.\n7. **IOB:** Servir frittata individual con plátano en rebanadas y un polvo de proteína disuelto en agua si faltan macros.\n\n**Emplatado**\nDesmoldar la frittata entera sobre tabla de madera, cortar en gajos como pizza. Servir junto al bowl de avena con fresas y nueces en vasija de cerámica contrastante.\n\n**Tip del chef**\nLa proteína en polvo coagula diferente al huevo: si la mezcla queda muy densa, añadir 1 clara extra para aflojar la textura y evitar una frittata gomosa. La clave es no superar 190°C — el exceso de calor endurece la proteína de suero antes de que el centro cuaje parejo.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=frittata+proteica+espinacas+horno) · [English version](https://www.youtube.com/results?search_query=protein+frittata+oven+spinach+cherry+tomato)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+frittata+proteica+alla+romana+espinacas)\n\n---\n\n## 🍎 Colación AM — Enfrijoladas de Pavo con Queso Panela\n\n### Enfrijoladas de Pavo con Queso Panela\n**Tiempo:** prep 10 min · cocción 15 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción:** ATM 781 kcal · P 73g · C 86g · G 17g | IOB 315 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n*ATM:*\n- Chapata integral — 80 g\n- Pechuga de pavo cocida y deshebrada — 200 g\n- Frijol negro cocido — 60 g\n- Espinaca cruda — 30 g\n- Jitomate fresco — 60 g\n- Aguacate — 45 g\n- Queso panela desmoronado — al gusto\n- Crema ácida light — al gusto\n- Epazote fresco — 3–4 hojas\n- Ajo — 1 diente\n\n*IOB:*\n- Pan integral rebanada — 30 g\n- Pavo cocido deshebrado — 50 g\n- Claras de huevo cocidas — 90 g\n- Frijol negro cocido — 30 g\n- Espinaca cruda — 30 g\n- Jitomate — al gusto\n- Papaya fresca — 140 g\n- Miel de agave — 7 g\n\n**Mise en place**\n- Pavo cocido y deshebrado (del batch dominical, ver Meal Prep)\n- Frijoles negros cocidos con epazote y ajo desde el día anterior o del batch\n- Claras de huevo cocidas duras, peladas, refrigeradas en agua (IOB)\n- Espinaca cruda lavada y centrifugada\n\n**Elaboración**\n1. **Salsa de frijol:** Licuar frijoles negros cocidos con el caldo de cocción necesario para lograr una consistencia de aterciopelado — ni aguada ni compacta. Hervir con ajo aplastado y epazote 3–4 min; ajustar sal. La salsa debe napar una cuchara limpiamente.\n2. **ATM — Chapata tostada:** Abrir chapata integral, tostar en comal o broiler hasta crujiente. Calentar pavo deshebrado en sartén seca con jitomate y espinaca marchita (90 seg fuego alto).\n3. Bañar la chapata con salsa de frijol caliente, montar pavo encima, terminar con panela desmoronada, crema ácida en hilo fino y aguacate en abanico.\n4. **IOB — Pan integral:** Tostar la rebanada. Servir con claras rebanadas, pavo, espinaca y jitomate. Salsa de frijol al lado como dip. Papaya con miel de agave como postre.\n\n**Emplatado**\nChapata en tabla de madera oscura, salsa de frijol cubriendo generosamente, pavo en montículo central, panela y crema en espiral. Toque de epazote fresco encima.\n\n**Conservación**\nSalsa de frijol hasta 5 días refrigerada en frasco hermético. Pavo deshebrado hasta 4 días en contenedor con tapa.\n\n**Tip del chef**\nPara una salsa de frijol con brillo sedoso sin agregar grasa extra, añadir 1 cucharada del agua de cocción del frijol (con todo su almidón) durante el licuado — actúa como emulsionante natural y da cuerpo sin necesidad de manteca.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=enfrijoladas+pavo+queso+panela+caseras) · [English version](https://www.youtube.com/results?search_query=black+bean+sauce+turkey+enfrijoladas+homemade)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+enfrijoladas+pavo+queso+panela)\n\n---\n\n## 🍽️ Comida — Risotto Proteico de Champiñones Porcini\n\n### Risotto Proteico de Champiñones Porcini\n**Tiempo:** prep 15 min · cocción 30 min | **Porciones:** 2 (ATM + IOB)\n**Macros por porción:** ATM 604 kcal · P 63g · C 47g · G 17g | IOB 406 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n*ATM:*\n- Arroz arborio — 150 g (en crudo, rinde ≈ 300 g cocido)\n- Pechuga de pollo cocida y desmenuzada — 200 g\n- Champiñones porcini secos rehidratados — 60 g\n- Cebolla + ajo finamente picados — 30 g total\n- Parmesano light rallado — 15 g\n- Vino blanco seco — 30 ml\n- Rúcula fresca — 20 g\n- Aceite de oliva — 8 g\n- Caldo de pollo desgrasado (del rehidratado de porcini) — c/s\n- Sal, pimienta blanca\n\n*IOB:*\n- Champiñones porcini rehidratados — 40 g\n- Tortilla de harina integral — 30 g\n- Aguacate — 45 g\n- Parmesano light — 8 g\n- Rúcula — 20 g\n- Aceite de oliva — 5 g\n- Gelatina light — 240 ml\n\n**Mise en place**\n- Porcini rehidratados en agua caliente 20 min mínimo; reservar el líquido colado (oro líquido para el caldo del risotto)\n- Pollo cocido y desmenuzado fino (batch dominical)\n- Caldo de pollo caliente en olla pequeña al lado del fuego\n- Cebolla y ajo en brunoise muy fina\n\n**Elaboración**\n1. **Sofrito:** Sudar cebolla y ajo en aceite de oliva a fuego bajo en sartén de fondo grueso — sin color, solo translúcidos (4–5 min). Subir a fuego medio.\n2. **Tostado del arroz (tostatura):** Incorporar arborio en seco al sofrito, mover constantemente 2 min hasta que los granos estén calientes al tacto y ligeramente perlados en el centro.\n3. **Deglasar con vino blanco:** Verter los 30 ml de golpe y reducir completamente absorbido — elimina el alcohol y aporta acidez estructural.\n4. **Hidratación progresiva:** Añadir cucharón a cucharón el caldo caliente (mezcla de caldo de pollo + líquido de porcini), esperando absorción completa antes del siguiente. Mover con regularidad — el almidón liberado es la mantequilla del risotto magro.\n5. A los 12 min, incorporar porcinis escurridos y troceados. Continuar hidratando.\n6. A los 16–18 min, el grano debe estar al dente firme en el centro. **Incorporar pollo desmenuzado** y 1–2 cucharones finales.\n7. **Mantecatura ligera:** Apagar fuego, añadir parmesano rallado, mover enérgicamente 30 seg para crear la emulsión. El risotto debe fluir lentamente al inclinar la sartén (*all'onda*).\n8. **IOB:** Saltear porcinis restantes en aceite de oliva. Calentar tortilla en comal. Montar con aguacate, porcinis y parmesano. Rúcula al lado. Servir gelatina light como cierre.\n\n**Emplatado**\nVerter risotto en plato hondo precalentado formando un lago extendido. Apilar un nido pequeño de rúcula fresca al centro tocando el arroz. Virutas de parmesano adicionales con microplane. Hilo de aceite de oliva en crudo al final.\n\n**Tip del chef**\nEl agua de rehidratación de los porcini contiene más umami que cualquier caldo comercial — filtrarla con manta de cielo elimina la arena sin perder el sabor. Jamás usar risotto del día anterior calentado: el almidón retrograda y pierde la textura cremosa; este platillo se cocina al momento.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=risotto+champinones+porcini+tecnica+italiana) · [English version](https://www.youtube.com/results?search_query=porcini+mushroom+risotto+professional+technique)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+risotto+proteico+champinones+porcini)\n\n---\n\n## 🌿 Colación PM — Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Jícama\n\n### Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Jícama\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** 2 (ATM + IOB)\n**Macros por porción:** ATM 487 kcal · P 56g · C 41g · G 12g | IOB 266 kcal · P 27g · C 39g · G 1g\n\n**Ingredientes**\n*ATM:*\n- Proteína en polvo — 60 g\n- Pan integral — 30 g\n- Mantequilla de cacahuate natural (sin azúcar añadida) — 16 g\n- Miel de agave — 7 g\n- Jícama fresca en bastones — 130 g\n- Agua fría o hielo — 300 ml\n\n*IOB:*\n- Proteína en polvo — 30 g\n- Jícama fresca en bastones — 130 g\n- Manzana verde — 180 g\n- Agua fría — 250 ml\n\n**Mise en place**\n- Jícama pelada y cortada en bastones el domingo (conservar en agua con limón en recipiente hermético hasta 4 días)\n- Mantequilla de cacahuate a temperatura ambiente para untado homogéneo\n\n**Elaboración**\n1. **ATM — Shake:** Licuar proteína en polvo con agua fría e hielos; si se usa shaker, disolver con 50 ml caliente primero para evitar grumos, completar con frío.\n2. Tostar pan integral en tostador hasta crujiente. Untar mantequilla de cacahuate en capa uniforme; terminar con hilo de agave.\n3. Servir shake en vaso frío + tostada al lado + bastones de jícama como snack crujiente.\n4. **IOB:** Shake de proteína simple con agua fría. Manzana verde en gajos como acompañamiento. Bastones de jícama al lado.\n\n**Emplatado**\nShake en vaso largo con pajilla ancha. Tostada en tabla pequeña. Bastones de jícama en shot glass o papel kraft. Presentación funcional tipo café-snack.\n\n**Conservación**\nJícama en bastones en agua con unas gotas de limón, refrigerada hasta 4 días sin perder crujencia.\n\n**Tip del chef**\nLa mantequilla de cacahuate natural tiende a separarse — integrar siempre desde el fondo del frasco con espátula antes de porcionar. Para una tostada con mejor textura, untar la mantequilla sobre pan aún caliente: la grasa penetra ligeramente y evita que el pan se sienta seco al morder.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteina+colacion+meal+prep+fitness) · [English version](https://www.youtube.com/results?search_query=protein+shake+peanut+butter+toast+high+protein+snack)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=colacion+proteica+shake+mantequilla+cacahuate+jicama)\n\n---\n\n## 🌙 Cena — Salmón al Cartoccio con Limón Siciliano\n\n### Salmón al Cartoccio con Limón Siciliano\n**Tiempo:** prep 15 min · cocción 20 min | **Porciones:** 2 (ATM + IOB) + excedente para meal prep semanal\n**Macros por porción:** ATM 800 kcal · P 63g · C 53g · G 34g | IOB 356 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n*ATM:*\n- Salmón fresco (porción para cartoccio) — 250 g\n- Pasta integral cocida al dente — 150 g\n- Espárragos blanqueados — 134 g\n- Salsa pomodoro ligera — 60 ml\n- Alcaparras en salmuera, enjuagadas — 15 g\n- Aceitunas verdes sin hueso, rebanadas — 10 g\n- Cebolla morada en juliana fina — 30 g\n- Limón siciliano o eureka en rodajas — 3–4 rodajas\n- Aceite de oliva extra virgen — 10 g\n- Tomillo o eneldo fresco — 2 ramas\n- Gelatina light — 480 ml\n\n*IOB:*\n- Salmón — 120 g\n- Pasta integral cocida — 75 g\n- Espárragos blanqueados — 134 g\n- Salsa pomodoro ligera — 40 ml\n- Alcaparras — 8 g\n- Aceite de oliva — 5 g\n- Gelatina light — 480 ml\n\n**Mise en place**\n- Espárragos blanqueados 2 min en agua con sal + choque en hielo (se hacen en batch dominical para toda la semana)\n- Pasta cocida al dente, enfriada con agua fría y ligeramente aceitada para evitar apelmazamiento\n- Salsa pomodoro ligera preparada en batch (ver sección Meal Prep)\n- Papel de horno cortado en rectángulos de 40 × 30 cm por porción — doblar tipo papillote clásico francés\n\n**Elaboración**\n1. Precalentar horno a 200°C.\n2. **Montaje del cartoccio:** Sobre papel pergamino, colocar rodajas de limón como cama para el salmón. Posicionar filete de salmón con piel hacia abajo. Distribuir alcaparras, aceitunas, cebolla morada y hierbas encima. Drizzle de aceite de oliva. Sal y pimienta blanca.\n3. **Sellar el paquete:** Doblar los bordes del pergamino en pliegues consecutivos hacia dentro, sellando herméticamente. El vapor interno es el mecanismo de cocción — cualquier fuga arruina la textura.\n4. Hornear 14–16 min. El paquete debe inflarse notablemente — indicador visual de que el vapor está activo. El salmón ideal: centro aún translúcido rosado, textura que se separa en láminas sin desmoronarse (núcleo a 52–54°C).\n5. **Pasta al pomodoro:** Calentar salsa pomodoro en sartén, incorporar pasta al dente directamente, saltear 90 seg a fuego alto para que la pasta absorba la salsa. Mantequear con 3 g aceite de oliva fuera del fuego.\n6. **Espárragos:** Calentar en sartén con unas gotas de aceite, sal marina en escamas y parmesano rallado fino encima al momento de servir.\n7. Abrir el paquete en la mesa o en el plato — el aroma del cartoccio abierto ante el comensal es parte de la experiencia.\n\n**Emplatado**\nLlevar el cartoccio cerrado al plato y abrir en el momento del servicio. Espárragos al lado en línea diagonal. Pasta en molde de timbale o cucharón apilado con toque final de pomodoro extra y hoja de albahaca.\n\n**Conservación — Meal Prep**\nEl salmón horneado individualmente en cartoccio se conserva en el mismo pergamino cerrado hasta 3 días en refrigeración. Recalentar en horno a 160°C / 8 min sin abrir. La pasta porcionada en bolsas zip con salsa separada hasta 4 días. Los espárragos blanqueados en agua fría hasta 5 días.\n\n**Tip del chef**\nPara el batch dominical de salmón: hornear todas las porciones semanales en cartoccio individual (cada porción sellada por separado), dejando el centro ligeramente subcocido a propósito (50°C) — al recalentar durante la semana llegará al punto exacto sin resecarse. Marcar cada paquete con el día de la semana con marcador de alimentos.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+al+cartoccio+papillote+limon+alcaparras) · [English version](https://www.youtube.com/results?search_query=salmon+en+papillote+lemon+capers+olives+professional)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+cartoccio+limon+siciliano+alcaparras)\n\n---\n\n## Preparaciones Base Compartidas\n\n> Estas bases se producen en el **Mega Meal Prep del Domingo 14** y se reutilizan a lo largo de la semana. Ejecutarlas en paralelo optimiza el tiempo total a ≈ 3–3.5 horas de trabajo activo.\n\n---\n\n### BASE 1 — Salsa Pomodoro Ligera\n**Rinde:** ≈ 300 ml | **Uso:** Cena dominical (100 ml) + cenas de pasta durante la semana\n\n**Ingredientes**\n- Passata de jitomate italiana (o jitomate guaje asado licuado y colado) — 500 g\n- Ajo — 3 dientes laminados\n- Albahaca fresca — 5–6 hojas\n- Aceite de oliva — 10 g\n- Sal, pizca de azúcar para balancear acidez\n- Hojuelas de chile (opcional) — 1 g\n\n**Elaboración**\n1. Sudar ajo laminado en aceite de oliva a fuego muy bajo hasta dorado pálido y aromático (no quemar — el ajo quemado amarga toda la salsa).\n2. Incorporar passata de golpe — cuidado con el salpicado. Subir a fuego medio.\n3. Cocinar sin tapa 20–25 min hasta que reduzca 30% y el aceite suba a la superficie formando charcos naranjas — señal de emulsión completada.\n4. Apagar, incorporar albahaca, ajustar sal y azúcar. **No licuar** — la textura rústica es parte del carácter.\n5. Enfriar rápidamente en baño de hielo. Porcionar en frascos de 100 ml etiquetados.\n\n**Conservación:** 7 días refrigerado · 3 meses congelado\n\n---\n\n### BASE 2 — Espárragos Blanqueados (Batch Semanal)\n**Rinde:** ≈ 800 g blanqueados | **Uso:** Todas las cenas de la semana\n\n**Ingredientes**\n- Espárragos frescos medianos — 1 kg crudo\n- Sal — 20 g por litro de agua\n- Hielo — 1 kg para choque\n\n**Elaboración**\n1. Romper la base leñosa doblando el tallo — se parte en el punto natural de dureza. No cortar con cuchillo: el quiebre natural es más preciso.\n2. Blanquear en agua con sal a hervor pleno exactamente **2 minutos** — los tallos deben ceder apenas a la presión del dedo pero conservar resistencia.\n3. Trasladar inmediatamente a baño de hielo abundante mínimo 3 minutos completos. El choque fija el color verde brillante (clorofila estabilizada) y detiene la cocción.\n4. Escurrir, secar con papel y refrigerar en contenedor con papel absorbente en la base.\n\n**Conservación:** 5 días refrigerado en contenedor abierto (el papel absorbe humedad) · No congelar — la textura se destruye\n\n---\n\n### BASE 3 — Pasta Integral al Dente (Batch Semanal)\n**Rinde:** ≈ 900 g cocida | **Uso:** Cena domingo + cenas de pasta semana\n\n**Ingredientes**\n- Pasta integral (penne, fusilli o rigatoni) — 400 g cruda\n- Sal — 10 g por litro de agua\n- Aceite de oliva — 5 g (para conservación)\n\n**Elaboración**\n1. Hervir en abundante agua salada. Cocinar **90 segundos menos** del tiempo indicado en empaque — la pasta continuará cociendo al recalentar durante la semana.\n2. Escurrir sin enjuagar (el almidón superficial ayuda a que la salsa adhiera). Extender en charola plana, aceitar ligeramente y enfriar rápidamente con ventilador o aire.\n3. Porcionar en bolsas zip: **150 g ATM / 75 g IOB** por porción. Etiquetar con día de uso.\n\n**Conservación:** 4 días refrigerado en bolsa sellada · No congelar pasta cocida integral — se vuelve pastosa\n\n---\n\n### BASE 4 — Pollo Confitado (Proteína Batch Semanal)\n**Rinde:** ≈ 800 g cocido | **Uso:** Risotto dominical + comidas Lunes y Jueves\n\n**Ingredientes**\n- Pechuga de pollo limpia — 1 200 g crudo\n- Aceite de oliva — suficiente para sumergir (usar aceite de calidad media, no el fino)\n- Ajo — 4 dientes aplastados\n- Tomillo, laurel, pimienta negra entera\n- Sal — 12 g por kg de proteína\n\n**Elaboración**\n1. Salar las pechugas y dejar reposar en refrigeración 30 min mínimo (salazón en seco para retención de jugos).\n2. Colocar en cazuela de fondo grueso completamente sumergidas en aceite con aromáticos. Temperatura objetivo: **80°C constante** — usar termómetro de sonda; la grasa jamás debe burbujear.\n3. Confitar **1.5 horas**. El pollo está listo cuando una sonda insertada en el centro marca 74°C y la carne se deshebra con dos tenedores sin resistencia.\n4. Retirar, escurrir, desmenuzar en tiras gruesas mientras aún tibio. Distribuir en porciones según tabla de uso semanal.\n5. **Guardar el aceite de confit** colado — contiene toda la gelatina del colágeno y sirve para saltear vegetales el resto de la semana.\n\n**Conservación:** 5 días refrigerado sumergido en el aceite de confit · El aceite prolonga la conservación al crear barrera anaeróbica\n\n---\n\n### BASE 5 — Salmón en Cartoccio Individual (Batch Semanal)\n**Rinde:** Todas las porciones de cena de la semana | **Uso:** Cenas de lunes a sábado\n\n**Ingredientes**\n- Salmón fresco en porciones individuales — 1 850 g total crudo\n- Limón en rodajas, alcaparras, hierbas frescas, aceite de oliva — según tabla semanal de porciones\n- Papel pergamino — 1 rectángulo de 40 × 30 cm por porción\n\n**Elaboración**\n1. Porcionar el salmón según gramajes del menú semanal (250 g ATM / 120 g IOB por cena).\n2. Ensamblar cada cartoccio individualmente con sus aromáticos correspondientes. Sellar con pliegues herméticos.\n3. Hornear a 180°C / 12 min — **dejar el centro a 50°C intencionalmente** (subcocido controlado).\n4. Enfriar completamente antes de refrigerar. Mantener el paquete cerrado hasta el momento de recalentar.\n5. **Al momento de servir durante la semana:** Horno a 160°C / 8–10 min con el paquete aún cerrado. Llegará a 54–56°C perfecto.\n\n**Conservación:** 3 días refrigerado en el mismo cartoccio sellado · Etiquetar con día de uso\n\n---\n\n### BASE 6 — Pavo Cocido y Deshebrado (Batch Semanal)\n**Rinde:** ≈ 500 g cocido | **Uso:** Colaciones AM toda la semana (ATM + IOB)\n\n**Ingredientes**\n- Pechuga de pavo — 750 g crudo\n- Caldo aromático: cebolla, ajo, zanahoria, apio, pimienta, laurel\n- Sal — al gusto\n\n**Elaboración**\n1. Sumergir el pavo en caldo frío aromático. Llevar a hervor y bajar inmediatamente a **fuego muy bajo** — el caldo no debe burbujear, solo humear (poché en lugar de hervir).\n2. Cocinar 35–40 min según grosor. Temperatura interna: 74°C. El método de poché lento conserva la humedad que el hervor violento destruye.\n3. Dejar templar en el mismo caldo 15 min fuera del fuego — la proteína relaja y retiene más jugo.\n4. Deshechar en tiras medias mientras aún tibio; en frío el deshebrado es difícil y la textura se compacta.\n5. Porcionar en bolsas según tabla semanal (200 g ATM / 50 g IOB por colación).\n6. **Reservar el caldo:** Colar y usar como base para sopas o para humedecer el pavo al recalentar.\n\n**Conservación:** 4 días refrigerado con 2 cucharadas del caldo en la bolsa (evita resecamiento) · 2 meses congelado\n\n---\n\n> 💡 **Orden de ejecución recomendado el domingo:** Iniciar confitado de pollo (1.5 h pasivo) → mientras confita: hacer salmones en cartoccio → hornear cartoccios → poché de pavo (35 min pasivo) → blanquear espárragos → hervir pasta → hacer salsa pomodoro → mientras todo enfría: deshechar proteínas, porcionar y etiquetar. Tiempo activo real: ≈ 2 h 45 min."}];

- Sartén: 2 dientes ajo en aceite oliva 1 min → añadir 400 g passata de tomate + orégano + sal + azúcar pellizco + hojas albahaca al final
- Hervir 15 min a fuego medio-bajo
- Rendimiento: ~300 ml → frasco

**11. Pico de gallo base** *(Sáb comida)*
- Jitomate saladet 3 piezas en cubos 5 mm + ½ cebolla blanca + chile serrano 1 pieza sin semillas + cilantro + jugo limón + sal
- Mezclar; guardar en frasco → refrigerar (no dura más de 4 días; para sábado es perfecto)
- Rendimiento: ~300 g

**Bloque B — Verduras restantes:**

**Espárragos blanqueados** *(todas las cenas, Lun–Dom)*
- Agua a hervor con sal + pellizco azúcar (realza color)
- 500 g espárragos, cortar 3 cm del tallo fibroso
- Blanquear en 3 lotes de 167 g: **2 min exactos** → colar → choque en agua+hielo 2 min → escurrir → secar con papel
- Porcionar: 134 g × 7 noches × 2 personas = porciones individuales o en contenedor grande dividido
- Refrigerar

**Nopales asados** *(Jue comida + Sáb comida)*
- Comal o plancha a fuego alto, nopales enteros limpios de espinas
- Asar 4–5 min por lado hasta manchas negras y textura flexible
- Cortar en tiras; marinar en: 40 ml vinagre blanco + orégano + sal + ajo en polvo
- Frasco hermético → refrigerar

**Ejotes blanqueados** *(Jue comida)*
- Agua hirviendo salada → 3 min → choque frío → secar
- 320 g total (80 g ATM × 2 + IOB al gusto)
- Refrigerar en contenedor

**Cebolla morada caramelizada** *(Mié cena)*
- Sartén a fuego mínimo: 2 cebollas moradas en juliana + 1 cda aceite oliva + 1 cdita azúcar + sal
- Cocinar **35 min** moviendo cada 5 min hasta color borgoña oscuro y textura mermelada
- ~150 g resultado → frasco

**Quinoa** *(Mié desayuno ATM)*
- 80 g quinoa blanca → enjuagar bien en colador fino 1 min
- 160 ml agua + sal → llevar a hervor, tapar, fuego mínimo 12 min → reposo 5 min tapado
- Rinde ~200 g cocida → contenedor individual

---

### TURNO 4 — 13:00 h · Porcionado, etiquetado y almacenamiento

**Protocolo de porcionado:**
1. Dejar enfriar cada preparación a temperatura ambiente (máx 30 min) antes de refrigerar
2. Etiquetar CADA contenedor con: preparación / cantidad / fecha / día de uso
3. Proteínas de res y pollo: porcionar en contenedores individuales por día y comensal

---

**PROTEÍNAS — Distribución detallada:**

**Pechuga de pollo confitada** → laminar en tiras gruesas
- Contenedor A: \`POLLO ATM LUN/JUE — 200 g × 2 porciones = 400 g\` → refrigerar (se usa lun y jue)
- Contenedor B: \`POLLO IOB LUN/JUE — 120 g × 2 porciones = 240 g\` → refrigerar
- *Para domingo: cocinar fresco (risotto)*

**Filete de res** → cortar en bisteces o tiras según uso
- Lote A (Birria): \`RES BIRRIA ATM MAR — 200 g\` + \`RES BIRRIA IOB MAR — 120 g\` → refrigerar
- Lote B (Lomo Saltado): \`RES SALTADO ATM MIÉ — 200 g\` + \`RES SALTADO IOB MIÉ — 120 g\` → refrigerar
- Lote C (Bulgogi): \`RES BULGOGI ATM VIE — 200 g\` + \`RES BULGOGI IOB VIE — 120 g\` + \`RES BULGOGI 3er MIÉ — 200 g\` + \`RES BULGOGI 3er MAR — 200 g\` → **3er comensal**: porciones iguales a ATM, refrigerar (martes y miércoles usan res diferente pero mismo contenedor size)

> **Nota 3er comensal:** Martes = birria res 200 g; Miércoles = lomo saltado 200 g; Viernes = bulgogi 200 g. Total adicional por 3er: 600 g res extra ya contemplado en los lotes.

**Pechuga de pavo laminada**
- Contenedor único grande o dividido: \`PAVO LAMINADO —` };

function mbar(v, max, col) {

  return `<div class="w-full bg-${col}-100 rounded-full h-1.5 mb-2.5"><div class="bg-${col}-400 h-1.5 rounded-full" style="width:${pct}%"></div></div>`;
}

// ── Rating system ─────────────────────────────────────────────────────────────
let ratings = JSON.parse(localStorage.getItem(RATING_KEY) || '{}');

function rkey(title) {
  return title.toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function saveRatings() {
  localStorage.setItem(RATING_KEY, JSON.stringify(ratings));
  renderFavoritos();
}

function addRatingWidgets() {
  const dayShort = DAYS[curDay]?.short || '';
  document.getElementById('recipes-day').querySelectorAll('h3').forEach(h3 => {
    if (h3.nextElementSibling?.classList.contains('recipe-rating')) return;
    const title = h3.textContent.trim();
    const key   = rkey(title);
    const r     = ratings[key] || { stars: 0, tag: '', title, day: dayShort };

    const w = document.createElement('div');
    w.className = 'recipe-rating not-prose flex items-center flex-wrap gap-2 my-2 px-3 py-2 bg-gray-50 rounded-lg';
    w.dataset.recipe = key;

    // Stars
    const sd = document.createElement('div');
    sd.className = 'flex gap-0.5 items-center';
    for (let s = 1; s <= 5; s++) {
      const sb = document.createElement('span');
      sb.className = 'star-btn' + (s <= r.stars ? ' lit' : '');
      sb.textContent = '★';
      sb.onclick = () => {
        const ns = ratings[key]?.stars === s ? 0 : s;
        ratings[key] = { ...(ratings[key] || {}), stars: ns, title, day: dayShort };
        saveRatings();
        w.querySelectorAll('.star-btn').forEach((b, j) => b.classList.toggle('lit', j < ns));
      };
      sd.appendChild(sb);
    }
    w.appendChild(sd);

    // Tag buttons
    [['favorito','❤️ fav','active-fav'],['repetir','🔄 repetir','active-rep'],['no','🚫 no','active-no']].forEach(([t, l, ac]) => {
      const tb = document.createElement('button');
      tb.className = 'tag-btn' + (r.tag === t ? ' ' + ac : '');
      tb.dataset.tag = t;
      tb.textContent = l;
      tb.onclick = () => {
        const cur = ratings[key]?.tag;
        ratings[key] = { ...(ratings[key] || {}), tag: cur === t ? '' : t, title, day: dayShort };
        saveRatings();
        const newTag = ratings[key].tag;
        w.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.remove('active-fav','active-rep','active-no');
          if (b.dataset.tag === newTag) {
            if (newTag === 'favorito') b.classList.add('active-fav');
            else if (newTag === 'repetir') b.classList.add('active-rep');
            else if (newTag === 'no') b.classList.add('active-no');
          }
        });
      };
      w.appendChild(tb);
    });

    h3.after(w);
  });
}

// ── Favoritos section ─────────────────────────────────────────────────────────
function renderFavoritos() {
  const favs = Object.values(ratings).filter(r => r.tag === 'favorito' || r.tag === 'repetir' || r.stars >= 4);
  const sec  = document.getElementById('fav-section');
  const list = document.getElementById('fav-list');
  if (!favs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = favs.map(r => {
    const tagEl = r.tag === 'favorito' ? '<span class="text-xs bg-red-50 text-red-400 border border-red-100 px-2 py-0.5 rounded-full">❤️ fav</span>'
                : r.tag === 'repetir'  ? '<span class="text-xs bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 rounded-full">🔄 repetir</span>'
                : '';
    const starsEl = r.stars > 0 ? `<span class="text-yellow-400 text-sm tracking-tighter">${'★'.repeat(r.stars)}</span>` : '';
    return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        ${tagEl}
        <span class="text-sm text-gray-700 truncate">${r.title}</span>
        ${r.day ? `<span class="text-xs text-gray-400 shrink-0">${r.day}</span>` : ''}
      </div>
      ${starsEl}
    </div>`;
  }).join('');
}

renderFavoritos();

// ── Shopping ──────────────────────────────────────────────────────────────────
let checks  = JSON.parse(localStorage.getItem(SHOP_KEY) || '{}');
let curShop = 'costco';

function shop(which) {
  curShop = which;
  const on  = 'px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white';
  const off = 'px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600';
  document.getElementById('btn-costco').className = which === 'costco' ? on : off;
  document.getElementById('btn-city').className   = which === 'city'   ? on : off;
  const el = document.getElementById('shop-content');
  el.innerHTML = marked.parse(C[which] || '_Sin contenido_');
  let tot = 0, chk = 0;
  el.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    const k = which + '_' + i;
    cb.checked = !!checks[k];
    if (cb.checked) chk++;
    tot++;
    cb.addEventListener('change', () => {
      checks[k] = cb.checked;
      localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
      setProgress(which);
    });
  });
  setProgress(which, tot, chk);
}

function setProgress(which, tot, chk) {
  if (tot === undefined) {
    const boxes = document.getElementById('shop-content').querySelectorAll('input[type=checkbox]');
    tot = boxes.length; chk = 0;
    boxes.forEach((cb, i) => { if (checks[which + '_' + i]) chk++; });
  }
  const p = document.getElementById('check-prog');
  p.textContent = tot ? `${chk} / ${tot} ítems` : '';
  p.className = chk === tot && tot > 0 ? 'text-xs text-green-600 font-medium' : 'text-xs text-gray-400 font-medium';
}

function clearChecks() {
  Object.keys(checks).filter(k => k.startsWith(curShop + '_')).forEach(k => delete checks[k]);
  localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
  shop(curShop);
}
