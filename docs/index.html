const DAYS     = [{"key": "lunes", "short": "Lun", "name": "# 🟦 LUNES", "menu": "# 🟦 LUNES 08 DE JUNIO — Gym ATM (+150 kcal)\n*Gastronomía: Japonesa / Mediterránea*\n\n---\n\n### 🌅 Desayuno 🏪 🇯🇵\n**Overnight Oats Matcha-Proteico: Avena Fría con Polvo de Proteína de Vainilla, Leche de Avena, Pasta de Matcha, Fresas Maceradas y Nueces Tostadas**\n*Avena hidratada toda la noche con matcha ceremonial, proteína batida y fresas maceradas en miel de agave; acabado con nueces caramelizadas en seco.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **612 · 61g · 55g · 20g** | **198 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g (2 porciones) | 30 g (1 porción) |\n| Avena cruda | 50 g | — |\n| Plátano entero | — | 120 g (1 pieza) |\n| Fresas frescas | 150 g | — |\n| Nueces | 20 g | — |\n| Leche de avena / agua | 200 ml leche avena | agua |\n| Matcha ceremonial | 2 g | — |\n| Miel de agave | 5 g | — |\n\n> 🏪 Prep: ATM mezcla avena + proteína + leche de avena + matcha en frasco hermético; refrigerar. IOB: proteína en polvo + plátano licuados en agua al momento (30 seg).\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Sándwich Estilo Club en Chapata Integral: Pavo Confitado, Espinaca Baby, Jitomate Heritage y Germen de Alfalfa con Aguacate**\n*Chapata integral tostada en seco el domingo, pavo cocido laminado fino, capas vegetales frescas y aguacate al momento.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **781 · 73g · 86g · 17g** | **315 · 29g · 28g · 9g** |\n| Chapata integral | 80 g (1 pieza) | — |\n| Pan integral (rebanada) | — | 30 g (1 rebanada) |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g (3 claras) |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Germen de alfalfa | 10 g | — |\n| Aguacate fresco | 45 g (¼ pieza) | — |\n| Papaya fresca | — | 140 g (1 taza) |\n| Miel de agave | — | 7 g (1 cdita) |\n\n> 🏪 Prep: pavo cocido al vacío / hervido y laminado; claras IOB cocidas duras. Chapata tostada al momento (1 min tostador).\n\n---\n\n### 🍽️ Comida 🏪 🇲🇹\n**Pollo Chermoula Dorado: Pechuga Confitada en Salsa Verde Marroquí con Arroz Jazmín al Azafrán, Zanahorias Glaseadas y Ensalada Crispy**\n*Pechuga confitada en aceite de oliva con cilantro, comino y ajo; servida sobre arroz jazmín perfumado con azafrán y zanahorias glaseadas en miel-limón.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **604 · 63g · 47g · 17g** | **407 · 28g · 18g · 17g** |\n| Pechuga de pollo cocida 🏪 | 200 g | 120 g |\n| Arroz jazmín cocido 🏪 | 200 g (1 taza) | — |\n| Tortilla de harina integral | — | 30 g (1 pieza) |\n| Aguacate fresco | — | 45 g |\n| Chermoula verde 🏪 | 30 g | 30 g |\n| Zanahoria glaseada 🏪 | 80 g | al gusto |\n| Lechuga + jitomate | 90 g | 90 g |\n| Espinaca cruda | 30 g | 30 g |\n| Aceite oliva (en chermoula) | 8 g | 8 g |\n| Gelatina light | — | 240 ml |\n\n> *(Lunes: 2 comensales)*\n> 🏪 Prep: pollo confitado en aceite con chermoula; arroz jazmín con infusión azafrán; zanahorias glaseadas en miel-limón-romero.\n\n---\n\n### 🌿 Colación PM *(pre-entreno gym — +150 kcal ATM)*\n**Power Shake de Proteína con Tostada Integral, Mantequilla de Cacahuate y Jícama Crujiente**\n*Shake denso de proteína con miel de agave; acompañado de tostada integral con mantequilla de cacahuate natural y bastones de jícama.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **637 · 57g · 55g · 19g** | **266 · 27g · 39g · 1g** |\n| Proteína en polvo | 60 g (2 porciones) | 30 g (1 porción) |\n| Pan integral | 30 g (1 rebanada) | — |\n| Mantequilla de cacahuate | 16 g (1 cda) | — |\n| Miel de agave | 14 g (2 cditas) *(+gym)* | — |\n| Jícama fresca | 130 g (1 taza) | 130 g (1 taza) |\n| Manzana verde | — | 180 g (1 pieza) |\n\n> ATM: +150 kcal gym = miel de agave doble (14 g vs 7 g base) + 5 g nueces extra.\n\n---\n\n### 🌙 Cena 🏪 🇮🇹\n**Salmón en Crosta di Erbe con Pasta Integral al Limón, Espárragos Salteados y Reducción de Alcaparras**\n*Salmón cocido en costra de hierbas (eneldo, perejil, cebolla morada); pasta integral al dente con emulsión de limón, alcaparras y espárragos blanqueados.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 64g · 53g · 34g** | **357 · 28g · 56g · 8g** |\n| Salmón cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g (1 taza) | 75 g (½ taza) |\n| Espárragos blanqueados 🏪 | 134 g (1 taza) | 134 g (1 taza) |\n| Cebolla morada | 30 g | — |\n| Aceite oliva + limón | 10 g | 5 g |\n| Alcaparras (reducción) | 15 g | — |\n| Gelatina light | 480 ml | 480 ml |\n\n> 🏪 Prep: salmón horneado en costra de hierbas; pasta integral cocida al dente; espárragos blanqueados 2 min + choque frío.\n\n---\n\n## 📊 Resumen Lunes\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 434** | **1 343** |\n| **Proteína** | **318g** | **137g** |\n| **Carbs** | **296g** | **172g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 427 (gym)* | *1 374* |\n\n---\n---", "recipes": "## 📅 LUNES 08 DE JUNIO\n\n---\n\n### Overnight Oats Matcha-Proteico\n**Tiempo:** prep 8 min · reposo overnight | **Porciones:** 2 (ATM doble, IOB individual)\n**Macros por porción — ATM:** 612 kcal · P 61g · C 55g · G 20g | **IOB:** 198 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n- Proteína en polvo vainilla: ATM 60 g / IOB 30 g\n- Avena cruda en hojuela: 50 g (ATM)\n- Fresas frescas: 150 g (ATM)\n- Nueces pecanas o de castilla: 20 g (ATM)\n- Leche de avena: 200 ml (ATM) / agua (IOB)\n- Matcha ceremonial en polvo: 2 g (ATM)\n- Miel de agave: 5 g (ATM)\n- Plátano maduro: 120 g (IOB)\n\n**Mise en place** *(domingo)*\n- ATM: disolver matcha en 30 ml de leche de avena tibia (60 °C) hasta pasta homogénea; mezclar con resto de leche + avena + proteína en polvo; ajustar dulzor con agave; vaciar en frasco hermético de 500 ml; refrigerar mínimo 8 h.\n- Macerar fresas en 3 g de agave + ralladura de limón; guardar por separado en frasco pequeño.\n- Tostar nueces en sartén seca a fuego medio 4 min hasta fragantes; enfriar y conservar en bolsa hermética a temperatura ambiente.\n- IOB: medir proteína en polvo en vaso individual; refrigerar. Plátano entero a temperatura ambiente.\n\n**Elaboración**\n1. ATM: sacar frasco del refrigerador — consistencia debe ser cremosa y espesa, cuchara debe sostenerse 3 seg antes de hundirse.\n2. Incorporar fresas maceradas con su jugo encima, sin mezclar (efecto visual bicolor).\n3. Coronar con nueces tostadas al momento del servicio para mantener crujiente.\n4. IOB: licuar proteína + plátano + agua 30 seg a alta velocidad hasta textura mousse; servir inmediato.\n\n**Emplatado**\nFrasco de vidrio transparente en capas visibles: base verde matcha, fresas rojas al centro, nueces doradas en cima. IOB: vaso alto con pajilla ancha.\n\n**Conservación**\nATM: frasco armado (sin nueces) hasta 3 días en refrigeración. Nueces separadas.\n\n**Tip del chef**\nDisolver el matcha ceremonial siempre con líquido tibio (55-65 °C) antes de integrar a la base fría — el choque térmico previo rompe grumos y activa los polifenoles para sabor más limpio y color verde vibrante.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=overnight+oats+matcha+proteico+receta) · [English version](https://www.youtube.com/results?search_query=matcha+protein+overnight+oats)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+overnight+oats+matcha+proteico)\n\n---\n\n### Sándwich Club en Chapata Integral — Pavo, Aguacate y Germen\n**Tiempo:** prep 10 min · cocción 0 min (componentes precocidos) | **Porciones:** 2\n**Macros por porción — ATM:** 781 kcal · P 73g · C 86g · G 17g | **IOB:** 315 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n- Chapata integral: 80 g (ATM) / pan integral rebanada 30 g (IOB)\n- Pechuga de pavo cocida 🏪: ATM 200 g / IOB 50 g, laminada a 3 mm\n- Claras de huevo cocidas duras 🏪: 90 g (IOB, aprox. 3 claras)\n- Espinaca baby: 30 g c/u\n- Jitomate tipo heritage o saladet: ATM 60 g / IOB al gusto\n- Germen de alfalfa: 10 g (ATM)\n- Aguacate Hass fresco: 45 g — ¼ pieza (ATM)\n- Papaya fresca: 140 g (IOB)\n- Miel de agave: 7 g (IOB)\n\n**Mise en place** *(domingo)*\n- Cocer pechuga de pavo a 74 °C interno (sous vide 65 °C × 2 h o pochada en caldo aromatizado); enfriar en hielo, laminar a cuchillo a 3 mm, porcionar en bolsas individuales.\n- IOB: cocer claras hasta yema firme, pelar, conservar enteras en agua fría.\n- Germen de alfalfa: guardar en colador dentro de frasco con un poco de agua; dura 4 días.\n\n**Elaboración**\n1. Tostar chapata/pan integral en tostador seco 1 min hasta corteza crujiente pero miga flexible.\n2. ATM: aplastar aguacate con sal de mar y gotitas de limón directamente sobre la base de la chapata — no untar con espátula, presionar con tenedor para textura rústica.\n3. Construir en capas: espinaca → pavo laminado (doble capa, superpuesto) → jitomate en rodajas de 5 mm sal + pimienta → germen → tapa.\n4. IOB: montar pan con espinaca + pavo + claras rebanadas + jitomate; acompañar papaya con hilo de agave.\n5. Cortar sándwich ATM en diagonal — la diagonal comprime las capas y facilita el bocado.\n\n**Emplatado**\nMitades del sándwich en ángulo de 45°, germen asomándose en los bordes. IOB: tostada + papaya en bowl pequeño al lado.\n\n**Conservación**\nComponentes por separado hasta 4 días. No armar con más de 12 h de anticipación (aguacate se oxida).\n\n**Tip del chef**\nBlanquear la espinaca baby 10 seg en agua hirviendo + choque frío si se va a congelar o viajar; cruda es superior en textura si se consume el mismo día.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=sandwich+club+pavo+aguacate+chapata+integral) · [English version](https://www.youtube.com/results?search_query=gourmet+turkey+club+sandwich+whole+grain)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+sandwich+club+pavo+chapata+integral)\n\n---\n\n### Pollo Chermoula Dorado con Arroz Jazmín al Azafrán y Zanahorias Glaseadas\n**Tiempo:** prep 20 min · cocción 45 min (🏪 dominical) | **Porciones:** 2\n**Macros por porción — ATM:** 604 kcal · P 63g · C 47g · G 17g | **IOB:** 407 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n\n*Chermoula verde 🏪 (rinde ~120 g):*\n- Cilantro fresco: 40 g\n- Perejil liso: 20 g\n- Ajo: 2 dientes\n- Comino molido: 3 g\n- Paprika ahumada: 2 g\n- Jugo de limón: 20 ml\n- Aceite de oliva extra virgen: 20 g\n- Sal + pimienta negra\n\n*Pollo + guarniciones:*\n- Pechuga de pollo: ATM 200 g / IOB 120 g (cocida pesada)\n- Arroz jazmín cocido 🏪: 200 g ATM (aprox. 70 g crudo)\n- Hebras de azafrán: 0.1 g (una pizca generosa)\n- Zanahoria baby o bastones: 80 g por porción\n- Miel de abeja: 8 g (para glasear)\n- Jugo de limón + romero fresco: c/s\n- Aceite de oliva (en chermoula): 8 g c/u\n- Tortilla de harina integral: 30 g (IOB)\n- Aguacate: 45 g (IOB)\n- Lechuga + jitomate: 90 g c/u\n- Espinaca cruda: 30 g c/u\n\n**Mise en place** *(domingo)*\n- **Chermoula:** procesar todos los ingredientes en licuadora o mortero hasta textura semi-rústica (no pasta lisa); reservar en frasco hermético — mejora sabor a las 24 h.\n- **Pollo confitado:** marinar pechugas en la mitad de la chermoula 30 min mínimo; confitar en aceite de oliva a 80 °C en horno 25 min hasta TI 72 °C; enfriar en su aceite; porcionar y refrigerar. El aceite perfumado se reusa para el arroz.\n- **Arroz jazmín:** infusionar azafrán en 10 ml agua a 80 °C × 5 min; cocer arroz 1:1.5 con caldo de pollo + infusión azafrán; reposar tapado 10 min; extender en charola para enfriar rápido.\n- **Zanahorias glaseadas:** blanquear zanahorias 3 min; saltear en sartén con miel + jugo limón + romero a fuego alto 4 min hasta glasé brillante y punto nacarado.\n\n**Elaboración**\n1. Calentar pollo confitado en sartén antiadherente a fuego medio-alto 3 min por lado — buscar corteza dorada Maillard sin resecar interior (TI destino: 68-70 °C).\n2. Calentar arroz en sartén con 2 cucharadas de agua + tapa; 3 min → granos sueltos y perfumados.\n3. Glasear nuevamente las zanahorias 1 min en sartén caliente hasta que el glaseado burbujee y brillé.\n4. ATM: rebanar pollo en diagonal, napar con chermoula fría encima de la carne caliente (contraste temperatura).\n5. IOB: armar wrap en tortilla integral con pollo + aguacate aplastado + ensalada.\n\n**Emplatado**\nATM: base de arroz azafrán en óvalo → pollo en abanico encima → zanahorias al lateral → hilo de chermoula verde sobre todo el plato. Ensalada en bowl aparte.\n\n**Conservación**\nPollo confitado en su aceite: 5 días refrigerado. Arroz: 4 días. Zanahorias: 3 días. Chermoula: 5 días.\n\n**Tip del chef**\nConfitar el pollo en su propio aceite de chermoula sella los aromas dentro de la fibra muscular; al recalentar, ese aceite perfumado es el mejor medio de fritura superficial — no añadas aceite nuevo o perderás el perfil aromático acumulado.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=pollo+chermoula+arroz+azafran+receta) · [English version](https://www.youtube.com/results?search_query=chermoula+chicken+saffron+rice+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+pollo+chermoula+arroz+jazmin+azafran)\n\n---\n\n### Power Shake Proteico con Tostada Integral, Mantequilla de Cacahuate y Jícama\n**Tiempo:** prep 5 min | **Porciones:** 2\n**Macros por porción — ATM (+gym):** 637 kcal · P 57g · C 55g · G 19g | **IOB:** 266 kcal · P 27g · C 39g · G 1g\n\n**Ingredientes**\n- Proteína en polvo vainilla: ATM 60 g / IOB 30 g\n- Pan integral: 30 g — 1 rebanada (ATM)\n- Mantequilla de cacahuate natural (sin azúcar añadida): 16 g (ATM)\n- Miel de agave: ATM 14 g (+gym boost) / IOB —\n- Jícama fresca: 130 g c/u\n- Manzana verde: IOB 180 g (1 pieza) / ATM — (+ 5 g nueces extra en boost gym si aplica)\n- Agua fría: 350-400 ml c/u\n\n**Mise en place** *(dominical)*\n- Pelar y cortar jícama en bastones 8×8×80 mm; guardar en agua fría con jugo de limón — mantiene tersura hasta 5 días.\n- ATM: pre-porcionar proteína en polvo en bolsa zip individual.\n\n**Elaboración**\n1. Licuar proteína + agua + miel de agave 20 seg a velocidad media → consistencia espesa sin grumos; no sobre-licuar (incorpora demasiado aire, textura espumosa).\n2. ATM: tostar pan 1 min → untar mantequilla de cacahuate en capa de 3 mm mientras el pan está caliente (facilita extensión uniforme y activa aromas).\n3. Servir shake en vaso alto con hielo; bastones de jícama en vaso lateral o en bolsa para llevar.\n4. ATM gym: añadir la segunda cucharadita de agave al shake ya servido, no durante el licuado (control exacto de dulzor).\n\n**Emplatado**\nShake en vaso de 500 ml con pajilla; tostada con mantequilla de cacahuate + bastones de jícama en papel kraft para transportar.\n\n**Tip del chef**\nLa mantequilla de cacahuate natural (solo cacahuate + sal) tiene separación de aceite — siempre mezclar desde el fondo del frasco antes de porcionar; nunca verter solo el aceite superficial o la porción de grasa quedará desbalanceada.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteico+pre+entreno+mantequilla+cacahuate) · [English version](https://www.youtube.com/results?search_query=pre+workout+protein+shake+peanut+butter)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteico+pre+entreno+tostada+integral)\n\n---\n\n### Salmón en Costra de Hierbas con Pasta Integral al Limón y Alcaparras\n**Tiempo:** prep 15 min · cocción 35 min (🏪 dominical) | **Porciones:** 2\n**Macros por porción — ATM:** 800 kcal · P 64g · C 53g · G 34g | **IOB:** 357 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n\n*Salmón en costra 🏪:*\n- Filete de salmón atlántico (piel): ATM 250 g / IOB 120 g\n- Eneldo fresco: 10 g\n- Perejil liso: 8 g\n- Cebolla morada: 30 g (ATM), finamente picada\n- Ralladura de limón: 1 pieza\n- Panko integral o amaranto: 15 g\n- Aceite de oliva: 5 g\n\n*Pasta + guarnición 🏪:*\n- Pasta integral (linguine o penne): ATM 60 g crudo → 150 g cocido / IOB 30 g crudo → 75 g cocido\n- Espárragos medianos: 134 g c/u\n- Alcaparras: 15 g (ATM)\n- Aceite de oliva + jugo limón: ATM 10 g / IOB 5 g\n- Gelatina light: 480 ml c/u\n\n**Mise en place** *(domingo)*\n- **Costra de hierbas:** picar fino eneldo + perejil + cebolla morada; mezclar con panko + ralladura de limón + aceite; presionar sobre el salmón (lado carne), refrigerar 30 min para que adhiera.\n- **Hornear:** horno a 200 °C con calor arriba-abajo; salmón en charola con papel siliconado; 12-14 min hasta costra dorada y centro a 52 °C (jugoso, ligeramente translúcido al centro); enfriar a temperatura ambiente, refrigerar.\n- **Pasta:** cocer al dente (1 min menos del tiempo de empaque); enjuagar con agua fría para detener cocción; mezclar con 3 g de aceite de oliva para evitar apelmazamiento; refrigerar.\n- **Espárragos:** blanquear 90 seg en agua hirviendo con sal; choque inmediato en hielo 2 min — color verde intenso, textura al dente; refrigerar.\n- **Reducción de alcaparras:** saltear alcaparras en sartén seca 1 min; añadir 20 ml jugo limón + 10 ml agua; reducir hasta jarabe ligero; enfriar.\n\n**Elaboración**\n1. Calentar pasta en sartén con 2 cucharadas agua + aceite de oliva + jugo de limón a fuego medio 2 min; emulsionar moviendo constantemente — el almidón residual de la pasta crea la salsa ligera.\n2. Calentar salmón en horno a 160 °C × 5 min (no en sartén — la costra se desprende con contacto directo) o en microondas potencia 60% × 90 seg.\n3. Calentar espárragos en sartén seca 1 min + sal de mar en escamas al finalizar.\n4. ATM: napar salmón caliente con reducción de alcaparras al emplatado.\n\n**Emplatado**\nNido de pasta al centro → salmón apoyado en diagonal sobre la pasta → espárragos cruzados → 3 alcaparras enteras y reducción en hilo fino. Servir con gelatina light fría en copa aparte.\n\n**Conservación**\nSalmón: 3 días (recalentar suave para no resecar). Pasta: 4 días. Espárragos: 3 días.\n\n**Tip del chef**\nEl salmón horneado a 52 °C interno retiene 30% más humedad que a 60 °C — al recalentar parte de esa humedad residual, el resultado es jugoso aunque sea del segundo o tercer día. Nunca recalentar a fuego directo fuerte.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+costra+hierbas+pasta+integral+limon) · [English version](https://www.youtube.com/results?search_query=herb+crusted+salmon+whole+wheat+pasta+lemon+capers)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+costra+hierbas+pasta+integral+limon+alcaparras)\n\n---\n---"}, {"key": "martes", "short": "Mar", "name": "# 🟩 MARTES", "menu": "# 🟩 MARTES 09 DE JUNIO — Salsa ambos (+100 kcal) · 3er comensal comida\n*Gastronomía: Francesa / Mexicana contemporánea*\n\n---\n\n### 🌅 Desayuno 🏪 🇫🇷\n**Crêpe Proteica à la Française: Proteína de Vainilla con Plátano Flambé, Canela y Miel de Agave**\n*Base de proteína en polvo batida con huevo y avena fina formando crêpe; rellena de plátano caramelizado en canela y miel de agave sin azúcar.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **613 · 60g · 54g · 20g** | **197 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g (2 porciones) | 30 g (1 porción) |\n| Avena cruda | 50 g | — |\n| Plátano | 120 g (para ambos en crêpe ATM) | 120 g (licuado) |\n| Fresas frescas | 150 g | — |\n| Nueces | 20 g | — |\n| Miel de agave | 5 g | — |\n| Canela | c/s | c/s |\n\n> 🏪 Prep: ATM prepara crêpe el domingo (base congelada); IOB licuado proteína+plátano en agua.\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Torta Gourmet de Pavo con Baguette Integral: Aguacate, Jitomate Asado, Espinaca y Germen**\n*Pan integral crujiente, pavo laminado fino, jitomate asado al rescoldo, espinaca baby y aguacate cremoso; acabado con gotas de limón.*\n\n|  agave | 14 g (+salsa boost) | 7 g |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | 90 g (½) *(+salsa)* | 180 g (1 pieza) |\n\n> Ambos +100 kcal salsa: ATM añade manzana media extra; IOB duplica miel de agave.\n\n---\n\n### 🌙 Cena 🏪 🇯🇵\n**Teriyaki de Salmón Glaseado: Filete Lacado con Salsa Teriyaki Casera, Pasta Integral Soba-Style, Espárragos Sésamo y Ensalada de Cebolla Morada**\n*Salmón lacado en glaseado teriyaki de mirin-soya reducida; pasta integral como base; espárragos finalizados con sésamo tostado.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 63g · 53g · 34g** | **356 · 28g · 56g · 8g** |\n| Salmón cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos blanqueados 🏪 | 134 g | 134 g |\n| Salsa teriyaki casera 🏪 | 25 ml | 15 ml |\n| Cebolla morada | 30 g | — |\n| Sésamo tostado | 5 g | 3 g |\n| Aceite sésamo | 5 g | 3 g |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Martes\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 383** | **1 639** |\n| **Proteína** | **316g** | **137g** |\n| **Carbs** | **290g** | **182g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 377 (salsa)* | *1 474 (salsa)* |\n\n---\n---", "recipes": "## 📅 MARTES 09 DE JUNIO\n\n---\n\n### Crêpe Proteica à la Française con Plátano Caramelizado y Canela\n**Tiempo:** prep 10 min · cocción 8 min | **Porciones:** 2\n**Macros por porción — ATM:** 613 kcal · P 60g · C 54g · G 20g | **IOB:** 197 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n- Proteína en polvo vainilla: ATM 60 g / IOB 30 g\n- Avena cruda en hojuela fina: 50 g (ATM)\n- Plátano maduro: 120 g (ATM, para relleno) / 120 g (IOB, licuado)\n- Fresas frescas: 150 g (ATM, para acompañar)\n- Nueces: 20 g (ATM)\n- Miel de agave: 5 g (ATM)\n- Canela molida mexicana: 2 g\n- Huevo entero: 1 pieza — 50 g (ATM, para estructura de la crêpe)\n- Agua o leche de avena: 60-80 ml (para batter)\n\n**Mise en place** *(domingo)*\n- Moler avena en procesador o licuadora hasta harina fina (20 seg); mezclar con proteína en polvo, huevo y agua hasta batter liso sin grumos — consistencia: debe cubrir el dorso de una cuchara y escurrirse en hilo continuo.\n- Porcionar batter en bolsa hermética o frasco; refrigerar hasta 3 días. Si se congela, separar cada crêpe cocida con papel encerado.\n- Tostar nueces en seco; guardar a temperatura ambiente.\n\n**Elaboración**\n1. ATM: sacar batter del refrigerador — si espesó, añadir 1 cucharadita de agua y batir.\n2. Sartén antiadherente de 24 cm a fuego medio-alto, temperatura ideal 170-180 °C (gota de agua debe bailar y evaporarse en 2 seg).\n3. Verter 80-90 ml de batter, girar sartén en movimiento circular inmediato para capa uniforme de 2 mm.\n4. Cocinar 90 seg hasta que los bordes se despeguen solos y la superficie pierda brillo → voltear con movimiento firme de muñeca, 45 seg lado 2.\n5. **Plátano caramelizado:** en la misma sartén limpia, plátano en rodajas de 8 mm + miel de agave + canela a fuego alto 2 min hasta color ámbar oscuro y aroma a caramelo — no mover hasta que aparezca la costra dorada.\n6. Doblar crêpe en cuartos; rellenar con plátano caramelizado; coronar con nueces + fresas.\n7. IOB: licuar proteína + plátano + agua 30 seg; servir en vaso alto.\n\n**Emplatado**\nDos crêpes dobladas en cuartos superpuestas en plato blanco; plátano caramelizado derramándose hacia afuera; fresas enteras y nueces dispersas; hilo fino de miel de agave cruda encima.\n\n**Conservación**\nCrêpes base (sin relleno): 3 días refrigeradas separadas con papel encerado, o 1 mes congeladas.\n\n**Tip del chef**\nLa proporción correcta de proteína en polvo en batter es máximo 40% del peso total de harinas — más proteína produce crêpes gomosas por exceso de desnaturalización; la avena molida aporta el almidón necesario para estructura extensible y bordes crujientes.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=crepe+proteica+platano+caramelizado+receta) · [English version](https://www.youtube.com/results?search_query=protein+crepe+caramelized+banana+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+crepe+proteica+platano+caramelizado+canela)\n\n---\n\n### Torta Gourmet de Pavo con Chapata Integral y Jitomate Asado\n**Tiempo:** prep 8 min (componentes listos) | **Porciones:** 2\n**Macros por porción — ATM:** 780 kcal · P 73g · C 85g · G 17g | **IOB:** 314 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n- Chapata integral: 80 g (ATM) / pan integral rebanada 30 g (IOB)\n- Pechuga de pavo cocida 🏪: ATM 200 g / IOB 50 g\n- Claras de huevo cocidas duras 🏪: 90 g (IOB)\n- Espinaca baby: 30 g c/u\n- Jitomate saladet o heritage: 60 g (ATM) / al gusto (IOB)\n- Germen de alfalfa: 10 g (ATM)\n- Aguacate Hass: 45 g (ATM)\n- Papaya fresca: 140 g (IOB)\n- Miel de agave: 7 g (IOB)\n- Jugo de limón: c/s\n- Sal de mar en escamas: c/s\n\n**Mise en place** *(domingo — mismo lote que lunes)*\n- Pavo cocido y laminado ya listo del lote dominical.\n- **Jitomate asado:** opcional para martes — asar jitomate en comal seco a fuego alto directo, girar con pinzas hasta que la piel esté completamente chamuscada (negro 60%); pelar en caliente; la pulpa ahumada se refrigera en su jugo 4 días. Diferenciador respecto al lunes.\n- Claras IOB ya cocidas.\n\n**Elaboración**\n1. Tostar chapata/pan en tostador seco o comal a fuego medio hasta corteza con crujido audible; no más de 90 seg (la chapata integral se reseca rápido).\n2. ATM: aplastar aguacate + sal + limón directamente en la base — capa gruesa de 5 mm.\n3. Montar: espinaca → pavo en capas superpuestas → jitomate asado desgarrado a mano (no rebanado — superficie irregular retiene más jugo) → germen → sal en escamas.\n4. IOB: pan + espinaca + pavo + claras rebanadas horizontalmente + jitomate fresco; papaya en bowl con hilo de agave.\n5. Presionar ligeramente la tapa antes de cortar en diagonal.\n\n**Emplatado**\nTorta ATM cortada en diagonal, interior visible al frente; germen asomando. IOB: tostada abierta tipo bruschetta con claras en abanico + papaya en bowl pequeño.\n\n**Conservación**\nJitomate asado en refrigeración: 4 días en su propio jugo chamuscado.\n\n**Tip del chef**\nAsar el jitomate directamente en flama o comal hasta tizne profundo añade compuestos de Maillard y notas ahumadas que imitan el asado de rescoldo tradicional mexicano — transforma un ingrediente simple en el sabor más complejo del sándwich.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=torta+gourmet+pavo+jitomate+asado+chapata) · [English version](https://www.youtube.com/results?search_query=gourmet+turkey+sandwich+roasted+tomato+sourdough)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+torta+pavo+jitomate+asado+chapata+integral)\n\n---\n\n### Birria de Res Contemporánea con Arroz Rojo y Cebolla Encurtida en Habanero\n**Tiempo:** prep 30 min · cocción 4 h (🏪 dominical) | **Porciones:** 3 (ATM ×3 + IOB individual)\n**Macros por porción — ATM:** 603 kcal · P 63g · C 46g · G 17g | **IOB:** 406 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n\n*Adobo de birria 🏪 (para lote 600 g res + consomé):*\n- Chile guajillo: 4 piezas (60 g), desvenado\n- Chile ancho: 2 piezas (30 g), desvenado\n- Chile morita o pasilla: 1 pieza (10 g) — profundidad\n- Ajo: 4 dientes\n- Cebolla blanca: ½ pieza\n- Jitomate saladet: 2 piezas\n- Comino molino: 3 g\n- Canela en raja: 1 cm\n- Clavos de olor: 3 piezas\n- Orégano mexicano seco: 2 g\n- Vinagre de manzana: 20 ml\n- Caldo de res: 500 ml\n\n*Proteína y guarnición:*\n- Filete de res magro (top round o chamberete deshuesado): ATM 600 g (para 3 porciones × 200 g cocido) / IOB 120 g cocido del mismo lote\n- Arroz rojo cocido 🏪: 600 g total (200 g × ATM × 3 comensales)\n- Cebolla encurtida en habanero 🏪: 90 g total\n- Consomé de birria 🏪: 150 ml c/u\n- Tortilla de harina integral: 30 g (IOB)\n- Agu a confitada en salsa oscura de pasilla-ajo; arroz integral perfumado con hoja de laurel; nopales asados marinados en vinagre y orégano.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **603 · 63g · 46g · 17g** | **405 · 28g · 18g · 17g** |\n| Pechuga de pollo cocida 🏪 | 200 g | 120 g |\n| Arroz integral cocido 🏪 | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Salsa pasilla 🏪 | 40 ml | 30 ml |\n| Ejotes blanqueados 🏪 | 80 g | 80 g |\n| Nopales asados 🏪 | 80 g | 80 g |\n| Jitomate + lechuga | 90 g | 90 g |\n| Gelatina light | — | 240 ml |\n\n> *(Jueves: 2 comensales)*\n> 🏪 Prep: pollo confitado; salsa pasilla reducida; ejotes blanqueados; nopales asados marinados.\n\n---\n\n### 🌿 Colación PM *(+100 kcal salsa — ambos)*\n**Shake Proteico con Tostada de Mantequilla de Cacahuate, Miel Extra y Bastones de Jícama**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **587 · 57g · 52g · 19g** | **366 · 27g · 49g · 1g** |\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 14 g (+salsa) | 7 g |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | 90 g (½) | 180 g |\n\n---\n\n### 🌙 Cena 🏪 🇸🇦\n**Salmón Harissa: Filete Marinado en Pasta Harissa Casera, Pasta Integral con Chermoula Blanca, Espárragos Asados y Cebolla Morada en Escabeche de Sumac**\n*Salmón marinado en harissa de chile de árbol-pimiento asado-comino; pasta integral con salsa blanca ligera de yogurt-limón-eneldo; espárragos asados.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 63g · 53g · 34g** | **357 · 28g · 56g · 8g** |\n| Salmón marinado-cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Harissa casera 🏪 | 20 g | 10 g |\n| Cebolla morada en sumac 🏪 | 30 g | — |\n| Aceite oliva | 10 g | 5 g |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Jueves\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 381** | **1 640** |\n| **Proteína** | **317g** | **137g** |\n| **Carbs** | **291g** | **182g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 377 (salsa)* | *1 474 (salsa)* |\n\n---\n---", "recipes": "## 📅 JUEVES 11 DE JUNIO\n\n---\n\n### Ful Medames Proteico: Proteína de Vainilla con Frijol Negro Especiado, Avena Árabe, Fresas y Nueces al Za'atar\n\n**Tiempo:** prep 8 min · cocción 5 min | **Porciones:** ATM + IOB\n**Macros ATM:** 612 kcal · P 61g · C 55g · G 20g\n**Macros IOB:** 198 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda | 50 g | — |\n| Plátano | — | 120 g |\n| Fresas | 150 g | — |\n| Nueces | 20 g | — |\n| Comino molido + canela | c/s | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(adelantar el domingo)*\n- Avena porcionada en frasco hermético con comino y canela mezclados en seco\n- Nueces tostadas en seco y reservadas en bolsa zip\n\n**Elaboración**\n1. **ATM — Avena caliente:** Cocer avena en 180 ml agua o leche descremada a fuego medio hasta absorción total. Al retirar del fuego, incorporar pizca de comino tostado y canela; ajustar textura con un splash de agua caliente si aprieta. La avena debe quedar densa, no líquida — punto mazacote suave.\n2. **Batido de proteína (ambos):** Batir proteína en polvo en 200–250 ml agua fría hasta espuma homogénea; verter sobre la avena caliente ATM o sobre plátano rebanado IOB. El calor residual de la avena emulsionará la proteína con textura semi-cuajada.\n3. **Nueces al za'atar ATM:** En sartén seca a fuego alto 45 seg, tostar nueces con pizca de za'atar hasta aromáticas. Colocar sobre la avena junto con fresas troceadas y miel de agave.\n4. **IOB:** Plátano en rodajas con proteína batida encima; temperatura fría.\n\n**Emplatado**\nATM en tazón hondo: base de avena, proteína bañando, fresas en abanico, nueces al centro como corona. IOB en bowl simple: plátano + proteína.\n\n**Tip del chef**\nEl comino tostado en seco antes de molerlo (o añadirlo a la avena caliente) libera cineol — potencia hasta 3× el aroma sin aumentar cantidad. Usa comino entero tostado 20 seg y muele al momento.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=ful+medames+avena+proteico+desayuno+arabe) · [English version](https://www.youtube.com/results?search_query=ful+medames+protein+oatmeal+breakfast)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+ful+medames+proteico+avena+arabe)\n\n---\n\n### Flatbread Árabe de Pavo con Labneh Ligero, Za'atar, Jitomate Confitado y Pepino Fresco\n\n**Tiempo:** prep 10 min · cocción 5 min (tostado pan) | **Porciones:** ATM + IOB\n**Macros ATM:** 779 kcal · P 73g · C 85g · G 17g\n**Macros IOB:** 314 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Labneh 0% | 30 g | — |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Za'atar | 3 g | — |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n**Mise en place** *(adelantar el domingo)*\n- Pavo cocido y laminado en hermético (meal prep)\n- Labneh: yogurt 0% en manta de cielo 8 h mínimo, refrigerado con sal fina\n\n**Elaboración**\n1. **Labneh al za'atar ATM:** Extender labneh en chapata abierta; espolvorear za'atar con toque de aceite de oliva en spray. El labneh debe tener textura de queso crema firme — si quedó aguado, apretar más en manta.\n2. **Pan ATM:** Tostar chapata en comal seco a fuego alto hasta que las caras internas estén doradas con marcas de comal — 2 min por lado. Debe crujir al presionar la corteza pero ceder en la miga.\n3. **Armar ATM:** Labneh → capas de pavo laminado → espinaca → jitomate en rodajas → aguacate en láminas. Terminar con za'atar adicional en seco.\n4. **IOB:** Pan tostado + claras rebanadas + espinaca + jitomate. Papaya en cubos con miel de agave al lado.\n\n**Emplatado**\nFlatbread ATM abierto como tostada, capas visibles en corte transversal. Papaya IOB en bowl separado con miel en hilo.\n\n**Conservación**\nLabneh en hermético 5 días refrigerado. Pavo laminado en bolsa zip con papel absorbente 4 días.\n\n**Tip del chef**\nEl za'atar pierde volátiles al contacto con calor prolongado — añadirlo siempre sobre el labneh frío o al final del montaje, nunca en cocción, para preservar el timol que da el aroma herbal característico.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=flatbread+arabe+pavo+labneh+zaatar) · [English version](https://www.youtube.com/results?search_query=arabic+flatbread+turkey+labneh+zaatar)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+flatbread+arabe+pavo+labneh+zaatar)\n\n---\n\n### Pollo en Salsa de Chile Pasilla con Arroz Integral, Ejotes Salteados y Ensalada de Nopales Asados\n\n**Tiempo:** prep 10 min · cocción 15 min (ensamble, proteína y salsas ya listas) | **Porciones:** 2 comensales\n**Macros ATM:** 603 kcal · P 63g · C 46g · G 17g\n**Macros IOB:** 405 kcal · P 28g · C 18g · G 17g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pollo cocida 🏪 | 200 g | 120 g |\n| Arroz integral cocido 🏪 | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Salsa pasilla 🏪 | 40 ml | 30 ml |\n| Ejotes blanqueados 🏪 | 80 g | 80 g |\n| Nopales asados 🏪 | 80 g | 80 g |\n| Jitomate + lechuga | 90 g | 90 g |\n| Gelatina light | — | 240 ml |\n\n**Mise en place** *(adelantar el domingo — crítico)*\n- **Salsa pasilla:** Desvenar y tostar chiles pasilla en comal seco hasta aromatic (no quemar). Remojar en agua caliente 15 min. Licuar con ajo confitado, comino, caldo de pollo reducido. Colar, reducir en sartén con aceite mínimo hasta napa. Porcionar en bolsas de 40 ml + 30 ml.\n- **Pollo confitado:** Pechugas a 80°C en aceite de oliva con ajo, laurel y tomillo 1.5 h. Laminar en frío.\n- **Ejotes:** Blanquear 3 min en agua salada hirviendo + choque en hielo. Refrigerar sin humedad.\n- **Nopales asados:** Comal seco a fuego alto hasta marcas y textura suave. Marinar en vinagre blanco, orégano, sal. Mínimo 2 h.\n\n**Elaboración**\n1. **Regenerar pollo en salsa:** En sartén a fuego medio, calentar salsa pasilla hasta burbujeo suave. Incorporar pollo laminado, 2–3 min cubierto para que absorba sin resecarse. La salsa debe envolver cada pieza — si aprieta, 1 cdita de caldo.\n2. **Arroz integral ATM:** Regenerar en sartén con 1 cdita aceite oliva a fuego alto, presionando ligeramente para obtener socarrat suave en la base — 3 min. Dar vuelta y calentar 1 min más.\n3. **Ejotes:** Saltear en sartén muy caliente con spray de aceite, 1 min, solo para calentar y dar brillo. No sobre cocinar — deben tener resistencia al morder.\n4. **Ensalada nopales:** Servir fríos sobre cama de lechuga con jitomate en cubos y un hilo de vinagre de manzana si gustan.\n5. **IOB:** Tortilla calentada en comal, aguacate en láminas, pollo en salsa encima, nopales y ensalada al lado.\n\n**Emplatado**\nATM: arroz en molde circular al centro, pollo napado con salsa oscura sobre el arroz, ejotes en abanico lateral, ensalada de nopales en diagonal opuesta. IOB: taco abierto sobre plato plano, componentes separados.\n\n**Conservación**\nSalsa pasilla hasta 7 días refrigerada o 3 meses congelada. Pollo en salsa 4 días. Ejotes y nopales 5 días.\n\n**Tip del chef**\nAl tostar el chile pasilla, detente cuando suelte aroma a chocolate-pasa y la piel empiece a inflarse levemente — 10–12 segundos por lado a fuego medio-alto. Pasado ese punto, la capsaicina se vuelve amarga y arruina el dulzor característico del pasilla.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=pollo+salsa+chile+pasilla+arroz+integral+nopales) · [English version](https://www.youtube.com/results?search_query=chicken+pasilla+chile+sauce+brown+rice+nopales)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+pollo+salsa+chile+pasilla+nopales+asados)\n\n---\n\n### Shake Proteico con Tostada de Mantequilla de Cacahuate, Miel Extra y Bastones de Jícama\n\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** ATM + IOB\n**Macros ATM:** 587 kcal · P 57g · C 52g · G 19g *(+100 kcal salsa incluidas)*\n**Macros IOB:** 366 kcal · P 27g · C 49g · G 1g *(+100 kcal salsa incluidas)*\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 14 g (+salsa) | 7 g |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | 90 g (½) | 180 g |\n\n**Elaboración**\n1. Batir proteína en 300 ml agua fría — shaker con esfera metálica para evitar grumos. Temperatura ideal del agua: 8–10°C para mejor solubilidad.\n2. **ATM:** Tostar pan integral, extender mantequilla de cacahuate en capa uniforme de ~3 mm mientras está caliente para que penetre la miga. Rociar miel de agave en hilo. Las +100 kcal de salsa se traducen en los 14 g de miel (vs 7 g día normal).\n3. Bastones de jícama: corte juliana gruesa 1 × 8 cm. Sprinkle de chile en polvo y limón opcional para palatabilidad sin macros relevantes.\n4. **IOB:** Shake frío + jícama + manzana verde en gajos.\n\n**Emplatado**\nShake en vaso alto con hielo. Tostada ATM en tabla pequeña. Jícama y manzana en ramequín lateral.\n\n**Tip del chef**\nLa mantequilla de cacahuate sobre pan caliente no es solo técnica — el calor baja la viscosidad y distribuye los aceites naturales de forma más homogénea, evitando el efecto \"pasta seca\" que dificulta comer rápido en colación.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteico+tostada+mantequilla+cacahuate+colacion) · [English version](https://www.youtube.com/results?search_query=protein+shake+peanut+butter+toast+snack+meal+prep)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteico+tostada+mantequilla+cacahuate+jicama)\n\n---\n\n### Salmón Harissa: Filete Marinado en Pasta Harissa Casera, Pasta Integral con Chermoula Blanca, Espárragos Asados y Cebolla Morada en Escabeche de Sumac\n\n**Tiempo:** prep 10 min (ensamble) · cocción 15 min | **Porciones:** ATM + IOB\n**Macros ATM:** 800 kcal · P 63g · C 53g · G 34g\n**Macros IOB:** 357 kcal · P 28g · C 56g · G 8g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón marinado-cocido 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Harissa casera 🏪 | 20 g | 10 g |\n| Cebolla morada en sumac 🏪 | 30 g | — |\n| Aceite oliva | 10 g | 5 g |\n| Gelatina light | 480 ml | 480 ml |\n\n**Mise en place** *(adelantar el domingo — crítico)*\n- **Harissa casera:** Asar chiles de árbol (15 g) y pimiento morrón rojo (100 g) directamente en flama hasta piel carbonizada. Pelar. Licuar con ajo (2 dientes), comino (1 cdita), coriandro molido, aceite oliva (20 ml), sal y limón. Consistencia: pasta densa, no líquida. Conservar cubierta con aceite en superficie.\n- **Salmón:** Marinar filetes en harissa 12–24 h refrigerado. Cocer a 180°C 12–14 min — punto: opaco en exterior, levemente translúcido en centro (55°C interno). Refrigerar en marinada.\n- **Cebolla en sumac:** Juliana fina de cebolla morada, sal, vinagre de manzana, sumac (5 g), dejar reposar mínimo 2 h. La cebolla debe perder la agresividad pero mantener crunch.\n- **Chermoula blanca (salsa para pasta):** Yogurt 0% (40 g) + limón + eneldo fresco + ajo mínimo + sal. No cocinar — salsa fría para pasta tibia.\n- **Espárragos:** Blanquear 2 min + choque frío; regenerar en sartén al momento.\n\n**Elaboración**\n1. **Regenerar salmón:** En sartén antiadherente a fuego medio-alto, piel hacia abajo, 3 min para re-crocantizar piel. Solo calentar el lado de la piel — el calor residual sube al centro sin resecar. El salmón pre-cocido no necesita más de 4 min total.\n2. **Pasta con chermoula:** Regenerar pasta en sartén con 10 ml aceite oliva a fuego medio, 2 min. Retirar del fuego, incorporar chermoula blanca (yogurt-limón-eneldo) fuera del calor para evitar que el yogurt se corte. Mantear con movimientos envolventes.\n3. **Espárragos:** Sartén muy caliente con spray, 90 seg, vuelta única. Deben tener marcas y resistencia — no blandos.\n4. **Montar:** Pasta base → salmón sobre pasta → cebolla en sumac encima del salmón → espárragos al costado → hilo de aceite oliva sobre todo.\n\n**Emplatado**\nPasta en nido irregular al centro. Salmón inclinado sobre la pasta, piel hacia arriba. Cebolla en sumac como guarnición cromática encima del salmón. Espárragos cruzados en paralelo al borde del plato.\n\n**Conservación**\nSalmón marinado sin cocer: 48 h. Cocido: 3 días. Harissa: 2 semanas refrigerada bajo aceite.\n\n**Tip del chef**\nEl sumac tiene ácido málico que actúa como encurtido rápido sin necesidad de calor — 30 minutos de contacto ya ablandarán la cebolla. Para color morado intenso (presentación), usa cebolla fría directamente del refri y no la exprimas con sal antes de marinar.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=salmon+harissa+pasta+integral+esparragos+receta) · [English version](https://www.youtube.com/results?search_query=harissa+salmon+whole+wheat+pasta+sumac+onion)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+harissa+pasta+integral+chermoula)\n\n---\n---"}, {"key": "viernes", "short": "Vie", "name": "# 🟥 VIERNES", "menu": "# 🟥 VIERNES 12 DE JUNIO — Gym ATM (+150 kcal) · 3er comensal comida\n*Gastronomía: Mediterránea griega / Asiática*\n\n---\n\n### 🌅 Desayuno 🏪 🇬🇷\n**Bircher Muesli Helénico: Avena Hidratada en Kéfir, Proteína de Limón, Fresas, Granada y Pistaches Tostados**\n*Avena remojada en kéfir con raspadura de limón; proteína de vainilla batida incorporada; fresas frescas, semillas de granada y pistaches crujientes.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **611 · 61g · 54g · 20g** | **197 · 25g · 31g · 2g** |\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda | 50 g | — |\n| Plátano | — | 120 g |\n| Fresas | 120 g | — |\n| Kéfir bajo en grasa | 60 ml | — |\n| Pistaches | 15 g | — |\n| Nueces | 10 g | — |\n| Granada | 30 g | — |\n| Miel de agave | 5 g | — |\n\n> 🏪 Prep: avena en kéfir en hermético desde la noche del domingo.\n\n---\n\n### 🍎 Colación AM 🏪 🇬🇷\n**Pita Griega con Pavo Souvlaki, Tzatziki Ligero, Jitomate Cherry y Espinaca Baby**\n*Chapata integral como base pita; pavo marinado en oreganato-limón-ajo; tzatziki de yogurt 0%-pepino-menta; jitomate cherry y espinaca.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **780 · 73g · 85g · 17g** | **315 · 29g · 28g · 9g** |\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Tzatziki ligero 🏪 | 30 g | — |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n---\n\n### 🍽️ Comida *(3er comensal — misma porción que ATM)* 🏪 🇰🇷\n**Bulgogi de Res Coreano: Filete Marinado en Soya-Pera-Sésamo, Arroz Integral con Sésamo, Kimchi Ligero y Ensalada de Pepino Gochujang**\n*Clásico coreano: res marinada en pera-soya-ajo-jengibre; servida sobre arroz integral con sésamo negro; kimchi ligero; ensalada de pepino en vinagre-gochujang.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **603 · 63g · 46g · 17g** | **406 · 28g · 18g · 17g** |\n| Filete de res magro cocido 🏪 | 200 g | 120 g |\n| Arroz integral cocido 🏪 | 200 g | — |\n| Tortilla de harina integral | — | 30 g |\n| Aguacate fresco | — | 45 g |\n| Marinada bulgogi 🏪 | 25 ml | 15 ml |\n| Kimchi ligero 🏪 | 40 g | 40 g |\n| Pepino en gochujang 🏪 | 60 g | 60 g |\n| Espinaca cruda | 30 g | 30 g |\n| Gelatina light | — | 240 ml |\n\n> *(3 porciones proteína + arroz)*\n> 🏪 Prep: res marinada y cocida en salsa bulgogi; arroz integral con sésamo; pepino encurtido en gochujang.\n\n---\n\n### 🌿 Colación PM *(pre-entreno gym — +150 kcal ATM)*\n**Shake de Proteína con Tostada, Mantequilla de Cacahuate, Miel Extra y Jícama**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **637 · 57g · 56g · 19g** | **266 · 27g · 39g · 1g** |\n| Proteína en polvo | 60 g | 30 g |\n| Pan integral | 30 g | — |\n| Mantequilla de cacahuate | 16 g | — |\n| Miel de agave | 14 g (+gym) | — |\n| Jícama fresca | 130 g | 130 g |\n| Manzana verde | — | 180 g |\n\n---\n\n### 🌙 Cena 🏪 🇯🇵\n**Salmón Miso-Glazed: Filete Lacado en Miso Blanco, Mirin y Jengibre con Pasta Integral Sesame-Shoyu, Espárragos al Vapor y Wakame**\n*Salmón marinado en miso blanco-mirin (12 h); pasta integral con salsa shoyu-sésamo; espárragos al vapor con alga wakame rehidratada.*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **800 · 64g · 53g · 34g** | **356 · 28g · 56g · 8g** |\n| Salmón miso-glaze 🏪 | 250 g | 120 g |\n| Pasta integral cocida 🏪 | 150 g | 75 g |\n| Espárragos 🏪 | 134 g | 134 g |\n| Miso blanco (en salsa) | 15 g | 8 g |\n| Salsa shoyu-sésamo 🏪 | 20 ml | 10 ml |\n| Wakame rehidratada | 10 g | 10 g |\n| Cebolla morada | 30 g | — |\n| Aceite sésamo | 5 g | 3 g |\n| Gelatina light | 480 ml | 480 ml |\n\n---\n\n## 📊 Resumen Viernes\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Total kcal** | **3 431** | **1 340** |\n| **Proteína** | **318g** | **137g** |\n| **Carbs** | **294g** | **171g** |\n| **Grasa** | **107g** | **37g** |\n| *Meta* | *3 427 (gym)* | *1 374* |\n\n---\n---", "recipes": "## 📅 VIERNES 12 DE JUNIO\n\n---\n\n### Bircher Muesli Helénico: Avena Hidratada en Kéfir, Proteína de Limón, Fresas, Granada y Pistaches Tostados\n\n**Tiempo:** prep 5 min (noche anterior) · cocción 0 min | **Porciones:** ATM + IOB\n**Macros ATM:** 611 kcal · P 61g · C 54g · G 20g\n**Macros IOB:** 197 kcal · P 25g · C 31g · G 2g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60 g | 30 g |\n| Avena cruda | 50 g | — |\n| Plátano | — | 120 g |\n| Fresas | 120 g | — |\n| Kéfir bajo en grasa | 60 ml | — |\n| Pistaches | 15 g | — |\n| Nueces | 10 g | — |\n| Granada | 30 g | — |\n| Miel de agave | 5 g | — |\n\n**Mise en place** *(noche del jueves o domingo para la semana)*\n- Avena + kéfir + pizca de ralladura de limón en frasco hermético, refrigerado mínimo 8 h\n- Pistaches tostados en seco, guardados en bolsa zip separada para mantener crunch\n\n**Elaboración**\n1. **Bircher base ATM:** Avena hidratada en kéfir tendrá textura cremosa y densa al día siguiente — si quedó muy espesa, aflojar con 1–2 cdas agua fría o kéfir adicional. No calentar — el Bircher clásico se sirve frío.\n2. **Incorporar proteína:** Batir proteína en 150 ml agua fría formando espuma; verter sobre la avena fría y mezclar con espátula suavemente. La proteína actuará como ligante cremoso sin alterar la textura del muesli.\n3. **Terminado ATM:** Fresas en cuartos, semillas de granada, pistaches y nueces encima. Miel de agave en hilo al final. Ralladura de limón adicional para perfumar.\n4. **IOB:** Proteína batida sobre plátano rebanado, temperatura fría.\n\n**Emplatado**\nFrasco de vidrio o bowl bajo: base beige del bircher, contraste rojo de fresas y granate de granada, verde pistache. Textura rustica visible.\n\n**Conservación**\nBircher base (sin fruta fresca ni proteína) hasta 3 días en hermético refrigerado.\n\n**Tip del chef**\nEl kéfir tiene más lactobacilos activos que el yogurt y su acidez natural pre-digiere el almidón de la avena durante la hidratación nocturna — mejora la digestibilidad y reduce el índice glucémico efectivo del desayuno sin cambiar el sabor.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=bircher+muesli+kefir+proteina+fresas+granada) · [English version](https://www.youtube.com/results?search_query=bircher+muesli+kefir+protein+strawberry+pomegranate)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+bircher+muesli+helénico+kefir+proteina)\n\n---\n\n### Pita Griega con Pavo Souvlaki, Tzatziki Ligero, Jitomate Cherry y Espinaca Baby\n\n**Tiempo:** prep 8 min · cocción 5 min | **Porciones:** ATM + IOB\n**Macros ATM:** 780 kcal · P 73g · C 85g · G 17g\n**Macros IOB:** 315 kcal · P 29g · C 28g · G 9g\n\n**Ingredientes**\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Chapata integral | 80 g | — |\n| Pan integral (rebanada) | — | 30 g |\n| Pechuga de pavo cocida 🏪 | 200 g | 50 g |\n| Claras de huevo cocidas 🏪 | — | 90 g |\n| Tzatziki ligero 🏪 | 30 g | — |\n| Espinaca cruda | 30 g | 30 g |\n| Jitomate | 60 g | al gusto |\n| Aguacate fresco | 45 g | — |\n| Papaya fresca | — | 140 g |\n| Miel de agave | — | 7 g |\n\n**Mise en place** *(adelantar el domingo)*\n- **Tzatziki ligero:** Yogurt 0% escurrido 2 h en manta + pepino rallado exprimido (eliminar toda el agua — clave para no diluir) + ajo mínimo + menta fresca + eneldo + sal + limón. Conservar 5 días.\n- **Pavo souvlaki:** Pechuga cocida marinada en oreganato seco, limón, ajo, aceite oliva mínimo. Laminar en frío.\n\n**Elaboración**\n1. **Chapata ATM:** Tostar en comal seco a fuego alto, cara interna primero, hasta golden con ampollas — 90 seg por lado. El vapor interno debe ablandar la miga mientras la superficie cruje.\n2. **Tzatziki sobre pan caliente:** Extender en capa generosa — el contraste frío sobre pan caliente es intencional y define la experiencia griega.\n3. **Capas ATM:** Tzatziki → espinaca baby → pavo laminado → jitomate cherry partido → aguacate. La espinaca entre tzatziki y pavo evita que | **Filete de res — birria/lomo saltado/bulgogi** — 1 600 g total | Dividir en 3 lotes: (A) 600 g adobo birria (guajillo+ancho+canela+clavo → licuado), (B) 500 g marinada lomo saltado (soya+Worcestershire+ajo+jengibre), (C) 500 g bulgogi (pera rallada+soya+ajo+jengibre+sésamo). Cada lote en bolsa de vacío o bolsa zip sellada doble | **Sous vide 54 °C / 2 h** — si no hay sous vide: baño María en olla con termómetro; alternativamente braseado a 160 °C / 1.5 h en cazuela tapada |
| **Pimientos tricolor confitados** — 400 g total (Mié comida + extras) | Pimientos rojo/amarillo/naranja cortados en tiras anchas, aceite oliva, ajo, sal, tomillo | **180 °C / 25 min** — meter junto con el pollo una vez que baje la temp |

**🔵 ESTUFA — OLLA GRANDE (quemador 1)**

| Elemento | Preparación | Tiempo |
|---|---|---|
| **Caldo aromático para pavo** | 3 L agua + 1 zanahoria + 1 cebolla + apio + pimienta negra + laurel + tomillo → llevar a hervor | Arrancar a fuego alto; cuando hierva, meter pavo |
| **Pechuga de pavo** — 750 g total | Una vez que hierve el caldo, meter pechugas ENTERAS, bajar a fuego medio-bajo (85 °C) | **25–30 min** hasta 74 °C interior; sacar, enfriar en hielo, laminar |

**🟢 ESTUFA — OLLA MEDIANA (quemador 2)**

| Elemento | Preparación | Tiempo |
|---|---|---|
| **Frijoles negros** *(Domingo colación AM)* | Escurrir remojo; cubrir con agua nueva + ajo + epazote + sal al final | **45–60 min** a fuego medio; probar textura |

**⚡ PARALELO mientras el horno trabaja y el pavo se cuece:**

- Cocer **18 claras de huevo** duras: agua hirviendo → 12 min → choque frío → pelar → conservar enteras en agua fría en contenedor hermético (quemador 3)
- Preparar **cebolla encurtida en sumac** (Jue cena): 1 cebolla morada en juliana fina + 60 ml vinagre de arroz + 1 cdita sumac + 1 cdita azúcar + sal → frasco → refrigerar mínimo 2 h
- Preparar **pepino en gochujang** (Vie comida): 2 pepinos persas en medias lunas 3 mm + 20 g gochujang + 30 ml vinagre de arroz + 10 ml aceite sésamo + 5 g azúcar + sésamo tostado → mezclar → frasco → refrigerar
- Tostar **nueces** (desayunos): sartén seca a fuego medio, 4 min moviendo constantemente → enfriar → bolsa hermética

### TURNO 2 — 10:30 h · Proteínas secundarias + Salmón Lun/Mar

*(El pollo está en horno, el pavo ya salió y está enfriando, la res está en sous vide)*

**🔴 HORNO — 190 °C convección** *(sacar res de sous vide cuando llegue su momento; el pollo sigue a 80 °C en parte baja si el horno es de dos niveles, o alternando)*

| Elemento | Preparación | Temperatura / Tiempo |
|---|---|---|
| **Salmón Lunes** — costra de hierbas | 250 g ATM + 120 g IOB. Cubrir con: perejil picado + eneldo + ralladura limón + ajo en polvo + pan rallado integral 10 g + aceite oliva → presionar para costra. Papel pergamino | **190 °C / 13–15 min** hasta 60 °C interior (ligeramente rosado al centro) |
| **Salmón Martes** — teriyaki glaze | 250 g ATM + 120 g IOB. Barnizar con salsa teriyaki preparada (ver turno 3) dos capas antes de hornear | **190 °C / 12 min** · último minuto broil para laqueado brillante |
| **Tortillas de maíz para tostadas** *(Sáb comida)* — 6 piezas | Extender en rejilla del horno, aceite en spray mínimo, sal | **180 °C / 8 min** por lado → crujientes |
| **Papa amarilla confitada** *(Mié comida)* — 200 g total | Dados de 2 cm, cubrir en aceite de oliva a 130 °C en olla pequeña apta para horno | **130 °C / 35 min** en olla pequeña separada, o quemador 4 a fuego mínimo |

**🔵 ESTUFA — Quemador 1**

| Elemento | Preparación | Tiempo |
|---|---|---|
| **Sellado de res** *(lotes A, B, C salidos del sous vide)* | Sartén de hierro a fuego máximo, aceite aguacate, SECAR bien la carne con papel. Sellar 90 seg por cara hasta costra oscura. Solo si se hizo sous vide | 3 min total por lote |
| **Arroz jazmín** — 600 g crudo → ~1 440 g cocido | Enjuagar 3 veces. Infusión: 1.5 g azafrán en 50 ml agua caliente 5 min. Agua total: 900 ml + infusión + sal. Tapa hermética | **15 min hervor + 10 min reposo tapado** |

**🟢 ESTUFA — Quemador 2**

| Elemento | Preparación | Tiempo |
|---|---|---|
| **Arroz integral** — 300 g crudo → ~660 g cocido | Enjuagar. 750 ml agua + sal + 1 cdita aceite sésamo. Tapa hermética | **35–40 min** a fuego bajo |

**🟡 ESTUFA — Quemador 3**

| Elemento | Preparación | Tiempo |
|---|---|---|
| **Pasta integral** — 750 g seca → ~1 500 g cocida | Olla grande, agua abundante con sal generosa (el agua debe saber a mar). Al dente = 2 min menos del tiempo del paquete. Escurrir y enfriar con chorro frío para detener cocción | **Según paquete menos 2 min** |

**🔴 ESTUFA — Quemador 4**

| Elemento | Preparación | Tiempo |
|---|---|---|
| **Zanahorias glaseadas** *(Lun comida)* — 360 g (80 g × ATM + al gusto IOB + 3er comensal días que aplique) | Zanahorias baby o en rodajas, mantequilla clarificada 10 g + miel de agave 15 g + jugo limón 20 ml + romero + sal. Saltear 5 min + 5 min glaseado con tapa | **10 min** |

### TURNO 3 — 11:30 h · Salsas, encurtidos finales y verduras

*(Proteínas principales ya cocidas; granos en proceso o terminados)*

**PRODUCCIÓN DE SALSAS — todas en estufa o procesador**

**Bloque A — Salsas en estufa (secuencia rápida, misma sartén limpiada entre una y otra):**

**1. Chermoula verde** *(Lun comida + base para otras)*
- Procesador: 1 manojo cilantro + 1 manojo perejil + 3 dientes ajo + 1 cdita comino molido + 1 cdita pimentón ahumado + 60 ml aceite oliva + 30 ml jugo limón + sal + chile verde opcional
- Procesar 30 seg → textura grumosa, NO pasta lisa
- Rendimiento: ~220 ml → frasco hermético

**2. Salsa birria/adobo** *(Mar comida)*
- Hidratar 4 chiles guajillo + 2 chiles ancho desvenados en agua hirviendo 20 min
- Licuar con: 4 dientes ajo + ½ cebolla + 1 jitomate asado + 1 clavo + ¼ raja canela + 1 cdita orégano + ½ cdita comino + 200 ml caldo (del pavo) + sal
- Colar y freír en sartén con 1 cda aceite a fuego medio-alto hasta que oscurezca y espese, 8 min
- Bañar la res lote A con 200 ml de esta salsa; guardar 200 ml extra para servir
- Rendimiento: ~400 ml total → frasco

**3. Salsa lomo saltado** *(Mié comida)*
- En sartén: ajo 3 dientes picado fino + jengibre 1 cdita rallado, 1 min. Agregar: soya 60 ml + Worcestershire 20 ml + kétchup 15 ml + agua 50 ml + maicena 1 cdita disuelta
- Hervir 3 min hasta napar cuchara
- Rendimiento: ~150 ml → frasco

**4. Salsa pasilla** *(Jue comida + Sáb colación AM)*
- 6 chiles pasilla desvenados → hidratar 20 min en agua caliente
- Licuar con: 4 dientes ajo + ½ cebolla + 1 jitomate asado + sal + 150 ml caldo pavo
- Freír en sartén 1 cda aceite a fuego medio-alto, 6 min hasta color oscuro intenso
- Rendimiento: ~350 ml → frasco

**5. Harissa casera** *(Jue cena)*
- Procesador: 3 chiles de árbol secos tostados + 1 pimiento rojo asado (de los confitados) + 2 dientes ajo + 1 cdita comino molido + 1 cdita cilantro molido + 1 cdita pimentón + 30 ml aceite oliva + 20 ml jugo limón + sal
- Procesar hasta pasta suave
- Rendimiento: ~150 g → frasco

**6. Salsa bulgogi** *(Vie comida)*
- Licuadora: ½ pera asiática pelada (o manzana) + 60 ml soya baja sodio + 30 ml mirin + 2 dientes ajo + 1 cdita jengibre + 15 ml aceite sésamo + 1 cda azúcar mascabado
- Licuar 20 seg · hervir en sartén 3 min
- Bañar res lote C con 100 ml; guardar 100 ml para servir
- Rendimiento: ~200 ml → frasco

**7. Salsa shoyu-sésamo** *(Vie cena)*
- Sartén: 60 ml soya + 30 ml mirin + 15 ml vinagre de arroz + 10 ml aceite sésamo + 1 cdita azúcar + sésamo tostado 10 g
- Reducir 2 min a fuego medio
- Rendimiento: ~100 ml → frasco pequeño

**8. Salsa teriyaki casera** *(Mar cena)*
- Sartén: 80 ml soya + 60 ml mirin + 30 ml sake (o vino blanco) + 20 g azúcar mascabado
- Reducir 5 min a fuego medio hasta que napee cuchara
- Rendimiento: ~150 ml → frasco

**9. Tzatziki ligero** *(Vie colación AM)*
- Mezcla en bowl: 150 g yogurt griego 0% + ½ pepino rallado y exprimido (extraer agua) + 1 diente ajo rallado fino + 1 cda jugo limón + eneldo seco + sal + menta opcional
- Rendimiento: ~200 g → frasco

**10. Salsa pomodoro ligera** *(Dom cena)*
- Sartén: 2 dientes ajo en aceite oliva 1 min → añadir 400 g passata de tomate + orégano + sal + azúcar pellizco + hojas albahaca al final
- Hervir 15 min a fuego medio-bajo
- Rendimiento: ~300 ml → frasco

**11. Pico de gallo base** *(Sáb comida)*
- Jitomate saladet 3 piezas en cubos 5 mm + ½ cebolla blanca + chile serrano 1 pieza sin semillas + cilantro + jugo limón + sal
- Mezclar; guardar en frasco → refrigerar (no dura más de 4 días; para sábado es perfecto)
- Rendimiento: ~300 g

**Bloque B — Verduras restantes:**

**Espárragos blanqueados** *(todas las cenas, Lun–Dom)*
- Agua a hervor con sal + pellizco azúcar (realza color)
- 500 g espárragos, cortar 3 cm del tallo fibroso
- Blanquear en 3 lotes de 167 g: **2 min exactos** → colar → choque en agua+hielo 2 min → escurrir → secar con papel
- Porcionar: 134 g × 7 noches × 2 personas = porciones individuales o en contenedor grande dividido
- Refrigerar

**Nopales asados** *(Jue comida + Sáb comida)*
- Comal o plancha a fuego alto, nopales enteros limpios de espinas
- Asar 4–5 min por lado hasta manchas negras y textura flexible
- Cortar en tiras; marinar en: 40 ml vinagre blanco + orégano + sal + ajo en polvo
- Frasco hermético → refrigerar

**Ejotes blanqueados** *(Jue comida)*
- Agua hirviendo salada → 3 min → choque frío → secar
- 320 g total (80 g ATM × 2 + IOB al gusto)
- Refrigerar en contenedor

**Cebolla morada caramelizada** *(Mié cena)*
- Sartén a fuego mínimo: 2 cebollas moradas en juliana + 1 cda aceite oliva + 1 cdita azúcar + sal
- Cocinar **35 min** moviendo cada 5 min hasta color borgoña oscuro y textura mermelada
- ~150 g resultado → frasco

**Quinoa** *(Mié desayuno ATM)*
- 80 g quinoa blanca → enjuagar bien en colador fino 1 min
- 160 ml agua + sal → llevar a hervor, tapar, fuego mínimo 12 min → reposo 5 min tapado
- Rinde ~200 g cocida → contenedor individual

**Protocolo de porcionado:**
1. Dejar enfriar cada preparación a temperatura ambiente (máx 30 min) antes de refrigerar
2. Etiquetar CADA contenedor con: preparación / cantidad / fecha / día de uso

let ratings = JSON.parse(localStorage.getItem(RATING_KEY) || '{}');

function rkey(title) {
  return title.toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function saveRatings() {
  localStorage.setItem(RATING_KEY, JSON.stringify(ratings));
  renderFavoritos();
}

function addRatingWidgets() {
  const dayShort = DAYS[curDay]?.short || '';
  document.getElementById('recipes-day').querySelectorAll('h3').forEach(h3 => {
    if (h3.nextElementSibling?.classList.contains('recipe-rating')) return;
    const title = h3.textContent.trim();
    const key   = rkey(title);
    const r     = ratings[key] || { stars: 0, tag: '', title, day: dayShort };

    const w = document.createElement('div');
    w.className = 'recipe-rating not-prose flex items-center flex-wrap gap-2 my-2 px-3 py-2 bg-gray-50 rounded-lg';
    w.dataset.recipe = key;

    // Stars
    const sd = document.createElement('div');
    sd.className = 'flex gap-0.5 items-center';
    for (let s = 1; s <= 5; s++) {
      const sb = document.createElement('span');
      sb.className = 'star-btn' + (s <= r.stars ? ' lit' : '');
      sb.textContent = '★';
      sb.onclick = () => {
        const ns = ratings[key]?.stars === s ? 0 : s;
        ratings[key] = { ...(ratings[key] || {}), stars: ns, title, day: dayShort };
        saveRatings();
        w.querySelectorAll('.star-btn').forEach((b, j) => b.classList.toggle('lit', j < ns));
      };
      sd.appendChild(sb);
    }
    w.appendChild(sd);

    // Tag buttons
    [['favorito','❤️ fav','active-fav'],['repetir','🔄 repetir','active-rep'],['no','🚫 no','active-no']].forEach(([t, l, ac]) => {
      const tb = document.createElement('button');
      tb.className = 'tag-btn' + (r.tag === t ? ' ' + ac : '');
      tb.dataset.tag = t;
      tb.textContent = l;
      tb.onclick = () => {
        const cur = ratings[key]?.tag;
        ratings[key] = { ...(ratings[key] || {}), tag: cur === t ? '' : t, title, day: dayShort };
        saveRatings();
        const newTag = ratings[key].tag;
        w.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.remove('active-fav','active-rep','active-no');
          if (b.dataset.tag === newTag) {
            if (newTag === 'favorito') b.classList.add('active-fav');
            else if (newTag === 'repetir') b.classList.add('active-rep');
            else if (newTag === 'no') b.classList.add('active-no');
          }
        });
      };
      w.appendChild(tb);
    });

    h3.after(w);
  });
}

// ── Favoritos section ─────────────────────────────────────────────────────────
function renderFavoritos() {
  const favs = Object.values(ratings).filter(r => r.tag === 'favorito' || r.tag === 'repetir' || r.stars >= 4);
  const sec  = document.getElementById('fav-section');
  const list = document.getElementById('fav-list');
  if (!favs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = favs.map(r => {
    const tagEl = r.tag === 'favorito' ? '<span class="text-xs bg-red-50 text-red-400 border border-red-100 px-2 py-0.5 rounded-full">❤️ fav</span>'
                : r.tag === 'repetir'  ? '<span class="text-xs bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 rounded-full">🔄 repetir</span>'
                : '';
    const starsEl = r.stars > 0 ? `<span class="text-yellow-400 text-sm tracking-tighter">${'★'.repeat(r.stars)}</span>` : '';
    return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        ${tagEl}
        <span class="text-sm text-gray-700 truncate">${r.title}</span>
        ${r.day ? `<span class="text-xs text-gray-400 shrink-0">${r.day}</span>` : ''}
      </div>
      ${starsEl}
    </div>`;
  }).join('');
}

let checks  = JSON.parse(localStorage.getItem(SHOP_KEY) || '{}');
let curShop = 'costco';

function shop(which) {
  curShop = which;
  const on  = 'px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white';
  const off = 'px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600';
  document.getElementById('btn-costco').className = which === 'costco' ? on : off;
  document.getElementById('btn-city').className   = which === 'city'   ? on : off;
  const el = document.getElementById('shop-content');
  el.innerHTML = marked.parse(C[which] || '_Sin contenido_');
  let tot = 0, chk = 0;
  el.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    const k = which + '_' + i;
    cb.checked = !!checks[k];
    if (cb.checked) chk++;
    tot++;
    cb.addEventListener('change', () => {
      checks[k] = cb.checked;
      localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
      setProgress(which);
    });
  });
  setProgress(which, tot, chk);
}

function setProgress(which, tot, chk) {
  if (tot === undefined) {
    const boxes = document.getElementById('shop-content').querySelectorAll('input[type=checkbox]');
    tot = boxes.length; chk = 0;
    boxes.forEach((cb, i) => { if (checks[which + '_' + i]) chk++; });
  }
  const p = document.getElementById('check-prog');
  p.textContent = tot ? `${chk} / ${tot} ítems` : '';
  p.className = chk === tot && tot > 0 ? 'text-xs text-green-600 font-medium' : 'text-xs text-gray-400 font-medium';
}

function clearChecks() {
  Object.keys(checks).filter(k => k.startsWith(curShop + '_')).forEach(k => delete checks[k]);
  localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
  shop(curShop);
}

shop('costco');

// ── Tracking charts ───────────────────────────────────────────────────────────
const tr = TRACKING;
if (!(tr.weekly && tr.weekly.length > 0)) {
  document.getElementById('charts-grid').style.display = 'none';
  document.getElementById('no-data').classList.remove('hidden');
} else {
  const dLabels = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const calTarget = PERSONS[0]?.calories || 2000;
  const calData = dLabels.map((_, i) => { const d = tr.weekly[i]; return d ? (d.calories || 0) : 0; });
  new Chart(document.getElementById('chart-cal'), {
    type: 'bar',
    data: { labels: dLabels, datasets: [
      { label: 'kcal consumidas', data: calData, backgroundColor: 'rgba(5,150,105,.7)', borderRadius: 6, borderSkipped: false },
      { label: 'Meta', data: Array(7).fill(calTarget), type: 'line', borderColor: '#f59e0b', borderWidth: 2, borderDash: [6,4], pointRadius: 0, fill: false }
    ]},
    options: { responsive: true, plugins: { title: { display: true, text: 'Calorías · Esta semana' }, legend: { position: 'bottom' } } }
  });
  const t = tr.today?.totals || {};
  new Chart(document.getElementById('chart-macro'), {
    type: 'doughnut',
    data: { labels: ['Proteína','Carbs','Grasas'],
      datasets: [{ data: [t.protein_g||0, t.carbs_g||0, t.fat_g||0], backgroundColor: ['#60a5fa','#fb923c','#fbbf24'], borderWidth: 0 }] },
    options: { responsive: true, cutout: '62%', plugins: { title: { display: true, text: 'Macros · Hoy' }, legend: { position: 'bottom' } } }
  });
  const wh = (tr.weight_history || []).slice().reverse();
  if (wh.length > 0) {
    new Chart(document.getElementById('chart-weight'), {
      type: 'line',
      data: { labels: wh.map(w => w.date.slice(5)),
        datasets: [{ label: 'kg', data: wh.map(w => w.weight_kg), borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,.08)', fill: true, tension: 0.3, pointRadius: 3 }] },
      options: { responsive: true, plugins: { title: { display: true, text: 'Tendencia de peso' }, legend: { display: false } }, scales: { y: { beginAtZero: false } } }
    });
  }
}
</script>
