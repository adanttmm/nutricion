const DAYS     = [{"key": "lunes", "short": "Lun", "name": "# LUNES", "menu": "# LUNES 08 DE JUNIO 🏋️ (+150 kcal ATM → colación PM sube a 430 kcal)\n\n---\n\n### 🌅 Desayuno 🏪 🇯🇵\n**Overnight Protein Oats Estilo Matcha: Avena Hidratada con Proteína de Vainilla, Leche de Almendra, Arándanos Frescos y Nueces Garapiñadas**\n*Avena fría cremosa infusionada con extracto de vainilla, capa de proteína batida, berries frescos y nuez caramelizada con canela*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **560 · 38g · 63g · 17g** | **340 · 27g · 37g · 10g** |\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Avena cruda 🏪 | 50g | — |\n| Plátano maduro | — | 120g |\n| Arándanos frescos | 100g | — |\n| Nueces | 40g | — |\n| Leche de almendra sin azúcar | 200ml | — |\n\n> 🏪 *Prep dominical: Remojar avena ATM en contenedores individuales. IOB solo proteína + plátano al momento.*\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Tostada de Pavo con Aguacate, Germinado y Pico de Gallo Fresco**\n*Base crujiente de pan integral tostado con capas de pavo especiado, aguacate en láminas, jitomate cherry y germinado de alfalfa*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **280 · 19g · 32g · 9g** | **170 · 14g · 19g · 5g** |\n| Pechuga de pavo cocida 🏪 | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Aguacate fresco | 45g | — |\n| Claras de huevo cocidas 🏪 | — | 90g (3 claras) |\n| Jitomate cherry | 50g | 50g |\n| Germen de alfalfa | 10g | 10g |\n| Papaya en cubos | — | 150g |\n\n---\n\n### 🍽️ Comida 🏪 🇫🇷\n**Magret de Pollo Provençal: Suprema Sous Vide con Ratatouille Confitado, Arroz Integral Herbes de Provence y Vinagreta de Mostaza Dijon**\n*Pechuga cocida a baja temperatura sobre cama de vegetales mediterráneos caramelizados, arroz aromático y aderezo de mostaza a la antigua*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **840 · 58g · 95g · 26g** | **510 · 41g · 56g · 14g** |\n| Pechuga de pollo sous vide 🏪 | 200g | 120g |\n| Arroz integral cocido 🏪 | 200g | — |\n| Tortilla de harina integral 🏪 | — | 30g |\n| Aguacate fresco | — | 45g |\n| Ratatouille confitado 🏪 | 150g | 150g |\n| Gelatina light | — | 240g |\n\n---\n\n### 🌿 Colación PM 🏋️ *(pre-entreno — día gym ATM: +150 kcal)*\n\n**Shake de Proteína Doble con Tostada de Mantequilla de Cacahuate, Miel de Agave y Bastones de Jícama**\n*Licuado proteico cremoso con base de proteína doble, complementado con tostada untada de mantequilla de maní y miel de agave*\n\n| | 🧔 ATM (+150 gym) | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **430 · 35g · 52g · 13g** | **170 · 14g · 19g · 5g** |\n| Proteína en polvo | 90g (3 scoops) | 30g (1 scoop) |\n| Pan integral | 45g (1.5 rebana.) | — |\n| Mantequilla de cacahuate | 24g (1.5 cdas.) | — |\n| Miel de agave | 10g | — |\n| Jícama en bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n---\n\n### 🌙 Cena 🏪 🇯🇵\n**Onsen Tamago con Salmón Dashi: Huevo a Baja Temperatura, Salmón Desmenuzado en Caldo Dashi-Ponzu, Pasta Integral Soba y Espárragos con Sésamo Negro**\n*Técnica japonesa de huevo cremoso sobre nido de pasta integral en caldo umami ligero con salmón desmenuzado y espárragos al dente*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **700 · 48g · 79g · 21g** | **425 · 34g · 47g · 12g** |\n| Salmón confitado 🏪 | 250g | 120g |\n| Pasta integral cocida 🏪 | 150g | 75g |\n| Espárragos blanqueados 🏪 | 134g | 134g |\n| Caldo dashi-ponzu 🏪 | 200ml | 200ml |\n| Cebolla morada encurtida 🏪 | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**🧔 ATM TOTAL LUNES: 2,810 kcal · 198g P · 321g C · 86g G** ✅\n**👤 IOB TOTAL LUNES: 1,615 kcal · 130g P · 178g C · 46g G** ✅\n\n---", "recipes": "# 🗓️ LUNES 08 DE JUNIO\n\n---\n\n## 🌅 DESAYUNO\n\n### Overnight Protein Oats Estilo Matcha\n\n**Tiempo:** prep 8 min · reposo 8h | **Porciones:** ATM y IOB por separado\n**Macros ATM:** 560 kcal · P 38g · C 63g · G 17g\n**Macros IOB:** 340 kcal · P 27g · C 37g · G 10g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Avena cruda | 50g | — |\n| Plátano maduro | — | 120g |\n| Arándanos frescos | 100g | — |\n| Nueces | 40g | — |\n| Leche de almendra sin azúcar | 200ml | — |\n\n**Mise en place** *(prep dominical)*\n- **ATM:** Mezclar avena + 180ml leche de almendra + 30g proteína en frasco hermético. Refrigerar mínimo 8h. Garapiñar nueces: calentar sartén seca, añadir nueces + 5g azúcar mascabado + pizca de canela, mover constantemente 3 min hasta caramelizar. Enfriar en papel encerado.\n- **IOB:** Solo porcionar proteína. Plátano y montaje al momento.\n\n**Elaboración**\n\n**ATM:**\n1. Sacar frasco del refrigerador. La avena debe estar completamente hidratada y cremosa — si quedó muy espesa, aflojar con los 20ml restantes de leche de almendra fría.\n2. Batir los 30g de proteína restantes con 50ml agua fría hasta obtener una crema densa sin grumos. Verter sobre la avena formando capa visible.\n3. Distribuir arándanos frescos y coronar con nueces garapiñadas justo antes de servir para conservar el crunch.\n\n**IOB:**\n1. Batir 30g proteína con 100ml agua fría hasta textura cremosa.\n2. Servir sobre plátano en rodajas de 1cm en diagonal. Consumir inmediatamente.\n\n**Emplatado**\nATM en frasco de vidrio 500ml con capas visibles: avena base → crema proteica → arándanos → nueces. IOB en tazón con rodajas de plátano en abanico, hilo de proteína encima.\n\n**Conservación**\nFrasco ATM sin toppings: 48h en refrigeración. Añadir frutas y nueces al momento de consumir.\n\n**Tip del chef**\nLa capa de proteína batida debe tener consistencia de yogur griego espeso — si queda líquida, la proporción agua:proteína está mal. Usa 40-45ml agua por scoop de 30g. El contraste de temperatura entre avena fría y proteína recién batida es parte de la experiencia.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=overnight+protein+oats+matcha+receta) · [English version](https://www.youtube.com/results?search_query=how+to+make+overnight+protein+oats+matcha)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+overnight+protein+oats+matcha)\n\n---\n\n## 🍎 COLACIÓN AM\n\n### Tostada de Pavo con Aguacate, Germinado y Pico de Gallo Fresco\n\n**Tiempo:** prep 5 min · ensamble 3 min | **Porciones:** ATM y IOB\n**Macros ATM:** 280 kcal · P 19g · C 32g · G 9g\n**Macros IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pavo cocida | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Aguacate fresco | 45g | — |\n| Claras de huevo cocidas | — | 90g (3 claras) |\n| Jitomate cherry | 50g | 50g |\n| Germen de alfalfa | 10g | 10g |\n| Papaya en cubos | — | 150g |\n\n**Mise en place** *(prep dominical)*\n- Cocer pechuga de pavo: sellar en sartén caliente 2 min por lado, terminar en horno 165°C hasta 72°C interior. Dejar enfriar completamente antes de laminar a 3mm con cuchillo de chef bien afilado. Refrigerar en contenedor hermético con papel absorbente.\n- Cocer claras: huevos en agua fría, llevar a hervor, apagar fuego, tapar 10 min. Separar claras. Refrigerar.\n- Jitomate cherry: cortar a la mitad, salpimentar, reservar.\n\n**Elaboración**\n\n**ATM:**\n1. Tostar chapata cortada a lo largo en comal seco a fuego alto — quieres marcas de comal y crujido exterior manteniendo miga suave.\n2. Machacar aguacate con sal de mar y unas gotas de limón directamente sobre el pan caliente — el calor del pan integra los sabores.\n3. Disponer láminas de pavo en capas superpuestas. Coronar con jitomates, germinado y flor de sal.\n\n**IOB:**\n1. Tostar pan integral. Disponer claras picadas toscamente sobre el pan.\n2. Añadir jitomates cherry, germinado, sal y pimienta.\n3. Servir papaya en cubos aparte como postre de colación.\n\n**Emplatado**\nATM en tabla de madera: tostadas en diagonal con capas visibles de aguacate, pavo laminado y toppings. IOB en plato con mitad sándwich + papaya en ventilador.\n\n**Conservación**\nPavo laminado: 4 días refrigerado. No armar tostada con anticipación — el pan pierde textura.\n\n**Tip del chef**\nEl aguacate sobre pan caliente actúa como sellante natural que evita que la humedad del pavo ablande la miga. Laminar el pavo en frío y con cuchillo afilado — si lo desmenuzas, pierdes la presentación y la textura compacta que da mordida satisfactoria.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=tostada+pavo+aguacate+gourmet+receta) · [English version](https://www.youtube.com/results?search_query=how+to+make+turkey+avocado+toast+gourmet)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+tostada+pavo+aguacate+germinado)\n\n---\n\n## 🍽️ COMIDA\n\n### Magret de Pollo Provençal: Suprema Sous Vide con Ratatouille Confitado, Arroz Integral Herbes de Provence y Vinagreta de Mostaza Dijon\n\n**Tiempo:** prep 15 min · sous vide 1.5h · emplatado 5 min | **Porciones:** ATM y IOB\n**Macros ATM:** 840 kcal · P 58g · C 95g · G 26g\n**Macros IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pollo sous vide | 200g | 120g |\n| Arroz integral cocido | 200g | — |\n| Tortilla de harina integral | — | 30g |\n| Aguacate fresco | — | 45g |\n| Ratatouille confitado | 150g | 150g |\n| Gelatina light | — | 240g |\n\n**Mise en place** *(prep dominical)*\n\n**Sous vide pollo:** Sazonar pechugas con herbes de provence, sal, pimienta y aceite de oliva. Embolsar al vacío. Cocinar 63°C por 90 min. Enfriar en baño de hielo 10 min. Refrigerar sin abrir hasta usar. Al momento: sellar en sartén muy caliente con aceite de aguacate, 45 seg por lado — solo para coloración, no para cocción adicional.\n\n**Ratatouille confitado:** Cortar calabacita, berenjena, pimiento rojo y amarillo en brunoise gruesa (1.5cm). Confitar en aceite de oliva a 120°C por 45 min hasta que los vegetales estén tiernos pero mantengan estructura. Añadir jitomate concassé, ajo, tomillo y orégano fresco los últimos 10 min. Refrigerar hasta 5 días.\n\n**Arroz integral:** Cocinar con caldo de pollo ligero, una hoja de laurel y herbes de provence. Ratio 1:2.2 para arroz integral. Refrigerar extendido en charola para enfriar rápido.\n\n**Vinagreta Dijon:** Emulsionar 20g mostaza Dijon a la antigua + 30ml vinagre de vino blanco + 60ml aceite de oliva + 5g miel + sal y pimienta. Refrigerar en frasco.\n\n**Elaboración**\n\n1. Regenerar arroz en sartén con 2 cdas de agua y tapa, 3 min a fuego medio — quieres vapor, no fritura.\n2. Calentar ratatouille en sartén a fuego medio-alto hasta que los bordes de los vegetales comiencen a caramelizarse levemente.\n3. Sellar pollo sous vide en sartén de acero o hierro muy caliente, aceite de aguacate, 45 seg por lado. Reposar 2 min antes de cortar.\n4. Cortar pollo en diagonal a 45° exponiendo el interior nacarado y jugoso.\n\n**Emplatado**\nATM: Arroz en molde circular al centro, ratatouille a un costado en quenelle rústica, pollo laminado apoyado contra el arroz. Hilo de vinagreta Dijon cruzando el plato. IOB: Tortilla integral caliente con ratatouille + pollo + aguacate laminado. Gelatina fría como postre.\n\n**Conservación**\nPollo sous vide sin sellar: 4 días refrigerado en bolsa original. Ratatouille: 5 días. Arroz: 3 días. Siempre regenerar arroz con vapor, nunca en microondas sin humedad.\n\n**Tip del chef**\nEl error más común con sous vide es el sellado excesivo post-cocción. La pechuga ya está cocida a 63°C — el sellado es solo para reacción de Maillard y textura de corteza. Sartén al máximo, aceite con punto de humo alto, no más de 45 seg por lado. Si ves que la proteína se encoge visiblemente, ya pasaste el punto.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=pollo+sous+vide+ratatouille+receta+francesa) · [English version](https://www.youtube.com/results?search_query=how+to+make+chicken+sous+vide+ratatouille+provencal)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+pollo+sous+vide+ratatouille+provencal)\n\n---\n\n## 🌿 COLACIÓN PM *(pre-entreno gym ATM +150 kcal)*\n\n### Shake de Proteína Doble con Tostada de Mantequilla de Cacahuate, Miel de Agave y Bastones de Jícama\n\n**Tiempo:** prep 5 min | **Porciones:** ATM y IOB\n**Macros ATM (+150 gym):** 430 kcal · P 35g · C 52g · G 13g\n**Macros IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (+150 gym) | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 90g (3 scoops) | 30g (1 scoop) |\n| Pan integral | 45g (1.5 rebanadas) | — |\n| Mantequilla de cacahuate | 24g (1.5 cdas.) | — |\n| Miel de agave | 10g | — |\n| Jícama en bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n**Mise en place** *(prep dominical)*\n- Pelar y cortar jícama en bastones de 1×1×8cm. Guardar en agua fría con jugo de limón para que no oscurezca y se mantenga crujiente. Refrigerar.\n- Porcionar proteína en bolsas zip individuales para llevar si aplica.\n\n**Elaboración**\n\n**ATM:**\n1. Licuar 90g proteína con 250-300ml agua fría o leche de almendra. Para textura más densa tipo batido de leche, usar 220ml y licuar 30 seg. Para más fluido, 300ml.\n2. Tostar pan integral en tostador al nivel máximo — quieres superficie con resistencia, no pan suave.\n3. Untar mantequilla de cacahuate mientras el pan está caliente para que penetre levemente. Hilo de agave encima en zigzag.\n4. Escurrir jícama, secar con papel. Opcional: espolvorear con chile piquín y limón para el pre-entreno.\n\n**IOB:**\n1. Batir proteína con 180ml agua fría.\n2. Servir con bastones de jícama y manzana verde en gajos.\n\n**Emplatado**\nATM: Shake en vaso alto con hielos, tostada cortada en triángulos a un lado, bastones de jícama en vaso separado con chile-limón. IOB: Shake + fruta fresca en plato.\n\n**Tip del chef**\nPara el pre-entreno, la miel de agave sobre la tostada no es opcional — aporta glucosa de absorción media que llega al músculo en los primeros 30 min de entrenamiento. Consumir esta colación 45-60 min antes del gym para llegada óptima de glucosa y aminoácidos al inicio del entreno.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteina+pre+entreno+receta) · [English version](https://www.youtube.com/results?search_query=how+to+make+pre+workout+protein+shake+peanut+butter)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteina+pre+entreno+mantequilla+cacahuate)\n\n---\n\n## 🌙 CENA\n\n### Onsen Tamago con Salmón Dashi: Huevo a Baja Temperatura, Salmón Desmenuzado en Caldo Dashi-Ponzu, Pasta Integral Soba y Espárragos con Sésamo Negro\n\n**Tiempo:** prep 10 min · regeneración 15 min | **Porciones:** ATM y IOB\n**Macros ATM:** 700 kcal · P 48g · C 79g · G 21g\n**Macros IOB:** 425 kcal · P 34g · C 47g · G 12g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón confitado | 250g | 120g |\n| Pasta integral cocida | 150g | 75g |\n| Espárragos blanqueados | 134g | 134g |\n| Caldo dashi-ponzu | 200ml | 200ml |\n| Cebolla morada encurtida | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**Mise en place** *(prep dominical)*\n\n**Salmón confitado:** Desescamar y porcionar salmón. Confitar en aceite de oliva a 55°C por 25 min hasta que la carne se desmenuce con presión leve pero mantenga cohesión. Enfriar en su propio aceite — esto es clave para que no se reseque. Refrigerar sumergido. Al momento: escurrir y desmenuzar en trozos irregulares grandes.\n\n**Caldo dashi-ponzu:** Hidratar kombu 20g en 500ml agua fría 30 min. Llevar a 60°C, sostener 10 min, retirar kombu. Subir a 85°C, añadir 20g katsuobushi, apagar, dejar 5 min, colar. Ajustar con 40ml salsa ponzu, 10ml mirin, sal. Refrigerar hasta 5 días.\n\n**Pasta integral:** Cocer al dente en agua con sal. Enfriar en agua con hielo inmediatamente. Aceite de ajonjolí tostado ligero para evitar que pegue.\n\n**Espárragos:** Blanquear en agua hirviendo con sal 90 seg. Baño de hielo inmediato para fijar color esmeralda. Refrigerar.\n\n**Onsen tamago:** Cocer huevos a 63°C en olla con termómetro, exactamente 45 min. Enfriar en agua fría. Se conservan en refrigeración sin pelar hasta 2 días. Al momento: romper con cuidado sobre tazón — la clara debe estar apenas coagulada, gelatinosa; la yema líquida y sedosa.\n\n**Elaboración**\n\n1. Calentar caldo dashi-ponzu a 75°C — no hervirlo, el umami se volatiliza con hervor fuerte.\n2. Regenerar pasta en colador sumergido en agua caliente 60 seg. Escurrir y disponer en tazón profundo.\n3. Calentar espárragos sumergiéndolos en el caldo 30 seg. Retirar y reservar.\n4. Desmenuzar salmón confitado sobre la pasta, añadir cebolla encurtida (ATM).\n5. Verter caldo caliente lateral — no directamente sobre el salmón para no \"cocerlo\" de nuevo.\n6. Colocar onsen tamago al centro con máximo cuidado. Terminar con sésamo negro y aceite de ajonjolí en hilo fino.\n\n**Emplatado**\nTazón negro o de cerámica oscura: nido de pasta al centro, salmón desmenuzado alrededor, espárragos cruzados en diagonal, onsen tamago coronando. Caldo vertido desde jarra a la mesa en el momento de servir para efecto visual. Sésamo negro y cebollín en chiffonade fino como acabado.\n\n**Conservación**\nCaldo: 5 días refrigerado o 1 mes congelado. Salmón confitado en su aceite: 4 días. Pasta ya cocida: 2 días — revisar textura, si pegó, separar con agua caliente. Onsen tamago sin romper: 2 días.\n\n**Tip del chef**\nEl onsen tamago falla cuando la temperatura del agua no es constante. Si no tienes circulador sous vide, usa olla con termómetro de sonda y fuego mínimo. La variación de ±2°C en 45 min cambia dramáticamente la textura: a 61°C la clara no cuaja suficiente; a 65°C la yema pierde su liquidez sedosa. Invierte en un termómetro de sonda preciso — es el utensilio que separa este plato de un huevo tibio ordinario.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=onsen+tamago+salmon+dashi+receta+japonesa) · [English version](https://www.youtube.com/results?search_query=how+to+make+onsen+tamago+salmon+dashi+broth)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+onsen+tamago+salmon+dashi+ponzu)\n\n---\n\n> **🧔 ATM TOTAL LUNES: 2,810 kcal · 198g P · 321g C · 86g G** ✅\n> **👤 IOB TOTAL LUNES: 1,615 kcal · 130g P · 178g C · 46g G** ✅\n\n---\n---"}, {"key": "martes", "short": "Mar", "name": "# MARTES", "menu": "# MARTES 09 DE JUNIO 💃 (+100 kcal ambos → colación PM sube)\n*(Comida: 3 comensales — mismo plato ATM x3)*\n\n---\n\n### 🌅 Desayuno 🏪 🇲🇽\n**Licuado Tropical Proteico: Proteína de Vainilla, Piña Congelada, Coco Tostado, Avena Cruda y Semillas de Chía**\n*Smoothie bowl al estilo mexicano caribeño con base de piña-coco, proteína de vainilla, avena hidratada y acabado de chía tostada*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **560 · 38g · 63g · 17g** | **340 · 27g · 37g · 10g** |\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Piña congelada | 150g | — |\n| Plátano | — | 120g |\n| Avena cruda 🏪 | 50g | — |\n| Nueces / semillas chía | 40g nueces | — |\n| Coco tostado sin azúcar | 15g | — |\n\n---\n\n### 🍎 Colación AM 🏪 🇫🇷\n**Croque Monsieur Ligero: Pan Integral con Jamón de Pavo, Mostaza Dijon, Jitomate Rôti y Espinaca Baby**\n*Versión ligera del clásico francés: pan integral tostado, pavo premium, mostaza a la antigua y verduras frescas*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **280 · 19g · 32g · 9g** | **170 · 14g · 19g · 5g** |\n| Pechuga de pavo cocida 🏪 | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Espinaca baby | 30g | 30g |\n| Jitomate confitado 🏪 | 50g | 50g |\n| Claras de huevo cocidas 🏪 | — | 90g |\n| Papaya | — | 150g |\n\n---\n\n### 🍽️ Comida 🏪 🇵🇪 *(3er comensal — misma porción que ATM)*\n**Ají de Gallina Contemporáneo: Pechuga en Salsa Amarilla de Ají Mirasol, Arroz Integral Andino, Aceitunas Botija y Huevo Duro**\n*Reinterpretación del clásico peruano con pechuga sous vide, reducción cremosa de ají amarillo-nuez, arroz perfumado y guarnición tradicional*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **840 · 58g · 95g · 26g** | **510 · 41g · 56g · 14g** |\n| Pechuga de pollo sous vide 🏪 | 200g | 120g |\n| Arroz integral cocido 🏪 | 200g | — |\n| Tortilla integral | — | 30g |\n| Salsa ají amarillo 🏪 | 80g | 50g |\n| Aguacate fresco | — | 45g |\n| Aceitunas / huevo duro | 20g/50g | — |\n| Gelatina light | — | 240g |\n\n> *3er comensal: mismas cantidades que ATM × 1 → total preparar x2.5 porciones \"ATM\" + 1 \"IOB\"*\n\n---\n\n### 🌿 Colación PM 💃 *(día salsa +100 kcal ambos)*\n\n**Shake de Proteína con Pan Integral, Mantequilla de Cacahuate, Miel de Agave y Jícama Enchilada**\n*Licuado denso con proteína doble, acompañado de tostada energética para rendir en la clase de salsa*\n\n| | 🧔 ATM (+100 salsa) | 👤 IOB (+100 salsa) |\n|---|---|---|\n| **kcal · P · C · G** | **380 · 28g · 45g · 11g** | **270 · 18g · 29g · 7g** |\n| Proteína en polvo | 60g (2 scoops) | 30g (1 scoop) |\n| Pan integral | 30g | 30g |\n| Mantequilla de cacahuate | 16g | — |\n| Miel de agave | 7g | 7g |\n| Jícama bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n---\n\n### 🌙 Cena 🏪 🇲🇽\n**Mole Negro Ligero con Filete de Res: Medallón Sellado en Mole Oaxaqueño Suave, Pasta Integral con Epazote, Espárragos Tateados y Cebolla Morada al Mezcal**\n*Filete de res de cocción perfecta sobre mole negro con base de chile mulato y chocolate oscuro, pasta con hierbas mexicanas y vegetales ahumados*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **700 · 48g · 79g · 21g** | **425 · 34g · 47g · 12g** |\n| Filete de res magro 🏪 | 250g | 120g |\n| Pasta integral cocida 🏪 | 150g | 75g |\n| Mole negro ligero 🏪 | 60g | 40g |\n| Espárragos blanqueados 🏪 | 134g | 134g |\n| Cebolla morada encurtida 🏪 | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**🧔 ATM TOTAL MARTES: 2,760 kcal · 191g P · 314g C · 84g G** ✅\n**👤 IOB TOTAL MARTES: 1,715 kcal · 134g P · 188g C · 48g G** ✅\n\n---", "recipes": "# 🗓️ MARTES 09 DE JUNIO\n\n---\n\n## 🌅 DESAYUNO\n\n### Licuado Tropical Proteico: Proteína de Vainilla, Piña Congelada, Coco Tostado, Avena Cruda y Semillas de Chía\n\n**Tiempo:** prep 5 min | **Porciones:** ATM y IOB\n**Macros ATM:** 560 kcal · P 38g · C 63g · G 17g\n**Macros IOB:** 340 kcal · P 27g · C 37g · G 10g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Piña congelada | 150g | — |\n| Plátano | — | 120g |\n| Avena cruda | 50g | — |\n| Nueces / semillas chía | 40g nueces | — |\n| Coco tostado sin azúcar | 15g | — |\n\n**Mise en place** *(prep dominical)*\n- Pelar, cubear y congelar piña en bolsa zip en capa plana — los cubos no deben estar pegados para dosificar fácil.\n- Tostar coco rallado sin azúcar en sartén seca a fuego medio, mover constantemente hasta dorado uniforme (3-4 min). Enfriar y guardar en frasco hermético. Dura 2 semanas.\n- Porcionar avena y proteína en bolsas individuales si el desayuno es en movimiento.\n\n**Elaboración**\n\n**ATM:**\n1. Licuar avena cruda sola 20 seg hasta polvo fino — esto evita la textura arenosa y crea una base cremosa natural.\n2. Añadir piña congelada, proteína, 250ml agua fría. Licuar 45 seg a velocidad alta. La piña congelada elimina la necesidad de hielos y mantiene temperatura sin diluir.\n3. Ajustar consistencia: para smoothie bowl denso, reducir agua a 180ml; para licuado bebible, mantener 250ml.\n4. Verter y coronar con coco tostado y nueces troceadas toscamente justo antes de consumir.\n\n**IOB:**\n1. Licuar proteína + plátano + 150ml agua fría hasta textura homogénea.\n2. Consumir inmediatamente — el plátano oxida y cambia sabor en 20 min.\n\n**Emplatado**\nATM como smoothie bowl en tazón ancho: superficie lisa, coco tostado en línea diagonal, nueces troceadas al lado opuesto, hilo de miel de agave opcional. IOB en vaso alto.\n\n**Conservación**\nNo aplica — consumir al momento. La avena licuada en crudo pierde textura si se deja reposar más de 10 min.\n\n**Tip del chef**\nLicuar la avena cruda antes de agregar los líquidos es el truco clave para smoothies sin textura de papel mojado. La avena molida en seco actúa como espesante natural y aporta betaglucanos sin el sabor harinoso que genera la avena remojada licuada directamente.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=licuado+tropical+proteico+pina+coco+receta) · [English version](https://www.youtube.com/results?search_query=how+to+make+tropical+protein+smoothie+pineapple+coconut)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+licuado+tropical+proteico+pina+coco+avena)\n\n---\n\n## 🍎 COLACIÓN AM\n\n### Croque Monsieur Ligero: Pan Integral con Jamón de Pavo, Mostaza Dijon, Jitomate Rôti y Espinaca Baby\n\n**Tiempo:** prep 5 min · tostado 3 min | **Porciones:** ATM y IOB\n**Macros ATM:** 280 kcal · P 19g · C 32g · G 9g\n**Macros IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pavo cocida | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral | — | 30g |\n| Espinaca baby | 30g | 30g |\n| Jitomate confitado | 50g | 50g |\n| Claras de huevo cocidas | — | 90g |\n| Papaya | — | 150g |\n\n**Mise en place** *(prep dominical)*\n- **Jitomate confitado (rôti):** Jitomates saladet o cherry cortados a la mitad. Disposición en charola con papel encerado, aceite de oliva en hilo, sal, pimienta, tomillo fresco. Hornear 150°C por 90 min hasta que colapsen y concentren azúcares. Refrigerar en su jugo. Duran 7 días y son el elemento diferenciador de este sándwich.\n- Pavo: misma preparación que lunes. Si quedó del domingo, utilizar directamente.\n- Claras cocidas IOB: preparadas desde el domingo.\n\n**Elaboración**\n\n**ATM:**\n1. Cortar chapata a lo largo. Aplicar mostaza Dijon a la antigua en capa generosa sobre ambas caras — la mostaza actúa como barrera contra la humedad del jitomate.\n2. Tostar en sartén de hierro o comal a fuego medio-alto, cara cortada hacia abajo, 2-3 min hasta caramelización de la mostaza y corteza crujiente.\n3. Disponer espinaca baby sobre la base caliente — el calor la marchita levemente sin cocerla completamente, creando textura intermedia.\n4. Láminas de pavo en capas, jitomates confitados escurridos encima. Cerrar y servir cortado en diagonal.\n\n**IOB:**\n1. Tostar pan integral. Claras picadas toscamente + espinaca + jitomate confitado sobre el pan.\n2. Papaya en cubos aparte.\n\n**Emplatado**\nATM cortado en diagonal exponiendo capas, dispuesto en tabla de madera con esquina de mostaza Dijon adicional para dipear. IOB en plato simple con papaya en abanico.\n\n**Conservación**\nJitomate confitado: 7 días en refrigeración en su jugo. No armar el sándwich con anticipación.\n\n**Tip del chef**\nEl jitomate confitado (rôti) a 150°C por 90 min es transformacional — la lentitud extrae el agua libre y concentra glutamato natural, convirtiendo un jitomate ordinario en una bomba de umami sin aditivos. Preparar cantidad doble el domingo: sirve para esta colación, para el ratatouille de lunes y como condimento de emergencia toda la semana.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=croque+monsieur+ligero+integral+receta) · [English version](https://www.youtube.com/results?search_query=how+to+make+healthy+croque+monsieur+turkey)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+croque+monsieur+ligero+pavo+jitomate+confitado)\n\n---\n\n## 🍽️ COMIDA *(3 comensales — porción ATM × 3)*\n\n### Ají de Gallina Contemporáneo: Pechuga en Salsa Amarilla de Ají Mirasol, Arroz Integral Andino, Aceitunas Botija y Huevo Duro\n\n**Tiempo:** prep 20 min · salsa 25 min · emplatado 5 min | **Porciones:** 3× ATM + 1× IOB\n**Macros ATM:** 840 kcal · P 58g · C 95g · G 26g\n**Macros IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (×3) | 👤 IOB |\n|---|---|---|\n| Pechuga de pollo sous vide | 600g (3×200g) | 120g |\n| Arroz integral cocido | 600g (3×200g) | — |\n| Tortilla integral | — | 30g |\n| Salsa ají amarillo | 240g (3×80g) | 50g |\n| Aguacate fresco | — | 45g |\n| Aceitunas botija / huevo duro | 60g/150g (3×20g/50g) | — |\n| Gelatina light | — | 240g |\n\n**Mise en place** *(prep dominical)*\n\n**Pollo sous vide:** Misma técnica que lunes. Preparar cantidad total para toda la semana en una sola sesión. Para el ají de gallina, desmenuzar el pollo en hebras gruesas — no en migas finas, se quiere textura.\n\n**Salsa ají amarillo (base):** Hidratar 6 chiles ají amarillo secos (mirasol) en agua caliente 20 min. Licuar con 1 cebolla blanca sudada hasta translúcida, 3 dientes ajo, 80g pan de molde remojado en leche (el pan es el espesante tradicional, no usar harina), 60g nueces licuadas, caldo de pollo c/s para ajustar. Cocinar la pasta resultante en sartén 10 min a fuego medio hasta que cambie de tono y suelte aceite natural. Ajustar sal, pimienta blanca. Esta salsa no lleva crema — toda su cremosidad viene del pan y la nuez. Refrigerar hasta 5 días.\n\n**Arroz integral:** Igual que lunes, preparar cantidad total semana.\n\n**Elaboración**\n\n1. Calentar salsa ají amarillo en sartén ancha a fuego medio. Añadir caldo de pollo si espesó demasiado en refrigeración — debe napar la cuchara pero fluir.\n2. Incorporar pollo desmenuzado en hebras, mezclar hasta integrar y calentar completamente (70°C interior). El pollo no debe cocer más — solo calentarse.\n3. Rectificar sazón. El ají amarillo tiene picor moderado — si cocinas para el 3er comensal, preguntar tolerancia.\n4. Regenerar arroz con vapor.\n5. Cortar huevos duros a la mitad con hilo dental para corte perfecto sin romper yema.\n\n**Emplatado**\nMolde de arroz desplazado del centro, ají de gallina vertido en cascada sobre el arroz derramándose hacia el plato. Huevo duro en mitades flanqueando, aceituna botija entera como punto oscuro de contraste, hilo de aceite de oliva y paprika ahumada. IOB: tortilla caliente con ají ligero + aguacate laminado.\n\n**Conservación**\nSalsa ají: 5 días refrigerada, 3 meses congelada. Con pollo integrado: 3 días. Regenerar con splash de caldo para restaurar textura.\n\n**Tip del chef**\nEl secreto del ají de gallina auténtico que ninguna receta de internet explica correctamente: el pan remojado en leche debe licuarse junto con el ají, no añadirse después. Esta emulsión pan-ají-nuez crea una matriz que no se corta al calentar y da la untuosidad característica del plato. Si ves que tu salsa \"se quiebra\" (separa aceite), faltó este paso o el fuego estuvo muy alto.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=aji+de+gallina+receta+peruana+contemporanea) · [English version](https://www.youtube.com/results?search_query=how+to+make+aji+de+gallina+peruvian+chicken)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+aji+de+gallina+contemporaneo+peruano)\n\n---\n\n## 🌿 COLACIÓN PM *(día salsa +100 kcal ambos)*\n\n### Shake de Proteína con Pan Integral, Mantequilla de Cacahuate, Miel de Agave y Jícama Enchilada\n\n**Tiempo:** prep 5 min | **Porciones:** ATM y IOB\n**Macros ATM (+100 salsa):** 380 kcal · P 28g · C 45g · G 11g\n**Macros IOB (+100 salsa):** 270 kcal · P 18g · C 29g · G 7g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (+100 salsa) | 👤 IOB (+100 salsa) |\n|---|---|---|\n| Proteína en polvo | 60g (2 scoops) | 30g (1 scoop) |\n| Pan integral | 30g | 30g |\n| Mantequilla de cacahuate | 16g (1 cda.) | — |\n| Miel de agave | 7g | 7g |\n| Jícama en bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n**Mise en place** *(prep dominical)*\n- Jícama cortada en bastones, refrigerada en agua con limón desde el domingo.\n- Porcionar proteína. Todo listo en 5 min al momento.\n\n**Elaboración**\n\n**ATM:**\n1. Licuar proteína con 220ml agua fría. Textura más densa que el lunes — son 2 scoops vs 3, así que ajustar líquido a la baja para mantener consistencia satisfactoria.\n2. Tostar pan integral. Untar mantequilla de cacahuate en capa uniforme hasta los bordes — la cobertura incompleta da mordidas sin sabor. Agave en hilo sobre la mantequilla.\n3. Escurrir jícama, espolvorear chile piquín + sal + limón al gusto.\n\n**IOB:**\n1. Batir proteína con 180ml agua.\n2. Tostar pan, hilo de agave encima.\n3. Jícama con limón y chile (al gusto), manzana verde en gajos con Tajín opcional.\n\n**Emplatado**\nShake en vaso, tostada cortada en triángulos, jícama en vaso tipo coctelera. Presentación rápida — esta colación es funcional, no gastronómica.\n\n**Tip del chef**\nPara la clase de salsa, esta colación debe consumirse 30-40 min antes de la actividad. La combinación mantequilla de cacahuate (grasa + proteína de liberación lenta) + agave (glucosa de absorción media) + proteína whey (aminoácidos rápidos) crea un suministro de energía escalonado que sostiene 60-90 min de actividad aeróbica sin pico-caída de glucosa.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteina+pre+entreno+cacahuate+agave) · [English version](https://www.youtube.com/results?search_query=how+to+make+pre+workout+protein+shake+peanut+butter+agave)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteina+pre+actividad+mantequilla+cacahuate+jicama)\n\n---\n\n## 🌙 CENA\n\n### Mole Negro Ligero con Filete de Res: Medallón Sellado en Mole Oaxaqueño Suave, Pasta Integral con Epazote, Espárragos Tateados y Cebolla Morada al Mezcal\n\n**Tiempo:** prep 10 min · sellado 6 min · emplatado 5 min | **Porciones:** ATM y IOB\n**Macros ATM:** 700 kcal · P 48g · C 79g · G 21g\n**Macros IOB:** 425 kcal · P 34g · C 47g · G 12g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Filete de res magro | 250g | 120g |\n| Pasta integral cocida | 150g | 75g |\n| Mole negro ligero | 60g | 40g |\n| Espárragos blanqueados | 134g | 134g |\n| Cebolla morada encurtida | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**Mise en place** *(prep dominical)*\n\n**Mole negro ligero:** Esta es la preparación más elaborada de la semana — hacer cantidad generosa y congelar por porciones.\nTostar en comal seco (sin aceite, a fuego medio): 2 chiles mulato, 1 chile negro, 1 chile pasilla. Desvenar y remojar 20 min en agua caliente. Licuar con: 1/2 cebolla tatemada, 3 dientes ajo tatemados, 30g chocolate oscuro 85%, 1/4 taza pepitas, pizca de comino, clavo, canela. Freír la pasta en cazuela con 1 cda aceite a fuego medio-alto, mover constantemente 8-10 min hasta oscurecer y oler a chocolate-chile integrados. Añadir caldo de res poco a poco hasta consistencia de salsa napante. Ajustar sal. Para versión \"ligera\": reducir aceite de fritura al mínimo y usar caldo desengrasado.\n\n**Cebolla al mezcal:** Cebolla morada en juliana fina + 30ml mezcal joven + 20ml vinagre de manzana + pizca de sal + orégano seco. Macerar mínimo 2h, mejor overnight. Se intensifica con el tiempo.\n\n**Espárragos:** Blanqueados desde el domingo, igual que lunes.\n\n**Pasta integral con epazote:** Cocer al dente, enfriar en hielo, aceite de oliva y epazote fresco picado. Refrigerar.\n\n**Filete de res:** No prep dominical — sellar al momento para servir en punto exacto.\n\n**Elaboración**\n\n1. Sacar filete del refrigerador 20 min antes — temperatura ambiente para sellado parejo.\n2. Secar completamente con papel — la humedad superficial es el enemigo del Maillard.\n3. Sartén de hierro o acero al máximo por 3 min hasta humo visible. Aceite de aguacate.\n4. Sellar filete: 2.5 min por lado para término medio-rojo (55-57°C interior). Para término medio, 3 min por lado (60-63°C). Sellar también los bordes 30 seg cada uno.\n5. Reposar en rejilla 4 min mínimo — nunca en tabla plana donde el jugo queda atrapado bajo la carne.\n6. Calentar mole a fuego bajo añadiendo splash de caldo si espesó. Regenerar pasta en agua caliente, escurrir.\n7. Tatear espárragos directamente en el comal caliente que usaste para el filete — captan los fondos de la carne.\n\n**Emplatado**\nEspejo de mole negro en el plato. Pasta en nido descentrado. Filete laminado en diagonal sobre la pasta, exponiendo el interior rosado. Espárragos tateados cruzando el plato. Cebolla al mezcal escurrida sobre el filete (ATM). Semillas de ajonjolí blanco y negro como acabado. Hilo delgado de aceite de oliva en el perímetro del mole.\n\n**Conservación**\nMole negro: 7 días refrigerado, 6 meses congelado en porciones de 60g. Filete: sellar siempre al momento, nunca regenerar — pierde el punto. Pasta con epazote: 2 días.\n\n**Tip del chef**\nEl epazote en la pasta no es decorativo — sus aceites esenciales se activan con el calor de la pasta recién cocida y crean un puente aromático con el mole negro que hace que el plato funcione como conjunto, no como elementos separados. Añadir el epazote mientras la pasta está caliente y dejar reposar 2 min antes de emplatar. Si no encuentras epazote fresco, hierba santa en cantidad menor funciona — nunca seco, pierde el aceite esencial que es todo el punto.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=mole+negro+ligero+filete+res+receta+oaxaquena) · [English version](https://www.youtube.com/results?search_query=how+to+make+oaxacan+black+mole+beef+tenderloin)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+mole+negro+ligero+filete+res+espárragos)\n\n---\n\n> **🧔 ATM TOTAL MARTES: 2,760 kcal · 191g P · 314g C · 84g G** ✅\n> **👤 IOB TOTAL MARTES: 1,715 kcal · 134g P · 188g C · 48g G** ✅\n\n---"}, {"key": "miercoles", "short": "Mié", "name": "# MIÉRCOLES", "menu": "# MIÉRCOLES 10 DE JUNIO 🏋️ (+150 kcal ATM → colación PM sube)\n*(Comida: 3 comensales)*\n\n---\n\n### 🌅 Desayuno 🏪 🇮🇳\n**Golden Protein Bowl: Avena Hidratada con Cúrcuma, Leche de Coco Light, Proteína de Vainilla, Fresas Maceradas y Pistaches**\n*Bowl de avena overnight con perfil especiado de cúrcuma y jengibre, cremosidad de coco light, proteína batida y frutas rojas maceradas*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **560 · 38g · 63g · 17g** | **340 · 27g · 37g · 10g** |\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Avena cruda 🏪 | 50g | — |\n| Fresas | 150g | — |\n| Plátano | — | 120g |\n| Pistaches | 30g | — |\n| Nueces | 15g | — |\n| Leche de coco light | 120ml | — |\n| Cúrcuma / jengibre | c/s | — |\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Taco Árabe de Pavo: Tortilla de Harina Integral con Pavo Especiado al Chipotle, Cebolla Asada, Cilantro y Limón**\n*Fusión de taco árabe mexica con pavo marinado en chipotle-achiote, tortilla suave y guarnición fresca cítrica*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **280 · 19g · 32g · 9g** | **170 · 14g · 19g · 5g** |\n| Pechuga de pavo cocida 🏪 | 200g | 50g |\n| Chapata integral | 80g | — |\n| Tortilla harina integral | — | 30g |\n| Jitomate | 50g | 50g |\n| Espinaca baby | 30g | 30g |\n| Claras cocidas 🏪 | — | 90g |\n| Papaya | — | 150g |\n\n---\n\n### 🍽️ Comida 🏪 🇯🇵 *(3er comensal — misma porción que ATM)*\n**Poke Bowl Tokio: Res Marinada en Shoyu-Mirin, Arroz Integral Sushi, Edamame, Pepino, Aguacate y Aderezo Ponzu Cítrico**\n*Deconstrucción japonesa moderna: proteína tierna en glaseado umami sobre arroz corto integral, vegetales crujientes y salsa ponzu de cítricos mexicanos*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **840 · 58g · 95g · 26g** | **510 · 41g · 56g · 14g** |\n| Filete de res magro 🏪 | 200g | 120g |\n| Arroz integral sushi 🏪 | 200g | — |\n| Tortilla integral 🏪 | — | 30g |\n| Edamame cocido 🏪 | 60g | 40g |\n| Aguacate fresco | 30g | 45g |\n| Pepino en láminas | 80g | 80g |\n| Aderezo ponzu 🏪 | 30ml | 20ml |\n| Gelatina light | — | 240g |\n\n---\n\n### 🌿 Colación PM 🏋️ *(gym ATM +150 kcal)*\n\n**Shake de Proteína Triple con Tostada de Mantequilla de Cacahuate, Miel y Jícama**\n*Licuado proteico reforzado con tres scoops para recuperación muscular, acompañado de tostada energética*\n\n| | 🧔 ATM (+150 gym) | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **430 · 35g · 52g · 13g** | **170 · 14g · 19g · 5g** |\n| Proteína en polvo | 90g (3 scoops) | 30g (1 scoop) |\n| Pan integral | 45g | — |\n| Mantequilla de cacahuate | 24g | — |\n| Miel de agave | 10g | — |\n| Jícama bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n---\n\n### 🌙 Cena 🏪 🇬🇷\n**Plaki de Salmón Estilo Griego: Filete Confitado con Salsa de Jitomate-Aceitunas Kalamata, Pasta Integral al Limón, Espárragos con Orégano y Feta Ligero**\n*Técnica griega de horneado en salsa aromática: salmón en fondo de jitomate herbal, pasta al limón-alcaparra y espárragos con queso feta desmenuzado*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **700 · 48g · 79g · 21g** | **425 · 34g · 47g · 12g** |\n| Salmón confitado 🏪 | 250g | 120g |\n| Pasta integral cocida 🏪 | 150g | 75g |\n| Salsa plaki 🏪 | 80g | 60g |\n| Espárragos blanqueados 🏪 | 134g | 134g |\n| Feta light | 20g | 15g |\n| Cebolla morada 🏪 | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**🧔 ATM TOTAL MIÉRCOLES: 2,810 kcal · 198g P · 321g C · 86g G** ✅\n**👤 IOB TOTAL MIÉRCOLES: 1,615 kcal · 130g P · 178g C · 46g G** ✅\n\n---", "recipes": "# 🗓️ MIÉRCOLES 10 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Golden Protein Bowl: Avena Hidratada con Cúrcuma, Leche de Coco Light, Proteína de Vainilla, Fresas Maceradas y Pistaches\n\n**Tiempo:** prep 10 min · reposo overnight | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM:** 560 kcal · P 38g · C 63g · G 17g\n**Macros por porción — 👤 IOB:** 340 kcal · P 27g · C 37g · G 10g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo vainilla | 60g (2 scoops) | 30g (1 scoop) |\n| Avena cruda | 50g | — |\n| Fresas | 150g | — |\n| Plátano | — | 120g |\n| Pistaches | 30g | — |\n| Nueces | 15g | — |\n| Leche de coco light | 120ml | — |\n| Cúrcuma / jengibre fresco | c/s | — |\n\n**Mise en place** *(preparar el domingo)*\n- Porcionar avena en frascos herméticos individuales\n- Mezclar especias secas (cúrcuma + jengibre molido o rallado) en proporción 2:1; guardar en pinch bowl\n- Macerar fresas (rodajas + pizca de sal de mar + 5ml limón) en contenedor cerrado; conservar refrigerado hasta 3 días\n- IOB: rebanar plátano y refrigerar en bolsa zip con unas gotas de limón\n\n**Elaboración**\n\n1. **Base overnight (noche anterior):** Mezclar avena cruda con 180ml agua fría + 120ml leche de coco light + 1.5g cúrcuma + 0.5g jengibre. Ajustar densidad: la mezcla debe quedar semilíquida al refrigerar — gelifica durante el reposo. Refrigerar mínimo 8h.\n2. **Al momento del servicio:** Batir proteína en polvo con 80–100ml agua fría o leche de coco restante hasta emulsión sin grumos. Incorporar al bowl sobre la avena ya hidratada en movimientos envolventes; no sobrebatir para conservar la textura gelificada de la avena.\n3. **Fresas ATM:** Drenar el líquido de maceración (reservar como coulis opcional), disposición sobre la superficie del bowl.\n4. **IOB:** Integrar plátano en rodajas directamente al bowl de proteína; agregar nueces.\n5. **Acabado ATM:** Pistaches ligeramente tostados en seco (170°C, 4 min) para activar aceites aromáticos. Distribuir sobre la superficie junto con un hilo de leche de coco y pizca de cúrcuma para color.\n\n**Emplatado**\nBowl amplio, avena como base, proteína batida encima en espiral, fresas maceradas en racimo lateral, pistaches tostados dispersos y polvo de cúrcuma en quenelle de aire. IOB: plátano en diagonal + nueces rotas.\n\n**Conservación**\nLa base de avena overnight se conserva 3 días refrigerada sin proteína. Incorporar el scoop al momento del servicio para evitar que la proteína desnaturalice la textura.\n\n**Tip del chef**\nLa leche de coco light tiene tendencia a separarse al refrigerar. Agitar el tetrapak 30 segundos antes de medir y añadir una pizca de goma xantana (0.2g) a la base overnight si se busca emulsión estable de 3 días sin separación.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=avena+overnight+curcuma+proteina+bowl) · [English version](https://www.youtube.com/results?search_query=golden+turmeric+overnight+oats+protein-bowl)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+avena+overnight+curcuma+leche+de+coco+proteina)\n\n---\n\n## 🍎 Colación AM\n\n### Taco Árabe de Pavo: Tortilla de Harina Integral con Pavo Especiado al Chipotle, Cebolla Asada, Cilantro y Limón\n\n**Tiempo:** prep 10 min · ensamble 5 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM:** 280 kcal · P 19g · C 32g · G 9g\n**Macros por porción — 👤 IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pavo cocida | 200g | 50g |\n| Chapata integral | 80g | — |\n| Tortilla harina integral | — | 30g |\n| Jitomate | 50g | 50g |\n| Espinaca baby | 30g | 30g |\n| Claras cocidas | — | 90g |\n| Papaya | — | 150g |\n\n**Mise en place** *(preparar el domingo)*\n- Pavo cocido y desmenuzado en hebras gruesas; marinado en chipotle adobado + achiote + ajo negro + sal; conservar en contenedor con su jugo de maceración\n- Cebolla fileteada y asada en comal sin grasa a punto de caramelización ligera; refrigerar\n- Jitomate en brunoisse gruesa, drenado; mezclar con cilantro fresco y sal al momento\n- IOB: claras cocidas en agua + sal, listas para servir frías o temperatura ambiente\n\n**Elaboración**\n\n1. **Pavo ATM:** Calentar sartén antiadherente o plancha a fuego alto. Saltear el pavo marinado con su jugo 2–3 min hasta que los bordes caramelicen ligeramente con el achiote — objetivo: textura exterior ligeramente crocante, interior jugoso. No sobrecocinar; ya está cocido.\n2. **Cebolla asada:** Rehidratar en la misma plancha 1 min con unas gotas del jugo de chipotle para potenciar el perfil ahumado.\n3. **ATM — Chapata:** Tostar en plancha seca por cara interna hasta Maillard ligero (costra dorada sin reseca). Construir como sándwich abierto: espinaca baby como base (actúa como barrera de humedad), pavo, cebolla, jitomate, expresar limón al momento.\n4. **IOB — Tortilla:** Calentar tortilla en comal seco, 20 segundos por lado. Armar taco con espinaca, pavo (50g), jitomate, claras desmenuzadas y limón. Papaya al lado.\n\n**Emplatado**\nATM: chapata en tabla de madera, corte diagonal, hilo de salsa de chipotle diluida con limón como trazado lateral. IOB: taco enrollado con papel de estraza opcional para presentación.\n\n**Conservación**\nPavo marinado: 4 días refrigerado en contenedor hermético con jugo. El calor del salteado reactiva los aromas del achiote sin necesidad de re-marinar.\n\n**Tip del chef**\nEl achiote en pasta tiene alto contenido de annatto — al saltear a fuego alto puede amargar. Diluir siempre con jugo de naranja o limón (ratio 1:3) antes de marinar y no superar 220°C en plancha para preservar el perfil especiado sin notas quemadas.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=taco+arabe+pavo+chipotle+achiote) · [English version](https://www.youtube.com/results?search_query=arabian-style+turkey+taco+chipotle+achiote)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+taco+arabe+pavo+chipotle+achiote)\n\n---\n\n## 🍽️ Comida *(3 comensales — 3er comensal misma porción que ATM)*\n\n### Poke Bowl Tokio: Res Marinada en Shoyu-Mirin, Arroz Integral Sushi, Edamame, Pepino, Aguacate y Aderezo Ponzu Cítrico\n\n**Tiempo:** prep 15 min · marinado 30 min mín · cocción 8 min | **Porciones:** 3 (ATM ×2 + IOB ×1)\n**Macros por porción — 🧔 ATM:** 840 kcal · P 58g · C 95g · G 26g\n**Macros por porción — 👤 IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (×2) | 👤 IOB |\n|---|---|---|\n| Filete de res magro | 200g c/u → 400g total | 120g |\n| Arroz integral sushi | 200g c/u → 400g total | — |\n| Tortilla integral | — | 30g |\n| Edamame cocido | 60g c/u → 120g total | 40g |\n| Aguacate fresco | 30g c/u → 60g total | 45g |\n| Pepino en láminas | 80g c/u → 160g total | 80g |\n| Aderezo ponzu | 30ml c/u → 60ml total | 20ml |\n| Gelatina light | — | 240g |\n\n**Para la marinada shoyu-mirin (toda la res):**\n- Shoyu (soya baja en sodio) 45ml · Mirin 20ml · Aceite de ajonjolí tostado 8ml · Jengibre rallado 5g · Ajo negro o fresco 2 dientes · Jugo de limón 15ml\n\n**Mise en place** *(preparar el domingo)*\n- Arroz integral sushi cocido con ratio 1:1.8, reposado 15 min tapado con trapo, no destapado al vapor — conservar en contenedor, recalentar con 1 cda de agua al vapor o microondas tapado\n- Edamame desvainado y blanqueado 3 min en agua con sal; enfriar en hielo\n- Marinada shoyu-mirin mezclada y refrigerada en frasco\n- Pepino en láminas tipo mandolina 1.5mm, refrigerado en agua helada con sal para mantener turgencia\n- Ponzu: mezclar shoyu + jugo de naranja agria (o naranja + limón) + mirin + ralladura de limón; refrigerar\n\n**Elaboración**\n\n1. **Marinado de la res:** Filete entero (ideal entraña fina o arrachera de corte delgado, o ribeye magro laminado) en marinada fría mínimo 30 min, máximo 4h. Más tiempo → la soya desnaturaliza la proteína superficial y pierde textura.\n2. **Cocción res ATM:** Plancha o sartén de hierro a temperatura máxima (230–250°C). Sellar filetes escurridos de marinada — exceso de líquido genera vapor y evita Maillard. 2 min por lado para término medio-rojo en corte de 1.5cm. Reposar 3 min antes de rebanar en diagonal contra la fibra, láminas de 5mm.\n3. **IOB — res:** Misma técnica, porción de 120g. Rebanas más delgadas (3mm) para mayor superficie de sabor con menor gramaje.\n4. **Arroz:** Recalentar porciones individuales. Ajustar con unas gotas de vinagre de arroz + sal al momento de servir para activar el perfil umami.\n5. **Ensamble:** Bowl frío — arroz como base caliente, secciones bien definidas de res, edamame, pepino escurrido, aguacate en láminas o quenelle. Ponzu al momento del servicio, no antes (evita oxidar el aguacate y recocer el pepino).\n6. **IOB:** Tortilla calentada como base o enrollada lateral. Gelatina light servida aparte.\n\n**Emplatado**\nBowl de cerámica oscura. Arroz centrado, ingredientes en sectores radiales bien delimitados — técnica \"clock bowl\". Res en abanico sobre el arroz. Aguacate con flor de sal y sésamo negro. Ponzu en jarra pequeña al lado para que cada comensal sirva al gusto.\n\n**Conservación**\nRes marinada cruda: 24h máximo en refrigeración. Cocida y rebanada: 2 días. Arroz integral cocido: 4 días. No congelar el ponzu con ralladura fresca.\n\n**Tip del chef**\nEl mirin contiene azúcares que caramelizarán rápido en plancha muy caliente — si la marinada tiene exceso, puede quemarse antes de que la proteína alcance el punto deseado. Secar la carne con papel absorbente tras escurrir la marinada y aplicar un pincel con marinada fresca en los últimos 30 segundos de cocción para el glaseado sin riesgo de quemado.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=poke+bowl+res+shoyu+mirin+arroz+integral) · [English version](https://www.youtube.com/results?search_query=japanese-beef-poke-bowl+shoyu+mirin+ponzu)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+poke+bowl+res+shoyu+mirin+ponzu+citrico)\n\n---\n\n## 🌿 Colación PM *(🏋️ ATM +150 kcal gym)*\n\n### Shake de Proteína Triple con Tostada de Mantequilla de Cacahuate, Miel y Jícama\n\n**Tiempo:** prep 5 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM (+150 gym):** 430 kcal · P 35g · C 52g · G 13g\n**Macros por porción — 👤 IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (+150 gym) | 👤 IOB |\n|---|---|---|\n| Proteína en polvo | 90g (3 scoops) | 30g (1 scoop) |\n| Pan integral | 45g | — |\n| Mantequilla de cacahuate | 24g | — |\n| Miel de agave | 10g | — |\n| Jícama bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n**Mise en place** *(preparar el domingo)*\n- Jícama pelada, cortada en bastones uniformes 8×1cm, refrigerada en agua con limón y pizca de sal\n- Pan integral porcionado en bolsa individual\n- IOB: manzana verde en gajos con limón\n\n**Elaboración**\n\n1. **Shake ATM:** Licuar o batir con shaker 90g de proteína con 350–400ml agua fría o leche descremada. Con 3 scoops la mezcla tiende a quedar densa — añadir líquido progresivamente para consistencia bebible (no batido espeso). Opcional: 3–4 cubos de hielo para temperatura óptima post-entreno.\n2. **Tostada ATM:** Tostar pan en tostador o plancha hasta Maillard definido — la textura crujiente es funcional, no solo estética, ya que contrasta con la cremosidad de la mantequilla de cacahuate. Aplicar mantequilla en caliente para que penetre levemente. Hilo de miel de agave en zigzag al final.\n3. **IOB:** Shake simple con 1 scoop + 200ml agua. Manzana en gajos con limón + jícama con tajín opcional.\n4. **Jícama:** Servir fría directamente del agua de conservación, escurrir y espolvorear tajín y limón al momento.\n\n**Emplatado**\nATM: vaso alto para el shake, tostada en tabla pequeña con las dos capas visibles (mantequilla + miel). Jícama en racimo lateral con rodaja de limón. IOB: vaso + fruta en contenedor de transporte.\n\n**Conservación**\nShake preparado: consumir en los 30 min post-entreno para optimizar ventana anabólica. No preparar con anticipación — la proteína hidrolizada se degrada y cambia de textura a las 2h.\n\n**Tip del chef**\nCon 3 scoops de proteína, el shake puede generar espuma excesiva si se licúa. Usar shaker de malla doble o batir a mano con látigo de globo 45 segundos — suficiente para integrar sin incorporar aire en exceso, lo que puede causar molestias gastrointestinales post-entreno.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteina+post+entreno+tostada+mantequilla+cacahuate) · [English version](https://www.youtube.com/results?search_query=post-workout+protein-shake+peanut-butter-toast)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+colacion+post+entreno+shake+proteina+triple+tostada+cacahuate)\n\n---\n\n## 🌙 Cena\n\n### Plaki de Salmón Estilo Griego: Filete Confitado con Salsa de Jitomate-Aceitunas Kalamata, Pasta Integral al Limón, Espárragos con Orégano y Feta Ligero\n\n**Tiempo:** prep 15 min · cocción 25 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM:** 700 kcal · P 48g · C 79g · G 21g\n**Macros por porción — 👤 IOB:** 425 kcal · P 34g · C 47g · G 12g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón confitado | 250g | 120g |\n| Pasta integral cocida | 150g | 75g |\n| Salsa plaki | 80g | 60g |\n| Espárragos blanqueados | 134g | 134g |\n| Feta light | 20g | 15g |\n| Cebolla morada | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**Para la salsa plaki (prep dominical — rinde para toda la semana):**\n- Jitomate guaje concassé 400g · Aceitunas kalamata sin hueso 60g · Ajo 3 dientes · Cebolla blanca brunoise 100g · Alcaparras 20g · Orégano seco 3g · Hoja de laurel 2 · AOVE 10ml · Sal + pimienta\n\n**Para el confit de salmón (prep dominical):**\n- Filetes sin piel · AOVE o aceite de girasol 200ml · Eneldo + ralladura de limón + pimienta blanca · Temperatura: 60°C constante, 25 min — resultado: textura sedosa, no escamada\n\n**Mise en place** *(preparar el domingo)*\n- Confit de salmón: sous vide 52°C/30 min o en sartén con aceite a temperatura controlada 60°C (termómetro de cocina esencial); porcionar y refrigerar en aceite del confit\n- Salsa plaki: sofrito de cebolla + ajo en AOVE, desglasar con vino blanco seco 30ml, agregar jitomate, alcaparras, kalamata, laurel; reducir 20 min a fuego bajo; enfriar y refrigerar hasta 5 días\n- Pasta integral cocida al dente (1 min menos que indicación del paquete); enfriar, aceitar ligeramente; refrigerar\n- Espárragos blanqueados: 2.5 min agua hirviendo + sal, choque de hielo, secar y refrigerar\n\n**Elaboración**\n\n1. **Salsa plaki:** Calentar en sartén a fuego medio hasta que burbujee suavemente. Ajustar acidez con ralladura de limón fresca — el jitomate pierde acidez al reposar.\n2. **Salmón:** Retirar del aceite de confit, escurrir en papel absorbente. Dos opciones de acabado: (a) glasear brevemente en plancha antiadherente caliente, 45 segundos por la cara superior, sin voltear — objetivo: costra ligera preservando el interior sedoso del confit; o (b) colocar directamente sobre la salsa caliente y cubrir 3 min para que termine en el fondo aromático (técnica plaki tradicional).\n3. **Pasta:** Saltar en sartén con 10ml AOVE + ralladura de limón + pimienta negra molida al momento. La pasta ya cocida debe tomar temperatura sin resecarse — añadir 30ml del agua de la salsa si es necesario para emulsionar.\n4. **Espárragos:** Plancha caliente, 2 min con orégano seco y flor de sal. No sobrecocinar — deben mantener el snap.\n5. **Cebolla morada ATM:** Encurtir rápido: láminas finas + jugo de limón + sal + orégano, 10 min mínimo antes de servir.\n\n**Emplatado**\nPasta al limón como base, salmón sobre la salsa plaki en centro del plato, espárragos cruzados en diagonal, cebolla morada encurtida en bouquet, feta desmenuzado a temperatura ambiente (nunca frío directo del refrigerador — pierde aroma). Hilo fino de AOVE en acabado. Gelatina light en copa aparte.\n\n**Conservación**\nSalmón confitado en aceite: 4 días refrigerado, el aceite lo preserva. No congelar — la textura del confit colapsa al descongelar. Salsa plaki: 5 días refrigerada, mejora con el reposo.\n\n**Tip del chef**\nEl feta light tiene menor contenido graso y tiende a volverse gomoso al calentar — nunca incorporarlo a la salsa caliente. Desmenuzar siempre frío sobre el plato terminado y dejar que el calor residual del platillo lo atempere. Para potenciar el perfil griego, agregar una hoja de orégano fresco (no seco) en el emplatado final — el aceite esencial del orégano fresco es volátil y se pierde por completo con el calor.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=salmon+plaki+griego+jitomate+aceitunas+kalamata) · [English version](https://www.youtube.com/results?search_query=greek-salmon-plaki+tomato+kalamata+olives)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+plaki+griego+aceitunas+kalamata+pasta+integral)\n\n---\n---"}, {"key": "jueves", "short": "Jue", "name": "# JUEVES", "menu": "# JUEVES 11 DE JUNIO 💃 (+100 kcal ambos → colación PM sube)\n\n---\n\n### 🌅 Desayuno 🏪 🇵🇪\n**Smoothie Morado Andino: Proteína de Vainilla, Maíz Morado (Chicha Concentrada), Mora Azul Congelada, Avena y Nueces**\n*Licuado de inspiración limeña con antioxidantes del maíz morado y moras azules, textura cremosa de avena y proteína de alto valor*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **560 · 38g · 63g · 17g** | **340 · 27g · 37g · 10g** |\n| Proteína en polvo (vainilla) | 60g (2 scoops) | 30g (1 scoop) |\n| Avena cruda 🏪 | 50g | — |\n| Mora azul congelada | 150g | — |\n| Plátano | — | 120g |\n| Nueces | 40g | — |\n| Extracto chicha morada | 60ml | — |\n\n---\n\n### 🍎 Colación AM 🏪 🇱🇧\n**Wrap de Pavo con Hummus Ligero, Pepino Persa, Menta y Sumac**\n*Tortilla integral enrollada con pavo especiado, hummus de garbanzo light, pepino crujiente y polvo de sumac árabe*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **280 · 19g · 32g · 9g** | **170 · 14g · 19g · 5g** |\n| Pechuga de pavo cocida 🏪 | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral / tortilla | — | 30g |\n| Hummus light 🏪 | 30g | 20g |\n| Pepino persa | 80g | 80g |\n| Espinaca baby | 30g | 30g |\n| Claras cocidas 🏪 | — | 90g |\n| Papaya | — | 150g |\n\n---\n\n### 🍽️ Comida 🏪 🇹🇭\n**Larb Gai Contemporáneo: Pollo Picado Finamente con Salsa de Lima, Chile de Árbol, Hierba Santa, Arroz Tostado y Cilantro**\n*Ensalada caliente tailandesa de pollo molido con aderezo ácido-picante, hierbas frescas y crujiente de arroz tostado sobre base de arroz integral*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **840 · 58g · 95g · 26g** | **510 · 41g · 56g · 14g** |\n| Pechuga de pollo sous vide 🏪 | 200g | 120g |\n| Arroz integral cocido 🏪 | 200g | — |\n| Tortilla integral 🏪 | — | 30g |\n| Salsa larb 🏪 | 60g | 40g |\n| Aguacate fresco | — | 45g |\n| Pepino / zanahoria juliana | 100g | 100g |\n| Gelatina light | — | 240g |\n\n---\n\n### 🌿 Colación PM 💃 *(salsa +100 kcal ambos)*\n\n**Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Jícama con Tajín**\n*Colación energética pre-salsa con licuado proteico reforzado y snack de fibra y carbohidratos*\n\n| | 🧔 ATM (+100 salsa) | 👤 IOB (+100 salsa) |\n|---|---|---|\n| **kcal · P · C · G** | **380 · 28g · 45g · 11g** | **270 · 18g · 29g · 7g** |\n| Proteína en polvo | 60g (2 scoops) | 30g (1 scoop) |\n| Pan integral | 30g | 30g |\n| Mantequilla de cacahuate | 16g | — |\n| Miel de agave | 7g | 7g |\n| Jícama bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n---\n\n### 🌙 Cena 🏪 🇸🇪\n**Gravlax Nórdico Reconstituido: Salmón Curado en Dill-Remolacha, Pasta Integral con Crema de Rábano Picante, Espárragos Encurtidos y Pepino en Vinagreta de Eneldo**\n*Inspiración escandinava: salmón marinado en remolacha y eneldo sobre pasta con salsa blanca de rábano, espárragos levemente ácidos y pepino nórdico*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **kcal · P · C · G** | **700 · 48g · 79g · 21g** | **425 · 34g · 47g · 12g** |\n| Salmón confitado-marinado 🏪 | 250g | 120g |\n| Pasta integral cocida 🏪 | 150g | 75g |\n| Crema rábano-eneldo 🏪 | 40g | 25g |\n| Espárragos 🏪 | 134g | 134g |\n| Pepino en vinagreta 🏪 | 80g | 80g |\n| Cebolla morada 🏪 | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**🧔 ATM TOTAL JUEVES: 2,760 kcal · 191g P · 314g C · 84g G** ✅\n**👤 IOB TOTAL JUEVES: 1,715 kcal · 134g P · 188g C · 48g G** ✅\n\n---", "recipes": "# 🗓️ JUEVES 11 DE JUNIO\n\n---\n\n## 🌅 Desayuno\n\n### Smoothie Morado Andino: Proteína de Vainilla, Maíz Morado (Chicha Concentrada), Mora Azul Congelada, Avena y Nueces\n\n**Tiempo:** prep 8 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM:** 560 kcal · P 38g · C 63g · G 17g\n**Macros por porción — 👤 IOB:** 340 kcal · P 27g · C 37g · G 10g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Proteína en polvo vainilla | 60g (2 scoops) | 30g (1 scoop) |\n| Avena cruda | 50g | — |\n| Mora azul congelada | 150g | — |\n| Plátano | — | 120g |\n| Nueces | 40g | — |\n| Extracto chicha morada | 60ml | — |\n\n**Para el extracto de chicha morada concentrada (prep dominical):**\n- Maíz morado seco 200g · Agua 1L · Cáscara de piña 100g · Canela en raja 1 · Clavo 3 piezas\n- Hervir 45 min, colar, reducir a la mitad hasta concentrado oscuro e intenso; refrigerar hasta 7 días en frasco de vidrio\n\n**Mise en place** *(preparar el domingo)*\n- Extracto de chicha concentrada listo y refrigerado\n- Nueces tostadas en seco a 160°C, 6 min; enfriar y guardar en frasco hermético\n- IOB: plátano porcionado, congelado o fresco según preferencia (congelado aporta cremosidad extra al smoothie)\n\n**Elaboración**\n\n1. **ATM — Base:** Licuar moras azules congeladas (directas del congelador, no descongelar — aportan cuerpo y temperatura) + extracto de chicha 60ml + 150ml agua fría o leche descremada. Velocidad alta 30 segundos hasta puré homogéneo.\n2. Agregar avena cruda (no cocida — se hidrata durante el licuado, aporta cuerpo sin espesar en exceso) y proteína en polvo. Licuar 20 segundos más — no sobreprocesar o la avena libera almidón y la textura se vuelve gomosa.\n3. Nueces: NO licuar. Incorporar al final en trozos o servir como topping crujiente para contraste textural. La grasa de nuez oxidada al licuarse puede alterar el sabor.\n4. **IOB:** Licuar plátano fresco o congelado + 1 scoop proteína + 200ml agua o leche descremada. Smoothie simple sin chicha. Servir en vaso alto.\n5. **Color control:** El concentrado de chicha morada vira a violeta profundo — añadir unas gotas de limón fresco al final para estabilizar el color por el efecto antocianina + pH ácido.\n\n**Emplatado**\nATM: vaso de 500ml o bowl de smoothie. Si es bowl: verter, nueces enteras encima, rodaja de limón en el borde, polvo de canela en trazo fino. Si es vaso: nueces al fondo como surprise crunch al terminar. IOB: vaso clásico con plátano en rodaja como garnish.\n\n**Conservación**\nEl smoothie pierde su color violeta intenso a las 2h por oxidación de antocianinas. Preparar y consumir inmediatamente. El extracto de chicha concentrada: 7 días refrigerado, 3 meses congelado en cubos de hielo (prático para dosificar).\n\n**Tip del chef**\nEl extracto de chicha morada tiene taninos naturales del maíz morado que pueden generar astringencia si se reduce demasiado. Probar durante la reducción: debe quedar dulce-especiado con cuerpo, no amargo. Si sobrerredujo, diluir con jugo de piña fresca (no enlatada) para balancear y aportar acidez tropical coherente con el perfil andino.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=smoothie+morado+andino+chicha+morada+mora+azul+proteina) · [English version](https://www.youtube.com/results?search_query=purple-andean-smoothie+chicha+morada+blueberry+protein)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+smoothie+morado+chicha+morada+mora+azul+proteina+vainilla)\n\n---\n\n## 🍎 Colación AM\n\n### Wrap de Pavo con Hummus Ligero, Pepino Persa, Menta y Sumac\n\n**Tiempo:** prep 8 min · ensamble 5 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM:** 280 kcal · P 19g · C 32g · G 9g\n**Macros por porción — 👤 IOB:** 170 kcal · P 14g · C 19g · G 5g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Pechuga de pavo cocida | 200g | 50g |\n| Chapata integral | 80g | — |\n| Pan integral / tortilla | — | 30g |\n| Hummus light | 30g | 20g |\n| Pepino persa | 80g | 80g |\n| Espinaca baby | 30g | 30g |\n| Claras cocidas | — | 90g |\n| Papaya | — | 150g |\n\n**Para el hummus light (prep dominical — rinde la semana):**\n- Garbanzo cocido 250g · Tahini 20g · Limón 30ml · Ajo 1 diente · Comino 1g · AOVE 8ml · Agua de cocción del garbanzo c/s\n- Procesar hasta crema sedosa; ajustar densidad con agua de garbanzo; el frío lo espesa — preparar ligeramente más fluido de lo deseado\n\n**Mise en place** *(preparar el domingo)*\n- Pavo cocido y laminado o desmenuzado; especiado con za'atar, pimienta negra y ralladura de limón; refrigerado con su jugo\n- Pepino persa en láminas oblicuas (corte bias) — más superficie y presentación más elegante que rodaja recta; refrigerar en agua helada\n- Menta fresca lavada y seca en papel absorbente, refrigerada\n- IOB: claras cocidas listas, papaya en cubos\n\n**Elaboración**\n\n1. **ATM — Chapata:** Tostar por cara interna en plancha o comal hasta Maillard definido. Aplicar hummus sobre la cara caliente — el calor activa los aceites del tahini y el comino, potenciando el perfil libanés.\n2. **Pavo ATM:** Saltear brevemente en plancha con za'atar 1 min — solo para despertar los aromas herbales. No recocinar; solo atemperar y tostar levemente la superficie.\n3. **Construcción ATM:** Chapata abierta → espinaca baby (capa base, barrera de humedad) → hummus → pavo → pepino en láminas → menta fresca → sumac en polvo generoso encima. Expresar limón al momento.\n4. **IOB:** Tortilla tibia (comal seco, 20 seg por lado) → hummus → espinaca → pavo (50g) → pepino → claras desmenuzadas → menta + sumac + limón. Enrollar y sellar. Papaya aparte.\n5. **Sumac:** Aplicar siempre al final, fuera del calor — su acidez cítrica y color rojo ladrillo son volátiles; el calor los destruye.\n\n**Emplatado**\nATM: chapata abierta como tartine árabe en tabla de madera, pepino en cascada, menta en bouquet, línea de sumac en diagonal. IOB: wrap enrollado en ángulo, papaya en bowl pequeño con miel opcional.\n\n**Conservación**\nHummus light: 5 días refrigerado cubierto con film en contacto directo (evita la capa oscura por oxidación). Cubrir con hilo de AOVE y sumac para conservación aromática. Pavo: 4 días refrigerado.\n\n**Tip del chef**\nEl sumac auténtico tiene acidez natural de fruta — sustituir por polvo genérico resulta en producto sin carácter. Para verificar calidad: el sumac bueno tiñe los dedos de rojo y tiene aroma afrutado. Si no está disponible, preparar una mezcla de polvo de hibisco (1 parte) + ácido cítrico (0.3 partes) + sal (0.1 parte) como aproximación funcional al perfil ácido-frutal.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=wrap+pavo+hummus+sumac+pepino+menta+libanes) · [English version](https://www.youtube.com/results?search_query=lebanese-turkey-wrap+hummus+sumac+persian-cucumber)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+wrap+pavo+hummus+light+sumac+menta+libanes)\n\n---\n\n## 🍽️ Comida *(3 comensales — 3er comensal misma porción que ATM)*\n\n### Larb Gai Contemporáneo: Pollo Picado Finamente con Salsa de Lima, Chile de Árbol, Hierba Santa, Arroz Tostado y Cilantro\n\n**Tiempo:** prep 15 min · cocción 10 min | **Porciones:** 3 (ATM ×2 + IOB ×1)\n**Macros por porción — 🧔 ATM:** 840 kcal · P 58g · C 95g · G 26g\n**Macros por porción — 👤 IOB:** 510 kcal · P 41g · C 56g · G 14g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (×2) | 👤 IOB |\n|---|---|---|\n| Pechuga de pollo sous vide | 200g c/u → 400g total | 120g |\n| Arroz integral cocido | 200g c/u → 400g total | — |\n| Tortilla integral | — | 30g |\n| Salsa larb | 60g c/u → 120g total | 40g |\n| Aguacate fresco | — | 45g |\n| Pepino / zanahoria juliana | 100g c/u → 200g total | 100g |\n| Gelatina light | — | 240g |\n\n**Para la salsa larb (prep dominical — rinde para toda la semana):**\n- Jugo de lima 50ml · Fish sauce (nam pla) 20ml · Mirin o azúcar de palma 8g · Chile de árbol seco 2–3 piezas tostadas · Hierba santa fresca picada finamente 10g (o epazote como sustituto mexicano) · Cebolla cambray 2 piezas · Ajo 1 diente microplane\n\n**Para el arroz tostado (khao khua) — prep dominical:**\n- Arroz integral crudo 30g tostado en sartén seca a fuego medio hasta dorado profundo y aroma a nuez; moler en molcajete o molinillo a textura arena gruesa — NO procesar fino, el crujiente es esencial\n\n**Para el pollo sous vide (prep dominical):**\n- Pechuga entera sellada al vacío con sal, pimienta blanca y hoja de limoncillo (lemongrass) o ralladura de limón\n- Temperatura: 63°C / 90 minutos → textura sedosa, jugosa, cortable en láminas o deshebrable uniformemente\n\n**Mise en place** *(preparar el domingo)*\n- Pollo sous vide porcionado y refrigerado en su bolsa\n- Salsa larb en frasco, refrigerada — los sabores se integran con el reposo\n- Khao khua (arroz tostado molido) en frasco hermético; dura 2 semanas a temperatura ambiente\n- Pepino en medias lunas o juliana fina; zanahoria en juliana, blanqueada 30 seg para suavizar ligeramente sin perder crunch; refrigeradas por separado\n- Arroz integral recalentable en porciones individuales\n\n**Elaboración**\n\n1. **Picado del pollo:** El larb auténtico usa pollo picado a cuchillo (no molido), con granulometría irregular — trozos 3–5mm con algunos más finos. Usar cuchillo de chef con movimiento de balanceo. El pollo sous vide ya cocido: picar directamente frío, más fácil de controlar el corte.\n2. **Calentamiento express:** Saltear el pollo picado en wok o sartén a fuego alto, 1.5–2 min — solo atemperar y generar Maillard en algunos bordes. No sobrecocinar; el perfil del larb es entre tibio y temperatura ambiente.\n3. **Salsa larb:** Incorporar fuera del fuego. Mezclar pollo tibio + salsa + cebolla cambray en rodajas finas + hierba santa (o epazote) picado fino + chile de árbol tostado triturado. Ajustar acidez con lima adicional al gusto.\n4. **Khao khua:** Espolvorear arroz tostado molido sobre el pollo al momento de servir — nunca antes, pierde el crujiente que es la textura clave del platillo.\n5. **Arroz integral como base:** Recalentar porciones con 1 cda agua, tapado en microondas 1.5 min o al vapor. Servir como cama del larb.\n6. **IOB:** Misma preparación, porción reducida. Tortilla caliente como alternativa al arroz. Aguacate en láminas + gelatina light aparte.\n\n**Emplatado**\nBowl amplio: arroz integral como base blanca/marrón, larb gai en centro en montículo irregular (no apretado — debe verse aireado), juliana de pepino y zanahoria en lateral en manojo, hojas de cilantro sueltas encima, khao khua espolvoreado en nube, rodaja de lima para expresar al gusto. La temperatura del plato: tibio-ambiente, nunca caliente.\n\n**Conservación**\nLarb ya mezclado con salsa: consumir en 2h máximo — la acidez de la lima \"cocina\" adicionalmente el pollo y lo reseca. Pollo sous vide sin mezclar: 3 días refrigerado. Salsa larb sola: 5 días.\n\n**Tip del chef**\nLa hierba santa (Piper auritum) aporta un anís herbal muy particular en la versión mexicanizada de este larb — es más aromática que el epazote y se complementa perfectamente con la lima. Usar solo las hojas internas (no los tallos ni hojas externas que son más amargas). Si se usa entera como hoja para servir, actúa como plato comestible aromático — una presentación que eleva el platillo sin costo adicional.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=larb+gai+tailandes+pollo+picado+arroz+tostado+chile) · [English version](https://www.youtube.com/results?search_query=larb-gai-thai-chicken-salad+toasted-rice-powder)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+larb+gai+tailandes+pollo+lima+arroz+tostado)\n\n---\n\n## 🌿 Colación PM *(💃 salsa +100 kcal ambos)*\n\n### Shake de Proteína con Pan Integral, Mantequilla de Cacahuate y Jícama con Tajín\n\n**Tiempo:** prep 5 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM (+100 salsa):** 380 kcal · P 28g · C 45g · G 11g\n**Macros por porción — 👤 IOB (+100 salsa):** 270 kcal · P 18g · C 29g · G 7g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM (+100 salsa) | 👤 IOB (+100 salsa) |\n|---|---|---|\n| Proteína en polvo | 60g (2 scoops) | 30g (1 scoop) |\n| Pan integral | 30g | 30g |\n| Mantequilla de cacahuate | 16g | — |\n| Miel de agave | 7g | 7g |\n| Jícama bastones | 130g | 130g |\n| Manzana verde | — | 180g |\n\n**Mise en place** *(preparar el domingo)*\n- Jícama pelada en bastones 8×1cm, conservada en agua con limón y sal; refrigerada\n- IOB: manzana en gajos, limón para oxidación; refrigerada en bolsa zip\n\n**Elaboración**\n\n1. **Shake ATM e IOB:** Batir proteína en polvo con 250–300ml agua fría en shaker o licuadora baja velocidad 20 segundos. La versión de 2 scoops (ATM) queda más densa — añadir líquido hasta consistencia bebible cómodamente.\n2. **Tostada ATM:** Pan integral tostado hasta punto dorado profundo. Aplicar mantequilla de cacahuate en caliente sobre el pan — la temperatura abre la estructura porosa y la mantequilla penetra en lugar de quedar solo en superficie. Hilo de miel de agave al final.\n3. **IOB:** Pan integral tostado seco (sin mantequilla de cacahuate). Miel de agave en hilo fino. Pan como fuente de carbohidratos de digestión media.\n4. **Jícama:** Escurrir del agua de conservación, secar con papel. Tajín al gusto + limón exprimido al momento — nunca antes para no ablandar la textura crujiente.\n5. **IOB — Manzana:** Gajos frescos con limón + tajín opcional.\n\n**Emplatado**\nVaso de shake + tostada en tabla pequeña + jícama en vasito o conito de papel. Presentación de snack energético pre-actividad física. IOB: shake + pan en bolsa de transporte + fruta en contenedor.\n\n**Conservación**\nConsumir shake inmediatamente post-preparación. Jícama en agua: hasta 5 días refrigerada. No aplicar tajín o limón hasta el momento de consumo.\n\n**Tip del chef**\nLa mantequilla de cacahuate de calidad (solo cacahuate + sal, sin azúcar añadida ni aceite hidrogenado) se separa al refrigerar. Conservar a temperatura ambiente, boca abajo 12h antes de usar para redistribuir el aceite natural — esto facilita el untado uniforme y evita el \"fondo seco\" que se endurece. La miel de agave de agave azul tiene índice glucémico más bajo que la miel de abeja y activa con el calor del pan, fluyendo con mejor cobertura.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteina+pre+actividad+tostada+cacahuate+jicama) · [English version](https://www.youtube.com/results?search_query=pre-workout-protein-shake+peanut-butter-toast+jicama)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+colacion+pre+actividad+shake+proteina+pan+integral+mantequilla+cacahuate)\n\n---\n\n## 🌙 Cena\n\n### Gravlax Nórdico Reconstituido: Salmón Curado en Dill-Remolacha, Pasta Integral con Crema de Rábano Picante, Espárragos Encurtidos y Pepino en Vinagreta de Eneldo\n\n**Tiempo:** prep 15 min (+ curado overnight si es gravlax real) · ensamble 10 min | **Porciones:** 2 (ATM y IOB)\n**Macros por porción — 🧔 ATM:** 700 kcal · P 48g · C 79g · G 21g\n**Macros por porción — 👤 IOB:** 425 kcal · P 34g · C 47g · G 12g\n\n**Ingredientes**\n\n| Ingrediente | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| Salmón confitado-marinado | 250g | 120g |\n| Pasta integral cocida | 150g | 75g |\n| Crema rábano-eneldo | 40g | 25g |\n| Espárragos | 134g | 134g |\n| Pepino en vinagreta | 80g | 80g |\n| Cebolla morada | 30g | — |\n| Gelatina light | 480ml | 480ml |\n\n**Para el salmón curado estilo gravlax (prep dominical — curado 24–36h):**\n- Filete entero con piel, sin espinas · Sal gruesa 40g + azúcar mascabado 20g + jugo de remolacha 60ml + eneldo fresco picado 20g + ralladura de limón + pimienta blanca molida\n- Cubrir el filete por ambas caras, envolver en film apretado, pesar con tabla + peso 1kg; refrigerar 24–36h; el curado \"cocina\" químicamente el salmón — textura firme, translúcida, no cruda\n- Limpiar la mezcla de curado antes de servir, no enjuagar\n\n**Para la crema de rábano picante y eneldo (prep dominical):**\n- Yogur griego 0% 100g · Rábano picante rallado fresco (o preparado en frasco) 15g · Eneldo fresco picado 10g · Jugo de limón 8ml · Sal + pimienta blanca\n- Mezclar y refrigerar tapado — mejora a las 24h\n\n**Para el pepino en vinagreta nórdica (prep dominical):**\n- Pepino en láminas mandolina 1mm · Vinagre de arroz 30ml · Agua 20ml · Azúcar 5g · Sal 3g · Eneldo seco 1g\n- Calentar la base de vinagre hasta disolver; enfriar; sumergir pepino mínimo 2h; conservar hasta 4 días\n\n**Para los espárragos encurtidos rápidos (prep dominical):**\n- Espárragos blanqueados 2.5 min + choque de hielo · Sumergir en vinagreta de eneldo junto con el pepino; absorben el perfil ácido-herbal en 4h\n\n**Mise en place** *(preparar el domingo)*\n- Gravlax en curado desde el domingo — listo para el jueves con 36h de curado\n- Crema de rábano-eneldo lista y reposada\n- Pepino y espárragos en vinagreta nórdica\n- Pasta integral cocida al dente, aceitada, refrigerada\n- Cebolla morada en encurtido rápido (limón + sal + orégano)\n\n**Elaboración**\n\n1. **Salmón gravlax:** Retirar del film, limpiar el exceso de curado con espátula (no enjuagar — el perfil de sabor está en la superficie). Rebanar en láminas delgadas (3–4mm) con cuchillo de filete muy afil
