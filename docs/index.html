const TRACKING = {"weekly": [], "weight_history": [], "today": {"date": "2026-06-05", "meals": [], "totals": {"calories": 0, "protein_g": 0, "carbs_g": 0, "fat_g": 0}, "goals": null}};
const DAYS     = [{"key": "lunes", "short": "Lun", "name": "# 🗓️ LUNES", "menu": "# 🗓️ LUNES 08 DE JUNIO — 🏋️ Gym ATM (+150 kcal)\n*Gastronomía: Japonesa · Mexicana · Mediterránea*\n\n---\n\n### 🌅 Desayuno 🏪 🇯🇵\n**Overnight Oat de Matcha y Proteína con Pera Anjou, Nuez de Castilla y Miso Dulce**\n*Avena remojada overnight en leche de avena con matcha ceremonial, proteína de vainilla, pera madura laminada y nueces tostadas; terminada con un velo de miso blanco y miel de agave*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 610 · 61g · 54g · 20g | 197 · 25g · 18g · 2g |\n| Proteína en polvo | 60g (2 porciones) | 30g (1 porción) |\n| Avena cruda 🏪 | 50g | — |\n| Nuez de Castilla | 20g | — |\n| Pera Anjou | 100g | — |\n| Matcha en polvo | 4g | 2g |\n| Leche de avena | 150ml | 80ml |\n| Plátano maduro | — | 120g |\n| Miso blanco (toque) | 5g | — |\n\n> 👤 IOB: smoothie frío con proteína, plátano, matcha y agua; sin avena ni nueces\n\n---\n\n### 🍎 Colación AM 🏪 🇲🇽\n**Sándwich Abierto de Pavo Confitado sobre Chapata Integral: Tzatziki, Espinacas Baby y Encurtido de Hibisco**\n*Pavo en láminas sobre chapata tostada, cama de espinacas frescas, tzatziki casero, cebolla encurtida en hibisco y jícama en bastones con tajín*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 764 · 72g · 82g · 17g | 347 · 34g · 28g · 10g |\n| Chapata integral 🏪 | 80g | — |\n| Pan integral tostado | — | 30g |\n| Pechuga de pavo 🏪 | 200g | 50g |\n| Espinaca cruda | 30g | 30g |\n| Tzatziki 🏪 | 40g | 30g |\n| Cebolla encurtida 🏪 | 20g | 20g |\n| Jícama fresca | 130g | 130g |\n| Manzana verde | 180g | — |\n| Papaya | — | 200g |\n| Miel de agave | — | 7g |\n\n> 👤 IOB: tostada integral con pavo, tzatziki y espinacas; fruta por separado\n\n---\n\n### 🍽️ Comida *(solo ATM e IOB — 2 comensales)* 🏪 🇲🇽\n**Tostadas de Pollo Confitado en Salsa Verde: Frijoles Negros Refritos, Aguacate, Queso Cotija y Pepino Encurtido**\n*Pollo confitado deshebrado sobre tostada de maíz azul, base de frijoles refritos, salsa verde tomatillo asada, aguacate cremoso, pepino marinado y queso cotija desmoronado*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 582 · 62g · 42g · 17g | 382 · 29g · 17g · 16g |\n| Pollo confitado 🏪 | 200g | 120g |\n| Tostada de maíz azul | 2 piezas (40g) | 1 pieza (20g) |\n| Frijoles negros 🏪 | 80g | 40g |\n| Aguacate fresco | 45g | 45g |\n| Salsa verde 🏪 | 60ml | 60ml |\n| Pepino encurtido 🏪 | 30g | 30g |\n| Queso cotija | 15g | 10g |\n| Gelatina light | — | 240ml |\n\n---\n\n### 🌿 Colación PM *(pre-entreno — +150 kcal ATM)* 🏪\n**Power Bowl Proteico: Shake de Vainilla con Pan Integral, Mantequilla de Cacahuate y Jícama — Boost de Plátano para Gym**\n*Batido de proteína con leche de avena, banana, mantequilla de cacahuate y toque de canela; pan integral tostado con miel de agave; jícama fresca*\n\n| | 🧔 ATM (+gym) | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 637 · 56g · 55g · 15g | 271 · 30g · 41g · 2g |\n| Proteína en polvo | 60g (2 porciones) | 30g (1 porción) |\n| Pan integral | 30g | — |\n| Mantequilla de cacahuate | 16g | — |\n| Miel de agave | 7g | — |\n| Plátano (boost gym) | 60g | — |\n| Jícama fresca | 130g | 130g |\n| Manzana verde | — | 180g |\n\n> 🧔 ATM: +60g plátano = +150 kcal actividad gym\n\n---\n\n### 🌙 Cena 🏪 🇯🇵\n**Salmón al Vapor con Dashi Ligero: Farro Perlado con Sésamo, Espárragos Glaseados y Cebollín**\n*Salmón confitado en aceite de oliva servido sobre farro perlado cocido con dashi y sésamo negro, espárragos glaseados en tamari, gota de aceite de sésamo y cebollín*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 787 · 63g · 50g · 34g | 355 · 27g · 55g · 9g |\n| Salmón cocido 🏪 | 250g | 120g |\n| Farro perlado 🏪 | 150g (cocido) | 75g (cocido) |\n| Espárragos 🏪 | 134g | 134g |\n| Dashi ligero 🏪 | 80ml | 60ml |\n| Aceite de sésamo | 8ml | 4ml |\n| Tamari bajo sodio | 10ml | 10ml |\n| Cebollín fresco | al gusto | al gusto |\n| Gelatina light | 480ml | 480ml |\n\n---\n\n### 📊 Totales Lunes 08/06\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Calorías** | **3,380** | **1,352** |\n| **Proteína** | **314g** | **145g** *(nota: IOB supera meta en proteína — carbohidratos ajustados a la baja)* |\n| **Carbs** | **283g** | **159g** |\n| **Grasa** | **103g** | **39g** |\n\n---", "recipes": "## 📅 LUNES 08 DE JUNIO\n\n---\n\n### Overnight Oat de Matcha y Proteína con Pera Anjou, Nuez de Castilla y Miso Dulce\n\n**Tiempo:** prep 8 min · reposo overnight | **Porciones:** ATM (2 scoops) + IOB (1 scoop) por separado\n**Macros ATM por porción:** 610 kcal · P 61g · C 54g · G 20g\n**Macros IOB (smoothie):** 197 kcal · P 25g · C 18g · G 2g\n\n**Ingredientes — ATM**\n- Avena cruda en hojuelas grandes: 50g\n- Proteína en polvo vainilla: 60g (2 scoops)\n- Leche de avena: 150ml\n- Pera Anjou madura: 100g\n- Nuez de Castilla: 20g\n- Matcha ceremonial en polvo: 4g\n- Miso blanco shiro: 5g\n- Miel de agave: al gusto para el miso glaze\n\n**Ingredientes — IOB (smoothie)**\n- Proteína en polvo vainilla: 30g (1 scoop)\n- Plátano maduro: 120g\n- Matcha ceremonial: 2g\n- Agua fría: 200ml\n\n**Mise en place** *(domingo)*\n- Mezclar avena + leche de avena + proteína + matcha en frasco hermético → refrigerar mínimo 6h\n- Tostar nuez en sartén seca a fuego medio hasta fragante → reservar a temperatura ambiente\n- Preparar miso glaze: miso blanco + 5ml miel de agave + 3ml agua caliente → emulsionar hasta consistencia de jarabe → frasco pequeño refrigerado\n\n**Elaboración**\n1. Al servir, sacar frasco del refrigerador. Consistencia debe ser espesa pero vertible — si está muy densa, aflojar con 20–30ml leche de avena fría.\n2. Laminar pera en medallones de 3mm con mandolina o cuchillo de chef en ángulo de 45°; no oxidar (servir inmediato).\n3. Disponer capas: oat base → pera laminada en abanico → nuez partida gruesa → hilo de miso glaze en zigzag.\n4. **IOB:** licuar proteína + plátano + matcha + agua con hielo 45 seg a velocidad alta hasta textura homogénea. Servir inmediato.\n\n**Emplatado**\nFrasco de vidrio o bowl bajo: oat en base, pera en abanico central, nuez rústica a un lado, miso glaze en hilo fino diagonal. Polvo ligero de matcha sobre todo al final con tamiz fino.\n\n**Conservación**\nOat preparado: hasta 3 días refrigerado en frasco sellado. El miso glaze: hasta 7 días refrigerado.\n\n**Tip del chef**\nEl miso blanco en frío tiene dulzor umami que amplifica la percepción del matcha — no sustituir con miso rojo (amargaría). Si el matcha forma grumos al mezclar en frío, disolverlo primero en 10ml de agua a 70°C (nunca hirviendo) antes de incorporar a la leche.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=overnight+oat+matcha+proteina) · [English version](https://www.youtube.com/results?search_query=matcha+protein+overnight+oats)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+overnight+oat+matcha+miso)\n\n---\n\n### Sándwich Abierto de Pavo Confitado sobre Chapata Integral: Tzatziki, Espinacas Baby y Encurtido de Hibisco\n\n**Tiempo:** prep 5 min · ensamble 3 min | **Porciones:** ATM (200g pavo) + IOB (50g pavo)\n**Macros ATM:** 764 kcal · P 72g · C 82g · G 17g\n**Macros IOB:** 347 kcal · P 34g · C 28g · G 10g\n\n**Ingredientes — ATM**\n- Chapata integral: 80g\n- Pechuga de pavo confitada (prep dominical): 200g, rebanada en láminas de 5mm\n- Espinaca baby: 30g\n- Tzatziki (prep dominical): 40g\n- Cebolla morada encurtida en hibisco (prep dominical): 20g\n- Jícama fresca: 130g, en bastones\n- Manzana verde: 180g\n\n**Ingredientes — IOB**\n- Pan integral tostado: 30g\n- Pechuga de pavo confitada: 50g\n- Espinaca baby: 30g\n- Tzatziki: 30g\n- Cebolla encurtida: 20g\n- Papaya: 200g\n- Miel de agave: 7g\n\n**Mise en place** *(domingo)*\n- Pavo confitado en láminas: ya listo, solo rebanar al momento\n- Tzatziki: listo en frasco\n- Cebolla encurtida en hibisco: lista en frasco\n- Jícama pelada y en bastones: bag hermética con papel húmedo → 5 días\n\n**Elaboración**\n1. Tostar chapata bajo el broiler 2–3 min hasta corteza crujiente sin resecar el interior — debe ceder al morder con resistencia.\n2. Calentar pavo en sartén antiadherente a fuego medio-alto 90 seg por lado o en microondas cubierto con papel húmedo 60 seg — temperatura interna mínima 65°C.\n3. Untar tzatziki directamente sobre la chapata caliente como base aislante (evita que el pan se empape).\n4. Disponer espinacas frescas sobre el tzatziki → láminas de pavo superpuestas en escalonado → cebolla encurtida bien escurrida encima.\n5. Jícama: servir por separado con limón y tajín.\n\n**Emplatado**\nChapata en tabla de madera o plato alargado; ingredientes visibles en capas escalonadas. Bastones de jícama en bundle lateral con cuña de limón.\n\n**Conservación**\nEnsamblar al momento — no construir la víspera. Todos los componentes duran 4–5 días por separado.\n\n**Tip del chef**\nEl encurtido de hibisco tiñe ligeramente el tzatziki si se mezclan — colocar la cebolla como toque final para mantener el contraste visual magenta/blanco.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=sandwich+abierto+pavo+tzatziki+chapata) · [English version](https://www.youtube.com/results?search_query=open+face+turkey+sandwich+tzatziki)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+sandwich+abierto+pavo+confitado+tzatziki)\n\n---\n\n### Tostadas de Pollo Confitado en Salsa Verde: Frijoles Negros Refritos, Aguacate, Queso Cotija y Pepino Encurtido\n\n**Tiempo:** prep 5 min · ensamble 8 min | **Porciones:** 2 comensales\n**Macros ATM:** 582 kcal · P 62g · C 42g · G 17g\n**Macros IOB:** 382 kcal · P 29g · C 17g · G 16g\n\n**Ingredientes — ATM**\n- Pollo confitado deshebrado (prep dominical): 200g\n- Tostadas de maíz azul: 2 piezas (40g)\n- Frijoles negros refritos (prep dominical): 80g\n- Aguacate fresco: 45g\n- Salsa verde tomatillo asada (prep dominical): 60ml\n- Pepino encurtido en sésamo-soya (prep dominical): 30g\n- Queso cotija: 15g\n\n**Ingredientes — IOB**\n- Pollo confitado: 120g\n- Tostada de maíz azul: 1 pieza (20g)\n- Frijoles negros: 40g\n- Aguacate: 45g\n- Salsa verde: 60ml\n- Pepino encurtido: 30g\n- Queso cotija: 10g\n- Gelatina light: 240ml\n\n**Mise en place** *(domingo)*\n- Pollo confitado deshebrado: bolsa hermética, listo\n- Frijoles refritos: caja hermética\n- Salsa verde asada: frasco\n- Pepino encurtido: frasco\n\n**Elaboración**\n1. Calentar frijoles en sartén a fuego medio con 15ml del caldo de cocción o agua — deben quedar untables pero sin líquido visible; si están muy secos, los frijoles se despegarán de la tostada y la romperán.\n2. Calentar pollo deshebrado en sartén con 30ml de salsa verde a fuego alto 2–3 min hasta que la salsa reduzca y glasee el pollo — debe quedar húmedo, no caldoso.\n3. Calentar tostadas en sartén seca 30 seg por lado para restaurar el crujido (refrigeración las ablanda).\n4. Construir: frijoles como cama aislante → pollo glaseado → aguacate aplastado con sal y limón (no guacamole liso) → pepino encurtido bien escurrido → queso cotija desmoronado → hilo de salsa verde.\n\n**Emplatado**\nDos tostadas en plato plano ligeramente superpuestas; ingredientes en capas visibles y texturalmente contrastantes. Gota de salsa verde al lado del plato para mojar.\n\n**Conservación**\nConstruir al momento. Componentes por separado: 4 días refrigerados.\n\n**Tip del chef**\nLa tostada de maíz azul es más friable que la blanca — el frijol como primera capa actúa como mortero que distribuye la presión al morder y evita que se quiebre en la primera mordida.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=tostadas+pollo+confitado+salsa+verde+frijoles) · [English version](https://www.youtube.com/results?search_query=chicken+tostadas+salsa+verde+black+beans)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+tostadas+pollo+confitado+salsa+verde)\n\n---\n\n### Power Bowl Proteico: Shake de Vainilla con Pan Integral, Mantequilla de Cacahuate y Jícama — Boost de Plátano para Gym\n\n**Tiempo:** prep 5 min | **Porciones:** ATM (+gym) + IOB por separado\n**Macros ATM (+gym):** 637 kcal · P 56g · C 55g · G 15g\n**Macros IOB:** 271 kcal · P 30g · C 41g · G 2g\n\n**Ingredientes — ATM**\n- Proteína en polvo vainilla: 60g (2 scoops)\n- Leche de avena: 300ml\n- Mantequilla de cacahuate natural: 16g\n- Miel de agave: 7g\n- Plátano maduro (boost gym): 60g\n- Pan integral: 30g\n- Jícama fresca: 130g\n\n**Ingredientes — IOB**\n- Proteína en polvo vainilla: 30g (1 scoop)\n- Agua fría: 300ml\n- Jícama fresca: 130g\n- Manzana verde: 180g\n\n**Mise en place** *(domingo)*\n- Jícama en bastones: bag hermética\n- Pan integral rebanado: listo\n\n**Elaboración**\n1. **ATM:** Licuar proteína + leche de avena + mantequilla de cacahuate + miel + plátano + 4–5 cubos de hielo a velocidad alta 30 seg. Consistencia debe ser cremosa y homogénea sin grumos de cacahuate. Tostar pan integral.\n2. **IOB:** Agitar proteína en shaker con agua fría 20 seg. Servir jícama con limón y tajín; manzana en gajos.\n3. Servir shake inmediatamente — la oxidación del plátano cambia color y sabor en 10 min.\n\n**Emplatado**\nVaso alto con shake; pan tostado y jícama en bowl pequeño lateral.\n\n**Tip del chef**\nCongelar el plátano en porciones de 60g desde el domingo — el plátano congelado en el shake elimina la necesidad de hielo extra y aporta textura más cremosa (las células rotas por congelación liberan más almidón).\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=shake+proteico+mantequilla+cacahuate+platano+preentrenamiento) · [English version](https://www.youtube.com/results?search_query=pre+workout+protein+shake+peanut+butter+banana)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteico+preentrenamiento+mantequilla+cacahuate)\n\n---\n\n### Salmón al Vapor con Dashi Ligero: Farro Perlado con Sésamo, Espárragos Glaseados y Cebollín\n\n**Tiempo:** prep 5 min · cocción 12 min | **Porciones:** 2 comensales\n**Macros ATM:** 787 kcal · P 63g · C 50g · G 34g\n**Macros IOB:** 355 kcal · P 27g · C 55g · G 9g\n\n**Ingredientes — ATM**\n- Salmón cocido al vapor (prep dominical): 250g\n- Farro perlado cocido (prep dominical): 150g\n- Espárragos frescos: 134g\n- Dashi ligero (prep dominical): 80ml\n- Aceite de sésamo tostado: 8ml\n- Tamari bajo sodio: 10ml\n- Cebollín fresco: al gusto\n- Gelatina light: 480ml\n\n**Ingredientes — IOB**\n- Salmón cocido: 120g\n- Farro perlado cocido: 75g\n- Espárragos: 134g\n- Dashi ligero: 60ml\n- Aceite de sésamo: 4ml\n- Tamari bajo sodio: 10ml\n- Gelatina light: 480ml\n\n**Mise en place** *(domingo)*\n- Salmón cocido al vapor: porciones individuales en papel encerado, caja hermética\n- Farro perlado cocido: caja hermética con 30ml del agua de cocción para mantener humedad\n- Dashi: frasco en refrigerador\n\n**Elaboración**\n1. Calentar dashi en sartén pequeña a fuego medio hasta 80°C (no hervir — los aromas del kombu y bonito se volatilizan sobre 90°C).\n2. **Espárragos:** Cortar tallos fibrosos (doblar y romper naturalmente). Saltear en sartén muy caliente con 5ml aceite vegetal 2 min — deben quedar verde brillante y con bite. Glasear con tamari + 5ml de dashi en los últimos 30 seg a fuego alto.\n3. Calentar farro con 20ml de dashi caliente en sartén, 2 min a fuego medio, removiendo para que absorba. Incorporar aceite de sésamo fuera del fuego — el calor residual activa los aromas sin quemarlo.\n4. Calentar salmón: colocar en sartén antiadherente cubierto con tapa 3–4 min a fuego muy bajo, o en microondas 45 seg cubierto con papel húmedo. Debe quedar tibio al centro, no recocido.\n5. Construir bowl: farro base → espárragos cruzados → salmón en trozo o desmenuzado → verter dashi caliente al borde → aceite de sésamo extra en hilo → cebollín en corte diagonal fino.\n\n**Emplatado**\nBowl profundo: farro en base, espárragos en haz cruzado, salmón en trozo sobre el farro. Dashi vertido al frente para que el vapor sea visible al servir. Cebollín en corte sesgo fino y semillas de sésamo negro opcionales.\n\n**Conservación**\nSalmón ya cocido: 3 días refrigerado. Farro: 5 días. Dashi: 5 días.\n\n**Tip del chef**\nEl farro absorbe líquido al reposar — si recalentado está muy denso, el golpe de dashi caliente lo suelta en 60 seg sin necesidad de agua que diluiría el sabor. No usar microondas para el farro: la presión seca y compacta el grano.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=salmon+vapor+dashi+farro+esparragos+japonesa) · [English version](https://www.youtube.com/results?search_query=steamed+salmon+dashi+broth+farro+asparagus)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+salmon+dashi+farro+sesamo)\n\n---"}, {"key": "martes", "short": "Mar", "name": "# 🗓️ MARTES", "menu": "# 🗓️ MARTES 09 DE JUNIO — 💃 Salsa (+100 kcal ambos) · 3er comensal en comida\n*Gastronomía: Peruana · Mediterránea · Árabe*\n\n---\n\n### 🌅 Desayuno 🏪 🇵🇪\n**Smoothie Proteico de Maracuyá y Mango con Avena, Semillas de Chía y Toque de Cúrcuma**\n*Batido dorado tropical con proteína de vainilla, maracuyá fresco, mango congelado, avena cruda remojada, semillas de chía y ralladura de limón amarillo*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 610 · 61g · 54g · 20g | 197 · 25g · 18g · 2g |\n| Proteína en polvo | 60g | 30g |\n| Avena cruda 🏪 | 50g | — |\n| Mango congelado | 80g | — |\n| Maracuyá | 50g | 50g |\n| Semillas de chía | 10g | — |\n| Nuez de Castilla | 15g | — |\n| Plátano | — | 120g |\n\n> 👤 IOB: smoothie simple con proteína, plátano y maracuyá en agua; sin avena\n\n---\n\n### 🍎 Colación AM 🏪 🇦🇷\n**Brioche Integral Tostado con Claras Revueltas, Pavo en Láminas, Espinacas Salteadas y Salsa Chermoula**\n*Tostada gruesa de pan brioche integral, claras de hue  | — |\n| Manzana verde | 130g | 180g |\n| Jícama | 130g | 130g |\n| Cacao en polvo s/azúcar | 10g | 8g |\n\n> 🧔 ATM +100 kcal: +1/2 manzana extra (65g ≈ +34 kcal) + 15g nuez (≈ +98 kcal) ≈ +132 aprox\n> 👤 IOB +100 kcal: +1 taza jícama extra (130g ≈ +50 kcal) + manzana completa vs media ≈ +100 kcal\n\n---\n\n### 🌙 Cena 🏪 🇲🇪\n**Tajín de Res Especiado: Filete con Ras el Hanout, Lentejas Negras, Camote Asado, Betabel y Chermoula Verde**\n*Filete de res sous vide calentado sobre cama de lentejas negras al laurel, gajos de camote asado y betabel, chermoula de cilantro-perejil y comino; acabado con sumac*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 787 · 63g · 50g · 34g | 355 · 27g · 55g · 9g |\n| Filete de res 🏪 | 250g | 120g |\n| Lentejas negras 🏪 | 150g cocidas | 100g cocidas |\n| Camote asado 🏪 | 100g | 80g |\n| Betabel asado 🏪 | 60g | 60g |\n| Chermoula 🏪 | 40g | 30g |\n| Aceite de oliva | 10ml | 5ml |\n| Sumac | 3g | 3g |\n| Gelatina light | 480ml | 480ml |\n\n---\n\n### 📊 Totales Martes 09/06\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Calorías** | **3,330** | **1,372** |\n| **Proteína** | **314g** | **115g** |\n| **Carbs** | **277g** | **169g** |\n| **Grasa** | **102g** | **42g** |\n\n---", "recipes": "## 📅 MARTES 09 DE JUNIO\n\n---\n\n### Smoothie Proteico de Maracuyá y Mango con Avena, Semillas de Chía y Toque de Cúrcuma\n\n**Tiempo:** prep 8 min (ATM avena remojada overnight) | **Porciones:** ATM + IOB por separado\n**Macros ATM:** 610 kcal · P 61g · C 54g · G 20g\n**Macros IOB:** 197 kcal · P 25g · C 18g · G 2g\n\n**Ingredientes — ATM**\n- Proteína en polvo vainilla: 60g (2 scoops)\n- Avena cruda en hojuelas: 50g (remojada overnight en 100ml agua)\n- Mango congelado: 80g\n- Maracuyá fresco: 50g (pulpa con semillas coladas)\n- Semillas de chía: 10g\n- Nuez de Castilla: 15g\n- Cúrcuma fresca o en polvo: 2g\n- Leche de avena: 150ml\n\n**Ingredientes — IOB**\n- Proteína en polvo vainilla: 30g\n- Plátano: 120g\n- Maracuyá: 50g (pulpa colada)\n- Agua fría: 200ml\n\n**Mise en place** *(domingo)*\n- Avena remojada en agua la noche anterior → frasco tapado en refrigerador\n- Mango congelado en bolsa porciones de 80g\n- Maracuyá: colar pulpa, descartar semillas; conservar en frasco\n\n**Elaboración**\n1. **ATM:** Licuar avena remojada + leche de avena + proteína + mango congelado + maracuyá colada + cúrcuma + hielo 60 seg velocidad alta. La avena remojada se licúa completamente sin textura arenosa. Añadir chía y nuez partida al vaso (no licuar — aportan textura).\n2. Verificar consistencia: debe ser espesa pero bebible en straw ancha. Ajustar con leche de avena en incrementos de 20ml.\n3. **IOB:** Licuar proteína + plátano + maracuyá colada + agua + hielo 30 seg. Servir inmediato.\n\n**Emplatado**\nVaso alto o mason jar. Verter smoothie base, coronar con semillas de chía secas en patrón, nuez partida gruesa en el borde. Ralladura de limón amarillo encima para el aroma.\n\n**Conservación**\nConsumir dentro de los 20 min de preparación — la chía absorbe líquido y cambia la textura.\n\n**Tip del chef**\nLa cúrcuma fresca (no en polvo) aporta un tono dorado más vivo y sabor menos amargo. Rallar 3–4g sobre la mezcla antes de licuar. Siempre combinar con pimienta negra (1 vuelta de molino) — la piperina aumenta la biodisponibilidad de la curcumina hasta 2000%.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=smoothie+proteico+maracuya+mango+curcuma) · [English version](https://www.youtube.com/results?search_query=passion+fruit+mango+protein+smoothie+turmeric)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+smoothie+proteico+maracuya+mango+curcuma)\n\n---\n\n### Brioche Integral Tostado con Claras Revueltas, Pavo en Láminas, Espinacas Salteadas y Salsa Chermoula\n\n**Tiempo:** prep 5 min · cocción 8 min | **Porciones:** ATM + IOB por separado\n**Macros ATM:** 764 kcal · P 72g · C 82g · G 17g\n**Macros IOB:** 347 kcal · P 34g · C 28g · G 10g\n\n**Ingredientes — ATM**\n- Chapata integral: 80g\n- Pechuga de pavo confitada: 200g, en láminas\n- Espinaca baby: 30g\n- Chermoula verde (prep dominical): 25g\n- Jícama: 130g\n- Manzana verde: 180g\n\n**Ingredientes — IOB**\n- Pan integral: 30g\n- Claras de huevo frescas: 3 claras (99g)\n- Pechuga de pavo confitada: 50g\n- Espinaca baby: 30g\n- Chermoula: 20g\n- Papaya: 200g\n- Miel de agave: 7g\n\n**Mise en place** *(domingo)*\n- Pavo confitado laminado: listo en caja hermética\n- Chermoula: frasco listo\n\n**Elaboración**\n1. Tostar chapata/pan bajo broiler — chapata necesita 3–4 min para que la corteza quiebre; pan integral 2 min lado.\n2. **IOB — claras revueltas:** Sartén antiadherente a fuego medio-bajo, rocío de aceite. Verter claras sin batir en exceso — revolver con espátula de silicón en movimientos lentos y amplios. Retirar a 70°C (todavía húmedas — el calor residual de la sartén termina la cocción). Las claras sobrecocidas se vuelven gomosas y exudan agua.\n3. Marchitar espinacas en la misma sartén 30 seg con el calor residual — no necesita aceite adicional.\n4. Calentar pavo 60 seg en sartén a fuego alto.\n5. Untar chermoula sobre tostada → espinacas → pavo (ATM) o claras + pavo (IOB) → hilo adicional de chermoula encima.\n\n**Emplatado**\nTostada en tabla. Capa de chermoula visible en los bordes como marco verde. Fruta en cuenco pequeño aparte.\n\n**Tip del chef**\nLa chermoula tiene ajo y limón que con el calor se vuelven astringentes — aplicarla sobre el pan ya fuera del fuego, nunca saltear con ella. En ATM, el pavo caliente sobre la chermoula fría crea un contraste aromático que abre el apetito.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=tostada+integral+pavo+chermoula+espinacas) · [English version](https://www.youtube.com/results?search_query=turkey+toast+chermoula+scrambled+eggs)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+tostada+pavo+chermoula+espinacas)\n\n---\n\n### Lomo Saltado Ligero Deconstruido: Filete de Res con Jitomate Cherry, Cebolla Morada, Arroz Jazmín al Cilantro y Camote Dorado\n\n**Tiempo:** prep 5 min · cocción 10 min | **Porciones:** 3 comensales (ATM + IOB + 3er comensal)\n**Macros ATM:** 582 kcal · P 62g · C 42g · G 17g\n**Macros IOB:** 382 kcal · P 29g · C 17g · G 16g\n\n**Ingredientes — ATM (y 3er comensal igual porción)**\n- Filete de res sous vide (prep dominical): 200g\n- Arroz jazmín con kaffir-jengibre cocido: 200g\n- Camote asado (prep dominical): 80g\n- Jitomate cherry: 80g, partidos a la mitad\n- Cebolla morada encurtida en hibisco: 30g\n- Salsa de soya bajo sodio: 15ml\n- Pasta de ají amarillo: 10g\n\n**Ingredientes — IOB**\n- Filete de res sous vide: 120g\n- Camote asado: 80g\n- Jitomate cherry: 80g\n- Cebolla encurtida: 30g\n- Aguacate fresco: 45g\n- Tortilla integral: 30g\n- Salsa de soya: 10ml\n- Ají amarillo: 10g\n- Gelatina light: 240ml\n\n**Mise en place** *(domingo)*\n- Filete sous vide en bolsa sellada: listo, solo calentar\n- Arroz jazmín cocido: caja con 20ml agua para recalentar\n- Camote asado: caja hermética\n\n**Elaboración**\n1. **Filete:** Sacar de la bolsa sous vide. Secar completamente con papel absorbente — la humedad superficial impide la reacción de Maillard. Sartén de hierro o acero inoxidable a fuego máximo hasta que humee. Sellar 90 seg por lado para una costra profunda — ya viene cocido a 57°C, solo necesita corteza. Reposar 2 min; rebanar contra la fibra en ángulo de 45°.\n2. En la misma sartén caliente, saltear jitomates cherry 2 min hasta que ampollen sin desmoronarse. Agregar ají amarillo y soya → reducir 30 seg a fuego alto. Incorporar cebolla encurtida escurrida al final, solo para integrar temperatura.\n3. Calentar arroz con 20ml agua tapado en microondas 90 seg, o en sartén con agua y tapa 3 min. Incorporar cilantro picado fresco al servir.\n4. Calentar camote en sartén con rocío de aceite 2–3 min hasta que los bordes doren.\n5. **IOB:** Misma técnica de sello para el filete. Servir con camote, jitomates salteados, aguacate en láminas y tortilla integral calentada en comal.\n\n**Emplatado**\nPlato amplio: arroz en molde circular (ATM), filete en abanico sobre arroz, salteado de jitomate-cebolla encima del filete, camote en cuña al lado. La cebolla encurtida en hibisco aporta el color magenta que define el plato visualmente.\n\n**Conservación**\nEl filete ya sellado: consumir el día. Los demás componentes: 4 días.\n\n**Tip del chef**\nEl sous vide lleva el filete exactamente a 57°C (medio) — sellar en sartén ardiente máximo 90 seg por lado. Superar 3 min de sello eleva la temperatura interna más allá del punto deseado y pierde toda la ventaja del sous vide.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube](https://www.youtube.com/results?search_query=lomo+saltado+ligero+filete+sous+vide+deconstruido) · [English version](https://www.youtube.com/results?search_query=lomo+saltado+deconstructed+sous+vide+beef)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+lomo+saltado+ligero+deconstruido)\n\n---\n\n### Shake de Proteína de Chocolate con Mantequilla de Cacahuate, Pan Integral y Manzana Verde Crujiente\n\n**Tiempo:** prep 5 min | **Porciones:** ATM (+salsa) + IOB (+salsa)\n**Macros ATM (+salsa):** 587 kcal · P 56g · C 49g · G 15g\n**Macros IOB (+salsa):** 371 kcal · P 30g · C 51g · G 5g\n\n**Ingredientes — ATM**\n- Proteína en polvo chocolate o vainilla: 60g\n- Leche de avena: 300ml\n- Cacao en polvo\n\n---\n\n# 🍽️ TARJETAS DE RECETA SEMANAL\n\n---"}, {"key": "miercoles", "short": "Mié", "name": "# 🗓️ MIÉRCOLES", "menu": "# 🗓️ MIÉRCOLES 10 DE JUNIO — 🏋️ Gym ATM (+150 kcal) · 3er comensal en comida\n*Gastronomía: Japonesa · Francesa · Mexicana*\n\n---\n\n### 🌅 Desayuno 🏪 🇫🇷\n**Parfait Proteico à la Française: Yogurt Griego con Proteína de Vainilla, Granola de Avena, Compota de Fresas y Almendras Laminadas**\n*Capas alternas de yogurt griego mezclado con prot | Aguacate fresco | — | 45g |\n| Tortilla integral | — | 30g |\n| Gelatina light | — | 240ml |\n\n---\n\n### 🌿 Colación PM *(+100 kcal salsa — ambos)* 🏪\n**Shake de Vainilla y Canela con Jícama en Bastones, Manzana y Tostada Integral**\n*Batido ligero de proteína de vainilla con canela de Ceilán y agua; jícama fresca con tajín y manzana verde crujiente; pan integral tostado con mantequilla de cacahuate*\n\n| | 🧔 ATM (+salsa) | 👤 IOB (+salsa) |\n|---|---|---|\n| kcal · P · C · G | 587 · 56g · 49g · 15g | 371 · 30g · 51g · 5g |\n| Proteína en polvo | 60g | 30g |\n| Pan integral | 30g | — |\n| Mantequilla de cacahuate | 16g | — |\n| Miel de agave | 7g | — |\n| Jícama | 130g | 130g |\n| Manzana verde | 180g | 180g |\n| Nuez extra (boost salsa ATM) | 15g | — |\n\n---\n\n### 🌙 Cena 🏪 🇳🇴\n**Gravlax de Salmón con Vinagreta de Eneldo: Farro Perlado, Pepino Marinado, Betabel y Salsa de Yogurt-Mostaza**\n*Salmón cocido al vapor frío servido estilo gravlax con vinagreta de eneldo y limón, sobre farro perlado con betabel asado, pepino marinado y salsa yogurt-mostaza de grano*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 787 · 63g · 50g · 34g | 355 · 27g · 55g · 9g |\n| Salmón cocido 🏪 | 250g | 120g |\n| Farro perlado 🏪 | 150g cocido | 75g cocido |\n| Betabel asado 🏪 | 80g | 60g |\n| Pepino encurtido 🏪 | 40g | 40g |\n| Yogurt griego 0% | 60g | 40g |\n| Mostaza de grano | 10g | 8g |\n| Eneldo fresco | al gusto | al gusto |\n| Aceite de oliva | 10ml | 5ml |\n| Gelatina light | 480ml | 480ml |\n\n---\n\n### 📊 Totales Jueves 11/06\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Calorías** | **3,330** | **1,372** |\n| **Proteína** | **314g** | **115g** |\n| **Carbs** | **277g** | **169g** |\n| **Grasa** | **102g** | **42g** |\n\n---", "recipes": "## 📅 JUEVES 11 DE JUNIO\n\n---\n\n### Filete de Res au Poivre Ligero: Medallón Sous Vide con Salsa de Pimienta Verde, Camote Pommes Dauphine y Ensalada de Berros\n\n**Tiempo:** prep 15 min · cocción 8 min (sin contar sous vide) | **Porciones:** 2 (ATM 200g / IOB 120g)\n**Macros por porción:** ATM 582 kcal · P 62g · C 42g · G 17g | IOB 382 kcal · P 29g · C 17g · G 16g\n\n**Ingredientes**\n- Filete de res 🏪: ATM 200g / IOB 120g\n- Camote asado 🏪: ATM 120g / IOB 60g\n- Salsa pimienta verde 🏪: ATM 50ml / IOB 30ml\n- Berros o rúcula fresca: 50g c/u\n- Mostaza Dijon: 10g c/u\n- Aceite de oliva: ATM 10ml / IOB 5ml\n- Aguacate fresco (IOB): 45g\n- Tortilla integral (IOB): 30g\n- Gelatina light (IOB): 240ml\n\n**Mise en place** *(adelantar el domingo)*\n- Filete sous vide: sellar en bolsa al vacío con sal, pimienta negra molida gruesa y tomillo; 55 °C × 1.5 h; refrigerar hasta 4 días\n- Camote: cocer al vapor, prensar en molde, refrigerar; cortar en cubos o croquetas al regenerar\n- Salsa pimienta verde: reducir fondo de res con échalote, cognac y pimienta verde en grano; mantequilla montada opcional; refrigerar 3 días\n\n**Elaboración**\n1. **Regenerar filete:** sacar del vacío, secar completamente con papel absorbente. Sartén de hierro a máximo calor con aceite de aguacate — dorar 45 seg por cara y lateral. Temperatura interna: 55-57 °C (medio). Reposar 3 min antes de cortar.\n2. **Camote pommes dauphine:** cubos de camote cocido en sartén antiadherente a fuego alto con aceite de oliva; voltear sin mover hasta obtener costra caramelizada, 3-4 min por cara. Sazonar con sal de mar y pimentón ahumado.\n3. **Salsa:** calentar la pimienta verde en el mismo sartén del filete deglazando con caldo; incorporar la base preparada, reducir 1 min hasta napar la cuchara. Ajustar sal.\n4. **Vinagreta de berros:** emulsionar Dijon, aceite de oliva, vinagre de champagne y sal. Mezclar con berros al momento de servir — nunca antes, el ácido los marchita.\n\n**Emplatado**\nMedallón sesgado en dos, apoyado sobre el camote; salsa en hilo sobre la carne. Berros al costado con vinagreta, aguacate laminado (IOB) y chip de tortilla integral horneado.\n\n**Conservación**\nFilete sous vide: hasta 4 días refrigerado en la bolsa original. Salsa: 3 días en frasco hermético. Camote: 4 días refrigerado; regenerar en sartén seco para recuperar costra.\n\n**Tip del chef**\nAl dorar el filete post-sous vide, la superficie debe estar absolutamente seca y la sartén a ≥220 °C — cualquier humedad genera vapor y anula la reacción de Maillard. Una servilleta de papel y 30 segundos de espera marcan la diferencia.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=filete+res+au+poivre+sous+vide+receta) · [English version](https://www.youtube.com/results?search_query=beef+tenderloin+au+poivre+sous+vide)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+filete+res+au+poivre+sous+vide)\n\n---\n\n### Shake de Vainilla y Canela con Jícama en Bastones, Manzana y Tostada Integral\n\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** 2\n**Macros por porción:** ATM 587 kcal · P 56g · C 49g · G 15g | IOB 371 kcal · P 30g · C 51g · G 5g\n\n**Ingredientes**\n- Proteína en polvo vainilla: ATM 60g / IOB 30g\n- Pan integral: ATM 30g\n- Mantequilla de cacahuate natural: ATM 16g\n- Miel de agave: ATM 7g\n- Jícama: 130g c/u\n- Manzana verde: 180g c/u\n- Nuez de Castilla (boost salsa ATM): 15g\n\n**Mise en place**\n- Jícama: cortar en bastones, refrigerar en agua con limón hasta 3 días\n- Manzana: cortar al momento (oxidación rápida) o en agua con limón\n\n**Elaboración**\n1. **Shake:** batir proteína con 350-400ml agua fría e hielo. Añadir canela de Ceilán molida (≥1g — los polifenoles de la canela de Ceilán no irritan el hígado a diferencia de la Cassia). Para ATM: incorporar mantequilla de cacahuate a la licuadora para textura cremosa.\n2. **Tostada (ATM):** pan integral tostado a 200 °C hasta caramelización uniforme; untar mantequilla de cacahuate a temperatura ambiente (untabilidad óptima), hilo de agave.\n3. **Garnish:** bastones de jícama con tajín y limón; manzana en gajos con piel.\n\n**Emplatado**\nShake en vaso alto con hielo y paja metálica. Bastones y gajos en bowl pequeño lateral. Tostada en tabla individual (ATM).\n\n**Conservación**\nShake: consumir inmediato. Jícama en agua: 3 días refrigerada.\n\n**Tip del chef**\nLa mantequilla de cacahuate natural tiende a separarse — guardar invertida en el refri y homogeneizar antes de usar. Si la incorporas al shake directo de refrigerador, la grasa fría formará grumos; temperarla 5 min a temperatura ambiente antes de batir garantiza emulsión homogénea.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=shake+proteina+vainilla+canela+receta) · [English version](https://www.youtube.com/results?search_query=vanilla+cinnamon+protein+shake+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+shake+proteina+vainilla+canela+jicama)\n\n---\n\n### Gravlax de Salmón con Vinagreta de Eneldo: Farro Perlado, Pepino Marinado, Betabel y Salsa Yogurt-Mostaza\n\n**Tiempo:** prep 20 min · cocción 30 min (farro y betabel ya listos del meal prep) | **Porciones:** 2\n**Macros por porción:** ATM 787 kcal · P 63g · C 50g · G 34g | IOB 355 kcal · P 27g · C 55g · G 9g\n\n**Ingredientes**\n- Salmón cocido 🏪: ATM 250g / IOB 120g\n- Farro perlado cocido 🏪: ATM 150g / IOB 75g\n- Betabel asado 🏪: ATM 80g / IOB 60g\n- Pepino encurtido 🏪: ATM 40g / IOB 40g\n- Yogurt griego 0%: ATM 60g / IOB 40g\n- Mostaza de grano: ATM 10g / IOB 8g\n- Eneldo fresco: al gusto\n- Aceite de oliva: ATM 10ml / IOB 5ml\n- Gelatina light: 480ml c/u\n\n**Mise en place** *(adelantar el domingo)*\n- Salmón: cocer al vapor a 65 °C hasta punto (translúcido en centro); enfriar rápidamente; marinar con sal, azúcar, eneldo y ralladura de limón estilo gravlax mínimo 4 h\n- Farro perlado: cocer en caldo de verduras con laurel (proporción 1:2.5); escurrir al dente; conservar refrigerado 5 días\n- Betabel: asar a 180 °C envuelto en papel aluminio con aceite y tomillo, 45-60 min; pelar en caliente con guantes; cortar en gajos o cubos; refrigerar hasta 5 días\n- Pepino encurtido: láminas en vinagre de arroz + sal + azúcar + eneldo, mínimo 2 h\n\n**Elaboración**\n1. **Salsa yogurt-mostaza:** mezclar yogurt, mostaza de grano, ralladura de limón, eneldo picado fino, sal y pimienta blanca. Diluir con 1 cdita de agua si se requiere fluidez para salsear. Refrigerar 30 min antes de servir (los sabores se integran).\n2. **Vinagreta de eneldo:** aceite de oliva + jugo de limón + mostaza Dijon + eneldo fresco picado + sal. Emulsionar vigorosamente en frasco.\n3. **Farro:** regenerar en sartén con unas gotas de agua a fuego medio, soltar los granos con tenedor; sazonar con sal y aceite de oliva.\n4. **Betabel:** servir a temperatura ambiente o ligeramente entibiado en sartén seco.\n5. **Salmón gravlax:** servir frío o temperatura ambiente, en lascas gruesas rompiendo con tenedor; bañar con vinagreta de eneldo al momento.\n\n**Emplatado**\nBase de farro; gajos de betabel alternando con pepino encurtido. Lascas de salmón ladeadas sobre el grano. Salsa yogurt en puntos o quenelle lateral. Eneldo fresco y ralladura de limón al frente.\n\n**Conservación**\nSalmón marinado: 3 días refrigerado bien cubierto. Farro: 5 días. Betabel asado: 5 días. Salsa yogurt: 2 días.\n\n**Tip del chef**\nEl farro perlado absorbe vinagreta mientras reposa — si lo preparas con anticipación, reserva un 20% de la vinagreta para añadir al momento de emplatar y recuperar brillo y frescura ácida que el grano habría absorbido.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=gravlax+salmon+eneldo+farro+receta) · [English version](https://www.youtube.com/results?search_query=gravlax+salmon+dill+farro+bowl+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gourmet+gravlax+salmon+farro+betabel+yogurt+mostaza)\n\n---"}, {"key": "viernes", "short": "Vie", "name": "# 🗓️ VIERNES", "menu": "# 🗓️ VIERNES 12 DE JUNIO — 🏋️ Gym ATM (+150 kcal) · 3er comensal en comida\n*Gastronomía: Coreana · Mexicana · Mediterránea*\n\n---\n\n### 🌅 Desayuno 🏪 🇰🇷\n**Smoothie Bowl Proteico Seoul Style: Proteína de Fresa, Avena Cruda, Kiwi, Mango Congelado y Semillas de Sésamo Dorado**\n*Bowl espeso de proteína batida con leche de coco light y mango congelado; cubierto de avena cruda remojada, kiwi laminado, fresas frescas, semillas de sésamo dorado y ralladura de lima*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 610 · 61g · 54g · 20g | 197 · 25g · 18g · 2g |\n| Proteína en polvo | 60g | 30g |\n| Avena cruda 🏪 | 50g | — |\n| Mango congelado | 80g | — |\n| Kiwi | 100g | 80g |\n| Semillas de sésamo | 10g | — |\n| Nuez de Castilla | 15g | — |\n| Plátano | — | 80g |\n\n---\n\n### 🍎 Colación AM 🏪 🇰🇷\n**Gimbap de Pavo y Espinacas: Rollito de Arroz Integral con Nori, Pavo Deshebrado, Espinaca Sazonada y Zanahoria**\n*Rollito estilo gimbap con arroz integral al vinagre de arroz, pavo confitado, espinacas sazonadas con ajo y sésamo, zanahoria juliana; manzana verde y jícama fresca*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 764 · 72g · 82g · 17g | 347 · 34g · 28g · 10g |\n| Chapata integral 🏪 | 80g | — |\n| Arroz integral 🏪 (gimbap) | 80g cocido | — |\n| Pan integral | — | 30g |\n| Pechuga de pavo 🏪 | 200g | 50g |\n| Claras de huevo | — | 3 claras (99g) |\n| Espinaca | 30g | 30g |\n| Zanahoria | 40g | 40g |\n| Nori tostado | 4g | — |\n| Jícama | 130g | — |\n| Manzana verde | 180g | — |\n| Papaya | — | 200g |\n| Miel de agave | — | 7g |\n\n---\n\n### 🍽️ Comida *(ATM + IOB + 3er comensal)* 🏪 🇲🇽\n**Tinga Poblana de Pollo: Pechuga Confitada en Salsa de Chipotle-Jitomate, Arroz Jazmín con Maíz Tatemado, Nopales y Queso Panela**\n*Pollo confitado bañado en tinga de chipotle y jitomate san marzano; arroz jazmín con granos de maíz tatemados; nopales asados con limón y queso panela desmoronado*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 582 · 62g · 42g · 17g | 382 · 29g · 17g · 16g |\n| Pollo confitado 🏪 | 200g | 120g |\n| Salsa tinga 🏪 | 80ml | 50ml |\n| Arroz jazmín 🏪 | 200g cocido | — |\n| Nopales asados | 100g | 100g |\n| Maíz tatemado | 40g | — |\n| Queso panela | 30g | 20g |\n| Aguacate fresco | — | 45g |\n| Tortilla integral | — | 30g |\n| Gelatina light | — | 240ml |\n\n> 🍽️ 3er comensal: misma porción que ATM (200g pollo, 200g arroz, 100g nopales, 80ml tinga)\n\n---\n\n### 🌿 Colación PM *(pre-entreno gym +150 kcal ATM)* 🏪\n**Shake de Proteína con Leche de Avena, Mantequilla de Cacahuate, Pan Integral y Manzana — Boost Plátano Gym**\n*Batido cremoso con proteína, leche de avena, mantequilla de cacahuate y canela; pan integral con miel de agave; plátano extra para el entreno*\n\n| | 🧔 ATM (+gym) | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 637 · 56g · 55g · 15g | 271 · 30g · 41g · 2g |\n| Proteína en polvo | 60g | 30g |\n| Pan integral | 30g | — |\n| Mantequilla de cacahuate | 16g | — |\n| Miel de agave | 7g | — |\n| Plátano (boost gym) | 60g | — |\n| Jícama | 130g | 130g |\n| Manzana verde | — | 180g |\n\n---\n\n### 🌙 Cena 🏪 🇮🇹\n**Pasta Integral al Pesto de Espinacas y Piñones: Salmón Desmenuzado, Alcaparras, Aceitunas Verdes y Parmesano Ligero**\n*Penne integral al dente en pesto de espinacas, ajo y piñones (sin queso en base); salmón cocido desmenuzado caliente, alcaparras, aceitunas verdes en rodajas y virutas de parmesano al servir*\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| kcal · P · C · G | 787 · 63g · 50g · 34g | 355 · 27g · 55g · 9g |\n| Salmón cocido 🏪 | 250g | 120g |\n| Pasta integral 🏪 | 150g cocida | 75g cocida |\n| Pesto de espinacas 🏪 | 50g | 25g |\n| Alcaparras | 15g | 15g |\n| Aceitunas verdes | 20g | 15g |\n| Parmesano | 15g | 8g |\n| Piñones | 10g | 5g |\n| Gelatina light | 480ml | 480ml |\n\n---\n\n### 📊 Totales Viernes 12/06\n\n| | 🧔 ATM | 👤 IOB |\n|---|---|---|\n| **Calorías** | **3,380** | **1,352** |\n| **Proteína** | **314g** | **115g** |\n| **Carbs** | **283g** | **159g** |\n| **Grasa** | **103g** | **39g** |\n\n---", "recipes": "## 📅 VIERNES 12 DE JUNIO\n\n---\n\n### Smoothie Bowl Proteico Seoul Style: Proteína de Fresa, Avena Cruda, Kiwi, Mango Congelado y Semillas de Sésamo Dorado\n\n**Tiempo:** prep 10 min · sin cocción | **Porciones:** 2 (ATM completo / IOB versión reducida)\n**Macros por porción:** ATM 610 kcal · P 61g · C 54g · G 20g | IOB 197 kcal · P 25g · C 18g · G 2g\n\n**Ingredientes**\n- Proteína en polvo fresa/vainilla: ATM 60g / IOB 30g\n- Avena cruda 🏪: ATM 50g\n- Mango congelado: ATM 80g\n- Kiwi: ATM 100g / IOB 80g\n- Semillas de sésamo dorado: ATM 10g\n- Nuez de Castilla: ATM 15g\n- Plátano (IOB): 80g\n\n**Mise en place**\n- Mango: tener congelado en cubos desde el día anterior\n- Avena: remojar en leche de coco light 8 h en refri para textura cremosa (overnight oats base)\n- Kiwi y fresas: lavar, laminar al momento de servir\n\n**Elaboración**\n1. **Base del bowl (ATM):** licuar proteína en polvo + 120ml leche de coco light + mango congelado + 4-5 cubos de hielo. Velocidad máxima 45 seg — la consistencia debe ser tipo soft-serve (cuchara se sostiene parada). Si queda líquido, añadir más mango congelado, no más líquido.\n2. **Base IOB:** proteína + plátano + 200ml agua fría. Consistencia más fluida, en vaso.\n3. **Toppings (ATM):** avena remojada escurrida sobre la base; kiwi en láminas traslapadas; fresas en mitades; semillas de sésamo tostadas en sartén seco 2 min hasta dorar; nuez troceada; ralladura de lima.\n4. **Temperatura:** servir inmediatamente — el bowl pierde estructura a los 10 min.\n\n**Emplatado**\nBowl frío (llevar al congelador 5 min antes). Base compacta a ras, toppings en secciones definidas de derecha a izquierda: avena, kiwi, fresas, nuez, sésamo. Ralladura de lima al frente como contraste aromático.\n\n**Conservación**\nNo aplica — consumir inmediato. Avena remojada: preparar noche anterior, máx 24 h.\n\n**Tip del chef**\nEl sésamo dorado solo libera sus aceites aromáticos cuando se tuesta — 90 segundos en sartén seco a fuego medio-alto con movimiento constante basta. Sin tostar, aporta textura pero ningún sabor. El contraste con el frío del bowl es intencional.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=smoothie+bowl+proteico+mango+avena+receta) · [English version](https://www.youtube.com/results?search_query=korean+style+protein+smoothie+bowl+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+smoothie+bowl+proteico+mango+kiwi+sesamo)\n\n---\n\n### Gimbap de Pavo y Espinacas: Rollito de Arroz Integral con Nori, Pavo Deshebrado, Espinaca Sazonada y Zanahoria\n\n**Tiempo:** prep 25 min · cocción 5 min de ensamble | **Porciones:** 2 (ATM completo / IOB versión sin gimbap)\n**Macros por porción:** ATM 764 kcal · P 72g · C 82g · G 17g | IOB 347 kcal · P 34g · C 28g · G 10g\n\n**Ingredientes**\n- Chapata integral 🏪: ATM 80g\n- Arroz integral cocido 🏪: ATM 80g\n- Pan integral (IOB): 30g\n- Pechuga de pavo 🏪: ATM 200g / IOB 50g\n- Claras de huevo (IOB): 3 claras (99g)\n- Espinaca: 30g c/u\n- Zanahoria: 40g c/u\n- Nori tostado: ATM 4g (2 hojas ½)\n- Jícama: ATM 130g\n- Manzana verde: ATM 180g\n- Papaya (IOB): 200g\n- Miel de agave (IOB): 7g\n\n**Mise en place** *(adelantar el domingo)*\n- Arroz integral: cocer con vinagre de arroz, sal y mirin en proporción 1:2; aún tibio sazonar y extender para enfriar. Refrigerar máx 24 h antes de usar en gimbap (el frío lo endurece demasiado — sacar 20 min antes de enrollar)\n- Espinaca sazonada: blanquear 30 seg en agua hirviendo, enfriar en agua con hielo, exprimir a fondo, sazonar con aceite de sésamo, salsa de soya baja en sodio y ajo rallado\n- Zanahoria: juliana fina, saltear 2 min en aceite de sésamo con sal; enfriar\n- Pavo: deshebradar fino si es confitado o en láminas delgadas si es fiambre\n\n**Elaboración**\n1. **Gimbap (ATM):** extender hoja de nori mate hacia arriba en tapete de bambú. Cubrir con arroz integral a 5mm de espesor dejando 2cm libres en el borde superior. Disponer rellenos en línea horizontal a ⅓ inferior: espinaca, zanahoria, pavo. Enrollar con presión firme y pareja desde el borde inferior. Sellar con grano de arroz en el borde. Dejar reposar 2 min; cortar con cuchillo húmedo en piezas de 2.5cm sin dientes (cuchillo liso, presión vertical, no serruchado).\n2. **Chapata (ATM):** tostar en horno 180 °C 5 min. Cubrir con láminas de pavo, espinaca fresca, zanahoria y mostaza Dijon opcional.\n3. **IOB:** claras revueltas a fuego bajo hasta punto cremoso (65 °C interno, no más); sobre pan integral tostado con espinaca y zanahoria salteada.\n\n**Emplatado**\nPiezas de gimbap de pie, corte a la vista, en línea diagonal. Chapata al costado. Jícama y manzana en bowl separado. IOB: tostada con claras, papaya con hilo de agave.\n\n**Conservación**\nGimbap: consumir el mismo día — el nori se humedece y pierde textura. Rellenos por separado: 3 días.\n\n**Tip del chef**\nEl error más común del gimbap casero es poner demasiado arroz — una capa delgada (5mm) permite enrollar sin que el nori se rompa. Si el arroz está demasiado caliente al enrollar, el vapor ablanda el nori; si está demasiado frío, no adhiere. La ventana óptima es 32-35 °C.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=gimbap+casero+arroz+integral+pavo+receta) · [English version](https://www.youtube.com/results?search_query=homemade+gimbap+turkey+brown+rice+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+gimbap+saludable+arroz+integral+pavo+espinacas)\n\n---\n\n### Tinga Poblana de Pollo: Pechuga Confitada en Salsa Chipotle-Jitomate, Arroz Jazmín con Maíz Tatemado, Nopales y Queso Panela\n\n**Tiempo:** prep 10 min · cocción 15 min (ensamble con bases prep) | **Porciones:** 3 (ATM + IOB + 3er comensal)\n**Macros por porción:** ATM 582 kcal · P 62g · C 42g · G 17g | IOB 382 kcal · P 29g · C 17g · G 16g\n\n**Ingredientes**\n- Pollo confitado 🏪: ATM y 3er comensal 200g c/u / IOB 120g\n- Salsa tinga 🏪: ATM y 3er comensal 80ml c/u / IOB 50ml\n- Arroz jazmín cocido 🏪: ATM y 3er comensal 200g c/u\n- Nopales asados: 100g c/u (los tres)\n- Maíz tatemado: ATM y 3er comensal 40g c/u\n- Queso panela: ATM y 3er comensal 30g / IOB 20g\n- Aguacate fresco (IOB): 45g\n- Tortilla integral (IOB): 30g\n- Gelatina light (IOB): 240ml\n\n**Mise en place** *(adelantar el domingo)*\n- Pollo confitado: muslos/pechuga cocidos a 75 °C en aceite de oliva con ajo y hierbas; deshebradar; refrigerar hasta 5 días\n- Salsa tinga: sofreír cebolla hasta caramelizar; licuar jitomate san marzano + chipotles adobados + ajo; reducir hasta napar la cuchara; sazonar; refrigerar 5 días\n- Nopales: asar en comal o plancha caliente en seco hasta que suelten baba y marquen; sazonar con limón y sal; refrigerar 3 días\n- Maíz tatemado: granos en sartén seco a fuego alto, sin mover, hasta que pontean y carbonizan ligeramente en puntos; reservar a temperatura ambiente\n\n**Elaboración**\n1. **Tinga:** calentar salsa en sartén a fuego medio hasta hervir suave; incorporar pollo deshebrado, reducir calor, integrar 3-4 min hasta que el pollo absorba la salsa. Si la salsa está muy seca, agregar 2 cdas de caldo de pollo.\n2. **Arroz:** regenerar en sartén con 1 cda agua, tapar 2 min; destapar y soltar granos. Incorporar maíz tatemado y mezclar fuera del fuego.\n3. **Nopales:** regenerar en plancha caliente 2 min por cara o servir fríos como ensalada con limón.\n4. **Panela:** desmoronar en el momento (la humedad del queso frío ablanda todo lo demás si se añade antes).\n\n**Emplatado**\nArroz con maíz como base; tinga sobre el arroz; nopal al costado. Queso panela desmoronado a última hora. IOB: tinga sobre tortilla integral con aguacate en cubos y gotas de limón.\n\n**Conservación**\nTinga: 5 días refrigerada o 3 meses congelada. Arroz: 4 días. Nopales asados: 3 días.\n\n**Tip del chef**\nEl chipotlé adobado tiene un calor que se potencia con el calor — añade la mitad de la cantidad que crees necesaria, reduce la salsa, prueba y ajusta. Una vez reducida y servida caliente, el picor es notablemente mayor que en crudo. Para la versión ligera, enjuaga los chipotles antes de licuar para reducir el sodio del adobo sin perder ahumado.\n\n---\n🎥 **Video tutorial:** [Buscar en YouTube ES](https://www.youtube.com/results?search_query=tinga+poblana+pollo+receta+gourmet) · [English version](https://www.youtube.com/results?search_query=tinga+poblana+chicken+chipotle+recipe)\n📖 **Receta de referencia:** [Buscar en Google](https://www.google.com/search?q=receta+tinga+poblana+pollo+chipotle+jitomate+gourmet)\n\n---\n\n### Shake Proteico Pre-Entreno: Proteína con Leche de Avena, Mantequilla de Cacahuate, Pan Integral y Boost Plátano Gym\n\n**Tiempo:** prep 5 min · sin cocción | **Porciones:** 2\n**Macros por porción:** ATM 637 kcal · P 56g · C 55g · G 15g | IOB 271 kcal · P 30g · C 41g · G 2g\n\n**Ingredientes**\n- Proteína en polvo: ATM 60g / IOB 30g\n- Pan integral: ATM 30g\n- Mantequilla de cacahuate natural: ATM 16g\n- Miel de agave: ATM 7g\n- Plátano boost gym: ATM 60g\n- Jícama: ATM 130g\n- Manzana verde (IOB): 180g\n\n**Mise en place**\n- Plátano: tener a temperatura ambiente (el frío apaga el sabor)\n- Jícama: bastones en agua con limón\n\n**Elaboración**\n1. **Shake ATM:** licuar proteína + 300ml leche de avena + mantequilla de cacahuate + ½ plátano maduro + 2 cubos hielo. El plátano actúa como espesante natural y fuente de carbohidratos de rápida absorción — ideal 60-90 min pre-entreno.\n2. **Shake IOB:** proteína + 350ml agua fría. Simple, sin grasa añadida.\n3. **Pan integral ATM:** tostar; hilo de agave como carga glucémica adicional para el entreno.\n\n**Emplatado**\nShake en botella o vaso para llevar. Pan en bolsa individual si se consume en tránsito hacia el gym.\n\n**Conservación**\nConsumir inmediato o máx 2 h refrigerado en botella cerrada.\n\n**Tip del chef**\nEl timing pre-entreno importa más que el platillo: carbohidratos de í ## 🗓️ DOMINGO 07 DE JUNIO — Sesión Principal

**Duración objetivo: 4.5–5 horas**
**Recomendación:** Empezar a las 09:00, terminar a las 14:00–14:30

### Pre-sesión: Mise en Place General (15 min antes de arrancar)

Antes de encender cualquier quemador u horno:

1. Sacar filete de res del refrigerador → atemperar a temperatura ambiente (mínimo 30 min antes del sous vide)
2. Drenar y enjuagar lentejas negras del remojo
3. Drenar y enjuagar farro perlado del remojo
4. Poner a calentar el water bath del sous vide (o olla grande con termómetro) a **57°C** — este proceso tarda 20–30 min
5. Organizar todos los contenedores etiquetados vacíos sobre la barra
6. Imprimir o tener visible la lista de contenedores

---

### TURNO 1 — 09:00 · Arrancar Todo lo de Largo Tiempo

> **Objetivo:** Encender horno, arrancar sous vide, poner caldos y fermentados. Estos no requieren atención constante.

**[09:00] HORNO → 200°C convección**

**[09:02] Camotes al horno**
- 6–7 camotes medianos (aprox. 1.5kg total) → lavar, secar, pinchar 8 veces con tenedor cada uno
- Colocar directamente sobre la rejilla del horno (sin charola, para piel crujiente) con papel aluminio en el fondo del horno para goteos
- Hornear **55–65 minutos** hasta que inserten un palillo sin resistencia y la piel esté arrugada
- NO sacar aún — estarán listos al final del Turno 2

**[09:05] Betabel al horno**
- 3–4 betabeles medianos → lavar, no pelar, envolver individualmente en papel aluminio con 3ml aceite de oliva y pizca de sal
- Colocar en charola en la rejilla inferior del horno
- Hornear **60–75 minutos** a 200°C hasta que un palillo entre sin resistencia

**[09:07] QUEMADOR 1 → Water bath sous vide**
- Olla de 8L llena a 2/3 con agua → mantener a **57°C exactos** con termómetro digital (o usar circulador si se tiene)
- Sumergir todas las bolsas de filete de res marinadas → asegurar que estén completamente sumergidas con un peso (plato pequeño)
- Tiempo de sous vide: **mínimo 90 minutos, máximo 3 horas** — a 57°C no hay sobrecocción en ese rango
- ⚠️ Verificar temperatura cada 20 min y ajustar quemador

**[09:10] QUEMADOR 2 → Caldo Dashi**
- Olla mediana 3L: 1.2L agua fría + 30g kombu en trozo → llevar a **60°C** a fuego bajo-medio (NO hervir el kombu)
- Mantener a 60°C por **30 minutos** → retirar kombu
- Subir a fuego medio hasta casi hervir (90°C) → apagar → añadir 20g katsuobushi (bonito) → infusionar **5 minutos** sin hervir
- Colar con malla fina → reservar en olla pequeña
- Total tiempo: ~40 min → listo a las 09:50

**[09:10 PARALELO] QUEMADOR 3 → Salsa verde tomatillo**
- 600g tomatillos sin cáscara + 2 chiles serranos + 4 dientes ajo + 1/2 cebolla blanca → asar en comal o sartén de hierro a fuego alto
- Voltear cuando estén negros en partes (5–7 min por lado) → los tomatillos deben reventar
- Licuar con 1 manojo cilantro, sal, 100ml agua → velocidad alta 30 seg
- Probar sal → reservar en contenedor
- Total: ~20 min → listo a las 09:30

**[09:12 PARALELO] QUEMADOR 4 → Lentejas negras**
- Olla mediana: lentejas drenadas + agua fría al doble de volumen + 1 hoja laurel + 1/2 cebolla + 3 dientes ajo + 5g sal

- Drenar, retirar laurel y cebolla → reservar
- Total: ~35 min → listas a las 09:45

---

**[09:30] REVISIÓN RÁPIDA:**
- ✅ Salsa verde lista → enfriar, contenedor, refrigerador
- ✅ Dashi: verificar temperatura (debería estar en fase kombu)
- ✅ Sous vide: verificar temperatura

**[09:35] Arroz jazmín — primera tanda (QUEMADOR 3 libre)**

- Hervir → reducir al mínimo → tapar hermético → **18 minutos sin abrir**

- Total: ~30 min → listo a las 10:05

**[09:40] Farro perlado (QUEMADOR 4 libre)**

**[10:25] QUEMADOR 3 → Vaporera para salmón**

let ratings = JSON.parse(localStorage.getItem(RATING_KEY) || '{}');

function rkey(title) {
  return title.toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function saveRatings() {
  localStorage.setItem(RATING_KEY, JSON.stringify(ratings));
  renderFavoritos();
}

function addRatingWidgets() {
  const dayShort = DAYS[curDay]?.short || '';
  document.getElementById('recipes-day').querySelectorAll('h3').forEach(h3 => {
    if (h3.nextElementSibling?.classList.contains('recipe-rating')) return;
    const title = h3.textContent.trim();
    const key   = rkey(title);
    const r     = ratings[key] || { stars: 0, tag: '', title, day: dayShort };

    const w = document.createElement('div');
    w.className = 'recipe-rating not-prose flex items-center flex-wrap gap-2 my-2 px-3 py-2 bg-gray-50 rounded-lg';
    w.dataset.recipe = key;

    // Stars
    const sd = document.createElement('div');
    sd.className = 'flex gap-0.5 items-center';
    for (let s = 1; s <= 5; s++) {
      const sb = document.createElement('span');
      sb.className = 'star-btn' + (s <= r.stars ? ' lit' : '');
      sb.textContent = '★';
      sb.onclick = () => {
        const ns = ratings[key]?.stars === s ? 0 : s;
        ratings[key] = { ...(ratings[key] || {}), stars: ns, title, day: dayShort };
        saveRatings();
        w.querySelectorAll('.star-btn').forEach((b, j) => b.classList.toggle('lit', j < ns));
      };
      sd.appendChild(sb);
    }
    w.appendChild(sd);

    // Tag buttons
    [['favorito','❤️ fav','active-fav'],['repetir','🔄 repetir','active-rep'],['no','🚫 no','active-no']].forEach(([t, l, ac]) => {
      const tb = document.createElement('button');
      tb.className = 'tag-btn' + (r.tag === t ? ' ' + ac : '');
      tb.dataset.tag = t;
      tb.textContent = l;
      tb.onclick = () => {
        const cur = ratings[key]?.tag;
        ratings[key] = { ...(ratings[key] || {}), tag: cur === t ? '' : t, title, day: dayShort };
        saveRatings();
        const newTag = ratings[key].tag;
        w.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.remove('active-fav','active-rep','active-no');
          if (b.dataset.tag === newTag) {
            if (newTag === 'favorito') b.classList.add('active-fav');
            else if (newTag === 'repetir') b.classList.add('active-rep');
            else if (newTag === 'no') b.classList.add('active-no');
          }
        });
      };
      w.appendChild(tb);
    });

    h3.after(w);
  });
}

// ── Favoritos section ─────────────────────────────────────────────────────────
function renderFavoritos() {
  const favs = Object.values(ratings).filter(r => r.tag === 'favorito' || r.tag === 'repetir' || r.stars >= 4);
  const sec  = document.getElementById('fav-section');
  const list = document.getElementById('fav-list');
  if (!favs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = favs.map(r => {
    const tagEl = r.tag === 'favorito' ? '<span class="text-xs bg-red-50 text-red-400 border border-red-100 px-2 py-0.5 rounded-full">❤️ fav</span>'
                : r.tag === 'repetir'  ? '<span class="text-xs bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 rounded-full">🔄 repetir</span>'
                : '';
    const starsEl = r.stars > 0 ? `<span class="text-yellow-400 text-sm tracking-tighter">${'★'.repeat(r.stars)}</span>` : '';
    return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        ${tagEl}
        <span class="text-sm text-gray-700 truncate">${r.title}</span>
        ${r.day ? `<span class="text-xs text-gray-400 shrink-0">${r.day}</span>` : ''}
      </div>
      ${starsEl}
    </div>`;
  }).join('');
}

function shop(which) {
  curShop = which;
  const on  = 'px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white';
  const off = 'px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600';
  document.getElementById('btn-costco').className = which === 'costco' ? on : off;
  document.getElementById('btn-city').className   = which === 'city'   ? on : off;
  const el = document.getElementById('shop-content');
  el.innerHTML = marked.parse(C[which] || '_Sin contenido_');
  let tot = 0, chk = 0;
  el.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    const k = which + '_' + i;
    cb.checked = !!checks[k];
    if (cb.checked) chk++;
    tot++;
    cb.addEventListener('change', () => {
      checks[k] = cb.checked;
      localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
      setProgress(which);
    });
  });
  setProgress(which, tot, chk);
}

function setProgress(which, tot, chk) {
  if (tot === undefined) {
    const boxes = document.getElementById('shop-content').querySelectorAll('input[type=checkbox]');
    tot = boxes.length; chk = 0;
    boxes.forEach((cb, i) => { if (checks[which + '_' + i]) chk++; });
  }
  const p = document.getElementById('check-prog');
  p.textContent = tot ? `${chk} / ${tot} ítems` : '';
  p.className = chk === tot && tot > 0 ? 'text-xs text-green-600 font-medium' : 'text-xs text-gray-400 font-medium';
}

function clearChecks() {
  Object.keys(checks).filter(k => k.startsWith(curShop + '_')).forEach(k => delete checks[k]);
  localStorage.setItem(SHOP_KEY, JSON.stringify(checks));
  shop(curShop);
}

      { label: 'kcal consumidas', data: calData, backgroundColor: 'rgba(5,150,105,.7)', borderRadius: 6, borderSkipped: false },
      { label: 'Meta', data: Array(7).fill(calTarget), type: 'line', borderColor: '#f59e0b', borderWidth: 2, borderDash: [6,4], pointRadius: 0, fill: false }
    ]},
    options: { responsive: true, plugins: { title: { display: true, text: 'Calorías · Esta semana' }, legend: { position: 'bottom' } } }
  });
  const t = tr.today?.totals || {};
  new Chart(document.getElementById('chart-macro'), {
    type: 'doughnut',
    data: { labels: ['Proteína','Carbs','Grasas'],
      datasets: [{ data: [t.protein_g||0, t.carbs_g||0, t.fat_g||0], backgroundColor: ['#60a5fa','#fb923c','#fbbf24'], borderWidth: 0 }] },
    options: { responsive: true, cutout: '62%', plugins: { title: { display: true, text: 'Macros · Hoy' }, legend: { position: 'bottom' } } }
  });
  const wh = (tr.weight_history || []).slice().reverse();
  if (wh.length > 0) {
    new Chart(document.getElementById('chart-weight'), {
      type: 'line',
      data: { labels: wh.map(w => w.date.slice(5)),
        datasets: [{ label: 'kg', data: wh.map(w => w.weight_kg), borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,.08)', fill: true, tension: 0.3, pointRadius: 3 }] },
      options: { responsive: true, plugins: { title: { display: true, text: 'Tendencia de peso' }, legend: { display: false } }, scales: { y: { beginAtZero: false } } }
    });
  }
}
</script>
</body>
</html>
